name: Build Bankmovie V1.4 V3 Player Modal Three APKs

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build Bankmovie V1.4 V3 Player Modal ARM64 V7A Universal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip exact V1.4 V3 source
        shell: bash
        run: |
          set -euo pipefail
          ZIP="Bankmovie-v1.4-source-v3-player-modal.zip"
          if [ ! -f "$ZIP" ]; then
            echo "==================== REAL ERROR ===================="
            echo "Missing $ZIP in repository root."
            echo "===================================================="
            exit 1
          fi
          rm -rf project
          mkdir project
          unzip -q "$ZIP" -d project
          test -f project/settings.gradle
          test -f project/app/build.gradle
          test -f project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt

      - name: Fix Kotlin regex escape
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path("project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt")
          source = path.read_text(encoding="utf-8")

          old = r'Regex("\d+")'
          new = r'Regex("""\d+""")'

          count = source.count(old)
          if count != 1:
              print("==================== REAL ERROR ====================")
              print(f"Expected exactly one broken Regex occurrence, found: {count}")
              print("====================================================")
              raise SystemExit(1)

          path.write_text(source.replace(old, new, 1), encoding="utf-8")
          print("Kotlin regex escape fixed successfully.")
          PY

          grep -Fq 'Regex("""\d+""")' project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt

      - name: Verify real V3 source changes
        shell: bash
        run: |
          set -euo pipefail
          MAIN="project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt"
          GRADLE="project/app/build.gradle"

          grep -Fq 'versionCode 1090000 + runNumber' "$GRADLE"
          grep -Fq 'versionName "1.4"' "$GRADLE"
          grep -Fq 'include "armeabi-v7a", "arm64-v8a"' "$GRADLE"
          grep -Fq 'universalApk true' "$GRADLE"
          grep -Fq 'private fun selectedRemoteApkUrl()' "$MAIN"
          grep -Fq 'private fun currentVersionBlockReason()' "$MAIN"
          grep -Fq 'blocked_version_names' "$MAIN"
          grep -Fq 'minimum_version_name' "$MAIN"
          grep -Fq 'apk_urls' "$MAIN"
          grep -Fq 'compareReleaseVersions(targetName, currentName) > 0' "$MAIN"

          LOADER_BLOCK="$(sed -n '/private fun movieDetailLoading/,/private fun skeletonPosterCard/p' "$MAIN")"
          if printf '%s' "$LOADER_BLOCK" | grep -Fq 'نسخه ۱.۴'; then
            echo "==================== REAL ERROR ===================="
            echo "Movie detail spinner still contains the version label."
            echo "===================================================="
            exit 1
          fi

          if grep -Fq 'remoteForceUpdate || remoteVersionCode > currentCode' "$MAIN"; then
            echo "==================== REAL ERROR ===================="
            echo "Old repeated-update condition still exists."
            echo "===================================================="
            exit 1
          fi

          grep -Fq 'private fun showPlaybackMethodDialog(' "$MAIN"
          grep -Fq 'R.drawable.ic_vlc_logo' "$MAIN"
          grep -Fq 'setPackage("org.videolan.vlc")' "$MAIN"
          grep -Fq 'Intent.createChooser(intent' "$MAIN"
          test -f project/app/src/main/res/drawable/ic_vlc_logo.xml
          test -f project/app/src/main/res/drawable/ic_external_player.xml

          echo "V1.4 V3 player modal source changes verified before build."

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          echo "sdk.dir=$ANDROID_HOME" > project/local.properties

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build and verify three APKs
        working-directory: project
        shell: bash
        run: |
          set -uo pipefail
          rm -rf app/build publish

          set +e
          gradle :app:assembleRelease --no-daemon --max-workers=1 --stacktrace --console=plain 2>&1 | tee build.log
          BUILD_STATUS=${PIPESTATUS[0]}
          set -e

          if [ "$BUILD_STATUS" -ne 0 ]; then
            echo ""
            echo "================ KOTLIN COMPILER ERRORS ================"
            grep -E '(^e: |^w: |\.kt:[0-9]+:[0-9]+|\.kt \([0-9]+,[0-9]+\)|Unresolved reference|Type mismatch|Overload resolution ambiguity|Cannot infer|No value passed|Too many arguments|Expecting )|Expecting an element)' build.log | tail -n 240 || true
            echo "==================== REAL ERROR ========================="
            grep -Ei 'FAILURE:|What went wrong:|Execution failed|error:|Exception|Caused by:' build.log | tail -n 180 || true
            echo "-------------------- LAST LOG LINES ---------------------"
            tail -n 120 build.log || true
            echo "========================================================="
            exit "$BUILD_STATUS"
          fi

          OUT="app/build/outputs/apk/release"
          ARM64="$(find "$OUT" -maxdepth 1 -type f -name '*arm64-v8a*release*.apk' | head -n 1)"
          V7A="$(find "$OUT" -maxdepth 1 -type f -name '*armeabi-v7a*release*.apk' | head -n 1)"
          UNIVERSAL="$(find "$OUT" -maxdepth 1 -type f -name '*universal*release*.apk' | head -n 1)"

          for spec in "ARM64:$ARM64" "V7A:$V7A" "UNIVERSAL:$UNIVERSAL"; do
            LABEL="${spec%%:*}"
            APK="${spec#*:}"
            if [ -z "$APK" ]; then
              echo "==================== REAL ERROR ===================="
              echo "$LABEL APK was not produced."
              find "$OUT" -maxdepth 1 -type f -name '*.apk' -print 2>/dev/null || true
              echo "===================================================="
              exit 1
            fi
          done

          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          EXPECTED_SHA256="862bc358d8d239a2134a63fab979ff6019862372e7950ea49bac74780936205d"

          verify_apk() {
            local apk="$1"
            local label="$2"
            local badging="apk-badging-${label}.txt"
            local signing="apk-signature-${label}.txt"

            "$AAPT" dump badging "$apk" > "$badging"

            if ! grep -Fq "versionName='1.4'" "$badging"; then
              echo "==================== REAL ERROR ===================="
              echo "$label APK versionName is not 1.4."
              grep -m1 '^package:' "$badging" || true
              echo "===================================================="
              exit 1
            fi

            if ! grep -Fq "package: name='ir.bankmoviee.app'" "$badging"; then
              echo "==================== REAL ERROR ===================="
              echo "$label APK package name is wrong."
              grep -m1 '^package:' "$badging" || true
              echo "===================================================="
              exit 1
            fi

            set +e
            "$APKSIGNER" verify --verbose --print-certs "$apk" > "$signing" 2>&1
            local sign_status=$?
            set -e

            if [ "$sign_status" -ne 0 ]; then
              echo "==================== REAL ERROR ===================="
              echo "$label APK signature verification failed."
              cat "$signing"
              echo "===================================================="
              exit "$sign_status"
            fi

            local actual_sha256
            actual_sha256="$(
              sed -n 's/^Signer #1 certificate SHA-256 digest: //p' "$signing" \
                | head -n 1 \
                | tr '[:upper:]' '[:lower:]' \
                | tr -d ':[:space:]'
            )"

            if [ -z "$actual_sha256" ] || [ "$actual_sha256" != "$EXPECTED_SHA256" ]; then
              echo "==================== REAL ERROR ===================="
              echo "$label APK signer does not match the previous Bankmovie release."
              echo "Expected: $EXPECTED_SHA256"
              echo "Actual:   ${actual_sha256:-missing}"
              echo "===================================================="
              exit 1
            fi

            echo "$label verified:"
            grep -m1 '^package:' "$badging"
            grep -E '^Signer #1 certificate (DN|SHA-256 digest):' "$signing" || true
          }

          verify_apk "$ARM64" "arm64"
          verify_apk "$V7A" "v7a"
          verify_apk "$UNIVERSAL" "universal"

          mkdir -p publish/arm64 publish/v7a publish/universal
          cp "$ARM64" "publish/arm64/Bankmovie-v1.4-v3-arm64-v8a-build-${GITHUB_RUN_NUMBER}.apk"
          cp "$V7A" "publish/v7a/Bankmovie-v1.4-v3-armeabi-v7a-build-${GITHUB_RUN_NUMBER}.apk"
          cp "$UNIVERSAL" "publish/universal/Bankmovie-v1.4-v3-universal-build-${GITHUB_RUN_NUMBER}.apk"
          sha256sum publish/arm64/*.apk > publish/arm64/SHA256.txt
          sha256sum publish/v7a/*.apk > publish/v7a/SHA256.txt
          sha256sum publish/universal/*.apk > publish/universal/SHA256.txt
          find publish -maxdepth 2 -type f -printf '%p  %k KB\n' | sort

      - name: Upload diagnostic build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.4-V3-Build-Log-${{ github.run_number }}
          path: project/build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.4-V3-ARM64-${{ github.run_number }}
          path: project/publish/arm64/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload V7A APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.4-V3-V7A-${{ github.run_number }}
          path: project/publish/v7a/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.4-V3-Universal-${{ github.run_number }}
          path: project/publish/universal/*
          if-no-files-found: error
          retention-days: 14
