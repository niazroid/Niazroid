name: Build BankMoviee V11 Visual Pro Fix 1

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build BankMoviee V11 Visual Pro Fix 1 APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and unzip project ZIP
        id: unzip
        shell: bash
        run: |
          echo "Files in repository root:"
          ls -la

          ZIP_FILE="$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            echo "Upload the project ZIP in the main Code page."
            exit 1
          fi

          echo "Using ZIP file: $ZIP_FILE"

          rm -rf project
          mkdir project
          unzip -q "$ZIP_FILE" -d project

          SETTINGS_FILE="$(find project -maxdepth 5 -type f -name "settings.gradle" | head -n 1)"

          if [ -z "$SETTINGS_FILE" ]; then
            echo "Could not find settings.gradle after unzip."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          echo "Android project directory: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Patch BankMoviee V11 Visual Pro Fix 1
        shell: bash
        env:
          PROJECT_DIR: ${{ steps.unzip.outputs.project_dir }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os, re, base64

          project = Path(os.environ["PROJECT_DIR"])
          LOGO_B64 = ""
          HEADER_LOGO_B64 = ""
          ADM_LOGO_B64 = ""

          gradle_props = project / "gradle.properties"
          existing = gradle_props.read_text(encoding="utf-8") if gradle_props.exists() else ""
          props = {}
          for line in existing.splitlines():
              if "=" in line and not line.strip().startswith("#"):
                  k, v = line.split("=", 1)
                  props[k.strip()] = v.strip()
          props["android.useAndroidX"] = "true"
          props["android.enableJetifier"] = "true"
          merged, seen = [], set()
          for line in existing.splitlines():
              if "=" in line and not line.strip().startswith("#"):
                  k = line.split("=", 1)[0].strip()
                  if k in props:
                      merged.append(f"{k}={props[k]}")
                      seen.add(k)
                  else:
                      merged.append(line)
              else:
                  merged.append(line)
          for k, v in props.items():
              if k not in seen:
                  merged.append(f"{k}={v}")
          gradle_props.write_text("\n".join(merged).strip() + "\n", encoding="utf-8")

          app_gradle = project / "app" / "build.gradle"
          if app_gradle.exists():
              text = app_gradle.read_text(encoding="utf-8")
              text = re.sub(r"\n\s*splits\s*\{\s*abi\s*\{.*?\n\s*\}\s*\}\s*", "\n", text, flags=re.S)
              text = re.sub(r"\n\s*ndk\s*\{\s*abiFilters[^\n]*\n\s*\}\s*", "\n", text, flags=re.S)
              text = re.sub(r"\n\s*abiFilters[^\n]*", "\n", text, flags=re.S)
              if "BANKMOVIE_ARCHIVE1_ACCURATE_MOVIEPHP" not in text:
                  text += """
          android {
              // BANKMOVIE_ARCHIVE1_ACCURATE_MOVIEPHP
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          """
              app_gradle.write_text(text, encoding="utf-8")

          manifest = project / "app" / "src" / "main" / "AndroidManifest.xml"
          if manifest.exists():
              text = manifest.read_text(encoding="utf-8")
              if "android.permission.INTERNET" not in text:
                  text = text.replace("<application", '<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <application', 1)
              if ".PlayerActivity" not in text:
                  text = text.replace("</application>", '        <activity android:name=".PlayerActivity" android:screenOrientation="fullSensor" android:configChanges="orientation|screenSize|keyboardHidden" />\n    </application>', 1)
              text = text.replace('android:screenOrientation="sensorLandscape"', 'android:screenOrientation="fullSensor"')
              text = text.replace('android:screenOrientation="landscape"', 'android:screenOrientation="fullSensor"')
              manifest.write_text(text, encoding="utf-8")

          res_dir = project / "app" / "src" / "main" / "res" / "drawable-nodpi"
          res_dir.mkdir(parents=True, exist_ok=True)
          if LOGO_B64:
              (res_dir / "bankmoviee_logo.jpg").write_bytes(base64.b64decode(LOGO_B64))

          drawable_dir = project / "app" / "src" / "main" / "res" / "drawable"
          drawable_dir.mkdir(parents=True, exist_ok=True)

          LITE_BRAND_VECTORS = {
              "bankmovie_logo_transparent.xml": """<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="180dp" android:height="72dp" android:viewportWidth="180" android:viewportHeight="72">
                  <path android:fillColor="#F5C045" android:pathData="M10,12h33c12,0 20,7 20,18c0,6 -3,11 -8,14c6,3 10,8 10,15c0,13 -9,21 -23,21H10zM27,27v13h13c4,0 7,-2 7,-6s-3,-7 -7,-7zM27,52v13h16c5,0 8,-2 8,-6.5S48,52 43,52z"/>
                  <path android:fillColor="#F5C045" android:pathData="M66,22l27,14l-27,14z"/>
                  <path android:fillColor="#E7E7E7" android:pathData="M98,12h18l20,26l20,-26h18v58h-17V38l-21,26h-1l-20,-26v32H98z"/>
                  <path android:fillColor="#F5C045" android:pathData="M10,62h63v6H10z"/>
                  <path android:fillColor="#E7E7E7" android:pathData="M78,62h92v6H78z"/>
              </vector>""",
              "adm_logo_transparent.xml": """<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="48dp" android:height="48dp" android:viewportWidth="48" android:viewportHeight="48">
                  <path android:fillColor="#E54B3E" android:pathData="M5,18h9v-9h9v24h7L18,45L5,33h7z"/>
                  <path android:fillColor="#7DB842" android:pathData="M18,4h13v25h9L24,45L8,29h10z"/>
                  <path android:fillColor="#159BD8" android:pathData="M31,16h8v14h7L35,45L24,30h7z"/>
              </vector>"""
          }
          for name, xml in LITE_BRAND_VECTORS.items():
              (drawable_dir / name).write_text(xml, encoding="utf-8")

          drawable_nodpi = project / "app" / "src" / "main" / "res" / "drawable-nodpi"
          drawable_nodpi.mkdir(parents=True, exist_ok=True)
          if HEADER_LOGO_B64:
              (drawable_nodpi / "bankmovie_logo_transparent.png").write_bytes(base64.b64decode(HEADER_LOGO_B64))
          if ADM_LOGO_B64:
