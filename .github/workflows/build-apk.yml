name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Find project folder
        id: project
        shell: bash
        run: |
          if [ -f "settings.gradle" ]; then
            echo "dir=." >> $GITHUB_OUTPUT
          elif [ -f "BankMovieeNativeVLCApp/settings.gradle" ]; then
            echo "dir=BankMovieeNativeVLCApp" >> $GITHUB_OUTPUT
          else
            echo "Could not find settings.gradle"
            find . -maxdepth 3 -name "settings.gradle"
            exit 1
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        working-directory: ${{ steps.project.outputs.dir }}
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        working-directory: ${{ steps.project.outputs.dir }}
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BankMoviee-debug-apk
          path: ${{ steps.project.outputs.dir }}/app/build/outputs/apk/debug/*.apk
