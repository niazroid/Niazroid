name: Build Bankmovie V1.5 V12 YAML Only Player Profile Responsive Fix

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build V1.5 V12 ARM64 V7A Lite Universal Full Universal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip exact V1.5 source
        shell: bash
        run: |
          set -euo pipefail
          ZIP="Bankmovie-v1.5-source-v11-archive2-content-fix.zip"
          if [ ! -f "$ZIP" ]; then
            echo "==================== REAL ERROR ===================="
            echo "Missing $ZIP in repository root."
            echo "===================================================="
            exit 1
          fi
          rm -rf project
          mkdir project
          unzip -q "$ZIP" -d project
          test -f project/settings.gradle
          test -f project/app/build.gradle
          test -f project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt

      - name: Verify V1.5 V11 archive 2 content fixes
        shell: bash
        run: |
          set -euo pipefail
          MAIN="project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt"
          GRADLE="project/app/build.gradle"

          grep -Fq 'versionName "1.5"' "$GRADLE"
          grep -Fq 'versionCode 1150000 + runNumber' "$GRADLE"
          grep -Fq 'minifyEnabled true' "$GRADLE"
          grep -Fq 'shrinkResources true' "$GRADLE"
          grep -Fq 'private fun archiveSwitchBar()' "$MAIN"
          grep -Fq 'private var selectedArchive = 1' "$MAIN"
          grep -Fq 'private var archive2ApiBase' "$MAIN"
          grep -Fq 'private var archive1LiveApiBase' "$MAIN"
          grep -Fq 'section == "dubbed" || section == "chinese_series"' "$MAIN"
          grep -Fq 'addRail(page, "سریال‌های چینی", 1, "chinese_series", false)' "$MAIN"
          grep -Fq 't("پخش با بانک مووی", "Play with Bankmovie")' "$MAIN"
          grep -Fq 'BankmovieAndroidNative/1.5-V11' "$MAIN"

          if grep -Fq 'BankmovieAndroidNative/1.4' "$MAIN"; then
            echo "Old 1.4 User-Agent remains in source."
            exit 1
          fi

          test -f project/app/src/main/res/drawable/ic_archive_database.xml
          test -f project/app/src/main/res/drawable/ic_archive_globe.xml
          test -f project/server-required/archive1_live.php
          test -f project/server-required/api5.php

          grep -Fq '"updated_movies" -> "movies_2025_2026"' "$MAIN"
          grep -Fq 'addRail(page, "اکران 2025 و 2026", 2, "updated_movies", false)' "$MAIN"
          grep -Fq 'addRail(page, "سریال‌های آپدیت‌شده", 2, "updated_series", false)' "$MAIN"
          grep -Fq 'private fun cleanArchive2DisplayTitle' "$MAIN"
          grep -Fq 'maxLines = 2' "$MAIN"

          if grep -Fq 'addRail(page, "زیرنویس فارسی", 2, "subtitled", false)' "$MAIN"; then
            echo "Archive 2 subtitle rail still exists."
            exit 1
          fi

          grep -Fq 'function serialblog_get_movies_2025_2026' project/server-required/api5_lib.php
          grep -Fq 'function serialblog_clean_display_title' project/server-required/api5_lib.php
          grep -Fq "serialblog_extract_downloads(\$xpath, \$detectedType)" project/server-required/api5_lib.php

          echo "V1.5 V11 base source verified before V12 YAML patch."

      - name: Apply V12 YAML-only app fixes
        shell: bash
        run: |
          set -euo pipefail

          cat > /tmp/patch_v12.py <<'PY'
          from pathlib import Path
          import re

          main_path = Path(
              "project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt"
          )
          player_path = Path(
              "project/app/src/main/java/ir/bankmoviee/app/PlayerActivity.kt"
          )

          main = main_path.read_text(encoding="utf-8")
          player = player_path.read_text(encoding="utf-8")

          # 1) حذف دکمه تریلر فقط برای آرشیو 2
          old = '''        actions.addView(detailActionButton("پخش آنلاین", R.drawable.ic_play_fill, true) { showPlayableSheet(item) }, LinearLayout.LayoutParams(0, dp(58), 1.2f).apply { marginStart = dp(10) })
                  actions.addView(purpleTrailerButton { playTrailer(item) }, LinearLayout.LayoutParams(0, dp(58), 1f).apply { marginStart = dp(16) })
                  actions.addView(favoriteHeartButton(item) {
          '''

          new = '''        actions.addView(detailActionButton("پخش آنلاین", R.drawable.ic_play_fill, true) { showPlayableSheet(item) }, LinearLayout.LayoutParams(0, dp(58), 1.2f).apply { marginStart = dp(10) })
                  if (item.optInt("archive", selectedArchive) != 2) {
                      actions.addView(purpleTrailerButton { playTrailer(item) }, LinearLayout.LayoutParams(0, dp(58), 1f).apply { marginStart = dp(16) })
                  }
                  actions.addView(favoriteHeartButton(item) {
          '''

          if old not in main:
              raise SystemExit("Trailer action block not found")

          main = main.replace(old, new, 1)

          # 2) آرشیو 2 فقط Similar واقعی API را نمایش دهد
          old = '''        val related = item.optJSONArray("related") ?: item.optJSONArray("related_movies") ?: JSONArray()
                  if (related.length() > 0) {
                      addJsonRail(page, "پیشنهاد فیلم", related)
                  } else {
                      val similarQuery = genres.firstOrNull().orEmpty().ifBlank { title }
                      addSearchRail(page, "پیشنهاد فیلم", similarQuery, "all", item.optInt("archive", selectedArchive))
                  }
          '''

          new = '''        val detailArchive = item.optInt("archive", selectedArchive)
                  val related = item.optJSONArray("related") ?: item.optJSONArray("related_movies") ?: JSONArray()
                  if (related.length() > 0) {
                      addJsonRail(page, "پیشنهاد فیلم", related)
                  } else if (detailArchive != 2) {
                      val similarQuery = genres.firstOrNull().orEmpty().ifBlank { title }
                      addSearchRail(page, "پیشنهاد فیلم", similarQuery, "all", detailArchive)
                  }
          '''

          if old not in main:
              raise SystemExit("Related rail block not found")

          main = main.replace(old, new, 1)

          # 3) اصلاح عرض کارت‌ها در صفحه مشاهده همه
          old_line = (
              "        val cardW = if (tv) tvGridCardWidth() else dp(116)"
          )

          new_line = (
              "        val cardW = if (tv) tvGridCardWidth() "
              "else ((resources.displayMetrics.widthPixels - dp(72)) / 3)"
              ".coerceAtLeast(dp(88))"
          )

          count = main.count(old_line)

          if count < 2:
              raise SystemExit(
                  f"Expected at least two fixed list card widths, found {count}"
              )

          main = main.replace(old_line, new_line)

          # 4) طراحی حرفه‌ای ادامه تماشا
          start = main.index(
              "    private fun profileStoredCard("
              "storeKey: String, item: JSONObject): LinearLayout {"
          )

          end = main.index(
              "    private fun showLocalList("
              "title: String, storeKey: String, emptyText: String) {",
              start,
          )

          replacement = r'''    private fun continueProgressValues(item: JSONObject): Pair<Long, Long> {
                  val url = item.optString("url")
                  val key = item.optString("progress_key").ifBlank {
                      if (url.isBlank()) "" else "progress_$url"
                  }

                  if (key.isBlank()) return 0L to 0L

                  val prefs = appPrefs()

                  val position = prefs.getLong(
                      key,
                      if (url.isNotBlank()) {
                          prefs.getLong("progress_$url", 0L)
                      } else {
                          0L
                      }
                  )

                  val duration = prefs.getLong(
                      "${key}_duration",
                      if (url.isNotBlank()) {
                          prefs.getLong("progress_${url}_duration", 0L)
                      } else {
                          0L
                      }
                  )

                  return position.coerceAtLeast(0L) to
                      duration.coerceAtLeast(0L)
              }

              private fun profileStoredCard(
                  storeKey: String,
                  item: JSONObject
              ): LinearLayout {
                  return LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setPadding(dp(3), dp(3), dp(3), dp(3))

                      if (storeKey == "continue") {
                          val cardBox = LinearLayout(this@MainActivity).apply {
                              orientation = LinearLayout.HORIZONTAL
                              layoutDirection = View.LAYOUT_DIRECTION_LTR
                              gravity = Gravity.CENTER_VERTICAL

                              background = rounded(
                                  Color.rgb(22, 24, 29),
                                  dp(22),
                                  Color.argb(72, 255, 255, 255)
                              )

                              clipToOutline = true

                              setOnClickListener {
                                  openStoredContinue(item)
                              }

                              applyTvFocusHalo(
                                  this,
                                  22,
                                  1.025f,
                                  0f
                              )
                          }

                          val imageFrame = FrameLayout(
                              this@MainActivity
                          ).apply {
                              background = rounded(
                                  Color.rgb(13, 16, 22),
                                  dp(20),
                                  Color.argb(70, 255, 255, 255)
                              )

                              clipToOutline = true
                          }

                          val image = ImageView(
                              this@MainActivity
                          ).apply {
                              scaleType =
                                  ImageView.ScaleType.CENTER_CROP
                          }

                          imageFrame.addView(
                              image,
                              FrameLayout.LayoutParams(-1, -1)
                          )

                          loadImage(
                              item.optString("poster")
                                  .ifBlank {
                                      item.optString("image")
                                  }
                                  .ifBlank {
                                      item.optString("cover_image")
                                  }
                                  .ifBlank {
                                      item.optString("backdrop")
                                  },
                              image
                          )

                          cardBox.addView(
                              imageFrame,
                              LinearLayout.LayoutParams(
                                  dp(112),
                                  -1
                              )
                          )

                          val details = LinearLayout(
                              this@MainActivity
                          ).apply {
                              orientation = LinearLayout.VERTICAL
                              layoutDirection =
                                  View.LAYOUT_DIRECTION_RTL

                              gravity =
                                  Gravity.CENTER_VERTICAL or
                                  Gravity.RIGHT

                              setPadding(
                                  dp(18),
                                  dp(13),
                                  dp(16),
                                  dp(13)
                              )
                          }

                          val titleValue =
                              item.optString("title_fa")
                                  .ifBlank {
                                      item.optString("title")
                                  }
                                  .ifBlank {
                                      "Bankmovie"
                                  }

                          val season = item.optInt("season", 0)
                          val episode = item.optInt("episode", 0)

                          val episodeLabel = when {
                              season > 0 && episode > 0 ->
                                  "S%02d • E%02d".format(
                                      season,
                                      episode
                                  )

                              episode > 0 ->
                                  "قسمت $episode"

                              else ->
                                  item.optString("type_fa")
                          }

                          val quality =
                              item.optString("quality")
                                  .ifBlank {
                                      item.optString(
                                          "display_label"
                                      )
                                  }

                          val (position, duration) =
                              continueProgressValues(item)

                          val remaining =
                              if (
                                  duration > position &&
                                  duration > 0L
                              ) {
                                  duration - position
                              } else {
                                  0L
                              }

                          val titleRow = LinearLayout(
                              this@MainActivity
                          ).apply {
                              orientation =
                                  LinearLayout.HORIZONTAL

                              layoutDirection =
                                  View.LAYOUT_DIRECTION_LTR

                              gravity =
                                  Gravity.CENTER_VERTICAL
                          }

                          titleRow.addView(
                              TextView(
                                  this@MainActivity
                              ).apply {
                                  text = titleValue
                                  setTextColor(Color.WHITE)
                                  textSize = 16.5f
                                  typeface =
                                      Typeface.DEFAULT_BOLD

                                  maxLines = 1
                                  ellipsize =
                                      TextUtils.TruncateAt.END

                                  gravity = Gravity.LEFT
                              },
                              LinearLayout.LayoutParams(
                                  0,
                                  -2,
                                  1f
                              )
                          )

                          titleRow.addView(
                              ImageView(
                                  this@MainActivity
                              ).apply {
                                  setImageResource(
                                      R.drawable.ic_seen_eye
                                  )

                                  setColorFilter(
                                      Color.rgb(
                                          205,
                                          214,
                                          228
                                      )
                                  )

                                  setPadding(
                                      dp(3),
                                      dp(3),
                                      dp(3),
                                      dp(3)
                                  )
                              },
                              LinearLayout.LayoutParams(
                                  dp(28),
                                  dp(28)
                              ).apply {
                                  marginStart = dp(8)
                              }
                          )

                          details.addView(
                              titleRow,
                              LinearLayout.LayoutParams(
                                  -1,
                                  -2
                              )
                          )

                          details.addView(
                              TextView(
                                  this@MainActivity
                              ).apply {
                                  text = listOf(
                                      episodeLabel,
                                      quality
                                  )
                                      .filter {
                                          it.isNotBlank()
                                      }
                                      .joinToString("  •  ")

                                  setTextColor(
                                      Color.rgb(
                                          151,
                                          158,
                                          171
                                      )
                                  )

                                  textSize = 12f
                                  maxLines = 1

                                  ellipsize =
                                      TextUtils.TruncateAt.END

                                  gravity = Gravity.LEFT
                              },
                              LinearLayout.LayoutParams(
                                  -1,
                                  -2
                              ).apply {
                                  topMargin = dp(8)
                              }
                          )

                          val progressTrack = FrameLayout(
                              this@MainActivity
                          ).apply {
                              background = rounded(
                                  Color.rgb(48, 53, 61),
                                  dp(3),
                                  Color.TRANSPARENT
                              )
                          }

                          val fraction = when {
                              duration > 0L ->
                                  (
                                      position.toFloat() /
                                      duration.toFloat()
                                  ).coerceIn(0.03f, 1f)

                              position > 0L -> 0.35f
                              else -> 0.03f
                          }

                          progressTrack.addView(
                              View(
                                  this@MainActivity
                              ).apply {
                                  background = rounded(
                                      Color.rgb(
                                          95,
                                          130,
                                          151
                                      ),
                                      dp(3),
                                      Color.TRANSPARENT
                                  )
                              },
                              FrameLayout.LayoutParams(
                                  0,
                                  -1
                              ).apply {
                                  width = (
                                      (
                                          resources
                                              .displayMetrics
                                              .density * 145f
                                      ) * fraction
