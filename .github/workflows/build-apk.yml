name: Build Bankmovie V1.8 V18 Internal Downloader Cast

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build V1.8 V18 ARM64 V7A Lite Universal Full Universal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip exact V1.8 source
        shell: bash
        run: |
          set -euo pipefail
          ZIP="Bankmovie-v1.8-source-v18-downloader-cast-subtitle.zip"
          if [ ! -f "$ZIP" ]; then
            echo "==================== REAL ERROR ===================="
            echo "Missing $ZIP in repository root."
            echo "===================================================="
            exit 1
          fi
          rm -rf project
          mkdir project
          unzip -q "$ZIP" -d project
          test -f project/settings.gradle
          test -f project/app/build.gradle
          test -f project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt

      - name: Verify legacy update signing key
        shell: bash
        run: |
          set -euo pipefail
          test -f project/bankmovie_update.jks
          KEY_INFO="$(keytool -list -v -keystore project/bankmovie_update.jks -storepass bankmovie123 -alias bankmovie)"
          printf '%s\n' "$KEY_INFO"
          NORMALIZED="$(printf '%s\n' "$KEY_INFO" | sed -n 's/.*SHA256: //p' | head -n1 | tr '[:upper:]' '[:lower:]' | tr -d ':[:space:]')"
          EXPECTED="862bc358d8d239a2134a63fab979ff6019862372e7950ea49bac74780936205d"
          if [ "$NORMALIZED" != "$EXPECTED" ]; then
            echo "Legacy Bankmovie signing key mismatch: $NORMALIZED"
            exit 1
          fi
          echo "Legacy signing key verified: $NORMALIZED"

      - name: Verify V1.8 V18 source
        shell: bash
        run: |
          set -euo pipefail
          MAIN="project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt"
          PLAYER="project/app/src/main/java/ir/bankmoviee/app/PlayerActivity.kt"
          PREFS="project/app/src/main/java/ir/bankmoviee/app/UiPreferences.kt"
          STORE="project/app/src/main/java/ir/bankmoviee/app/InternalDownloadStore.kt"
          SERVICE="project/app/src/main/java/ir/bankmoviee/app/InternalDownloadService.kt"
          DOWNLOADS="project/app/src/main/java/ir/bankmoviee/app/DownloadsActivity.kt"
          CAST="project/app/src/main/java/ir/bankmoviee/app/CastOptionsProvider.kt"
          MANIFEST="project/app/src/main/AndroidManifest.xml"
          GRADLE="project/app/build.gradle"

          grep -Fq 'versionName "1.8"' "$GRADLE"
          grep -Fq 'versionCode 3200000 + runNumber' "$GRADLE"
          grep -Fq "androidx.core:core-ktx" "$GRADLE"
          grep -Fq "play-services-cast-framework" "$GRADLE"
          grep -Fq 'minifyEnabled true' "$GRADLE"
          grep -Fq 'shrinkResources true' "$GRADLE"

          test -f "$PREFS"
          test -f "$STORE"
          test -f "$SERVICE"
          test -f "$DOWNLOADS"
          test -f "$CAST"
          test -f project/app/src/main/res/xml/file_paths.xml
          test -f project/app/src/main/res/drawable/ic_telegram.xml

          grep -Fq 'InternalDownloadService' "$MANIFEST"
          grep -Fq 'DownloadsActivity' "$MANIFEST"
          grep -Fq 'CastOptionsProvider' "$MANIFEST"
          grep -Fq 'android.permission.FOREGROUND_SERVICE_DATA_SYNC' "$MANIFEST"
          grep -Fq 'android.permission.CHANGE_WIFI_MULTICAST_STATE' "$MANIFEST"
          grep -Fq 'androidx.core.content.FileProvider' "$MANIFEST"

          grep -Fq 'دانلودر داخلی بانک مووی' "$MAIN"
          grep -Fq 'InternalDownloadService.start' "$MAIN"
          grep -Fq 'دانلودهای من' "$MAIN"
          grep -Fq 'private fun linkKindLabel(link: JSONObject)' "$MAIN"
          grep -Fq 'سافت‌ساب فارسی' "$MAIN"
          grep -Fq 'هاردساب فارسی' "$MAIN"
          grep -Fq 'دوبله فارسی' "$MAIN"
          grep -Fq 'صوت دوبله' "$MAIN"
          grep -Fq 'showDownloadChoiceModal(item, link)' "$MAIN"
          grep -Fq 'if (iconRes != R.drawable.ic_telegram)' "$MAIN"

          grep -Fq 'MediaRouteButton' "$PLAYER"
          grep -Fq 'CastButtonFactory.setUpMediaRouteButton' "$PLAYER"
          grep -Fq 'private fun castCurrentMedia' "$PLAYER"
          grep -Fq 'MediaLoadRequestData.Builder()' "$PLAYER"
          grep -Fq 'private fun maybePromptNextEpisode' "$PLAYER"
          grep -Fq 'time.toDouble() / length.toDouble() < 0.95' "$PLAYER"
          grep -Fq 'private fun nextEpisodeIndex()' "$PLAYER"
          grep -Fq 'private fun showAudioSubtitleSettingsSheet()' "$PLAYER"
          grep -Fq 'اعمال صدا و زیرنویس' "$PLAYER"

          grep -Fq 'getInt(KEY_SUB_TEXT_COLOR, Color.YELLOW)' "$PREFS"
          grep -Fq 'getString(KEY_SUB_BG_MODE, "black")' "$PREFS"
          grep -Fq 'const val KEY_AUTO_NEXT = "player_auto_next"' "$PREFS"

          grep -Fq 'RandomAccessFile' "$SERVICE"
          grep -Fq 'setRequestProperty("Range", "bytes=$start-")' "$SERVICE"
          grep -Fq 'Executors.newFixedThreadPool(2)' "$SERVICE"
          grep -Fq 'FileProvider.getUriForFile' "$DOWNLOADS"

          if grep -R -E 'bonVF|vazir\.ttf|KEY_FONT|KEY_SUB_FONT|customFontFile' project/app/src/main project/app/build.gradle; then
            echo "Custom font code or asset still exists."
            exit 1
          fi
          if grep -Fq 'دانلود با Chrome' "$MAIN"; then
            echo "Chrome downloader must be removed from the modal."
            exit 1
          fi
          if find project/app/src/main -type f \( -iname '*.ttf' -o -iname '*.otf' -o -iname '*.woff' -o -iname '*.woff2' \) | grep -q .; then
            echo "A font file is still packaged."
            exit 1
          fi

          echo "V1.8 V18 downloader, Cast, subtitle defaults and link labels verified."

      - name: Force first build to ARM64 and V7A only
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("project/app/build.gradle")
          source = path.read_text(encoding="utf-8")

          source = re.sub(
              r'\n\s*ndk\s*\{\s*abiFilters[^\n]*\n\s*\}',
              '',
              source,
              count=1,
              flags=re.MULTILINE,
          )

          marker = '        versionName "1.8"\n'
          replacement = (
              '        versionName "1.8"\n'
              '        ndk {\n'
              '            abiFilters "armeabi-v7a", "arm64-v8a"\n'
              '        }\n'
          )
          if marker not in source:
              raise SystemExit("Could not find versionName insertion point")
          source = source.replace(marker, replacement, 1)

          source, changed = re.subn(
              r'include\s+[^\n]+',
              'include "armeabi-v7a", "arm64-v8a"',
              source,
              count=1,
          )
          if changed != 1:
              raise SystemExit("Could not set two-ABI split list")

          source, changed = re.subn(
              r'universalApk\s+(?:false|true)',
              'universalApk true',
              source,
              count=1,
          )
          if changed != 1:
              raise SystemExit("Could not enable universal APK")

          path.write_text(source, encoding="utf-8")
          PY
          grep -Fq 'abiFilters "armeabi-v7a", "arm64-v8a"' project/app/build.gradle
          grep -Fq 'include "armeabi-v7a", "arm64-v8a"' project/app/build.gradle

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          echo "sdk.dir=$ANDROID_HOME" > project/local.properties

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build and verify four APKs
        working-directory: project
        shell: bash
        run: |
          set -uo pipefail
          rm -rf app/build publish
          mkdir -p publish/arm64 publish/v7a publish/universal-lite publish/universal-full

          print_real_error() {
            local log_file="$1"
            local exit_code="$2"
            echo ""
            echo "================ KOTLIN COMPILER ERRORS ================"
            grep -E '(^e: |^w: |\.kt:[0-9]+:[0-9]+|\.kt \([0-9]+,[0-9]+\)|Unresolved reference|Type mismatch|Overload resolution ambiguity|Cannot infer|No value passed|Too many arguments|Unsupported escape|Expecting)' "$log_file" | tail -n 260 || true
            echo "==================== REAL ERROR ========================="
            grep -Ei 'FAILURE:|What went wrong:|Execution failed|error:|Exception|Caused by:' "$log_file" | tail -n 200 || true
            echo "-------------------- LAST LOG LINES ---------------------"
            tail -n 140 "$log_file" || true
            echo "========================================================="
            exit "$exit_code"
          }

          build_release() {
            local log_file="$1"
            local mode="$2"
            rm -rf app/build
            set +e
            if [ "$mode" = "append" ]; then
              gradle :app:assembleRelease --no-daemon --max-workers=1 --stacktrace --console=plain 2>&1 | tee -a "$log_file"
            else
              gradle :app:assembleRelease --no-daemon --max-workers=1 --stacktrace --console=plain 2>&1 | tee "$log_file"
            fi
            local status=${PIPESTATUS[0]}
            set -e
            if [ "$status" -ne 0 ]; then
              print_real_error "$log_file" "$status"
            fi
          }

          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          EXPECTED_SHA256="862bc358d8d239a2134a63fab979ff6019862372e7950ea49bac74780936205d"

          verify_apk() {
            local apk="$1"
            local label="$2"
            local expected_mode="$3"
            local badging="apk-badging-${label}.txt"
            local signing="apk-signature-${label}.txt"

            "$AAPT" dump badging "$apk" > "$badging"
            grep -Fq "versionName='1.8'" "$badging" || { echo "$label versionName is not 1.8"; grep -m1 '^package:' "$badging" || true; exit 1; }
            grep -Fq "package: name='ir.bankmoviee.app'" "$badging" || { echo "$label package is wrong"; exit 1; }
            VERSION_CODE="$(sed -n "s/.*versionCode='\([0-9][0-9]*\)'.*/\1/p" "$badging" | head -n1)"
            if [ -z "$VERSION_CODE" ] || [ "$VERSION_CODE" -lt 3200001 ]; then
              echo "$label versionCode is not high enough for V18 in-place update: ${VERSION_CODE:-missing}"
              exit 1
            fi

            local native_line
            native_line="$(grep -m1 '^native-code:' "$badging" || true)"
            case "$expected_mode" in
              arm64)
                printf '%s' "$native_line" | grep -Fq "'arm64-v8a'" || { echo "ARM64 ABI missing"; exit 1; }
                printf '%s' "$native_line" | grep -Eq "armeabi-v7a|x86" && { echo "ARM64 APK contains unwanted ABI: $native_line"; exit 1; } || true
                ;;
              v7a)
                printf '%s' "$native_line" | grep -Fq "'armeabi-v7a'" || { echo "V7A ABI missing"; exit 1; }
                printf '%s' "$native_line" | grep -Eq "arm64-v8a|x86" && { echo "V7A APK contains unwanted ABI: $native_line"; exit 1; } || true
                ;;
              lite-universal)
                printf '%s' "$native_line" | grep -Fq "'arm64-v8a'" || { echo "Lite Universal arm64 missing"; exit 1; }
                printf '%s' "$native_line" | grep -Fq "'armeabi-v7a'" || { echo "Lite Universal v7a missing"; exit 1; }
                printf '%s' "$native_line" | grep -Eq "'x86'|'x86_64'" && { echo "Lite Universal contains x86: $native_line"; exit 1; } || true
                ;;
              full-universal)
                for abi in arm64-v8a armeabi-v7a x86 x86_64; do
                  printf '%s' "$native_line" | grep -Fq "'$abi'" || { echo "Full Universal missing $abi: $native_line"; exit 1; }
                done
                ;;
            esac

            set +e
            "$APKSIGNER" verify --verbose --print-certs "$apk" > "$signing" 2>&1
            local sign_status=$?
            set -e
            [ "$sign_status" -eq 0 ] || { cat "$signing"; exit "$sign_status"; }

            local actual_sha256
            actual_sha256="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' "$signing" | head -n1 | tr '[:upper:]' '[:lower:]' | tr -d ':[:space:]')"
            [ "$actual_sha256" = "$EXPECTED_SHA256" ] || { echo "$label signer mismatch: $actual_sha256"; exit 1; }

            echo "$label verified:"
            grep -m1 '^package:' "$badging"
            grep -m1 '^native-code:' "$badging" || true
            grep -E '^Signer #1 certificate (DN|SHA-256 digest):' "$signing" || true
          }

          echo "========== BUILD 1: ARM64 + V7A + LITE UNIVERSAL =========="
          build_release "build.log" "new"

          OUT="app/build/outputs/apk/release"
          ARM64="$(find "$OUT" -maxdepth 1 -type f -name '*arm64-v8a*release*.apk' | head -n1)"
          V7A="$(find "$OUT" -maxdepth 1 -type f -name '*armeabi-v7a*release*.apk' | head -n1)"
          LITE_UNIVERSAL="$(find "$OUT" -maxdepth 1 -type f -name '*universal*release*.apk' | head -n1)"
          [ -n "$ARM64" ] && [ -n "$V7A" ] && [ -n "$LITE_UNIVERSAL" ] || { find "$OUT" -maxdepth 1 -type f -name '*.apk' -print || true; exit 1; }

          verify_apk "$ARM64" "arm64" "arm64"
          verify_apk "$V7A" "v7a" "v7a"
          verify_apk "$LITE_UNIVERSAL" "universal-lite" "lite-universal"

          cp "$ARM64" "publish/arm64/Bankmovie-v1.8-v18-arm64-v8a-build-${GITHUB_RUN_NUMBER}.apk"
          cp "$V7A" "publish/v7a/Bankmovie-v1.8-v18-armeabi-v7a-build-${GITHUB_RUN_NUMBER}.apk"
          cp "$LITE_UNIVERSAL" "publish/universal-lite/Bankmovie-v1.8-v18-universal-lite-2abi-build-${GITHUB_RUN_NUMBER}.apk"

          echo "========== BUILD 2: FULL UNIVERSAL 4 ABI =========="
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("app/build.gradle")
          source = path.read_text(encoding="utf-8")
          source, split_changed = re.subn(
              r'include\s+"armeabi-v7a",\s*"arm64-v8a"',
              'include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"',
              source,
              count=1,
          )
          source, filter_changed = re.subn(
              r'abiFilters\s+"armeabi-v7a",\s*"arm64-v8a"',
              'abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"',
              source,
              count=1,
          )
          if split_changed != 1 or filter_changed != 1:
              raise SystemExit(f"Could not enable four ABIs: split={split_changed}, filter={filter_changed}")
          path.write_text(source, encoding="utf-8")
          PY

          grep -Fq 'include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"' app/build.gradle
          grep -Fq 'abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"' app/build.gradle
          build_release "build.log" "append"

          OUT="app/build/outputs/apk/release"
          FULL_UNIVERSAL="$(find "$OUT" -maxdepth 1 -type f -name '*universal*release*.apk' | head -n1)"
          [ -n "$FULL_UNIVERSAL" ] || { find "$OUT" -maxdepth 1 -type f -name '*.apk' -print || true; exit 1; }
          verify_apk "$FULL_UNIVERSAL" "universal-full" "full-universal"
          cp "$FULL_UNIVERSAL" "publish/universal-full/Bankmovie-v1.8-v18-universal-full-4abi-build-${GITHUB_RUN_NUMBER}.apk"

          for dir in arm64 v7a universal-lite universal-full; do
            sha256sum "publish/$dir"/*.apk > "publish/$dir/SHA256.txt"
          done

          echo "================ APK SIZES ================"
          for apk in publish/*/*.apk; do
            bytes=$(stat -c%s "$apk")
            mib=$(awk -v b="$bytes" 'BEGIN { printf "%.1f", b/1048576 }')
            echo "$(basename "$apk"): ${mib} MiB"
          done
          echo "==========================================="

      - name: Upload diagnostic build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.8-V18-Build-Log-${{ github.run_number }}
          path: project/build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.8-V18-ARM64-${{ github.run_number }}
          path: project/publish/arm64/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload V7A APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.8-V18-V7A-${{ github.run_number }}
          path: project/publish/v7a/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload Lite Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.8-V18-Universal-Lite-2ABI-${{ github.run_number }}
          path: project/publish/universal-lite/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload Full Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.8-V18-Universal-Full-4ABI-${{ github.run_number }}
          path: project/publish/universal-full/*
          if-no-files-found: error
          retention-days: 14
