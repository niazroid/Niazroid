name: Build BankMoviee API First Blue Native

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build API First Blue Native APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and unzip project ZIP
        id: unzip
        shell: bash
        run: |
          echo "Files in repository root:"
          ls -la

          ZIP_FILE="$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            echo "Upload the project ZIP in the main Code page."
            exit 1
          fi

          echo "Using ZIP file: $ZIP_FILE"

          rm -rf project
          mkdir project
          unzip -q "$ZIP_FILE" -d project

          SETTINGS_FILE="$(find project -maxdepth 5 -type f -name "settings.gradle" | head -n 1)"

          if [ -z "$SETTINGS_FILE" ]; then
            echo "Could not find settings.gradle after unzip."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          echo "Android project directory: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Patch BankMoviee API First Blue Native
        shell: bash
        env:
          PROJECT_DIR: ${{ steps.unzip.outputs.project_dir }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os, re
          project = Path(os.environ["PROJECT_DIR"])

          gradle_props = project / "gradle.properties"
          existing = gradle_props.read_text(encoding="utf-8") if gradle_props.exists() else ""
          props = {}
          for line in existing.splitlines():
              if "=" in line and not line.strip().startswith("#"):
                  k, v = line.split("=", 1)
                  props[k.strip()] = v.strip()
          props["android.useAndroidX"] = "true"
          props["android.enableJetifier"] = "true"
          merged, seen = [], set()
          for line in existing.splitlines():
              if "=" in line and not line.strip().startswith("#"):
                  k = line.split("=", 1)[0].strip()
                  if k in props:
                      merged.append(f"{k}={props[k]}")
                      seen.add(k)
                  else:
                      merged.append(line)
              else:
                  merged.append(line)
          for k, v in props.items():
              if k not in seen:
                  merged.append(f"{k}={v}")
          gradle_props.write_text("\n".join(merged).strip() + "\n", encoding="utf-8")

          app_gradle = project / "app" / "build.gradle"
          if app_gradle.exists():
              text = app_gradle.read_text(encoding="utf-8")
              text = re.sub(r"\n\s*splits\s*\{\s*abi\s*\{.*?\n\s*\}\s*\}\s*", "\n", text, flags=re.S)
              text = re.sub(r"\n\s*ndk\s*\{\s*abiFilters[^\n]*\n\s*\}\s*", "\n", text, flags=re.S)
              text = re.sub(r"\n\s*abiFilters[^\n]*", "\n", text, flags=re.S)
              if "BANKMOVIE_API_FIRST_BLUE_NATIVE" not in text:
                  text += """
          android {
              // BANKMOVIE_API_FIRST_BLUE_NATIVE
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          """
              app_gradle.write_text(text, encoding="utf-8")

          manifest = project / "app" / "src" / "main" / "AndroidManifest.xml"
          if manifest.exists():
              text = manifest.read_text(encoding="utf-8")
              if "android.permission.INTERNET" not in text:
                  text = text.replace("<application", '<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <application', 1)
              if ".PlayerActivity" not in text:
                  text = text.replace("</application>", '        <activity android:name=".PlayerActivity" android:screenOrientation="fullSensor" android:configChanges="orientation|screenSize|keyboardHidden" />\n    </application>', 1)
              text = text.replace('android:screenOrientation="sensorLandscape"', 'android:screenOrientation="fullSensor"')
              text = text.replace('android:screenOrientation="landscape"', 'android:screenOrientation="fullSensor"')
              manifest.write_text(text, encoding="utf-8")

          java_dir = project / "app" / "src" / "main" / "java"
          main_files = list(java_dir.rglob("MainActivity.kt"))
          if not main_files:
              main_files = [java_dir / "ir" / "bankmoviee" / "app" / "MainActivity.kt"]
          main_file = main_files[0]
          main_file.parent.mkdir(parents=True, exist_ok=True)
          player_file = main_file.parent / "PlayerActivity.kt"
          main_file.write_text('package ir.bankmoviee.app\n\nimport android.app.Activity\nimport android.app.AlertDialog\nimport android.content.Intent\nimport android.graphics.BitmapFactory\nimport android.graphics.Color\nimport android.graphics.Typeface\nimport android.os.Bundle\nimport android.text.TextUtils\nimport android.view.Gravity\nimport android.view.View\nimport android.view.ViewGroup\nimport android.view.Window\nimport android.view.WindowInsets\nimport android.view.WindowInsetsController\nimport android.widget.Button\nimport android.widget.EditText\nimport android.widget.FrameLayout\nimport android.widget.GridLayout\nimport android.widget.HorizontalScrollView\nimport android.widget.ImageButton\nimport android.widget.ImageView\nimport android.widget.LinearLayout\nimport android.widget.ProgressBar\nimport android.widget.ScrollView\nimport android.widget.TextView\nimport android.widget.Toast\nimport org.json.JSONArray\nimport org.json.JSONObject\nimport java.net.HttpURLConnection\nimport java.net.URL\nimport java.net.URLEncoder\nimport java.util.Locale\nimport kotlin.math.roundToInt\n\nclass MainActivity : Activity() {\n\n    private val apiBase = "https://bankmoviee.ir/app_api.php"\n    private val blue = Color.rgb(0, 122, 255)\n    private val blue2 = Color.rgb(0, 175, 255)\n    private val bg = Color.rgb(13, 17, 27)\n    private val panel = Color.rgb(23, 29, 43)\n    private val panel2 = Color.rgb(30, 38, 55)\n    private val txt = Color.WHITE\n    private val muted = Color.rgb(170, 181, 198)\n\n    private lateinit var root: LinearLayout\n    private lateinit var content: FrameLayout\n    private lateinit var bottomNav: LinearLayout\n    private lateinit var titleBar: TextView\n    private var currentScreen = "home"\n\n    override fun onCreate(savedInstanceState: Bundle?) {\n        super.onCreate(savedInstanceState)\n        requestWindowFeature(Window.FEATURE_NO_TITLE)\n        window.statusBarColor = bg\n        window.navigationBarColor = bg\n        if (android.os.Build.VERSION.SDK_INT >= 23) {\n            window.decorView.systemUiVisibility = 0\n        }\n        buildShell()\n        showHome()\n    }\n\n    private fun buildShell() {\n        root = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setBackgroundColor(bg)\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n\n        val top = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            setPadding(dp(14), dp(14), dp(14), dp(8))\n            layoutParams = LinearLayout.LayoutParams(-1, dp(72))\n        }\n\n        val searchBtn = smallIconButton("⌕")\n        searchBtn.setOnClickListener { showSearch() }\n\n        titleBar = TextView(this).apply {\n            text = "بانک مووی"\n            setTextColor(txt)\n            textSize = 21f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.CENTER\n            layoutParams = LinearLayout.LayoutParams(0, -1, 1f)\n        }\n\n        val menuBtn = smallIconButton("☰")\n        menuBtn.setOnClickListener { showArchivePicker() }\n\n        top.addView(searchBtn)\n        top.addView(titleBar)\n        top.addView(menuBtn)\n\n        content = FrameLayout(this).apply {\n            layoutParams = LinearLayout.LayoutParams(-1, 0, 1f)\n        }\n\n        bottomNav = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n            setPadding(dp(10), dp(8), dp(10), dp(12))\n            setBackgroundColor(Color.rgb(16, 22, 34))\n            layoutParams = LinearLayout.LayoutParams(-1, dp(78))\n        }\n\n        root.addView(top)\n        root.addView(content)\n        root.addView(bottomNav)\n        setContentView(root)\n        buildBottomNav()\n    }\n\n    private fun buildBottomNav() {\n        bottomNav.removeAllViews()\n        addNavItem("خانه", "home") { showHome() }\n        addNavItem("فیلم", "movies") { showSectionScreen("فیلم\u200cهای جدید", 3, "new_movies", "movie") }\n        addNavItem("سریال", "series") { showSectionScreen("سریال\u200cهای جدید", 3, "new_series", "series") }\n        addNavItem("جستجو", "search") { showSearch() }\n    }\n\n    private fun addNavItem(label: String, key: String, click: () -> Unit) {\n        val selected = currentScreen == key\n        val v = TextView(this).apply {\n            text = label\n            textSize = 13f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            setTextColor(if (selected) Color.WHITE else muted)\n            background = rounded(if (selected) blue else Color.TRANSPARENT, dp(24), if (selected) blue else Color.TRANSPARENT)\n            setPadding(dp(14), 0, dp(14), 0)\n            layoutParams = LinearLayout.LayoutParams(0, dp(52), 1f).apply {\n                marginStart = dp(4)\n                marginEnd = dp(4)\n            }\n            setOnClickListener { click() }\n        }\n        bottomNav.addView(v)\n    }\n\n    private fun clear(title: String) {\n        titleBar.text = title\n        content.removeAllViews()\n    }\n\n    private fun showHome() {\n        currentScreen = "home"\n        buildBottomNav()\n        clear("بانک مووی")\n        val scroll = ScrollView(this)\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(14), dp(6), dp(14), dp(24))\n        }\n        scroll.addView(box)\n        content.addView(scroll)\n\n        addHero(box)\n        addFilterChips(box)\n        addLoadingRow(box, "در حال دریافت محتوا از API")\n\n        val requests = listOf(\n            Triple(3, "new_series", "سریال\u200cهای بروز شده"),\n            Triple(3, "new_movies", "فیلم\u200cهای جدید"),\n            Triple(1, "new_movies", "آرشیو ۱"),\n            Triple(3, "new_anime", "انیمه")\n        )\n        box.removeAllViews()\n        addHero(box)\n        addFilterChips(box)\n        requests.forEach { (archive, section, title) ->\n            addSectionFromApi(box, title, archive, section)\n        }\n    }\n\n    private fun addHero(box: LinearLayout) {\n        val hero = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.BOTTOM or Gravity.RIGHT\n            setPadding(dp(18), dp(18), dp(18), dp(18))\n            background = rounded(panel2, dp(26), Color.rgb(42, 52, 72))\n            layoutParams = LinearLayout.LayoutParams(-1, dp(210)).apply {\n                bottomMargin = dp(18)\n            }\n        }\n        hero.addView(TextView(this).apply {\n            text = "تماشای آنلاین با پلیر اختصاصی"\n            setTextColor(txt)\n            textSize = 23f\n            typeface = Typeface.DEFAULT_BOLD\n        })\n        hero.addView(TextView(this).apply {\n            text = "آرشیو ۱ و ۳، سریع، Native و آماده توسعه"\n            setTextColor(muted)\n            textSize = 13f\n            setPadding(0, dp(8), 0, dp(14))\n        })\n        val btn = Button(this).apply {\n            text = "شروع تماشا"\n            setTextColor(Color.WHITE)\n            textSize = 15f\n            typeface = Typeface.DEFAULT_BOLD\n            background = rounded(blue, dp(22), blue)\n            setOnClickListener { showSectionScreen("فیلم\u200cهای جدید", 3, "new_movies", "movie") }\n        }\n        hero.addView(btn, LinearLayout.LayoutParams(dp(150), dp(48)))\n        box.addView(hero)\n    }\n\n    private fun addFilterChips(box: LinearLayout) {\n        val hsv = HorizontalScrollView(this).apply {\n            isHorizontalScrollBarEnabled = false\n        }\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        hsv.addView(row)\n\n        val chips = listOf(\n            "همه" to { showHome() },\n            "فیلم" to { showSectionScreen("فیلم\u200cهای جدید", 3, "new_movies", "movie") },\n            "سریال" to { showSectionScreen("سریال\u200cهای جدید", 3, "new_series", "series") },\n            "آرشیو ۱" to { showSectionScreen("آرشیو ۱", 1, "new_movies", "movie") },\n            "آرشیو ۳" to { showSectionScreen("آرشیو ۳", 3, "new_movies", "movie") }\n        )\n        chips.forEach { (label, action) ->\n            val chip = TextView(this).apply {\n                text = label\n                setTextColor(Color.WHITE)\n                textSize = 13f\n                typeface = Typeface.DEFAULT_BOLD\n                gravity = Gravity.CENTER\n                background = rounded(if (label == "همه") blue else panel, dp(22), Color.rgb(50, 62, 88))\n                setPadding(dp(18), 0, dp(18), 0)\n                layoutParams = LinearLayout.LayoutParams(-2, dp(44)).apply {\n                    marginStart = dp(6)\n                    marginEnd = dp(6)\n                    bottomMargin = dp(18)\n                }\n                setOnClickListener { action() }\n            }\n            row.addView(chip)\n        }\n        box.addView(hsv)\n    }\n\n    private fun addSectionFromApi(parent: LinearLayout, title: String, archive: Int, section: String) {\n        val holder = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            layoutParams = LinearLayout.LayoutParams(-1, -2).apply {\n                bottomMargin = dp(22)\n            }\n        }\n        holder.addView(sectionHeader(title) {\n            showSectionScreen(title, archive, section, "")\n        })\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        val hsv = HorizontalScrollView(this).apply {\n            isHorizontalScrollBarEnabled = false\n            addView(row)\n        }\n        holder.addView(hsv)\n        parent.addView(holder)\n\n        fetchJson("$apiBase?action=section&archive=$archive&section=$section&page=1") { ok, json, err ->\n            runOnUiThread {\n                if (!ok || json == null) {\n                    row.addView(errorText(err ?: "خطا در دریافت اطلاعات"))\n                    return@runOnUiThread\n                }\n                val arr = json.optJSONArray("items") ?: JSONArray()\n                val max = minOf(arr.length(), 12)\n                for (i in 0 until max) {\n                    val item = arr.optJSONObject(i) ?: continue\n                    row.addView(movieCard(item, dp(132), dp(250)))\n                }\n            }\n        }\n    }\n\n    private fun showSectionScreen(title: String, archive: Int, section: String, type: String) {\n        currentScreen = if (type == "series") "series" else "movies"\n        buildBottomNav()\n        clear(title)\n\n        val scroll = ScrollView(this)\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(14), dp(8), dp(14), dp(24))\n        }\n        scroll.addView(box)\n        content.addView(scroll)\n\n        box.addView(sectionHeader(title, null))\n        val grid = GridLayout(this).apply {\n            columnCount = 3\n            useDefaultMargins = false\n        }\n        box.addView(grid)\n        addLoadingRow(box, "در حال دریافت")\n\n        fetchJson("$apiBase?action=section&archive=$archive&section=$section&page=1") { ok, json, err ->\n            runOnUiThread {\n                box.removeViewAt(box.childCount - 1)\n                if (!ok || json == null) {\n                    box.addView(errorText(err ?: "خطا"))\n                    return@runOnUiThread\n                }\n                val arr = json.optJSONArray("items") ?: JSONArray()\n                for (i in 0 until arr.length()) {\n                    val item = arr.optJSONObject(i) ?: continue\n                    grid.addView(movieCard(item, dp(112), dp(230)))\n                }\n            }\n        }\n    }\n\n    private fun showSearch() {\n        currentScreen = "search"\n        buildBottomNav()\n        clear("جستجو")\n\n        val scroll = ScrollView(this)\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(14), dp(8), dp(14), dp(24))\n        }\n        scroll.addView(box)\n        content.addView(scroll)\n\n        val searchRow = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            background = rounded(panel, dp(24), Color.rgb(42, 52, 72))\n            setPadding(dp(10), dp(8), dp(10), dp(8))\n        }\n\n        val input = EditText(this).apply {\n            hint = "دنبال عنوان خاصی می\u200cگردی؟"\n            setHintTextColor(muted)\n            setTextColor(Color.WHITE)\n            textSize = 15f\n            singleLine = true\n            background = null\n            layoutParams = LinearLayout.LayoutParams(0, dp(48), 1f)\n        }\n\n        val btn = Button(this).apply {\n            text = "جستجو"\n            setTextColor(Color.WHITE)\n            background = rounded(blue, dp(20), blue)\n            setOnClickListener {\n                val q = input.text.toString().trim()\n                if (q.isNotBlank()) doSearch(box, q)\n            }\n        }\n\n        searchRow.addView(input)\n        searchRow.addView(btn, LinearLayout.LayoutParams(dp(92), dp(44)))\n        box.addView(searchRow, LinearLayout.LayoutParams(-1, dp(66)).apply { bottomMargin = dp(18) })\n        box.addView(TextView(this).apply {\n            text = "جستجوی پیشرفته در آرشیو ۱ و ۳"\n            setTextColor(muted)\n            textSize = 13f\n        })\n    }\n\n    private fun doSearch(box: LinearLayout, q: String) {\n        while (box.childCount > 2) box.removeViewAt(2)\n        val grid = GridLayout(this).apply { columnCount = 3 }\n        box.addView(grid)\n        addLoadingRow(box, "در حال جستجو")\n\n        val query = URLEncoder.encode(q, "UTF-8")\n        val results = mutableListOf<JSONObject>()\n        fun done() {\n            runOnUiThread {\n                box.removeViewAt(box.childCount - 1)\n                if (results.isEmpty()) {\n                    box.addView(errorText("نتیجه\u200cای پیدا نشد"))\n                } else {\n                    results.forEach { grid.addView(movieCard(it, dp(112), dp(230))) }\n                }\n            }\n        }\n\n        var pending = 2\n        listOf(1, 3).forEach { archive ->\n            fetchJson("$apiBase?action=search&archive=$archive&q=$query&page=1") { ok, json, _ ->\n                if (ok && json != null) {\n                    val arr = json.optJSONArray("items") ?: JSONArray()\n                    for (i in 0 until arr.length()) arr.optJSONObject(i)?.let { results.add(it) }\n                }\n                pending -= 1\n                if (pending == 0) done()\n            }\n        }\n    }\n\n    private fun showDetail(seed: JSONObject) {\n        val archive = seed.optInt("archive", 3)\n        val id = seed.optString("id")\n        val type = seed.optString("type", "movie")\n        if (id.isBlank()) return\n\n        clear(seed.optString("title_fa", seed.optString("title", "جزئیات")))\n        val scroll = ScrollView(this)\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(14), dp(8), dp(14), dp(24))\n        }\n        scroll.addView(box)\n        content.addView(scroll)\n        renderDetail(box, seed, false)\n\n        val url = "$apiBase?action=detail&archive=$archive&id=${URLEncoder.encode(id, "UTF-8")}&type=$type"\n        fetchJson(url) { ok, json, err ->\n            runOnUiThread {\n                box.removeAllViews()\n                if (!ok || json == null) {\n                    box.addView(errorText(err ?: "جزئیات دریافت نشد"))\n                    renderDetail(box, seed, false)\n                    return@runOnUiThread\n                }\n                val item = json.optJSONObject("item") ?: seed\n                renderDetail(box, item, true)\n            }\n        }\n    }\n\n    private fun renderDetail(box: LinearLayout, item: JSONObject, full: Boolean) {\n        val poster = item.optString("poster")\n        val title = item.optString("title_fa").ifBlank { item.optString("title") }\n        val year = item.optString("year")\n        val rating = item.optString("rating")\n        val desc = item.optString("long_description").ifBlank { item.optString("description") }\n\n        val header = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.TOP\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        val posterView = ImageView(this).apply {\n            scaleType = ImageView.ScaleType.CENTER_CROP\n            background = rounded(panel2, dp(18), panel2)\n        }\n        loadImage(poster, posterView)\n        header.addView(posterView, LinearLayout.LayoutParams(dp(132), dp(198)).apply { marginEnd = dp(14) })\n\n        val info = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            layoutParams = LinearLayout.LayoutParams(0, -2, 1f)\n        }\n        info.addView(TextView(this).apply {\n            text = title\n            setTextColor(Color.WHITE)\n            textSize = 23f\n            typeface = Typeface.DEFAULT_BOLD\n        })\n        info.addView(TextView(this).apply {\n            text = listOf(year, if (rating.isNotBlank() && rating != "null") "IMDb $rating" else "", item.optString("type")).filter { it.isNotBlank() }.joinToString(" • ")\n            setTextColor(blue2)\n            textSize = 13f\n            setPadding(0, dp(8), 0, dp(10))\n        })\n        info.addView(TextView(this).apply {\n            text = item.optJSONArray("genres")?.let { arr ->\n                val list = mutableListOf<String>()\n                for (i in 0 until arr.length()) list.add(arr.optString(i))\n                list.joinToString("  ")\n            } ?: ""\n            setTextColor(muted)\n            textSize = 13f\n            maxLines = 2\n            ellipsize = TextUtils.TruncateAt.END\n        })\n        header.addView(info)\n        box.addView(header)\n\n        val buttons = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            setPadding(0, dp(18), 0, dp(14))\n        }\n        val playBtn = Button(this).apply {\n            text = "پخش آنلاین"\n            setTextColor(Color.WHITE)\n            textSize = 15f\n            typeface = Typeface.DEFAULT_BOLD\n            background = rounded(blue, dp(22), blue)\n            setOnClickListener { playItem(item) }\n        }\n        val downloadBtn = Button(this).apply {\n            text = "دانلود"\n            setTextColor(Color.WHITE)\n            background = rounded(panel2, dp(22), Color.rgb(52, 62, 84))\n            setOnClickListener { showLinksDialog(item, false) }\n        }\n        buttons.addView(playBtn, LinearLayout.LayoutParams(0, dp(52), 1f).apply { marginStart = dp(6) })\n        buttons.addView(downloadBtn, LinearLayout.LayoutParams(0, dp(52), 1f).apply { marginEnd = dp(6) })\n        box.addView(buttons)\n\n        box.addView(TextView(this).apply {\n            text = desc.ifBlank { "توضیحاتی برای این عنوان ثبت نشده است." }\n            setTextColor(Color.rgb(220, 226, 236))\n            textSize = 15f\n            lineSpacing = dp(5).toFloat(), 1f\n            setPadding(0, dp(8), 0, dp(18))\n        })\n\n        if (!full) addLoadingRow(box, "در حال دریافت لینک\u200cها و جزئیات")\n        else {\n            val links = extractLinks(item)\n            box.addView(TextView(this).apply {\n                text = "لینک\u200cهای پخش: ${links.length()}"\n                setTextColor(blue2)\n                textSize = 13f\n                typeface = Typeface.DEFAULT_BOLD\n            })\n        }\n    }\n\n    private fun playItem(item: JSONObject) {\n        val links = extractLinks(item)\n        if (links.length() == 0) {\n            Toast.makeText(this, "لینک پخش برای این عنوان پیدا نشد", Toast.LENGTH_SHORT).show()\n            return\n        }\n        val direct = mutableListOf<JSONObject>()\n        for (i in 0 until links.length()) {\n            val l = links.optJSONObject(i) ?: continue\n            if (isVideoUrl(l.optString("url"))) direct.add(l)\n        }\n        if (direct.isEmpty()) {\n            Toast.makeText(this, "لینک مستقیم قابل پخش پیدا نشد", Toast.LENGTH_SHORT).show()\n            return\n        }\n        if (direct.size == 1) openPlayer(item, direct, 0)\n        else showLinksDialog(item, true)\n    }\n\n    private fun showLinksDialog(item: JSONObject, playMode: Boolean) {\n        val links = extractLinks(item)\n        val direct = mutableListOf<JSONObject>()\n        for (i in 0 until links.length()) {\n            val l = links.optJSONObject(i) ?: continue\n            if (isVideoUrl(l.optString("url"))) direct.add(l)\n        }\n        if (direct.isEmpty()) {\n            Toast.makeText(this, "لینکی پیدا نشد", Toast.LENGTH_SHORT).show()\n            return\n        }\n        val labels = direct.mapIndexed { index, l ->\n            val s = l.optString("season")\n            val e = l.optString("episode")\n            val q = l.optString("quality")\n            val type = if (l.optString("type").lowercase(Locale.US).contains("dub")) "دوبله" else "زیرنویس"\n            val ep = if (s.isNotBlank() && s != "0") "فصل $s قسمت $e • " else ""\n            "${index + 1}. $ep$q • $type"\n        }.toTypedArray()\n\n        AlertDialog.Builder(this)\n            .setTitle(if (playMode) "انتخاب پخش" else "لینک\u200cها")\n            .setItems(labels) { _, which ->\n                if (playMode) openPlayer(item, direct, which)\n                else openPlayer(item, direct, which)\n            }\n            .show()\n    }\n\n    private fun openPlayer(item: JSONObject, links: List<JSONObject>, selected: Int) {\n        val title = item.optString("title_fa").ifBlank { item.optString("title") }\n        val arr = JSONArray()\n        links.forEach { l ->\n            arr.put(JSONObject().apply {\n                put("url", l.optString("url"))\n                put("title", title)\n                put("quality", l.optString("quality"))\n                put("type", l.optString("type"))\n                put("label", l.optString("label"))\n                put("season", l.optString("season"))\n                put("episode", l.optString("episode"))\n            })\n        }\n        val payload = JSONObject().apply {\n            put("video", links[selected].optString("url"))\n            put("title", title)\n            put("selectedIndex", selected)\n            put("tracks", arr)\n        }\n        startActivity(Intent(this, PlayerActivity::class.java).apply {\n            putExtra(PlayerActivity.EXTRA_VIDEO_URL, links[selected].optString("url"))\n            putExtra(PlayerActivity.EXTRA_TITLE, title)\n            putExtra(PlayerActivity.EXTRA_PLAYLIST_JSON, payload.toString())\n        })\n    }\n\n    private fun extractLinks(item: JSONObject): JSONArray {\n        val play = item.optJSONObject("play")\n        return play?.optJSONArray("links") ?: item.optJSONArray("links") ?: JSONArray()\n    }\n\n    private fun isVideoUrl(url: String): Boolean {\n        val lower = url.lowercase(Locale.US)\n        return lower.startsWith("http") && (\n            lower.contains(".mkv") ||\n                lower.contains(".mp4") ||\n                lower.contains(".m3u8") ||\n                lower.contains(".avi") ||\n                lower.contains(".webm") ||\n                lower.contains(".mov")\n        )\n    }\n\n    private fun sectionHeader(title: String, moreClick: (() -> Unit)?): View {\n        val row = LinearLayout(this).apply {\n            gravity = Gravity.CENTER_VERTICAL\n            orientation = LinearLayout.HORIZONTAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            setPadding(0, dp(4), 0, dp(12))\n        }\n        row.addView(TextView(this).apply {\n            text = title\n            setTextColor(Color.WHITE)\n            textSize = 19f\n            typeface = Typeface.DEFAULT_BOLD\n            layoutParams = LinearLayout.LayoutParams(0, -2, 1f)\n        })\n        if (moreClick != null) {\n            row.addView(TextView(this).apply {\n                text = "مشاهده همه"\n                setTextColor(muted)\n                textSize = 12f\n                background = rounded(panel, dp(15), panel)\n                setPadding(dp(12), dp(6), dp(12), dp(6))\n                setOnClickListener { moreClick() }\n            })\n        }\n        return row\n    }\n\n    private fun movieCard(item: JSONObject, width: Int, height: Int): View {\n        val card = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.TOP or Gravity.RIGHT\n            setPadding(dp(4), dp(4), dp(4), dp(4))\n            layoutParams = ViewGroup.MarginLayoutParams(width, height).apply {\n                marginStart = dp(5)\n                marginEnd = dp(5)\n                bottomMargin = dp(12)\n            }\n            setOnClickListener { showDetail(item) }\n        }\n\n        val img = ImageView(this).apply {\n            scaleType = ImageView.ScaleType.CENTER_CROP\n            background = rounded(panel2, dp(14), panel2)\n        }\n        loadImage(item.optString("poster"), img)\n        card.addView(img, LinearLayout.LayoutParams(-1, (height * 0.68f).roundToInt()))\n\n        val name = item.optString("title_fa").ifBlank { item.optString("title") }\n        card.addView(TextView(this).apply {\n            text = name\n            setTextColor(Color.WHITE)\n            textSize = 13f\n            typeface = Typeface.DEFAULT_BOLD\n            maxLines = 1\n            ellipsize = TextUtils.TruncateAt.END\n            gravity = Gravity.CENTER\n            setPadding(0, dp(8), 0, dp(4))\n        })\n\n        val meta = listOf(item.optString("year"), item.optString("rating").takeIf { it.isNotBlank() && it != "null" } ?: "N/A")\n            .joinToString("   ")\n        card.addView(TextView(this).apply {\n            text = meta\n            setTextColor(blue2)\n            textSize = 11f\n            gravity = Gravity.CENTER\n            background = rounded(Color.rgb(6, 10, 18), dp(9), Color.rgb(30, 38, 55))\n            setPadding(0, dp(4), 0, dp(4))\n        }, LinearLayout.LayoutParams(-1, dp(28)))\n\n        return card\n    }\n\n    private fun loadImage(url: String, imageView: ImageView) {\n        if (url.isBlank() || url == "null") return\n        Thread {\n            try {\n                val c = URL(url).openConnection() as HttpURLConnection\n                c.connectTimeout = 7000\n                c.readTimeout = 7000\n                c.instanceFollowRedirects = true\n                val bmp = BitmapFactory.decodeStream(c.inputStream)\n                runOnUiThread { imageView.setImageBitmap(bmp) }\n            } catch (_: Throwable) {\n            }\n        }.start()\n    }\n\n    private fun fetchJson(url: String, cb: (Boolean, JSONObject?, String?) -> Unit) {\n        Thread {\n            try {\n                val conn = URL(url).openConnection() as HttpURLConnection\n                conn.connectTimeout = 12000\n                conn.readTimeout = 18000\n                conn.setRequestProperty("Accept", "application/json")\n                conn.setRequestProperty("User-Agent", "BankMovieeAndroidApi/1.0")\n                val code = conn.responseCode\n                val stream = if (code in 200..299) conn.inputStream else conn.errorStream\n                val body = stream.bufferedReader(Charsets.UTF_8).use { it.readText() }\n                if (code in 200..299) cb(true, JSONObject(body), null)\n                else cb(false, null, "HTTP $code")\n            } catch (e: Throwable) {\n                cb(false, null, e.message ?: "network error")\n            }\n        }.start()\n    }\n\n    private fun addLoadingRow(box: LinearLayout, msg: String) {\n        box.addView(TextView(this).apply {\n            text = msg\n            setTextColor(muted)\n            gravity = Gravity.CENTER\n            setPadding(0, dp(18), 0, dp(18))\n        })\n    }\n\n    private fun errorText(msg: String): TextView {\n        return TextView(this).apply {\n            text = msg\n            setTextColor(Color.rgb(255, 120, 120))\n            gravity = Gravity.CENTER\n            setPadding(dp(12), dp(20), dp(12), dp(20))\n        }\n    }\n\n    private fun smallIconButton(label: String): TextView {\n        return TextView(this).apply {\n            text = label\n            setTextColor(Color.WHITE)\n            textSize = 24f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = rounded(panel, dp(18), Color.rgb(42, 52, 72))\n            layoutParams = LinearLayout.LayoutParams(dp(52), dp(52))\n        }\n    }\n\n    private fun showArchivePicker() {\n        val items = arrayOf("خانه", "آرشیو ۱ فیلم\u200cها", "آرشیو ۳ فیلم\u200cها", "آرشیو ۳ سریال\u200cها", "جستجو")\n        AlertDialog.Builder(this)\n            .setTitle("بانک مووی")\n            .setItems(items) { _, which ->\n                when (which) {\n                    0 -> showHome()\n                    1 -> showSectionScreen("آرشیو ۱", 1, "new_movies", "movie")\n                    2 -> showSectionScreen("آرشیو ۳ فیلم\u200cها", 3, "new_movies", "movie")\n                    3 -> showSectionScreen("آرشیو ۳ سریال\u200cها", 3, "new_series", "series")\n                    4 -> showSearch()\n                }\n            }\n            .show()\n    }\n\n    private fun rounded(color: Int, radius: Int, strokeColor: Int): android.graphics.drawable.GradientDrawable {\n        return android.graphics.drawable.GradientDrawable().apply {\n            setColor(color)\n            cornerRadius = radius.toFloat()\n            if (strokeColor != Color.TRANSPARENT) setStroke(dp(1), strokeColor)\n        }\n    }\n\n    private fun dp(v: Int): Int = (v * resources.displayMetrics.density).roundToInt()\n}\n', encoding="utf-8")
          player_file.write_text('package ir.bankmoviee.app\n\nimport android.app.Activity\nimport android.app.AlertDialog\nimport android.content.Intent\nimport android.content.pm.ActivityInfo\nimport android.graphics.Color\nimport android.graphics.Typeface\nimport android.net.Uri\nimport android.os.Bundle\nimport android.os.Handler\nimport android.os.Looper\nimport android.view.Gravity\nimport android.view.MotionEvent\nimport android.view.View\nimport android.view.Window\nimport android.view.WindowManager\nimport android.widget.FrameLayout\nimport android.widget.ImageButton\nimport android.widget.LinearLayout\nimport android.widget.SeekBar\nimport android.widget.TextView\nimport android.widget.Toast\nimport org.json.JSONArray\nimport org.json.JSONObject\nimport org.videolan.libvlc.LibVLC\nimport org.videolan.libvlc.Media\nimport org.videolan.libvlc.MediaPlayer\nimport org.videolan.libvlc.util.VLCVideoLayout\nimport java.util.Locale\nimport kotlin.math.abs\nimport kotlin.math.max\nimport kotlin.math.min\nimport kotlin.math.roundToInt\n\nclass PlayerActivity : Activity() {\n\n    companion object {\n        const val EXTRA_VIDEO_URL = "video_url"\n        const val EXTRA_TITLE = "title"\n        const val EXTRA_PLAYLIST_JSON = "playlist_json"\n    }\n\n    data class Track(\n        val url: String,\n        val title: String,\n        val quality: String,\n        val type: String,\n        val label: String,\n        val season: String,\n        val episode: String\n    )\n\n    private val blue = Color.rgb(0, 122, 255)\n    private val bgPanel = Color.argb(145, 0, 0, 0)\n    private lateinit var root: FrameLayout\n    private lateinit var videoLayout: VLCVideoLayout\n    private lateinit var controls: LinearLayout\n    private lateinit var titleText: TextView\n    private lateinit var statusText: TextView\n    private lateinit var seek: SeekBar\n    private lateinit var timeText: TextView\n    private lateinit var playBtn: TextView\n    private lateinit var modeBtn: TextView\n    private lateinit var episodeBtn: TextView\n\n    private var vlc: LibVLC? = null\n    private var player: MediaPlayer? = null\n    private val handler = Handler(Looper.getMainLooper())\n    private var tracks = mutableListOf<Track>()\n    private var currentIndex = 0\n    private var videoUrl = ""\n    private var title = "BankMoviee"\n    private var modeIndex = 0\n    private val modes = arrayOf("Fit", "Crop", "Full")\n    private var downX = 0f\n    private var lastTap = 0L\n\n    private val progressRunnable = object : Runnable {\n        override fun run() {\n            updateProgress()\n            handler.postDelayed(this, 500)\n        }\n    }\n\n    override fun onCreate(savedInstanceState: Bundle?) {\n        super.onCreate(savedInstanceState)\n        requestWindowFeature(Window.FEATURE_NO_TITLE)\n        requestedOrientation = ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE\n        window.addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON)\n        window.decorView.systemUiVisibility = (\n            View.SYSTEM_UI_FLAG_FULLSCREEN or\n                View.SYSTEM_UI_FLAG_HIDE_NAVIGATION or\n                View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY or\n                View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN or\n                View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION\n        )\n        parseIntent()\n        buildUi()\n        startPlayer(videoUrl)\n    }\n\n    private fun parseIntent() {\n        videoUrl = intent.getStringExtra(EXTRA_VIDEO_URL) ?: ""\n        title = intent.getStringExtra(EXTRA_TITLE) ?: "BankMoviee"\n        val json = intent.getStringExtra(EXTRA_PLAYLIST_JSON) ?: ""\n        if (json.isNotBlank()) {\n            try {\n                val obj = JSONObject(json)\n                currentIndex = obj.optInt("selectedIndex", 0)\n                val arr = obj.optJSONArray("tracks") ?: JSONArray()\n                for (i in 0 until arr.length()) {\n                    val it = arr.optJSONObject(i) ?: continue\n                    tracks.add(\n                        Track(\n                            it.optString("url"),\n                            it.optString("title", title),\n                            it.optString("quality"),\n                            it.optString("type"),\n                            it.optString("label"),\n                            it.optString("season"),\n                            it.optString("episode")\n                        )\n                    )\n                }\n            } catch (_: Throwable) {}\n        }\n        if (tracks.isEmpty() && videoUrl.isNotBlank()) {\n            tracks.add(Track(videoUrl, title, "", "", "", "", ""))\n            currentIndex = 0\n        }\n        if (currentIndex !in tracks.indices) currentIndex = 0\n        videoUrl = tracks.getOrNull(currentIndex)?.url ?: videoUrl\n        title = tracks.getOrNull(currentIndex)?.title ?: title\n    }\n\n    private fun buildUi() {\n        root = FrameLayout(this).apply { setBackgroundColor(Color.BLACK) }\n        videoLayout = VLCVideoLayout(this)\n        root.addView(videoLayout, FrameLayout.LayoutParams(-1, -1))\n\n        val top = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            setPadding(dp(14), dp(12), dp(14), dp(8))\n            backgroundColorCompat(bgPanel)\n        }\n        val back = pill("بازگشت")\n        back.setOnClickListener { finish() }\n        val info = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL }\n        titleText = TextView(this).apply {\n            text = title\n            setTextColor(Color.WHITE)\n            textSize = 15f\n            typeface = Typeface.DEFAULT_BOLD\n            maxLines = 1\n        }\n        statusText = TextView(this).apply {\n            text = currentLabel()\n            setTextColor(Color.LTGRAY)\n            textSize = 12f\n            maxLines = 1\n        }\n        info.addView(titleText)\n        info.addView(statusText)\n        top.addView(back, LinearLayout.LayoutParams(dp(86), dp(44)))\n        top.addView(info, LinearLayout.LayoutParams(0, -2, 1f))\n        root.addView(top, FrameLayout.LayoutParams(-1, dp(74), Gravity.TOP))\n\n        controls = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.CENTER\n            setPadding(dp(18), dp(10), dp(18), dp(14))\n            backgroundColorCompat(bgPanel)\n        }\n\n        seek = SeekBar(this).apply {\n            max = 1000\n            progressTintList = android.content.res.ColorStateList.valueOf(blue)\n            thumbTintList = android.content.res.ColorStateList.valueOf(blue)\n        }\n        controls.addView(seek, LinearLayout.LayoutParams(-1, dp(34)))\n\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n        }\n        timeText = TextView(this).apply {\n            text = "00:00 / --:--"\n            setTextColor(Color.WHITE)\n            textSize = 12f\n        }\n        playBtn = pill("توقف")\n        playBtn.setOnClickListener { toggle() }\n        episodeBtn = pill("قسمت\u200cها")\n        episodeBtn.setOnClickListener { showEpisodes() }\n        modeBtn = pill("Fit")\n        modeBtn.setOnClickListener { nextMode() }\n\n        row.addView(timeText, LinearLayout.LayoutParams(0, dp(48), 1f))\n        row.addView(modeBtn, LinearLayout.LayoutParams(dp(82), dp(42)))\n        row.addView(episodeBtn, LinearLayout.LayoutParams(dp(100), dp(42)))\n        row.addView(playBtn, LinearLayout.LayoutParams(dp(82), dp(42)))\n        controls.addView(row)\n\n        root.addView(controls, FrameLayout.LayoutParams(-1, dp(98), Gravity.BOTTOM))\n        root.setOnClickListener { toggleControls() }\n        root.setOnTouchListener { _, event -> handleTap(event) }\n        setContentView(root)\n\n        seek.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {\n            override fun onStartTrackingTouch(s: SeekBar?) {}\n            override fun onStopTrackingTouch(s: SeekBar?) {\n                val p = player ?: return\n                if (p.length > 0) p.time = ((s?.progress ?: 0).toLong() * p.length) / 1000L\n            }\n            override fun onProgressChanged(s: SeekBar?, progress: Int, fromUser: Boolean) {}\n        })\n    }\n\n    private fun startPlayer(url: String) {\n        release()\n        val lib = LibVLC(this, arrayListOf("--network-caching=1800", "--http-reconnect", "--audio-time-stretch"))\n        vlc = lib\n        val mp = MediaPlayer(lib)\n        player = mp\n        mp.attachViews(videoLayout, null, false, false)\n        mp.setEventListener { e ->\n            runOnUiThread {\n                when (e.type) {\n                    MediaPlayer.Event.Playing -> {\n                        playBtn.text = "توقف"\n                        applyMode()\n                    }\n                    MediaPlayer.Event.Paused -> playBtn.text = "پخش"\n                    MediaPlayer.Event.EndReached -> playNext()\n                    MediaPlayer.Event.EncounteredError -> Toast.makeText(this, "خطا در پخش", Toast.LENGTH_LONG).show()\n                }\n            }\n        }\n        val media = Media(lib, Uri.parse(url))\n        media.setHWDecoderEnabled(true, false)\n        media.addOption(":network-caching=1800")\n        media.addOption(":http-reconnect")\n        media.addOption(":http-user-agent=Mozilla/5.0 BankMovieeAndroidApi/1.0")\n        mp.media = media\n        media.release()\n        mp.play()\n        handler.removeCallbacks(progressRunnable)\n        handler.post(progressRunnable)\n        updateTitle()\n    }\n\n    private fun showEpisodes() {\n        if (tracks.isEmpty()) return\n        val labels = tracks.mapIndexed { idx, t ->\n            val type = if (t.type.lowercase(Locale.US).contains("dub")) "دوبله" else "زیرنویس"\n            val ep = if (t.season.isNotBlank() && t.season != "0") "فصل ${t.season} قسمت ${t.episode} • " else ""\n            "${if (idx == currentIndex) "● " else ""}$ep${t.quality} • $type"\n        }.toTypedArray()\n        AlertDialog.Builder(this)\n            .setTitle("انتخاب قسمت یا کیفیت")\n            .setItems(labels) { _, which ->\n                currentIndex = which\n                videoUrl = tracks[which].url\n                title = tracks[which].title\n                startPlayer(videoUrl)\n            }\n            .show()\n    }\n\n    private fun playNext() {\n        if (currentIndex + 1 < tracks.size) {\n            currentIndex += 1\n            videoUrl = tracks[currentIndex].url\n            title = tracks[currentIndex].title\n            startPlayer(videoUrl)\n        }\n    }\n\n    private fun nextMode() {\n        modeIndex = (modeIndex + 1) % modes.size\n        modeBtn.text = modes[modeIndex]\n        applyMode()\n    }\n\n    private fun applyMode() {\n        val mp = player ?: return\n        when (modes[modeIndex]) {\n            "Fit" -> {\n                setAspect(mp, null)\n                setScale(mp, 0f)\n            }\n            "Crop" -> {\n                setAspect(mp, null)\n                setScale(mp, 1.22f)\n            }\n            "Full" -> {\n                videoLayout.post {\n                    val w = root.width.coerceAtLeast(resources.displayMetrics.widthPixels)\n                    val h = root.height.coerceAtLeast(resources.displayMetrics.heightPixels)\n                    setAspect(mp, "$w:$h")\n                    setScale(mp, 0f)\n                }\n            }\n        }\n    }\n\n    private fun setAspect(mp: MediaPlayer, ratio: String?) {\n        try { mp.javaClass.getMethod("setAspectRatio", String::class.java).invoke(mp, ratio) } catch (_: Throwable) {}\n    }\n\n    private fun setScale(mp: MediaPlayer, scale: Float) {\n        try { mp.javaClass.getMethod("setScale", java.lang.Float.TYPE).invoke(mp, scale) } catch (_: Throwable) {}\n    }\n\n    private fun toggle() {\n        val p = player ?: return\n        if (p.isPlaying) p.pause() else p.play()\n    }\n\n    private fun toggleControls() {\n        controls.visibility = if (controls.visibility == View.VISIBLE) View.GONE else View.VISIBLE\n    }\n\n    private fun handleTap(e: MotionEvent): Boolean {\n        when (e.action) {\n            MotionEvent.ACTION_DOWN -> downX = e.x\n            MotionEvent.ACTION_UP -> {\n                val now = System.currentTimeMillis()\n                if (now - lastTap < 300) {\n                    if (e.x < root.width / 2f) seekBy(-10000) else seekBy(10000)\n                    lastTap = 0\n                } else lastTap = now\n            }\n        }\n        return false\n    }\n\n    private fun seekBy(delta: Long) {\n        val p = player ?: return\n        val len = p.length\n        p.time = if (len > 0) min(max(p.time + delta, 0L), len) else max(p.time + delta, 0L)\n    }\n\n    private fun updateProgress() {\n        val p = player ?: return\n        val len = p.length\n        val time = p.time\n        if (len > 0) seek.progress = ((time * 1000L) / len).toInt().coerceIn(0, 1000)\n        timeText.text = "${fmt(time)} / ${if (len > 0) fmt(len) else "--:--"}"\n    }\n\n    private fun updateTitle() {\n        titleText.text = title\n        statusText.text = currentLabel()\n    }\n\n    private fun currentLabel(): String {\n        val t = tracks.getOrNull(currentIndex) ?: return ""\n        val type = if (t.type.lowercase(Locale.US).contains("dub")) "دوبله" else "زیرنویس"\n        val ep = if (t.season.isNotBlank() && t.season != "0") "فصل ${t.season} قسمت ${t.episode} • " else ""\n        return "$ep${t.quality} • $type"\n    }\n\n    private fun fmt(ms: Long): String {\n        val s = max(0, ms / 1000)\n        val h = s / 3600\n        val m = (s % 3600) / 60\n        val sec = s % 60\n        return if (h > 0) String.format(Locale.US, "%d:%02d:%02d", h, m, sec) else String.format(Locale.US, "%02d:%02d", m, sec)\n    }\n\n    private fun pill(text: String): TextView {\n        return TextView(this).apply {\n            this.text = text\n            setTextColor(Color.WHITE)\n            textSize = 13f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = android.graphics.drawable.GradientDrawable().apply {\n                setColor(Color.argb(105, 20, 24, 32))\n                cornerRadius = dp(18).toFloat()\n                setStroke(dp(1), Color.argb(130, 0, 122, 255))\n            }\n            setPadding(dp(8), 0, dp(8), 0)\n        }\n    }\n\n    private fun View.backgroundColorCompat(color: Int) {\n        setBackgroundColor(color)\n    }\n\n    private fun release() {\n        try {\n            player?.stop()\n            player?.detachViews()\n            player?.release()\n            vlc?.release()\n        } catch (_: Throwable) {}\n        player = null\n        vlc = null\n    }\n\n    override fun onDestroy() {\n        handler.removeCallbacksAndMessages(null)\n        release()\n        super.onDestroy()\n    }\n\n    private fun dp(v: Int): Int = (v * resources.displayMetrics.density).roundToInt()\n}\n', encoding="utf-8")
          print("BankMoviee API-first blue native patch applied")
