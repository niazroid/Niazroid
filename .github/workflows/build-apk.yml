name: Build Bankmovie V2.1 All Features

on:
  workflow_dispatch:
  push:
    paths:
      - 'app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'bankmovie_update.jks'
      - '.github/workflows/build-apk-v2.1-all-features.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Verify original signing identity
        run: |
          set -euo pipefail
          test -f bankmovie_update.jks
          echo "b73994bc2228e91763fde6d049fa792e44bcfce4f1359bef8d0bd6cd6d2f7b39  bankmovie_update.jks" | sha256sum -c -
          grep -q "applicationId 'ir.bankmoviee.app'" app/build.gradle
          grep -q 'versionName "2.1"' app/build.gradle
          grep -q 'signingConfig signingConfigs.bankmovieStable' app/build.gradle
          keytool -list -v -keystore bankmovie_update.jks -storepass bankmovie123 -alias bankmovie -keypass bankmovie123 | tee keystore-cert.txt
          grep -q '86:2B:C3:58:D8:D2:39:A2:13:4A:63:FA:B9:79:FF:60:19:86:23:72:E7:95:0E:A4:9B:AC:74:78:09:36:20:5D' keystore-cert.txt

      - name: Build signed release APKs
        run: |
          set -euo pipefail
          gradle --no-daemon clean assembleRelease --stacktrace

      - name: Verify APK signatures and collect files
        run: |
          set -euo pipefail
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$APKSIGNER"
          mkdir -p output
          found=0
          while IFS= read -r -d '' apk; do
            found=1
            "$APKSIGNER" verify --verbose --print-certs "$apk" | tee "${apk}.signature.txt"
            digest="$($APKSIGNER verify --print-certs "$apk" | sed -n 's/.*certificate SHA-256 digest: //p' | head -n1 | tr -d ':[:space:]' | tr 'A-F' 'a-f')"
            test "$digest" = "862bc358d8d239a2134a63fab979ff6019862372e7950ea49bac74780936205d"
            cp "$apk" output/
          done < <(find app/build/outputs/apk/release -type f -name '*.apk' -print0)
          test "$found" = 1
          cp keystore-cert.txt output/
          (cd output && sha256sum *.apk > SHA256SUMS.txt)

      - name: Upload signed APKs
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V2.1-all-features-signed
          path: output/*
          if-no-files-found: error
          retention-days: 30
