name: Build Bankmovie V2.1 Admin Archive Control Online Fix

on:
  workflow_dispatch:
  push:
    paths:
      - 'Bankmovie-v2.1-ADMIN-ARCHIVE-CONTROL-ONLINE-FIX-source.zip'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract source
        run: |
          set -euo pipefail
          rm -rf project
          mkdir project
          unzip -q 'Bankmovie-v2.1-ADMIN-ARCHIVE-CONTROL-ONLINE-FIX-source.zip' -d project

      - name: Verify original signing key
        working-directory: project
        run: |
          set -euo pipefail
          echo 'b73994bc2228e91763fde6d049fa792e44bcfce4f1359bef8d0bd6cd6d2f7b39  bankmovie_update.jks' | sha256sum -c -

      - name: Build release APK
        working-directory: project
        run: |
          set -euo pipefail
          chmod +x gradlew 2>/dev/null || true
          if [ -x ./gradlew ]; then
            ./gradlew assembleRelease --stacktrace
          else
            gradle assembleRelease --stacktrace
          fi

      - name: Collect APKs separately
        run: |
          set -euo pipefail
          rm -rf output
          mkdir -p output

          while IFS= read -r apk; do
            normalized="$(printf '%s' "$apk" | tr '[:upper:]' '[:lower:]')"

            if [[ "$normalized" == *"abi2lite"* ]]; then
              edition="abi2-lite"
            elif [[ "$normalized" == *"abi4full"* ]]; then
              edition="abi4-full"
            else
              continue
            fi

            if [[ "$normalized" == *"universal"* ]]; then
              abi="universal"
            elif [[ "$normalized" == *"arm64-v8a"* ]]; then
              abi="arm64-v8a"
            elif [[ "$normalized" == *"armeabi-v7a"* ]]; then
              abi="armeabi-v7a"
            else
              continue
            fi

            cp "$apk" "output/Bankmovie-v2.1-${edition}-${abi}.apk"
          done < <(find project/app/build/outputs/apk -type f -name '*.apk' | sort)

          test -f output/Bankmovie-v2.1-abi2-lite-universal.apk
          test -f output/Bankmovie-v2.1-abi2-lite-arm64-v8a.apk
          test -f output/Bankmovie-v2.1-abi2-lite-armeabi-v7a.apk
          test -f output/Bankmovie-v2.1-abi4-full-universal.apk
          test -f output/Bankmovie-v2.1-abi4-full-arm64-v8a.apk
          test -f output/Bankmovie-v2.1-abi4-full-armeabi-v7a.apk

      - name: Upload ABI2 Lite Universal
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V2.1-ABI2-Lite-Universal
          path: output/Bankmovie-v2.1-abi2-lite-universal.apk
          if-no-files-found: error

      - name: Upload ABI2 Lite ARM64
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V2.1-ABI2-Lite-arm64-v8a
          path: output/Bankmovie-v2.1-abi2-lite-arm64-v8a.apk
          if-no-files-found: error

      - name: Upload ABI2 Lite ARMv7
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V2.1-ABI2-Lite-armeabi-v7a
          path: output/Bankmovie-v2.1-abi2-lite-armeabi-v7a.apk
          if-no-files-found: error

      - name: Upload ABI4 Full Universal
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V2.1-ABI4-Full-Universal
          path: output/Bankmovie-v2.1-abi4-full-universal.apk
          if-no-files-found: error

      - name: Upload ABI4 Full ARM64
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V2.1-ABI4-Full-arm64-v8a
          path: output/Bankmovie-v2.1-abi4-full-arm64-v8a.apk
          if-no-files-found: error

      - name: Upload ABI4 Full ARMv7
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V2.1-ABI4-Full-armeabi-v7a
          path: output/Bankmovie-v2.1-abi4-full-armeabi-v7a.apk
          if-no-files-found: error
