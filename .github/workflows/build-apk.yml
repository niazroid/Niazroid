name: Build Bankmovie V1.4 V8 Four Outputs

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build Bankmovie V1.4 V8 ARM64 V7A Lite Universal Full Universal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip exact V1.4 V5 source
        shell: bash
        run: |
          set -euo pipefail
          ZIP="Bankmovie-v1.4-source-v5-final.zip"
          if [ ! -f "$ZIP" ]; then
            echo "==================== REAL ERROR ===================="
            echo "Missing $ZIP in repository root."
            echo "===================================================="
            exit 1
          fi
          rm -rf project
          mkdir project
          unzip -q "$ZIP" -d project
          test -f project/settings.gradle
          test -f project/app/build.gradle
          test -f project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt

      - name: Apply V6 UI patch from YAML only
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 -d > /tmp/patch_bankmovie_v6.py
          python3 /tmp/patch_bankmovie_v6.py

      - name: Force two ABI release and size optimization
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 -d > /tmp/patch_bankmovie_v7_abi.py
          python3 /tmp/patch_bankmovie_v7_abi.py

          GRADLE="project/app/build.gradle"
          grep -Fq 'versionCode 1140000 + runNumber' "$GRADLE"
          grep -Fq 'minifyEnabled true' "$GRADLE"
          grep -Fq 'shrinkResources true' "$GRADLE"
          grep -Fq 'include "armeabi-v7a", "arm64-v8a"' "$GRADLE"
          grep -Fq 'universalApk true' "$GRADLE"
          if grep -Eq 'include .*x86|abiFilters .*x86' "$GRADLE"; then
            echo "==================== REAL ERROR ===================="
            echo "x86 ABI is still enabled in app/build.gradle."
            echo "===================================================="
            exit 1
          fi

      - name: Verify V7 Lite YAML-only patch
        shell: bash
        run: |
          set -euo pipefail
          MAIN="project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt"
          GRADLE="project/app/build.gradle"

          grep -Fq 'versionCode 1140000 + runNumber' "$GRADLE"
          grep -Fq 'versionName "1.4"' "$GRADLE"
          grep -Fq 'include "armeabi-v7a", "arm64-v8a"' "$GRADLE"
          grep -Fq 'universalApk true' "$GRADLE"
          grep -Fq 'private fun selectedRemoteApkUrl()' "$MAIN"
          grep -Fq 'private fun currentVersionBlockReason()' "$MAIN"
          grep -Fq 'blocked_version_names' "$MAIN"
          grep -Fq 'minimum_version_name' "$MAIN"
          grep -Fq 'apk_urls' "$MAIN"
          grep -Fq 'compareReleaseVersions(targetName, currentName) > 0' "$MAIN"
          grep -Fq 'Regex("""\d+""")' "$MAIN"
          grep -Fq 'private val navigationHistory = mutableListOf<() -> Unit>()' "$MAIN"
          grep -Fq 'private fun handleSmartBack()' "$MAIN"
          grep -Fq 'private fun updateSearchRestorer()' "$MAIN"
          grep -Fq 'private fun showSearch(initialQuery: String = "", initialFilter: String = "all", showAllResults: Boolean = false)' "$MAIN"
          grep -Fq 'rememberCurrentScreen { showCollectionItems(savedSlug, savedTitle) }' "$MAIN"
          grep -Fq 'hero.addView(svgIconButton(R.drawable.ic_player_back) { handleSmartBack() }' "$MAIN"
          grep -Fq 'head.addView(svgIconButton(R.drawable.ic_player_back) { handleSmartBack() }' "$MAIN"

          if grep -Fq 'Regex("\d+")' "$MAIN"; then
            echo "==================== REAL ERROR ===================="
            echo "Broken Kotlin regex escape still exists."
            echo "===================================================="
            exit 1
          fi

          LOADER_BLOCK="$(sed -n '/private fun movieDetailLoading/,/private fun skeletonPosterCard/p' "$MAIN")"
          if printf '%s' "$LOADER_BLOCK" | grep -Fq 'نسخه ۱.۴'; then
            echo "==================== REAL ERROR ===================="
            echo "Movie detail spinner still contains the version label."
            echo "===================================================="
            exit 1
          fi

          if grep -Fq 'remoteForceUpdate || remoteVersionCode > currentCode' "$MAIN"; then
            echo "==================== REAL ERROR ===================="
            echo "Old repeated-update condition still exists."
            echo "===================================================="
            exit 1
          fi

          grep -Fq 'private fun showPlaybackMethodDialog(' "$MAIN"
          grep -Fq 'R.drawable.ic_vlc_logo' "$MAIN"
          grep -Fq 'setPackage("org.videolan.vlc")' "$MAIN"
          grep -Fq 'Intent.createChooser(intent' "$MAIN"
          test -f project/app/src/main/res/drawable/ic_vlc_logo.xml
          test -f project/app/src/main/res/drawable/ic_external_player.xml
          test -f project/app/src/main/res/drawable/ic_seen_eye.xml
          grep -Fq 'private data class ServerEndpoint' "$MAIN"
          grep -Fq 'private fun rewriteConfiguredUrl(' "$MAIN"
          grep -Fq 'json.optJSONArray("servers")' "$MAIN"
          grep -Fq 'json.optJSONArray("url_rewrites")' "$MAIN"
          grep -Fq 'private fun markPlayed(' "$MAIN"
          grep -Fq 'R.drawable.ic_seen_eye' "$MAIN"
          grep -Fq 'R.drawable.bankmovie_logo_transparent' "$MAIN"
          grep -Fq 't("پخش با بانک مووی", "Play with Bankmovie")' "$MAIN"
          grep -Fq 'val collectionLoading = movieDetailLoading(JSONObject())' "$MAIN"
          grep -Fq 'val collectionItemsLoading = movieDetailLoading(JSONObject())' "$MAIN"
          MODAL_BLOCK="$(sed -n '/private fun showPlaybackMethodDialog/,/private fun /p' "$MAIN")"
          if printf '%s' "$MODAL_BLOCK" | grep -Fq 'R.drawable.adm_logo_transparent'; then
            echo "==================== REAL ERROR ===================="
            echo "ADM logo still exists inside the playback modal."
            echo "===================================================="
            exit 1
          fi
          grep -Fq 'putExtra(PlayerActivity.EXTRA_PROGRESS_KEY' "$MAIN"
          grep -Fq 'transparentIcon = true' "$MAIN"
          grep -Fq 'setDimAmount(0.58f)' "$MAIN"
          PLAYER="project/app/src/main/java/ir/bankmoviee/app/PlayerActivity.kt"
          grep -Fq 'const val EXTRA_PROGRESS_KEY = "progress_key"' "$PLAYER"
          grep -Fq 'val progressKey: String' "$PLAYER"
          grep -Fq '.putLong(stableKey, savedTime)' "$PLAYER"

          echo "V1.4 V7 Lite two-ABI build and all prior features verified before build."

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          echo "sdk.dir=$ANDROID_HOME" > project/local.properties

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build and verify four APKs
        working-directory: project
        shell: bash
        run: |
          set -uo pipefail
          rm -rf app/build publish
          mkdir -p publish/arm64 publish/v7a publish/universal-lite publish/universal-full

          print_real_error() {
            local log_file="$1"
            local exit_code="$2"
            echo ""
            echo "================ KOTLIN COMPILER ERRORS ================"
            grep -E '(^e: |^w: |\.kt:[0-9]+:[0-9]+|\.kt \([0-9]+,[0-9]+\)|Unresolved reference|Type mismatch|Overload resolution ambiguity|Cannot infer|No value passed|Too many arguments|Expecting \)|Expecting an element)' "$log_file" | tail -n 240 || true
            echo "==================== REAL ERROR ========================="
            grep -Ei 'FAILURE:|What went wrong:|Execution failed|error:|Exception|Caused by:' "$log_file" | tail -n 180 || true
            echo "-------------------- LAST LOG LINES ---------------------"
            tail -n 120 "$log_file" || true
            echo "========================================================="
            exit "$exit_code"
          }

          build_release() {
            local log_file="$1"
            local append_mode="$2"

            rm -rf app/build
            set +e
            if [ "$append_mode" = "append" ]; then
              gradle :app:assembleRelease --no-daemon --max-workers=1 --stacktrace --console=plain 2>&1 | tee -a "$log_file"
            else
              gradle :app:assembleRelease --no-daemon --max-workers=1 --stacktrace --console=plain 2>&1 | tee "$log_file"
            fi
            local status=${PIPESTATUS[0]}
            set -e

            if [ "$status" -ne 0 ]; then
              print_real_error "$log_file" "$status"
            fi
          }

          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          EXPECTED_SHA256="862bc358d8d239a2134a63fab979ff6019862372e7950ea49bac74780936205d"

          verify_apk() {
            local apk="$1"
            local label="$2"
            local expected_mode="$3"
            local badging="apk-badging-${label}.txt"
            local signing="apk-signature-${label}.txt"

            "$AAPT" dump badging "$apk" > "$badging"

            if ! grep -Fq "versionName='1.4'" "$badging"; then
              echo "==================== REAL ERROR ===================="
              echo "$label APK versionName is not 1.4."
              grep -m1 '^package:' "$badging" || true
              echo "===================================================="
              exit 1
            fi

            if ! grep -Fq "package: name='ir.bankmoviee.app'" "$badging"; then
              echo "==================== REAL ERROR ===================="
              echo "$label APK package name is wrong."
              grep -m1 '^package:' "$badging" || true
              echo "===================================================="
              exit 1
            fi

            local native_line
            native_line="$(grep -m1 '^native-code:' "$badging" || true)"

            case "$expected_mode" in
              arm64)
                printf '%s' "$native_line" | grep -Fq "'arm64-v8a'" || { echo "ARM64 APK has no arm64-v8a native code"; exit 1; }
                if printf '%s' "$native_line" | grep -Eq "armeabi-v7a|x86"; then
                  echo "ARM64 APK contains an unwanted ABI: $native_line"
                  exit 1
                fi
                ;;
              v7a)
                printf '%s' "$native_line" | grep -Fq "'armeabi-v7a'" || { echo "V7A APK has no armeabi-v7a native code"; exit 1; }
                if printf '%s' "$native_line" | grep -Eq "arm64-v8a|x86"; then
                  echo "V7A APK contains an unwanted ABI: $native_line"
                  exit 1
                fi
                ;;
              lite-universal)
                printf '%s' "$native_line" | grep -Fq "'arm64-v8a'" || { echo "Lite Universal APK has no arm64-v8a native code"; exit 1; }
                printf '%s' "$native_line" | grep -Fq "'armeabi-v7a'" || { echo "Lite Universal APK has no armeabi-v7a native code"; exit 1; }
                if printf '%s' "$native_line" | grep -Eq "'x86'|'x86_64'"; then
                  echo "Lite Universal APK contains x86: $native_line"
                  exit 1
                fi
                ;;
              full-universal)
                for abi in arm64-v8a armeabi-v7a x86 x86_64; do
                  printf '%s' "$native_line" | grep -Fq "'$abi'" || {
                    echo "Full Universal APK is missing $abi: $native_line"
                    exit 1
                  }
                done
                ;;
              *)
                echo "Unknown verification mode: $expected_mode"
                exit 1
                ;;
            esac

            set +e
            "$APKSIGNER" verify --verbose --print-certs "$apk" > "$signing" 2>&1
            local sign_status=$?
            set -e

            if [ "$sign_status" -ne 0 ]; then
              echo "==================== REAL ERROR ===================="
              echo "$label APK signature verification failed."
              cat "$signing"
              echo "===================================================="
              exit "$sign_status"
            fi

            local actual_sha256
            actual_sha256="$(
              sed -n 's/^Signer #1 certificate SHA-256 digest: //p' "$signing" \
                | head -n 1 \
                | tr '[:upper:]' '[:lower:]' \
                | tr -d ':[:space:]'
            )"

            if [ -z "$actual_sha256" ] || [ "$actual_sha256" != "$EXPECTED_SHA256" ]; then
              echo "==================== REAL ERROR ===================="
              echo "$label APK signer does not match the previous Bankmovie release."
              echo "Expected: $EXPECTED_SHA256"
              echo "Actual:   ${actual_sha256:-missing}"
              echo "===================================================="
              exit 1
            fi

            echo "$label verified:"
            grep -m1 '^package:' "$badging"
            grep -m1 '^native-code:' "$badging" || true
            grep -E '^Signer #1 certificate (DN|SHA-256 digest):' "$signing" || true
          }

          echo "========== BUILD 1: ARM64 + V7A + LITE UNIVERSAL =========="
          build_release "build.log" "new"

          OUT="app/build/outputs/apk/release"
          ARM64="$(find "$OUT" -maxdepth 1 -type f -name '*arm64-v8a*release*.apk' | head -n 1)"
          V7A="$(find "$OUT" -maxdepth 1 -type f -name '*armeabi-v7a*release*.apk' | head -n 1)"
          LITE_UNIVERSAL="$(find "$OUT" -maxdepth 1 -type f -name '*universal*release*.apk' | head -n 1)"

          for spec in "ARM64:$ARM64" "V7A:$V7A" "LITE_UNIVERSAL:$LITE_UNIVERSAL"; do
            LABEL="${spec%%:*}"
            APK="${spec#*:}"
            if [ -z "$APK" ]; then
              echo "==================== REAL ERROR ===================="
              echo "$LABEL APK was not produced."
              find "$OUT" -maxdepth 1 -type f -name '*.apk' -print 2>/dev/null || true
              echo "===================================================="
              exit 1
            fi
          done

          verify_apk "$ARM64" "arm64" "arm64"
          verify_apk "$V7A" "v7a" "v7a"
          verify_apk "$LITE_UNIVERSAL" "universal-lite" "lite-universal"

          cp "$ARM64" "publish/arm64/Bankmovie-v1.4-v8-arm64-v8a-build-${GITHUB_RUN_NUMBER}.apk"
          cp "$V7A" "publish/v7a/Bankmovie-v1.4-v8-armeabi-v7a-build-${GITHUB_RUN_NUMBER}.apk"
          cp "$LITE_UNIVERSAL" "publish/universal-lite/Bankmovie-v1.4-v8-universal-lite-2abi-build-${GITHUB_RUN_NUMBER}.apk"

          echo "========== BUILD 2: FULL UNIVERSAL (4 ABI) =========="
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("app/build.gradle")
          source = path.read_text(encoding="utf-8")

          source, changed = re.subn(
              r'include\s+"armeabi-v7a",\s*"arm64-v8a"',
              'include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"',
              source,
              count=1,
          )

          if changed != 1:
              print("==================== REAL ERROR ====================")
              print("Could not switch build.gradle from 2 ABI to 4 ABI.")
              print("====================================================")
              raise SystemExit(1)

          path.write_text(source, encoding="utf-8")
          print("Full Universal ABI list enabled.")
          PY

          grep -Fq 'include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"' app/build.gradle
          build_release "build.log" "append"

          OUT="app/build/outputs/apk/release"
          FULL_UNIVERSAL="$(find "$OUT" -maxdepth 1 -type f -name '*universal*release*.apk' | head -n 1)"

          if [ -z "$FULL_UNIVERSAL" ]; then
            echo "==================== REAL ERROR ===================="
            echo "Full Universal APK was not produced."
            find "$OUT" -maxdepth 1 -type f -name '*.apk' -print 2>/dev/null || true
            echo "===================================================="
            exit 1
          fi

          verify_apk "$FULL_UNIVERSAL" "universal-full" "full-universal"
          cp "$FULL_UNIVERSAL" "publish/universal-full/Bankmovie-v1.4-v8-universal-full-4abi-build-${GITHUB_RUN_NUMBER}.apk"

          for dir in arm64 v7a universal-lite universal-full; do
            sha256sum "publish/$dir"/*.apk > "publish/$dir/SHA256.txt"
          done

          echo "================ APK SIZES ================"
          for apk in publish/*/*.apk; do
            bytes=$(stat -c%s "$apk")
            mib=$(awk -v b="$bytes" 'BEGIN { printf "%.1f", b/1048576 }')
            echo "$(basename "$apk"): ${mib} MiB"
          done
          echo "==========================================="

      - name: Upload diagnostic build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.4-V8-Build-Log-${{ github.run_number }}
          path: project/build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.4-V8-ARM64-${{ github.run_number }}
          path: project/publish/arm64/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload V7A APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.4-V8-V7A-${{ github.run_number }}
          path: project/publish/v7a/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload Lite Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.4-V8-Universal-Lite-2ABI-${{ github.run_number }}
          path: project/publish/universal-lite/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload Full Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.4-V8-Universal-Full-4ABI-${{ github.run_number }}
          path: project/publish/universal-full/*
          if-no-files-found: error
          retention-days: 14
