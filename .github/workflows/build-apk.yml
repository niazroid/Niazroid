                      val root = DocumentFile.fromTreeUri(this, tree)
                          ?: throw IllegalStateException("پوشه انتخاب‌شده در دسترس نیست")
                      val document = root.findFile(fileName)
                          ?: root.createFile(InternalDownloadStore.mimeForName(fileName), fileName)
                          ?: throw IllegalStateException("ساخت فایل در پوشه انتخاب‌شده ممکن نیست")
                      item.put("storage_mode", InternalDownloadStore.STORAGE_TREE)
                      item.put("tree_uri", tree.toString())
                      item.put("document_uri", document.uri.toString())
                      item.put("path", "")
                      item.put("location_label", DownloadLocationPrefs.displayName(this))
                  } else {
                      val target = File(DownloadLocationPrefs.appFolder(this), fileName)
                      item.put("storage_mode", InternalDownloadStore.STORAGE_FILE)
                      item.put("tree_uri", "")
                      item.put("document_uri", "")
                      item.put("path", target.absolutePath)
                      item.put("location_label", DownloadLocationPrefs.displayName(this))
                  }
              }
          '''
          new = '''    private fun configureTarget(item: JSONObject, fileName: String) {
                  val tree = DownloadLocationPrefs.treeUri(this)
                  if (DownloadLocationPrefs.mode(this) == DownloadLocationPrefs.MODE_TREE && tree != null) {
                      val root = DocumentFile.fromTreeUri(this, tree)
                          ?: throw IllegalStateException("پوشه انتخاب‌شده در دسترس نیست")
                      val document = root.findFile(fileName)
                          ?: root.createFile(InternalDownloadStore.mimeForName(fileName), fileName)
                          ?: throw IllegalStateException("ساخت فایل در پوشه انتخاب‌شده ممکن نیست")
                      item.put("storage_mode", InternalDownloadStore.STORAGE_TREE)
                      item.put("tree_uri", tree.toString())
                      item.put("document_uri", document.uri.toString())
                      item.put("path", "")
                      item.put("location_label", DownloadLocationPrefs.displayName(this))
                      return
                  }
          
                  DownloadLocationPrefs.setPublicDownloads(this)
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      val values = ContentValues().apply {
                          put(MediaStore.MediaColumns.DISPLAY_NAME, fileName)
                          put(MediaStore.MediaColumns.MIME_TYPE, InternalDownloadStore.mimeForName(fileName))
                          put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DOWNLOADS + "/Bankmovie")
                          put(MediaStore.MediaColumns.IS_PENDING, 1)
                      }
                      val uri = contentResolver.insert(MediaStore.Downloads.EXTERNAL_CONTENT_URI, values)
                          ?: throw IllegalStateException("ساخت فایل در Downloads/Bankmovie ممکن نیست")
                      item.put("storage_mode", InternalDownloadStore.STORAGE_MEDIA)
                      item.put("tree_uri", "")
                      item.put("document_uri", uri.toString())
                      item.put("path", "")
                      item.put("location_label", "Downloads / Bankmovie")
                  } else {
                      val target = File(DownloadLocationPrefs.publicFolder(), fileName)
                      item.put("storage_mode", InternalDownloadStore.STORAGE_FILE)
                      item.put("tree_uri", "")
                      item.put("document_uri", "")
                      item.put("path", target.absolutePath)
                      item.put("location_label", "Downloads / Bankmovie")
                  }
              }
          '''
          assert old in service, 'service configureTarget block not found'
          service = service.replace(old,new,1)
          old = '''    private fun openTarget(item: JSONObject): DownloadTarget {
