name: Build Bankmovie V1.9 V19 Light English Downloads Hotfix

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build V1.9 V19 Hotfix ARM64 V7A Lite Universal Full Universal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip exact V1.9 source
        shell: bash
        run: |
          set -euo pipefail
          ZIP="Bankmovie-v1.9-source-v19-downloader-path-player-fix.zip"
          if [ ! -f "$ZIP" ]; then
            echo "==================== REAL ERROR ===================="
            echo "Missing $ZIP in repository root."
            echo "===================================================="
            exit 1
          fi
          rm -rf project
          mkdir project
          unzip -q "$ZIP" -d project
          test -f project/settings.gradle
          test -f project/app/build.gradle
          test -f project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt

      - name: Verify legacy update signing key
        shell: bash
        run: |
          set -euo pipefail
          test -f project/bankmovie_update.jks
          KEY_INFO="$(keytool -list -v -keystore project/bankmovie_update.jks -storepass bankmovie123 -alias bankmovie)"
          printf '%s\n' "$KEY_INFO"
          NORMALIZED="$(printf '%s\n' "$KEY_INFO" | sed -n 's/.*SHA256: //p' | head -n1 | tr '[:upper:]' '[:lower:]' | tr -d ':[:space:]')"
          EXPECTED="862bc358d8d239a2134a63fab979ff6019862372e7950ea49bac74780936205d"
          if [ "$NORMALIZED" != "$EXPECTED" ]; then
            echo "Legacy Bankmovie signing key mismatch: $NORMALIZED"
            exit 1
          fi
          echo "Legacy signing key verified: $NORMALIZED"

      - name: Verify V1.9 V19 source
        shell: bash
        run: |
          set -euo pipefail
          MAIN="project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt"
          PLAYER="project/app/src/main/java/ir/bankmoviee/app/PlayerActivity.kt"
          PREFS="project/app/src/main/java/ir/bankmoviee/app/UiPreferences.kt"
          STORE="project/app/src/main/java/ir/bankmoviee/app/InternalDownloadStore.kt"
          SERVICE="project/app/src/main/java/ir/bankmoviee/app/InternalDownloadService.kt"
          DOWNLOADS="project/app/src/main/java/ir/bankmoviee/app/DownloadsActivity.kt"
          LOCATION="project/app/src/main/java/ir/bankmoviee/app/DownloadLocationPrefs.kt"
          MANIFEST="project/app/src/main/AndroidManifest.xml"
          GRADLE="project/app/build.gradle"

          grep -Fq 'versionName "1.9"' "$GRADLE"
          grep -Fq 'versionCode 3400000 + runNumber' "$GRADLE"
          grep -Fq "androidx.documentfile:documentfile" "$GRADLE"
          grep -Fq 'minifyEnabled true' "$GRADLE"
          grep -Fq 'shrinkResources true' "$GRADLE"

          test -f "$PREFS"
          test -f "$STORE"
          test -f "$SERVICE"
          test -f "$DOWNLOADS"
          test -f "$LOCATION"
          test -f project/app/src/main/res/xml/file_paths.xml
          test -f project/app/src/main/res/drawable/ic_telegram.xml
          test -f project/app/src/main/res/drawable/ic_dubbed_mic_green.xml

          grep -Fq 'InternalDownloadService' "$MANIFEST"
          grep -Fq 'DownloadsActivity' "$MANIFEST"
          grep -Fq 'android.permission.FOREGROUND_SERVICE_DATA_SYNC' "$MANIFEST"
          grep -Fq 'androidx.core.content.FileProvider' "$MANIFEST"

          grep -Fq 'private val bmAppKey = "bm_android_v1_7c2f40"' "$MAIN"
          grep -Fq 'DownloadLocationPrefs.hasChoice' "$MAIN"
          grep -Fq 'Intent.ACTION_OPEN_DOCUMENT_TREE' "$MAIN"
          grep -Fq 'itemHasDubbedBadge' "$MAIN"
          grep -Fq 'ic_dubbed_mic_green' "$MAIN"
          grep -Fq 'normalizeArchiveItem(it, archive)' "$MAIN"
          grep -Fq 'text = "نسخه ${appVersionName()}"' "$MAIN"
          grep -Fq 'سافت‌ساب فارسی' "$MAIN"
          grep -Fq 'هاردساب فارسی' "$MAIN"
          grep -Fq 'دوبله فارسی' "$MAIN"
          grep -Fq 'صوت دوبله' "$MAIN"

          grep -Fq 'private fun showAudioSubtitleSettingsSheet()' "$PLAYER"
          grep -Fq 'time.toDouble() / length.toDouble() < 0.95' "$PLAYER"
          grep -Fq '"pink" to "صورتی"' "$PLAYER"
          if grep -Eq 'CastContext|MediaRouteButton|CastButtonFactory|castCurrentMedia' "$PLAYER"; then
            echo "Cast code still exists in PlayerActivity."
            exit 1
          fi
          if grep -Eq 'play-services-cast-framework|androidx.mediarouter' "$GRADLE"; then
            echo "Cast dependencies still exist."
            exit 1
          fi
          if grep -Fq 'CastOptionsProvider' "$MANIFEST"; then
            echo "Cast manifest metadata still exists."
            exit 1
          fi

          grep -Fq 'getInt(KEY_SUB_TEXT_COLOR, Color.YELLOW)' "$PREFS"
          grep -Fq 'getString(KEY_SUB_BG_MODE, "black")' "$PREFS"
          grep -Fq '"pink" -> Color.rgb(236, 64, 122)' "$PREFS"
          if grep -Fq '"glass"' "$PREFS"; then
            echo "Broken glass subtitle mode still exists."
            exit 1
          fi

          grep -Fq 'DocumentFile.fromTreeUri' "$SERVICE"
          grep -Fq 'ParcelFileDescriptor' "$SERVICE"
          grep -Fq 'setRequestProperty("Range", "bytes=$start-")' "$SERVICE"
          grep -Fq 'Executors.newFixedThreadPool(2)' "$SERVICE"
          grep -Fq 'مسیر ذخیره‌سازی' "$DOWNLOADS"
          grep -Fq 'ذخیره در:' "$DOWNLOADS"
          grep -Fq 'DownloadLocationPrefs.setTree' "$DOWNLOADS"

          if grep -R -E 'bonVF|vazir\.ttf|KEY_FONT|KEY_SUB_FONT|customFontFile' project/app/src/main project/app/build.gradle; then
            echo "Custom font code or asset still exists."
            exit 1
          fi
          if grep -Fq 'دانلود با Chrome' "$MAIN"; then
            echo "Chrome downloader must stay removed."
            exit 1
          fi
          if find project/app/src/main -type f \( -iname '*.ttf' -o -iname '*.otf' -o -iname '*.woff' -o -iname '*.woff2' \) | grep -q .; then
            echo "A font file is still packaged."
            exit 1
          fi

          echo "V1.9 V19 storage picker, player crash fix, related items, subtitle backgrounds and dubbed badges verified."

      - name: Apply V1.9 light theme English and Downloads hotfix
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/patch_v19_hotfix.py <<'PY'
          from pathlib import Path
          import re
          
          root = Path('project')
          main_path = root/'app/src/main/java/ir/bankmoviee/app/MainActivity.kt'
          player_path = root/'app/src/main/java/ir/bankmoviee/app/PlayerActivity.kt'
          prefs_path = root/'app/src/main/java/ir/bankmoviee/app/UiPreferences.kt'
          loc_path = root/'app/src/main/java/ir/bankmoviee/app/DownloadLocationPrefs.kt'
          store_path = root/'app/src/main/java/ir/bankmoviee/app/InternalDownloadStore.kt'
          service_path = root/'app/src/main/java/ir/bankmoviee/app/InternalDownloadService.kt'
          downloads_path = root/'app/src/main/java/ir/bankmoviee/app/DownloadsActivity.kt'
          
          # 1) Download location defaults to public Downloads/Bankmovie.
          loc_path.write_text(r'''package ir.bankmoviee.app
          
          import android.content.Context
          import android.net.Uri
          import android.os.Environment
          import java.io.File
          
          object DownloadLocationPrefs {
              private const val PREFS = "bankmovie_download_location"
              private const val KEY_MODE = "mode"
              private const val KEY_TREE_URI = "tree_uri"
              private const val KEY_TREE_LABEL = "tree_label"
              private const val KEY_CONFIGURED = "configured"
          
              const val MODE_PUBLIC = "public"
              const val MODE_TREE = "tree"
          
              private fun prefs(context: Context) = context.getSharedPreferences(PREFS, Context.MODE_PRIVATE)
          
              fun hasChoice(context: Context): Boolean = true
          
              fun mode(context: Context): String {
                  val saved = prefs(context).getString(KEY_MODE, MODE_PUBLIC).orEmpty()
                  return if (saved == MODE_TREE && treeUri(context) != null) MODE_TREE else MODE_PUBLIC
              }
          
              fun treeUri(context: Context): Uri? {
                  val raw = prefs(context).getString(KEY_TREE_URI, "").orEmpty()
                  return if (raw.isBlank()) null else runCatching { Uri.parse(raw) }.getOrNull()
              }
          
              fun setPublicDownloads(context: Context) {
                  prefs(context).edit()
                      .putBoolean(KEY_CONFIGURED, true)
                      .putString(KEY_MODE, MODE_PUBLIC)
                      .remove(KEY_TREE_URI)
                      .remove(KEY_TREE_LABEL)
                      .apply()
              }
          
              // Kept for compatibility with older call sites. It now means public Downloads/Bankmovie.
              fun setAppFolder(context: Context) = setPublicDownloads(context)
          
              fun setTree(context: Context, uri: Uri) {
                  val label = uri.lastPathSegment
                      ?.substringAfterLast(':')
                      ?.replace("%2F", "/", true)
                      ?.ifBlank { "پوشه انتخاب‌شده" }
                      ?: "پوشه انتخاب‌شده"
                  prefs(context).edit()
                      .putBoolean(KEY_CONFIGURED, true)
                      .putString(KEY_MODE, MODE_TREE)
                      .putString(KEY_TREE_URI, uri.toString())
                      .putString(KEY_TREE_LABEL, label)
                      .apply()
              }
          
              @Suppress("DEPRECATION")
              fun publicFolder(): File {
                  return File(Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS), "Bankmovie").apply { mkdirs() }
              }
          
              fun displayName(context: Context): String {
                  return if (mode(context) == MODE_TREE && treeUri(context) != null) {
                      prefs(context).getString(KEY_TREE_LABEL, "پوشه انتخاب‌شده") ?: "پوشه انتخاب‌شده"
                  } else {
                      "Downloads / Bankmovie"
                  }
              }
          }
          ''', encoding='utf-8')
          
          # 2) Internal download store supports MediaStore/public Downloads.
          store = store_path.read_text(encoding='utf-8')
          store = store.replace('    const val STORAGE_FILE = "file"\n    const val STORAGE_TREE = "tree"',
                                '    const val STORAGE_FILE = "file"\n    const val STORAGE_TREE = "tree"\n    const val STORAGE_MEDIA = "media"')
          old = '''    fun exists(context: Context, item: JSONObject): Boolean {
                  return if (item.optString("storage_mode") == STORAGE_TREE) {
                      val raw = item.optString("document_uri")
                      if (raw.isBlank()) false else runCatching {
                          DocumentFile.fromSingleUri(context, Uri.parse(raw))?.exists() == true
                      }.getOrDefault(false)
                  } else {
                      val path = item.optString("path")
                      path.isNotBlank() && File(path).exists()
                  }
              }
          
              fun deleteDownloadedFile(context: Context, item: JSONObject) {
                  if (item.optString("storage_mode") == STORAGE_TREE) {
                      val raw = item.optString("document_uri")
                      if (raw.isNotBlank()) runCatching {
                          DocumentFile.fromSingleUri(context, Uri.parse(raw))?.delete()
                      }
                  } else {
                      val path = item.optString("path")
                      if (path.isNotBlank()) runCatching { File(path).delete() }
                  }
              }
          '''
          new = '''    fun exists(context: Context, item: JSONObject): Boolean {
                  val mode = item.optString("storage_mode")
                  if (mode == STORAGE_TREE || mode == STORAGE_MEDIA) {
                      val raw = item.optString("document_uri")
                      if (raw.isBlank()) return false
                      return runCatching {
                          context.contentResolver.openFileDescriptor(Uri.parse(raw), "r")?.use { true } ?: false
                      }.getOrDefault(false)
                  }
                  val path = item.optString("path")
                  return path.isNotBlank() && File(path).exists()
              }
          
              fun deleteDownloadedFile(context: Context, item: JSONObject) {
                  val mode = item.optString("storage_mode")
                  if (mode == STORAGE_TREE || mode == STORAGE_MEDIA) {
                      val raw = item.optString("document_uri")
                      if (raw.isNotBlank()) runCatching {
                          if (mode == STORAGE_MEDIA) {
                              context.contentResolver.delete(Uri.parse(raw), null, null)
                          } else {
                              DocumentFile.fromSingleUri(context, Uri.parse(raw))?.delete()
                          }
                      }
                      return
                  }
                  val path = item.optString("path")
                  if (path.isNotBlank()) runCatching { File(path).delete() }
              }
          '''
          assert old in store, 'store exists/delete block not found'
          store = store.replace(old,new,1)
          store = store.replace('        put("storage_mode", STORAGE_FILE)', '        put("storage_mode", STORAGE_MEDIA)', 1)
          store_path.write_text(store, encoding='utf-8')
          
          # 3) Service: MediaStore Downloads/Bankmovie on Android 10+, public folder before Android 10.
          service = service_path.read_text(encoding='utf-8')
          service = service.replace('import android.content.Context\nimport android.content.Intent', 'import android.content.ContentValues\nimport android.content.Context\nimport android.content.Intent')
          service = service.replace('import android.os.ParcelFileDescriptor', 'import android.os.Environment\nimport android.os.ParcelFileDescriptor')
          service = service.replace('import androidx.core.app.NotificationCompat', 'import android.provider.MediaStore\nimport androidx.core.app.NotificationCompat')
          old = '''    private fun configureTarget(item: JSONObject, fileName: String) {
                  val tree = DownloadLocationPrefs.treeUri(this)
