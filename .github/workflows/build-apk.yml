            راهنمای پخش و زیرنویس
        </h3>
        <p>اگر از پلیر آنلاین میخواهید استفاده کنید باید زیرنویس را از سایت‌های زیرنویسی دانلود و در پلیر آنلاین از قسمت تنظیمات وارد کنید. در غیر این صورت فیلم‌ها سافت ساب هستند و زیرنویس دارند که در ادامه می‌گوییم چطور استفاده کنید.</p>
        
        <p><strong>روش پخش آنلاین با VLC:</strong></p>
        <ol>
            <li>ابتدا برنامه VLC را نصب کنید. لینک دانلود برای اندروید: <a href="https://niazroid.ir/1858/vlc-for-android/" target="_blank" style="color:var(--accent);">https://niazroid.ir/1858/vlc-for-android/</a></li>
            <li>لینک دانلود فیلم یا سریال مورد نظر را از بخش دانلود کپی کنید.</li>
            <li>در VLC گزینه "New Stream" را زده و لینک را وارد کنید.</li>
        </ol>
        
        <p><strong>حل مشکل عدم نمایش زیرنویس در نسخه سافت ساب:</strong></p>
        <p>1- از پلیر مناسب استفاده کنید (VLC یا MX Player در اندروید، VLC یا Pot Player در ویندوز).<br>2- ممکن است زیرنویس غیرفعال باشد. برای فعالسازی:</p>
        
