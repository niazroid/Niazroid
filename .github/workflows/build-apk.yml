<script id="bm-sitewide-header-js">
(function(){
    function openMenu(){
        var sidebar = document.getElementById('sidebarMenu');
        var overlay = document.getElementById('menuOverlay');
        if (sidebar) sidebar.classList.add('open');
        if (overlay) overlay.classList.add('active');
        document.body.classList.add('menu-open');
        document.body.style.overflow = 'hidden';
        var legacy = document.getElementById('menuBtn');
        if (!sidebar && legacy && legacy !== document.getElementById('menuBtnDesktop')) {
            legacy.click();
        }
    }
    function openNotif(){
        var notif = document.getElementById('notifSidebar');
        var overlay = document.getElementById('menuOverlay');
        if (notif) notif.classList.add('open');
        if (overlay) overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        var legacy = document.getElementById('notifBell');
        if (!notif && legacy && legacy !== document.getElementById('notifBellDesktop')) {
            legacy.click();
        }
    }
    document.addEventListener('DOMContentLoaded', function(){
        var deskMenu = document.getElementById('menuBtnDesktop');
        if (deskMenu) deskMenu.addEventListener('click', function(e){ e.preventDefault(); openMenu(); });
        var deskNotif = document.getElementById('notifBellDesktop');
        if (deskNotif) deskNotif.addEventListener('click', function(e){ e.preventDefault(); openNotif(); });
    });
})();
</script>
