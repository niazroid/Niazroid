  function pinFooter(){
    var footer = document.querySelector('.bm-global-footer[data-bm-global-footer="v30"]');
    if (!footer) return;
    footer.style.marginTop = '';
    requestAnimationFrame(function(){
      var rect = footer.getBoundingClientRect();
      var gap = (window.innerHeight || document.documentElement.clientHeight) - rect.bottom;
      if (gap > 0) {
        var mt = parseFloat(getComputedStyle(footer).marginTop) || 0;
        footer.style.marginTop = (mt + gap) + 'px';
      }
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', pinFooter, {once:true});
  else pinFooter();
  window.addEventListener('load', pinFooter, {once:true});
  window.addEventListener('resize', pinFooter, {passive:true});
  setTimeout(pinFooter, 450);
  setTimeout(pinFooter, 1200);
})();
