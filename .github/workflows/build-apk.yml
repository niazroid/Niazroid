          # 4) Downloads activity opens MediaStore items and defaults to Downloads/Bankmovie.
          downloads = downloads_path.read_text(encoding='utf-8')
          # Add English helpers/import ViewGroup.
          downloads = downloads.replace('import android.view.View\n', 'import android.view.View\nimport android.view.ViewGroup\n')
          # Make public folder the first and default option.
