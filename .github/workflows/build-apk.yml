name: Build Bankmovie V2.1 All Features

on:
  workflow_dispatch:
  push:
    paths:
      - 'Bankmovie-v2.1-all-features-fixed-source.zip'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract source
        run: |
          set -euo pipefail
          rm -rf project
          mkdir project
          unzip -q Bankmovie-v2.1-all-features-fixed-source.zip -d project

      - name: Build release APK
        working-directory: project
        run: |
          set -euo pipefail
          chmod +x gradlew 2>/dev/null || true
          if [ -x ./gradlew ]; then
            ./gradlew assembleRelease --stacktrace
          else
            gradle assembleRelease --stacktrace
          fi

      - name: Collect APK
        run: |
          set -euo pipefail
          mkdir -p output
          find project/app/build/outputs/apk -type f -name '*.apk' -exec cp {} output/ \;
          test -n "$(find output -type f -name '*.apk' -print -quit)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V2.1-all-features
          path: output/*.apk
          if-no-files-found: error
