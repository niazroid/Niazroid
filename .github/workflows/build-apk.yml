name: Build Bankmovie V1.4 Universal

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build Bankmovie V1.4 Universal APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip exact V1.4 source
        shell: bash
        run: |
          set -euo pipefail
          ZIP="Bankmovie-v1.4-source-fixed.zip"
          test -f "$ZIP" || { echo "Missing $ZIP in repository root"; exit 1; }
          rm -rf project
          mkdir project
          unzip -q "$ZIP" -d project
          test -f project/settings.gradle
          test -f project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt

      - name: Verify real source fixes
        shell: bash
        run: |
          set -euo pipefail
          MAIN="project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt"
          GRADLE="project/app/build.gradle"
          grep -Fq 'text = "نسخه ۱.۴"' "$MAIN"
          grep -Fq 'FrameLayout.LayoutParams(dp(112), dp(44)' "$MAIN"
          grep -Fq 'code == 401 && !retried' "$MAIN"
          grep -Fq 'private fun friendlyError' "$MAIN"
          grep -Fq 'versionName "1.4"' "$GRADLE"
          if grep -Fq 'تماشای فیلم و سریال با استایل حرفه‌ای Bankmovie' "$MAIN"; then
            echo "Old slider fallback text still exists"
            exit 1
          fi
          echo "V1.4 source fixes verified before build"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          echo "sdk.dir=$ANDROID_HOME" > project/local.properties

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build one universal APK
        working-directory: project
        shell: bash
        run: |
          set -uo pipefail
          rm -rf app/build

          set +e
          gradle :app:assembleRelease --no-daemon --max-workers=1 --stacktrace --console=plain 2>&1 | tee build.log
          BUILD_STATUS=${PIPESTATUS[0]}
          set -e

          if [ "$BUILD_STATUS" -ne 0 ]; then
            echo ""
            echo "==================== REAL ERROR ===================="
            grep -Ei 'FAILURE:|What went wrong:|Execution failed|error:|Exception|Caused by:' build.log | tail -n 160 || true
            echo "-------------------- LAST LOG LINES ----------------"
            tail -n 160 build.log || true
            echo "===================================================="
            exit "$BUILD_STATUS"
          fi

          APK="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*universal*release*.apk' | head -n 1)"

          if [ -z "$APK" ]; then
            echo ""
            echo "==================== REAL ERROR ===================="
            echo "Universal release APK was not produced."
            find app/build/outputs/apk/release -type f -name '*.apk' -print 2>/dev/null || true
            echo "===================================================="
            exit 1
          fi

          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt"
          "$AAPT" dump badging "$APK" > apk-badging.txt

          if ! grep -Fq "versionName='1.4'" apk-badging.txt; then
            echo ""
            echo "==================== REAL ERROR ===================="
            echo "APK versionName is not 1.4."
            grep -m1 "^package:" apk-badging.txt || true
            echo "===================================================="
            exit 1
          fi

          if ! grep -Fq "package: name='ir.bankmoviee.app'" apk-badging.txt; then
            echo ""
            echo "==================== REAL ERROR ===================="
            echo "APK package name is not ir.bankmoviee.app."
            grep -m1 "^package:" apk-badging.txt || true
            echo "===================================================="
            exit 1
          fi

          echo "APK package/version check OK:"
          grep -m1 "^package:" apk-badging.txt

          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"

          set +e
          "$APKSIGNER" verify --verbose --print-certs "$APK" > apk-signature-full.txt 2>&1
          SIGN_STATUS=$?
          set -e

          if [ "$SIGN_STATUS" -ne 0 ]; then
            echo ""
            echo "==================== REAL ERROR ===================="
            echo "apksigner verification failed."
            cat apk-signature-full.txt
            echo "===================================================="
            exit "$SIGN_STATUS"
          fi

          EXPECTED_SHA256="862bc358d8d239a2134a63fab979ff6019862372e7950ea49bac74780936205d"
          ACTUAL_SHA256="$(
            sed -n 's/^Signer #1 certificate SHA-256 digest: //p' apk-signature-full.txt               | head -n 1               | tr '[:upper:]' '[:lower:]'               | tr -d ':[:space:]'
          )"

          if [ -z "$ACTUAL_SHA256" ]; then
            echo ""
            echo "==================== REAL ERROR ===================="
            echo "Could not read signer SHA-256 from apksigner output."
            cat apk-signature-full.txt
            echo "===================================================="
            exit 1
          fi

          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo ""
            echo "==================== REAL ERROR ===================="
            echo "APK signer does not match the previous Bankmovie release."
            echo "Expected: $EXPECTED_SHA256"
            echo "Actual:   $ACTUAL_SHA256"
            echo "===================================================="
            exit 1
          fi

          echo "APK signer check OK:"
          grep -E '^Signer #1 certificate (DN|SHA-256 digest):' apk-signature-full.txt || true
          echo "META-INF warnings are non-fatal and are intentionally ignored."

          mkdir -p publish
          cp "$APK" "publish/Bankmovie-v1.4-universal-build-${GITHUB_RUN_NUMBER}.apk"
          sha256sum publish/*.apk > publish/SHA256.txt
          ls -lh publish

      - name: Upload V1.4 APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.4-Universal-${{ github.run_number }}
          path: project/publish/*
          if-no-files-found: error
          retention-days: 14
