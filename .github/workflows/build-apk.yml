          '''
          assert insert_anchor in downloads, 'Downloads dp anchor missing'
          downloads = downloads.replace(insert_anchor, helper+insert_anchor,1)
          # Translate after every render.
          needle = '''        if (completed > 0) {
                      content.addView(TextView(this).apply {'''
          # We'll post translation at end of render by inserting before function closing after completed block. Find actionButton function anchor.
          anchor = '    private fun downloadLocationCard(): LinearLayout {'
          idx = downloads.index(anchor)
