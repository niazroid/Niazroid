name: Build BankMoviee Player Episode Update

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build BankMoviee Player Episode Update APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and unzip project ZIP
        id: unzip
        shell: bash
        run: |
          echo "Files in repository root:"
          ls -la

          ZIP_FILE="$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            echo "Upload the project ZIP in the main Code page."
            exit 1
          fi

          echo "Using ZIP file: $ZIP_FILE"

          rm -rf project
          mkdir project
          unzip -q "$ZIP_FILE" -d project

          SETTINGS_FILE="$(find project -maxdepth 5 -type f -name "settings.gradle" | head -n 1)"

          if [ -z "$SETTINGS_FILE" ]; then
            echo "Could not find settings.gradle after unzip."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          echo "Android project directory: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Patch BankMoviee Episode Update
        shell: bash
        env:
          PROJECT_DIR: ${{ steps.unzip.outputs.project_dir }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os, re
          project = Path(os.environ["PROJECT_DIR"])

          gradle_props = project / "gradle.properties"
          existing = gradle_props.read_text(encoding="utf-8") if gradle_props.exists() else ""
          props = {}
          for line in existing.splitlines():
              if "=" in line and not line.strip().startswith("#"):
                  k, v = line.split("=", 1)
                  props[k.strip()] = v.strip()
          props["android.useAndroidX"] = "true"
          props["android.enableJetifier"] = "true"
          merged, seen = [], set()
          for line in existing.splitlines():
              if "=" in line and not line.strip().startswith("#"):
                  k = line.split("=", 1)[0].strip()
                  if k in props:
                      merged.append(f"{k}={props[k]}")
                      seen.add(k)
                  else:
                      merged.append(line)
              else:
                  merged.append(line)
          for k, v in props.items():
              if k not in seen:
                  merged.append(f"{k}={v}")
          gradle_props.write_text("\n".join(merged).strip() + "\n", encoding="utf-8")

          app_gradle = project / "app" / "build.gradle"
          if app_gradle.exists():
              text = app_gradle.read_text(encoding="utf-8")
              text = re.sub(r"\n\s*splits\s*\{\s*abi\s*\{.*?\n\s*\}\s*\}\s*", "\n", text, flags=re.S)
              text = re.sub(r"\n\s*ndk\s*\{\s*abiFilters[^\n]*\n\s*\}\s*", "\n", text, flags=re.S)
              text = re.sub(r"\n\s*abiFilters[^\n]*", "\n", text, flags=re.S)
              if "BANKMOVIE_PRO_EPISODE_UPDATE" not in text:
                  text += """
          android {
              // BANKMOVIE_PRO_EPISODE_UPDATE
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          """
              app_gradle.write_text(text, encoding="utf-8")

          manifest = project / "app" / "src" / "main" / "AndroidManifest.xml"
          if manifest.exists():
              text = manifest.read_text(encoding="utf-8")
              text = text.replace('android:screenOrientation="sensorLandscape"', 'android:screenOrientation="fullSensor"')
              text = text.replace('android:screenOrientation="landscape"', 'android:screenOrientation="fullSensor"')
              manifest.write_text(text, encoding="utf-8")

          java_dir = project / "app" / "src" / "main" / "java"
          main_files = list(java_dir.rglob("MainActivity.kt"))
          player_files = list(java_dir.rglob("PlayerActivity.kt"))
          if not main_files: raise SystemExit("MainActivity.kt not found")
          if not player_files: raise SystemExit("PlayerActivity.kt not found")
          main_files[0].write_text('package ir.bankmoviee.app\n\nimport android.annotation.SuppressLint\nimport android.app.Activity\nimport android.app.DownloadManager\nimport android.content.ActivityNotFoundException\nimport android.content.Context\nimport android.content.Intent\nimport android.graphics.Bitmap\nimport android.net.Uri\nimport android.net.http.SslError\nimport android.os.Build\nimport android.os.Bundle\nimport android.os.Environment\nimport android.view.View\nimport android.webkit.CookieManager\nimport android.webkit.DownloadListener\nimport android.webkit.JavascriptInterface\nimport android.webkit.SslErrorHandler\nimport android.webkit.ValueCallback\nimport android.webkit.WebChromeClient\nimport android.webkit.WebResourceRequest\nimport android.webkit.WebResourceResponse\nimport android.webkit.WebSettings\nimport android.webkit.WebView\nimport android.webkit.WebViewClient\nimport android.widget.FrameLayout\nimport android.widget.ProgressBar\nimport android.widget.TextView\nimport android.widget.Toast\nimport org.json.JSONArray\nimport org.json.JSONObject\nimport java.util.Locale\n\nclass MainActivity : Activity() {\n\n    private lateinit var webView: WebView\n    private lateinit var progressBar: ProgressBar\n    private lateinit var offlineBox: View\n    private lateinit var offlineText: TextView\n    private lateinit var fullScreenContainer: FrameLayout\n    private lateinit var launchLoader: View\n    private lateinit var launchLoaderText: TextView\n\n    private var filePathCallback: ValueCallback<Array<Uri>>? = null\n    private var customView: View? = null\n    private var customViewCallback: WebChromeClient.CustomViewCallback? = null\n\n    private val fileChooserRequestCode = 7001\n\n    @SuppressLint("SetJavaScriptEnabled", "AddJavascriptInterface")\n    override fun onCreate(savedInstanceState: Bundle?) {\n        super.onCreate(savedInstanceState)\n        setContentView(R.layout.activity_main)\n\n        webView = findViewById(R.id.bankWebView)\n        progressBar = findViewById(R.id.webProgress)\n        offlineBox = findViewById(R.id.offlineBox)\n        offlineText = findViewById(R.id.offlineText)\n        fullScreenContainer = findViewById(R.id.fullScreenContainer)\n        launchLoader = findViewById(R.id.launchLoader)\n        launchLoaderText = findViewById(R.id.launchLoaderText)\n\n        applySafeAreaForWebView()\n        showLoader(true, "در حال آماده\u200cسازی بانک مووی")\n\n        CookieManager.getInstance().setAcceptCookie(true)\n        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {\n            CookieManager.getInstance().setAcceptThirdPartyCookies(webView, true)\n        }\n\n        webView.settings.apply {\n            javaScriptEnabled = true\n            domStorageEnabled = true\n            databaseEnabled = true\n            mediaPlaybackRequiresUserGesture = false\n            loadWithOverviewMode = true\n            useWideViewPort = true\n            builtInZoomControls = false\n            displayZoomControls = false\n            cacheMode = WebSettings.LOAD_DEFAULT\n            mixedContentMode = WebSettings.MIXED_CONTENT_COMPATIBILITY_MODE\n            allowFileAccess = false\n            allowContentAccess = true\n            userAgentString = userAgentString + " BankMovieeAndroid/2.0"\n        }\n\n        webView.addJavascriptInterface(NativeBridge(), "BankMovieeNative")\n        webView.setLayerType(View.LAYER_TYPE_HARDWARE, null)\n        webView.webViewClient = BankMovieeWebViewClient()\n        webView.webChromeClient = BankMovieeChromeClient()\n        webView.setDownloadListener(BankMovieeDownloadListener())\n\n        if (savedInstanceState == null) {\n            webView.loadUrl(AppConfig.BASE_URL)\n        } else {\n            webView.restoreState(savedInstanceState)\n        }\n    }\n\n    private fun applySafeAreaForWebView() {\n        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {\n            webView.setOnApplyWindowInsetsListener { view, insets ->\n                var top = insets.systemWindowInsetTop\n                var bottom = insets.systemWindowInsetBottom\n                var left = insets.systemWindowInsetLeft\n                var right = insets.systemWindowInsetRight\n                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.P) {\n                    val cutout = insets.displayCutout\n                    if (cutout != null) {\n                        top = kotlin.math.max(top, cutout.safeInsetTop)\n                        bottom = kotlin.math.max(bottom, cutout.safeInsetBottom)\n                        left = kotlin.math.max(left, cutout.safeInsetLeft)\n                        right = kotlin.math.max(right, cutout.safeInsetRight)\n                    }\n                }\n                view.setPadding(left, top, right, bottom)\n                insets\n            }\n            webView.requestApplyInsets()\n        }\n    }\n\n    private fun showLoader(show: Boolean, text: String = "") {\n        launchLoader.visibility = if (show) View.VISIBLE else View.GONE\n        if (text.isNotBlank()) launchLoaderText.text = text\n    }\n\n    private fun isHttpUrl(url: String?): Boolean {\n        if (url.isNullOrBlank()) return false\n        val lower = url.lowercase(Locale.US)\n        return lower.startsWith("http://") || lower.startsWith("https://")\n    }\n\n    private fun isDirectVideoUrl(url: String?): Boolean {\n        if (!isHttpUrl(url)) return false\n        val lower = url!!.lowercase(Locale.US)\n        return lower.contains(".m3u8") ||\n            lower.contains(".mp4") ||\n            lower.contains(".mkv") ||\n            lower.contains(".avi") ||\n            lower.contains(".mov") ||\n            lower.contains(".webm") ||\n            lower.contains(".ts")\n    }\n\n    override fun onSaveInstanceState(outState: Bundle) {\n        super.onSaveInstanceState(outState)\n        webView.saveState(outState)\n    }\n\n    override fun onBackPressed() {\n        when {\n            customView != null -> hideCustomView()\n            webView.canGoBack() -> webView.goBack()\n            else -> super.onBackPressed()\n        }\n    }\n\n    override fun onDestroy() {\n        try {\n            webView.stopLoading()\n            webView.destroy()\n        } catch (_: Throwable) {\n        }\n        super.onDestroy()\n    }\n\n    @Deprecated("Deprecated in Java")\n    override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {\n        super.onActivityResult(requestCode, resultCode, data)\n        if (requestCode == fileChooserRequestCode) {\n            val callback = filePathCallback ?: return\n            filePathCallback = null\n            callback.onReceiveValue(WebChromeClient.FileChooserParams.parseResult(resultCode, data))\n        }\n    }\n\n    inner class NativeBridge {\n        @JavascriptInterface\n        fun openPlayer(payload: String?) {\n            runOnUiThread {\n                try {\n                    openNativePlayerFromJson(payload.orEmpty())\n                } catch (_: Throwable) {\n                    Toast.makeText(this@MainActivity, "پلیر Native باز نشد", Toast.LENGTH_SHORT).show()\n                }\n            }\n        }\n    }\n\n    private fun openNativePlayerFromJson(payload: String) {\n        val obj = try {\n            JSONObject(payload)\n        } catch (_: Throwable) {\n            JSONObject()\n        }\n        val videoUrl = obj.optString("video").ifBlank { obj.optString("url") }\n        if (!isHttpUrl(videoUrl)) {\n            Toast.makeText(this, "لینک ویدیو معتبر نیست", Toast.LENGTH_SHORT).show()\n            return\n        }\n\n        val normalized = if (obj.has("tracks")) obj else JSONObject().apply {\n            put("video", videoUrl)\n            put("title", obj.optString("title", webView.title ?: "BankMoviee"))\n            put("subtitle", obj.optString("subtitle"))\n            put("referer", obj.optString("referer", webView.url ?: AppConfig.BASE_URL))\n            put("selectedIndex", 0)\n            put("tracks", JSONArray().put(JSONObject().apply {\n                put("url", videoUrl)\n                put("title", obj.optString("title", webView.title ?: "BankMoviee"))\n                put("subtitle", obj.optString("subtitle"))\n                put("quality", obj.optString("quality"))\n                put("type", obj.optString("type"))\n                put("label", obj.optString("label"))\n            }))\n        }\n\n        val intent = Intent(this, PlayerActivity::class.java).apply {\n            putExtra(PlayerActivity.EXTRA_VIDEO_URL, videoUrl)\n            putExtra(PlayerActivity.EXTRA_TITLE, normalized.optString("title", webView.title ?: "BankMoviee"))\n            putExtra(PlayerActivity.EXTRA_SUBTITLE_URL, normalized.optString("subtitle"))\n            putExtra(PlayerActivity.EXTRA_REFERER, normalized.optString("referer", webView.url ?: AppConfig.BASE_URL))\n            putExtra(PlayerActivity.EXTRA_PLAYLIST_JSON, normalized.toString())\n        }\n        startActivity(intent)\n    }\n\n    private fun openNativePlayer(playUri: Uri) {\n        val obj = JSONObject().apply {\n            put("video", playUri.getQueryParameter("video") ?: "")\n            put("title", playUri.getQueryParameter("title") ?: webView.title ?: "BankMoviee")\n            put("subtitle", playUri.getQueryParameter("subtitle") ?: "")\n            put("referer", playUri.getQueryParameter("referer") ?: webView.url ?: AppConfig.BASE_URL)\n            put("selectedIndex", 0)\n            put("tracks", JSONArray().put(JSONObject().apply {\n                put("url", playUri.getQueryParameter("video") ?: "")\n                put("title", playUri.getQueryParameter("title") ?: webView.title ?: "BankMoviee")\n                put("subtitle", playUri.getQueryParameter("subtitle") ?: "")\n                put("quality", playUri.getQueryParameter("quality") ?: "")\n                put("type", playUri.getQueryParameter("type") ?: "")\n                put("label", playUri.getQueryParameter("label") ?: "")\n                put("season", playUri.getQueryParameter("season") ?: "")\n                put("episode", playUri.getQueryParameter("episode") ?: "")\n            }))\n        }\n        openNativePlayerFromJson(obj.toString())\n    }\n\n    private fun openDirectVideo(url: String) {\n        val obj = JSONObject().apply {\n            put("video", url)\n            put("title", webView.title ?: "BankMoviee")\n            put("referer", webView.url ?: AppConfig.BASE_URL)\n            put("selectedIndex", 0)\n            put("tracks", JSONArray().put(JSONObject().apply {\n                put("url", url)\n                put("title", webView.title ?: "BankMoviee")\n            }))\n        }\n        openNativePlayerFromJson(obj.toString())\n    }\n\n    private fun handleSpecialUri(uri: Uri?): Boolean {\n        uri ?: return false\n        val scheme = uri.scheme?.lowercase(Locale.US) ?: return false\n\n        if (scheme == AppConfig.APP_SCHEME && uri.host == AppConfig.PLAY_HOST) {\n            openNativePlayer(uri)\n            return true\n        }\n\n        val raw = uri.toString()\n        if (isDirectVideoUrl(raw)) {\n            openDirectVideo(raw)\n            return true\n        }\n\n        if (scheme == "intent") {\n            return try {\n                val intent = Intent.parseUri(raw, Intent.URI_INTENT_SCHEME)\n                startActivity(intent)\n                true\n            } catch (_: Exception) {\n                true\n            }\n        }\n\n        if (scheme in listOf("tel", "mailto", "sms", "tg", "whatsapp")) {\n            return try {\n                startActivity(Intent(Intent.ACTION_VIEW, uri))\n                true\n            } catch (_: ActivityNotFoundException) {\n                true\n            }\n        }\n\n        return false\n    }\n\n    private fun injectBankMovieeBridge() {\n        val js = """\n            (function(){\n                if (window.__BankMovieeNativeBridgeProInstalled) return;\n                window.__BankMovieeNativeBridgeProInstalled = true;\n\n                function absUrl(url){\n                    try { return new URL(url || \'\', location.href).href; } catch(e){ return url || \'\'; }\n                }\n                function isVideo(url){\n                    return /^https?:\\/\\//i.test(url || \'\') && /\\.(mkv|mp4|avi|m3u8|mov|webm|ts)(\\?|#|$)/i.test(url || \'\');\n                }\n                function txt(sel){\n                    var el = document.querySelector(sel);\n                    return el && el.textContent ? el.textContent.trim() : \'\';\n                }\n                function pageTitle(){\n                    return txt(\'.movie-title-fa\') || txt(\'.movie-title-en\') || txt(\'.movie-title\') || txt(\'h1\') || document.title || \'BankMoviee\';\n                }\n                function findSubtitleNear(btn){\n                    var raw = btn.getAttribute(\'data-subtitle\') || btn.getAttribute(\'data-sub\') || btn.getAttribute(\'data-srt\') || \'\';\n                    if (raw) return absUrl(raw);\n                    var box = btn.closest(\'.download-link,.arc1-link-row,.premium-download-card,.arc1-ep-card,.download-section,.episode-card,.quality-card\');\n                    if (!box) return \'\';\n                    var sub = box.querySelector(\'[data-subtitle],[data-sub],[data-srt]\');\n                    if (sub) return absUrl(sub.getAttribute(\'data-subtitle\') || sub.getAttribute(\'data-sub\') || sub.getAttribute(\'data-srt\') || \'\');\n                    var a = box.querySelector(\'a[href$=".srt"],a[href$=".ass"],a[href$=".ssa"],a[href$=".vtt"]\');\n                    if (a) return absUrl(a.href);\n                    return \'\';\n                }\n                function rank(q){\n                    q=String(q||\'\').toLowerCase();\n                    if(q.indexOf(\'2160\')>=0 || q.indexOf(\'4k\')>=0) return 6;\n                    if(q.indexOf(\'1080\')>=0) return 5;\n                    if(q.indexOf(\'720\')>=0) return 4;\n                    if(q.indexOf(\'480\')>=0) return 3;\n                    if(q.indexOf(\'360\')>=0) return 2;\n                    return 1;\n                }\n                function addTrack(list, seen, item){\n                    if(!item || !isVideo(item.url)) return;\n                    item.url = absUrl(item.url);\n                    var key = item.url + \'|\' + (item.type || \'\') + \'|\' + (item.quality || \'\') + \'|\' + (item.season || \'\') + \'|\' + (item.episode || \'\');\n                    if(seen[key]) return;\n                    seen[key]=true;\n                    list.push(item);\n                }\n                function addFromQualityData(list, seen, data, type){\n                    if(!data) return;\n                    Object.keys(data).sort(function(a,b){ return rank(b)-rank(a); }).forEach(function(q){\n                        var arr = data[q] || [];\n                        for(var i=0;i<arr.length;i++){\n                            var it = arr[i] || {};\n                            addTrack(list, seen, {\n                                url: absUrl(it.url || it.href || \'\'),\n                                subtitle: absUrl(it.subtitle || it.sub || it.srt || \'\'),\n                                quality: q,\n                                type: type,\n                                label: (type === \'dub\' ? \'دوبله فارسی\' : \'زیرنویس فارسی\') + (q ? \' - \' + q : \'\'),\n                                size: it.size || \'\',\n                                title: pageTitle()\n                            });\n                        }\n                    });\n                }\n                function collectTracks(selectedBtn, selectedUrl){\n                    var list = [];\n                    var seen = {};\n\n                    addFromQualityData(list, seen, window.dubLinksData || window.arc1DubLinksData, \'dub\');\n                    addFromQualityData(list, seen, window.softLinksData || window.arc1SoftLinksData, \'soft\');\n\n                    document.querySelectorAll(\'.arc1-play-btn,[data-bm-native-play],[data-url],[data-video],a[href]\').forEach(function(el){\n                        var url = el.getAttribute(\'data-url\') || el.getAttribute(\'data-video\') || el.getAttribute(\'href\') || \'\';\n                        url = absUrl(url);\n                        if(!isVideo(url)) return;\n                        var label = el.getAttribute(\'data-label\') || el.getAttribute(\'aria-label\') || el.textContent || \'\';\n                        var type = el.getAttribute(\'data-type\') || \'\';\n                        var quality = el.getAttribute(\'data-quality\') || \'\';\n                        if(!type && /dub|dubbed|دوبله/i.test(label + \' \' + url)) type = \'dub\';\n                        if(!type) type = \'soft\';\n                        addTrack(list, seen, {\n                            url: url,\n                            subtitle: findSubtitleNear(el),\n                            quality: quality,\n                            type: type,\n                            label: label.trim(),\n                            season: el.getAttribute(\'data-season\') || \'\',\n                            episode: el.getAttribute(\'data-episode\') || \'\',\n                            nextUrl: absUrl(el.getAttribute(\'data-next-url\') || \'\'),\n                            nextLabel: el.getAttribute(\'data-next-label\') || \'\',\n                            title: pageTitle()\n                        });\n                    });\n\n                    selectedUrl = absUrl(selectedUrl);\n                    var selectedIndex = 0;\n                    for(var i=0;i<list.length;i++){\n                        if(list[i].url === selectedUrl){ selectedIndex = i; break; }\n                    }\n                    if(!list.length && isVideo(selectedUrl)) {\n                        addTrack(list, seen, { url: selectedUrl, title: pageTitle(), label: selectedBtn ? (selectedBtn.textContent || \'\').trim() : \'\' });\n                    }\n\n                    return { tracks: list, selectedIndex: selectedIndex };\n                }\n\n                function openNative(btn, url){\n                    url = absUrl(url);\n                    if(!isVideo(url)) return false;\n                    var collected = collectTracks(btn, url);\n                    var current = collected.tracks[collected.selectedIndex] || {};\n                    var payload = {\n                        video: url,\n                        title: pageTitle(),\n                        referer: location.href,\n                        subtitle: current.subtitle || findSubtitleNear(btn) || \'\',\n                        selectedIndex: collected.selectedIndex,\n                        tracks: collected.tracks\n                    };\n                    if(window.BankMovieeNative && window.BankMovieeNative.openPlayer) {\n                        window.BankMovieeNative.openPlayer(JSON.stringify(payload));\n                        return true;\n                    }\n                    location.href = \'bankmoviee://play?video=\' + encodeURIComponent(url) + \'&title=\' + encodeURIComponent(pageTitle()) + \'&referer=\' + encodeURIComponent(location.href);\n                    return true;\n                }\n\n                document.addEventListener(\'click\', function(e){\n                    var btn = e.target && e.target.closest ? e.target.closest(\'.arc1-play-btn,[data-bm-native-play],[data-url],[data-video],a[href]\') : null;\n                    if(!btn) return;\n                    var href = btn.getAttribute(\'href\') || \'\';\n                    if(href.indexOf(\'bankmoviee://play\') === 0) return;\n                    var url = btn.getAttribute(\'data-url\') || btn.getAttribute(\'data-video\') || href;\n                    if(openNative(btn, url)){\n                        e.preventDefault();\n                        e.stopPropagation();\n                        if(e.stopImmediatePropagation) e.stopImmediatePropagation();\n                    }\n                }, true);\n\n                var style = document.createElement(\'style\');\n                style.textContent = \'header,.header,.site-header,.app-header{padding-top:max(env(safe-area-inset-top),0px)}\';\n                document.head && document.head.appendChild(style);\n\n                console.log(\'BankMoviee Android Native Player bridge installed\');\n            })();\n        """.trimIndent()\n        webView.evaluateJavascript(js, null)\n    }\n\n    private fun showCustomView(view: View, callback: WebChromeClient.CustomViewCallback) {\n        if (customView != null) {\n            callback.onCustomViewHidden()\n            return\n        }\n        customView = view\n        customViewCallback = callback\n        fullScreenContainer.addView(view, FrameLayout.LayoutParams.MATCH_PARENT, FrameLayout.LayoutParams.MATCH_PARENT)\n        fullScreenContainer.visibility = View.VISIBLE\n        webView.visibility = View.GONE\n        window.decorView.systemUiVisibility = (\n            View.SYSTEM_UI_FLAG_FULLSCREEN\n                or View.SYSTEM_UI_FLAG_HIDE_NAVIGATION\n                or View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY\n                or View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN\n                or View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION\n        )\n    }\n\n    private fun hideCustomView() {\n        val view = customView ?: return\n        fullScreenContainer.removeView(view)\n        fullScreenContainer.visibility = View.GONE\n        webView.visibility = View.VISIBLE\n        customView = null\n        customViewCallback?.onCustomViewHidden()\n        customViewCallback = null\n        window.decorView.systemUiVisibility = View.SYSTEM_UI_FLAG_VISIBLE\n    }\n\n    private inner class BankMovieeWebViewClient : WebViewClient() {\n        override fun shouldOverrideUrlLoading(view: WebView?, request: WebResourceRequest?): Boolean {\n            return handleSpecialUri(request?.url)\n        }\n\n        @Deprecated("Deprecated in Java")\n        override fun shouldOverrideUrlLoading(view: WebView?, url: String?): Boolean {\n            return handleSpecialUri(url?.let { Uri.parse(it) })\n        }\n\n        override fun onPageStarted(view: WebView?, url: String?, favicon: Bitmap?) {\n            progressBar.visibility = View.VISIBLE\n            offlineBox.visibility = View.GONE\n            showLoader(true, "در حال بارگذاری صفحه")\n        }\n\n        override fun onPageFinished(view: WebView?, url: String?) {\n            progressBar.visibility = View.GONE\n            injectBankMovieeBridge()\n            launchLoader.postDelayed({ showLoader(false) }, 450)\n        }\n\n        override fun onReceivedHttpError(view: WebView?, request: WebResourceRequest?, errorResponse: WebResourceResponse?) {\n            super.onReceivedHttpError(view, request, errorResponse)\n            if (request?.isForMainFrame == true && (errorResponse?.statusCode ?: 0) >= 500) {\n                offlineText.text = "مشکل موقت در اتصال به سایت. دوباره تلاش کن."\n                offlineBox.visibility = View.VISIBLE\n                showLoader(false)\n            }\n        }\n\n        override fun onReceivedSslError(view: WebView?, handler: SslErrorHandler?, error: SslError?) {\n            handler?.cancel()\n            offlineText.text = "خطای امنیتی SSL. گواهی سایت را بررسی کن."\n            offlineBox.visibility = View.VISIBLE\n            showLoader(false)\n        }\n    }\n\n    private inner class BankMovieeChromeClient : WebChromeClient() {\n        override fun onProgressChanged(view: WebView?, newProgress: Int) {\n            progressBar.progress = newProgress\n            progressBar.visibility = if (newProgress >= 100) View.GONE else View.VISIBLE\n            if (newProgress in 1..99) {\n                launchLoaderText.text = "در حال بارگذاری ${newProgress}٪"\n            }\n        }\n\n        override fun onShowFileChooser(\n            webView: WebView?,\n            filePathCallback: ValueCallback<Array<Uri>>?,\n            fileChooserParams: FileChooserParams?\n        ): Boolean {\n            this@MainActivity.filePathCallback?.onReceiveValue(null)\n            this@MainActivity.filePathCallback = filePathCallback\n            return try {\n                val intent = fileChooserParams?.createIntent() ?: Intent(Intent.ACTION_GET_CONTENT).apply {\n                    addCategory(Intent.CATEGORY_OPENABLE)\n                    type = "*/*"\n                }\n                startActivityForResult(intent, fileChooserRequestCode)\n                true\n            } catch (_: ActivityNotFoundException) {\n                this@MainActivity.filePathCallback = null\n                false\n            }\n        }\n\n        override fun onShowCustomView(view: View?, callback: CustomViewCallback?) {\n            if (view != null && callback != null) showCustomView(view, callback)\n        }\n\n        override fun onHideCustomView() {\n            hideCustomView()\n        }\n    }\n\n    private inner class BankMovieeDownloadListener : DownloadListener {\n        override fun onDownloadStart(\n            url: String?,\n            userAgent: String?,\n            contentDisposition: String?,\n            mimeType: String?,\n            contentLength: Long\n        ) {\n            if (isDirectVideoUrl(url)) {\n                openDirectVideo(url!!)\n                return\n            }\n            if (!isHttpUrl(url)) return\n            try {\n                val request = DownloadManager.Request(Uri.parse(url))\n                request.setMimeType(mimeType)\n                request.addRequestHeader("User-Agent", userAgent ?: webView.settings.userAgentString)\n                CookieManager.getInstance().getCookie(url)?.let { request.addRequestHeader("Cookie", it) }\n                request.setTitle("BankMoviee Download")\n                request.setDescription("در حال دانلود فایل")\n                request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED)\n                request.setDestinationInExternalPublicDir(\n                    Environment.DIRECTORY_DOWNLOADS,\n                    Uri.parse(url).lastPathSegment ?: "bankmoviee_file"\n                )\n                val dm = getSystemService(Context.DOWNLOAD_SERVICE) as DownloadManager\n                dm.enqueue(request)\n                Toast.makeText(this@MainActivity, "دانلود شروع شد", Toast.LENGTH_SHORT).show()\n            } catch (_: Exception) {\n                Toast.makeText(this@MainActivity, "دانلود مستقیم توسط سیستم ممکن نشد", Toast.LENGTH_SHORT).show()\n            }\n        }\n    }\n}\n', encoding="utf-8")
          player_files[0].write_text('package ir.bankmoviee.app\n\nimport android.app.Activity\nimport android.app.AlertDialog\nimport android.content.SharedPreferences\nimport android.content.pm.ActivityInfo\nimport android.media.AudioManager\nimport android.net.Uri\nimport android.os.Build\nimport android.os.Bundle\nimport android.os.Handler\nimport android.os.Looper\nimport android.view.MotionEvent\nimport android.view.View\nimport android.view.WindowManager\nimport android.widget.ImageButton\nimport android.widget.LinearLayout\nimport android.widget.ProgressBar\nimport android.widget.SeekBar\nimport android.widget.TextView\nimport android.widget.Toast\nimport org.json.JSONObject\nimport org.videolan.libvlc.LibVLC\nimport org.videolan.libvlc.Media\nimport org.videolan.libvlc.MediaPlayer\nimport org.videolan.libvlc.util.VLCVideoLayout\nimport java.util.Locale\nimport kotlin.math.abs\nimport kotlin.math.max\nimport kotlin.math.min\n\nclass PlayerActivity : Activity() {\n\n    companion object {\n        const val EXTRA_VIDEO_URL = "video_url"\n        const val EXTRA_SUBTITLE_URL = "subtitle_url"\n        const val EXTRA_TITLE = "title"\n        const val EXTRA_REFERER = "referer"\n        const val EXTRA_PLAYLIST_JSON = "playlist_json"\n    }\n\n    data class Track(\n        val url: String,\n        val title: String,\n        val subtitle: String,\n        val quality: String,\n        val type: String,\n        val label: String,\n        val season: String,\n        val episode: String,\n        val nextUrl: String,\n        val nextLabel: String\n    )\n\n    private lateinit var root: View\n    private lateinit var vlcLayout: VLCVideoLayout\n    private lateinit var topBar: LinearLayout\n    private lateinit var bottomBar: LinearLayout\n    private lateinit var centerControls: LinearLayout\n    private lateinit var titleText: TextView\n    private lateinit var statusText: TextView\n    private lateinit var currentTimeText: TextView\n    private lateinit var durationText: TextView\n    private lateinit var playPauseBtn: ImageButton\n    private lateinit var bigPlayPauseBtn: ImageButton\n    private lateinit var seekBar: SeekBar\n    private lateinit var episodesBtn: TextView\n    private lateinit var resizeBtn: TextView\n    private lateinit var lockBtn: ImageButton\n    private lateinit var hudText: TextView\n    private lateinit var bufferOverlay: View\n    private lateinit var bufferText: TextView\n    private lateinit var bufferSpinner: ProgressBar\n    private lateinit var audioManager: AudioManager\n    private lateinit var prefs: SharedPreferences\n\n    private var libVLC: LibVLC? = null\n    private var mediaPlayer: MediaPlayer? = null\n    private val handler = Handler(Looper.getMainLooper())\n\n    private var tracks = mutableListOf<Track>()\n    private var currentTrackIndex = 0\n    private var videoUrl: String = ""\n    private var subtitleUrl: String = ""\n    private var referer: String = ""\n    private var pendingSeekMs = -1L\n    private var restoredOnce = false\n    private var externalSubtitleApplied = false\n\n    private var isSeeking = false\n    private var controlsVisible = true\n    private var locked = false\n    private var resizeModeIndex = 0\n\n    private var downX = 0f\n    private var downY = 0f\n    private var lastTapTime = 0L\n    private var lastTapX = 0f\n    private var draggingGesture = false\n    private var gestureSide = 0\n    private var startVolume = 0\n    private var startBrightness = 0.7f\n\n    private val resizeModes = arrayOf("Fit", "Fill", "Crop", "16:9", "4:3")\n\n    private val progressRunnable = object : Runnable {\n        override fun run() {\n            updateProgress()\n            handler.postDelayed(this, 500)\n        }\n    }\n\n    private val saveRunnable = object : Runnable {\n        override fun run() {\n            saveCurrentPosition()\n            handler.postDelayed(this, 3000)\n        }\n    }\n\n    private val hideControlsRunnable = Runnable {\n        if (mediaPlayer?.isPlaying == true && !locked) setControlsVisible(false)\n    }\n\n    private val hideHudRunnable = Runnable {\n        hudText.visibility = View.GONE\n    }\n\n    override fun onCreate(savedInstanceState: Bundle?) {\n        super.onCreate(savedInstanceState)\n        prefs = getSharedPreferences("bankmoviee_player_cache", MODE_PRIVATE)\n        audioManager = getSystemService(AUDIO_SERVICE) as AudioManager\n\n        requestedOrientation = ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE\n        setupFullscreenAndCutout()\n        setContentView(R.layout.activity_player)\n\n        bindViews()\n        applySafeAreaPadding()\n        readIntentAndPlaylist()\n        setupControls()\n\n        if (!isHttpUrl(videoUrl)) {\n            Toast.makeText(this, "لینک پخش معتبر نیست", Toast.LENGTH_LONG).show()\n            finish()\n            return\n        }\n\n        updateTitle()\n        startVlc(videoUrl, loadSavedPosition(videoUrl))\n    }\n\n    private fun setupFullscreenAndCutout() {\n        window.addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON)\n        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.P) {\n            val attrs = window.attributes\n            attrs.layoutInDisplayCutoutMode = WindowManager.LayoutParams.LAYOUT_IN_DISPLAY_CUTOUT_MODE_SHORT_EDGES\n            window.attributes = attrs\n        }\n        window.decorView.systemUiVisibility = (\n            View.SYSTEM_UI_FLAG_FULLSCREEN\n                or View.SYSTEM_UI_FLAG_HIDE_NAVIGATION\n                or View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY\n                or View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN\n                or View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION\n                or View.SYSTEM_UI_FLAG_LAYOUT_STABLE\n        )\n    }\n\n    private fun bindViews() {\n        root = findViewById(R.id.playerRoot)\n        vlcLayout = findViewById(R.id.vlcVideoLayout)\n        topBar = findViewById(R.id.playerTopBar)\n        bottomBar = findViewById(R.id.playerBottomBar)\n        centerControls = findViewById(R.id.playerCenterControls)\n        titleText = findViewById(R.id.playerTitle)\n        statusText = findViewById(R.id.playerStatus)\n        currentTimeText = findViewById(R.id.currentTime)\n        durationText = findViewById(R.id.durationTime)\n        playPauseBtn = findViewById(R.id.playPauseBtn)\n        bigPlayPauseBtn = findViewById(R.id.bigPlayPauseBtn)\n        seekBar = findViewById(R.id.seekBar)\n        episodesBtn = findViewById(R.id.episodesBtn)\n        resizeBtn = findViewById(R.id.resizeBtn)\n        lockBtn = findViewById(R.id.lockBtn)\n        hudText = findViewById(R.id.playerHud)\n        bufferOverlay = findViewById(R.id.bufferOverlay)\n        bufferText = findViewById(R.id.bufferText)\n        bufferSpinner = findViewById(R.id.bufferSpinner)\n    }\n\n    private fun applySafeAreaPadding() {\n        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {\n            root.setOnApplyWindowInsetsListener { _, insets ->\n                var top = insets.systemWindowInsetTop\n                var bottom = insets.systemWindowInsetBottom\n                var left = insets.systemWindowInsetLeft\n                var right = insets.systemWindowInsetRight\n                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.P) {\n                    val cutout = insets.displayCutout\n                    if (cutout != null) {\n                        top = max(top, cutout.safeInsetTop)\n                        bottom = max(bottom, cutout.safeInsetBottom)\n                        left = max(left, cutout.safeInsetLeft)\n                        right = max(right, cutout.safeInsetRight)\n                    }\n                }\n                topBar.setPadding(left + dp(14), top + dp(10), right + dp(14), dp(10))\n                bottomBar.setPadding(left + dp(14), dp(10), right + dp(14), bottom + dp(14))\n                insets\n            }\n            root.requestApplyInsets()\n        }\n    }\n\n    private fun readIntentAndPlaylist() {\n        val data = intent.data\n        val playlistJson = intent.getStringExtra(EXTRA_PLAYLIST_JSON) ?: data?.getQueryParameter("playlist") ?: ""\n        val defaultTitle = intent.getStringExtra(EXTRA_TITLE) ?: data?.getQueryParameter("title") ?: "BankMoviee Player"\n        subtitleUrl = intent.getStringExtra(EXTRA_SUBTITLE_URL) ?: data?.getQueryParameter("subtitle") ?: ""\n        referer = intent.getStringExtra(EXTRA_REFERER) ?: data?.getQueryParameter("referer") ?: ""\n\n        if (playlistJson.isNotBlank()) {\n            try {\n                val obj = JSONObject(playlistJson)\n                val arr = obj.optJSONArray("tracks")\n                if (arr != null) {\n                    for (i in 0 until arr.length()) {\n                        val item = arr.optJSONObject(i) ?: continue\n                        val url = item.optString("url").ifBlank { item.optString("video") }\n                        if (!isHttpUrl(url)) continue\n                        tracks.add(\n                            Track(\n                                url = url,\n                                title = item.optString("title", defaultTitle),\n                                subtitle = item.optString("subtitle"),\n                                quality = item.optString("quality"),\n                                type = item.optString("type"),\n                                label = item.optString("label"),\n                                season = item.optString("season"),\n                                episode = item.optString("episode"),\n                                nextUrl = item.optString("nextUrl"),\n                                nextLabel = item.optString("nextLabel")\n                            )\n                        )\n                    }\n                }\n                currentTrackIndex = obj.optInt("selectedIndex", 0).coerceAtLeast(0)\n                subtitleUrl = obj.optString("subtitle", subtitleUrl)\n                referer = obj.optString("referer", referer)\n            } catch (_: Throwable) {\n            }\n        }\n\n        videoUrl = intent.getStringExtra(EXTRA_VIDEO_URL)\n            ?: data?.getQueryParameter("video")\n            ?: tracks.getOrNull(currentTrackIndex)?.url\n            ?: ""\n\n        if (tracks.isEmpty() && isHttpUrl(videoUrl)) {\n            tracks.add(Track(videoUrl, defaultTitle, subtitleUrl, "", "", "", "", "", "", ""))\n            currentTrackIndex = 0\n        }\n\n        if (currentTrackIndex !in tracks.indices) {\n            currentTrackIndex = tracks.indexOfFirst { it.url == videoUrl }.takeIf { it >= 0 } ?: 0\n        }\n        videoUrl = tracks.getOrNull(currentTrackIndex)?.url ?: videoUrl\n        if (subtitleUrl.isBlank()) subtitleUrl = tracks.getOrNull(currentTrackIndex)?.subtitle ?: ""\n    }\n\n    private fun setupControls() {\n        findViewById<ImageButton>(R.id.closeBtn).setOnClickListener { finish() }\n        playPauseBtn.setOnClickListener { if (!locked) { togglePlayPause(); scheduleHideControls() } }\n        bigPlayPauseBtn.setOnClickListener { if (!locked) { togglePlayPause(); scheduleHideControls() } }\n        findViewById<ImageButton>(R.id.rewindBtn).setOnClickListener { if (!locked) { seekBy(-10_000); showHud("۱۰ ثانیه عقب"); scheduleHideControls() } }\n        findViewById<ImageButton>(R.id.forwardBtn).setOnClickListener { if (!locked) { seekBy(10_000); showHud("۱۰ ثانیه جلو"); scheduleHideControls() } }\n        findViewById<ImageButton>(R.id.audioBtn).setOnClickListener { if (!locked) showAudioTracks() }\n        findViewById<ImageButton>(R.id.subtitleBtn).setOnClickListener { if (!locked) showSubtitleTracks() }\n        episodesBtn.setOnClickListener { if (!locked) showEpisodePicker() }\n        resizeBtn.setOnClickListener { if (!locked) cycleResizeMode() }\n        lockBtn.setOnClickListener { toggleLock() }\n\n        seekBar.max = 1000\n        seekBar.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {\n            override fun onStartTrackingTouch(seekBar: SeekBar?) {\n                if (locked) return\n                isSeeking = true\n                handler.removeCallbacks(hideControlsRunnable)\n            }\n\n            override fun onStopTrackingTouch(seekBar: SeekBar?) {\n                if (locked) return\n                val mp = mediaPlayer ?: return\n                val length = mp.length\n                if (length > 0) {\n                    val target = ((seekBar?.progress ?: 0).toLong() * length) / 1000L\n                    mp.time = target\n                }\n                isSeeking = false\n                scheduleHideControls()\n            }\n\n            override fun onProgressChanged(seekBar: SeekBar?, progress: Int, fromUser: Boolean) {\n                if (fromUser) {\n                    val length = mediaPlayer?.length ?: 0L\n                    if (length > 0) currentTimeText.text = formatMs((progress.toLong() * length) / 1000L)\n                }\n            }\n        })\n\n        root.setOnTouchListener { _, event -> handlePlayerTouch(event) }\n        updateEpisodeButtonLabel()\n        updateLockIcon()\n    }\n\n    private fun startVlc(url: String, startMs: Long = -1L) {\n        showBuffer(true, "در حال آماده\u200cسازی پلیر")\n        pendingSeekMs = startMs\n        restoredOnce = false\n        externalSubtitleApplied = false\n\n        releasePlayer()\n\n        val args = arrayListOf(\n            "--network-caching=2500",\n            "--file-caching=2500",\n            "--live-caching=2500",\n            "--http-reconnect",\n            "--audio-time-stretch",\n            "--subsdec-encoding=UTF-8",\n            "--freetype-rel-fontsize=18",\n            "--android-display-chroma=RV32"\n        )\n\n        val vlc = LibVLC(this, args)\n        libVLC = vlc\n\n        val player = MediaPlayer(vlc)\n        mediaPlayer = player\n\n        player.attachViews(vlcLayout, null, false, false)\n        player.setEventListener { event ->\n            runOnUiThread {\n                when (event.type) {\n                    MediaPlayer.Event.Opening -> showBuffer(true, "در حال باز کردن لینک")\n                    MediaPlayer.Event.Buffering -> {\n                        val b = event.buffering.toInt().coerceIn(0, 100)\n                        showBuffer(true, if (b in 1..99) "در حال بافر ${b}٪" else "در حال بافر")\n                    }\n                    MediaPlayer.Event.Playing -> {\n                        statusText.text = currentTrackLabel()\n                        setPlayIcon(false)\n                        applyExternalSubtitleIfNeeded()\n                        if (!restoredOnce && pendingSeekMs > 5000L) {\n                            player.time = pendingSeekMs\n                            showHud("ادامه از ${formatMs(pendingSeekMs)}")\n                            restoredOnce = true\n                            pendingSeekMs = -1L\n                        }\n                        showBuffer(false)\n                        scheduleHideControls()\n                    }\n                    MediaPlayer.Event.Paused -> {\n                        statusText.text = "توقف موقت"\n                        setPlayIcon(true)\n                        setControlsVisible(true)\n                    }\n                    MediaPlayer.Event.Stopped -> {\n                        setPlayIcon(true)\n                    }\n                    MediaPlayer.Event.EndReached -> {\n                        saveCurrentPosition(clear = true)\n                        setPlayIcon(true)\n                        setControlsVisible(true)\n                        maybePlayNext()\n                    }\n                    MediaPlayer.Event.EncounteredError -> {\n                        statusText.text = "خطا در پخش. لینک یا دسترسی سرور را بررسی کن."\n                        showBuffer(false)\n                        Toast.makeText(this, "خطا در پخش ویدیو", Toast.LENGTH_LONG).show()\n                        setControlsVisible(true)\n                    }\n                }\n            }\n        }\n\n        val media = Media(vlc, Uri.parse(url))\n        media.setHWDecoderEnabled(true, false)\n        media.addOption(":network-caching=2500")\n        media.addOption(":http-reconnect")\n        media.addOption(":http-user-agent=Mozilla/5.0 BankMovieeAndroid/2.0")\n        if (referer.isNotBlank()) media.addOption(":http-referrer=$referer")\n        if (isSubtitleUrl(subtitleUrl)) media.addOption(":sub-file=$subtitleUrl")\n\n        player.media = media\n        media.release()\n        applyResizeMode()\n        player.play()\n        handler.removeCallbacks(progressRunnable)\n        handler.removeCallbacks(saveRunnable)\n        handler.post(progressRunnable)\n        handler.post(saveRunnable)\n    }\n\n    private fun releasePlayer() {\n        try {\n            mediaPlayer?.stop()\n            mediaPlayer?.detachViews()\n            mediaPlayer?.release()\n            libVLC?.release()\n        } catch (_: Throwable) {\n        }\n        mediaPlayer = null\n        libVLC = null\n    }\n\n    private fun handlePlayerTouch(event: MotionEvent): Boolean {\n        if (locked) {\n            if (event.action == MotionEvent.ACTION_UP) showHud("صفحه قفل است")\n            return true\n        }\n\n        when (event.action) {\n            MotionEvent.ACTION_DOWN -> {\n                downX = event.x\n                downY = event.y\n                draggingGesture = false\n                gestureSide = if (event.x < root.width / 2f) 1 else 2\n                startVolume = audioManager.getStreamVolume(AudioManager.STREAM_MUSIC)\n                val b = window.attributes.screenBrightness\n                startBrightness = if (b in 0f..1f) b else 0.7f\n                handler.removeCallbacks(hideControlsRunnable)\n                return true\n            }\n\n            MotionEvent.ACTION_MOVE -> {\n                val dx = event.x - downX\n                val dy = event.y - downY\n                if (abs(dy) > dp(22) && abs(dy) > abs(dx)) {\n                    draggingGesture = true\n                    val percent = (-dy / root.height).coerceIn(-1f, 1f)\n                    if (gestureSide == 2) {\n                        val maxVol = audioManager.getStreamMaxVolume(AudioManager.STREAM_MUSIC)\n                        val newVol = (startVolume + percent * maxVol).toInt().coerceIn(0, maxVol)\n                        audioManager.setStreamVolume(AudioManager.STREAM_MUSIC, newVol, 0)\n                        showHud("صدا ${((newVol.toFloat() / maxVol) * 100).toInt()}٪")\n                    } else {\n                        val newBrightness = (startBrightness + percent).coerceIn(0.05f, 1f)\n                        val attrs = window.attributes\n                        attrs.screenBrightness = newBrightness\n                        window.attributes = attrs\n                        showHud("روشنایی ${(newBrightness * 100).toInt()}٪")\n                    }\n                    return true\n                }\n            }\n\n            MotionEvent.ACTION_UP -> {\n                if (draggingGesture) {\n                    scheduleHideControls()\n                    return true\n                }\n\n                val now = System.currentTimeMillis()\n                val isDoubleTap = now - lastTapTime < 300 && abs(event.x - lastTapX) < dp(80)\n                if (isDoubleTap) {\n                    if (event.x < root.width / 2f) {\n                        seekBy(-10_000)\n                        showHud("۱۰ ثانیه عقب")\n                    } else {\n                        seekBy(10_000)\n                        showHud("۱۰ ثانیه جلو")\n                    }\n                    lastTapTime = 0L\n                    scheduleHideControls()\n                    return true\n                }\n\n                lastTapTime = now\n                lastTapX = event.x\n                toggleControls()\n                return true\n            }\n        }\n        return true\n    }\n\n    private fun showEpisodePicker() {\n        if (tracks.isEmpty()) {\n            Toast.makeText(this, "موردی برای نمایش پیدا نشد", Toast.LENGTH_SHORT).show()\n            return\n        }\n        val names = tracks.mapIndexed { index, t ->\n            val parts = mutableListOf<String>()\n            if (t.season.isNotBlank()) parts.add("فصل ${t.season}")\n            if (t.episode.isNotBlank()) parts.add("قسمت ${t.episode}")\n            if (t.quality.isNotBlank()) parts.add(t.quality)\n            val typeText = when (t.type.lowercase(Locale.US)) {\n                "dub", "dubbed" -> "دوبله"\n                "soft", "sub", "subtitle" -> "زیرنویس"\n                else -> ""\n            }\n            if (typeText.isNotBlank()) parts.add(typeText)\n            val label = if (t.label.isNotBlank()) t.label else parts.joinToString(" • ")\n            "${if (index == currentTrackIndex) "● " else ""}${if (parts.isNotEmpty()) parts.joinToString(" • ") else label}"\n        }.toTypedArray()\n\n        AlertDialog.Builder(this)\n            .setTitle(if (tracks.any { it.episode.isNotBlank() || it.season.isNotBlank() }) "انتخاب فصل و قسمت" else "انتخاب پخش")\n            .setItems(names) { _, which ->\n                if (which == currentTrackIndex) return@setItems\n                val keep = mediaPlayer?.time ?: 0L\n                saveCurrentPosition()\n                currentTrackIndex = which\n                val track = tracks[which]\n                videoUrl = track.url\n                subtitleUrl = track.subtitle\n                updateTitle()\n                showHud("در حال تغییر پخش")\n                startVlc(videoUrl, keep)\n            }\n            .show()\n    }\n\n    private fun showAudioTracks() {\n        val mp = mediaPlayer ?: return\n        val audioTracks = mp.audioTracks?.toList().orEmpty()\n        if (audioTracks.isEmpty()) {\n            Toast.makeText(this, "ترک صوتی پیدا نشد", Toast.LENGTH_SHORT).show()\n            return\n        }\n        val names = audioTracks.map { it.name ?: "Audio ${it.id}" }.toTypedArray()\n        AlertDialog.Builder(this)\n            .setTitle("انتخاب صدا")\n            .setItems(names) { _, which ->\n                mp.setAudioTrack(audioTracks[which].id)\n                showHud(names[which])\n            }\n            .show()\n    }\n\n    private fun showSubtitleTracks() {\n        val mp = mediaPlayer ?: return\n        val list = mutableListOf<Pair<Int, String>>()\n        list.add(-1 to "خاموش")\n        mp.spuTracks?.forEach { list.add(it.id to (it.name ?: "Subtitle ${it.id}")) }\n\n        if (list.size == 1) {\n            Toast.makeText(this, "زیرنویس داخلی پیدا نشد", Toast.LENGTH_LONG).show()\n        }\n\n        AlertDialog.Builder(this)\n            .setTitle("انتخاب زیرنویس")\n            .setItems(list.map { it.second }.toTypedArray()) { _, which ->\n                mp.setSpuTrack(list[which].first)\n                showHud(list[which].second)\n            }\n            .show()\n    }\n\n    private fun applyExternalSubtitleIfNeeded() {\n        if (externalSubtitleApplied) return\n        if (!isSubtitleUrl(subtitleUrl)) return\n        externalSubtitleApplied = true\n    }\n\n    private fun maybePlayNext() {\n        val current = tracks.getOrNull(currentTrackIndex)\n        val nextByUrl = current?.nextUrl?.takeIf { isHttpUrl(it) }\n        val nextIndex = if (currentTrackIndex + 1 < tracks.size) currentTrackIndex + 1 else -1\n\n        if (nextByUrl != null || nextIndex >= 0) {\n            AlertDialog.Builder(this)\n                .setTitle("قسمت بعدی")\n                .setMessage("پخش قسمت بعدی شروع شود؟")\n                .setPositiveButton("پخش") { _, _ ->\n                    if (nextByUrl != null) {\n                        val nextTrack = Track(\n                            nextByUrl,\n                            current?.nextLabel ?: "قسمت بعدی",\n                            "",\n                            "",\n                            "",\n                            current?.nextLabel ?: "",\n                            "",\n                            "",\n                            "",\n                            ""\n                        )\n                        tracks.add(currentTrackIndex + 1, nextTrack)\n                        currentTrackIndex += 1\n                    } else {\n                        currentTrackIndex = nextIndex\n                    }\n                    val t = tracks[currentTrackIndex]\n                    videoUrl = t.url\n                    subtitleUrl = t.subtitle\n                    updateTitle()\n                    startVlc(videoUrl, 0)\n                }\n                .setNegativeButton("نه", null)\n                .show()\n        } else {\n            statusText.text = "پخش تمام شد"\n        }\n    }\n\n    private fun cycleResizeMode() {\n        resizeModeIndex = (resizeModeIndex + 1) % resizeModes.size\n        applyResizeMode()\n        showHud("حالت تصویر: ${resizeModes[resizeModeIndex]}")\n        resizeBtn.text = resizeModes[resizeModeIndex]\n    }\n\n    private fun applyResizeMode() {\n        val mp = mediaPlayer ?: return\n        try {\n            when (resizeModes[resizeModeIndex]) {\n                "Fit" -> {\n                    callSetAspect(mp, null)\n                    callSetScale(mp, 0f)\n                }\n                "Fill" -> {\n                    callSetAspect(mp, null)\n                    callSetScale(mp, 1.08f)\n                }\n                "Crop" -> {\n                    callSetAspect(mp, null)\n                    callSetScale(mp, 1.22f)\n                }\n                "16:9" -> {\n                    callSetAspect(mp, "16:9")\n                    callSetScale(mp, 0f)\n                }\n                "4:3" -> {\n                    callSetAspect(mp, "4:3")\n                    callSetScale(mp, 0f)\n                }\n            }\n        } catch (_: Throwable) {\n        }\n    }\n\n    private fun callSetAspect(mp: MediaPlayer, ratio: String?) {\n        try {\n            mp.javaClass.getMethod("setAspectRatio", String::class.java).invoke(mp, ratio)\n        } catch (_: Throwable) {\n        }\n    }\n\n    private fun callSetScale(mp: MediaPlayer, scale: Float) {\n        try {\n            mp.javaClass.getMethod("setScale", java.lang.Float.TYPE).invoke(mp, scale)\n        } catch (_: Throwable) {\n        }\n    }\n\n    private fun toggleLock() {\n        locked = !locked\n        updateLockIcon()\n        if (locked) {\n            setControlsVisible(false)\n            lockBtn.visibility = View.VISIBLE\n            showHud("صفحه قفل شد")\n        } else {\n            setControlsVisible(true)\n            showHud("قفل باز شد")\n            scheduleHideControls()\n        }\n    }\n\n    private fun updateLockIcon() {\n        lockBtn.setImageResource(if (locked) R.drawable.ic_bm_lock else R.drawable.ic_bm_unlock)\n    }\n\n    private fun togglePlayPause() {\n        val mp = mediaPlayer ?: return\n        if (mp.isPlaying) mp.pause() else mp.play()\n    }\n\n    private fun seekBy(deltaMs: Long) {\n        val mp = mediaPlayer ?: return\n        val length = mp.length\n        val next = if (length > 0) min(max(mp.time + deltaMs, 0L), length) else max(mp.time + deltaMs, 0L)\n        mp.time = next\n        updateProgress()\n    }\n\n    private fun updateProgress() {\n        if (isSeeking) return\n        val mp = mediaPlayer ?: return\n        val length = mp.length\n        val time = mp.time\n        currentTimeText.text = formatMs(time)\n        durationText.text = if (length > 0) formatMs(length) else "--:--"\n        if (length > 0) seekBar.progress = ((time * 1000L) / length).toInt().coerceIn(0, 1000)\n    }\n\n    private fun showBuffer(show: Boolean, text: String = "") {\n        bufferOverlay.visibility = if (show) View.VISIBLE else View.GONE\n        bufferSpinner.visibility = if (show) View.VISIBLE else View.GONE\n        if (text.isNotBlank()) bufferText.text = text\n    }\n\n    private fun saveCurrentPosition(clear: Boolean = false) {\n        val url = videoUrl\n        if (!isHttpUrl(url)) return\n        val editor = prefs.edit()\n        if (clear) {\n            editor.remove(positionKey(url))\n        } else {\n            val pos = mediaPlayer?.time ?: return\n            val len = mediaPlayer?.length ?: 0L\n            if (pos > 5000L && (len <= 0L || pos < len - 8000L)) {\n                editor.putLong(positionKey(url), pos)\n            }\n        }\n        editor.apply()\n    }\n\n    private fun loadSavedPosition(url: String): Long {\n        return prefs.getLong(positionKey(url), -1L)\n    }\n\n    private fun positionKey(url: String): String = "pos_" + url.hashCode()\n\n    private fun updateTitle() {\n        val track = tracks.getOrNull(currentTrackIndex)\n        val base = track?.title?.takeIf { it.isNotBlank() }\n            ?: intent.getStringExtra(EXTRA_TITLE)\n            ?: "BankMoviee Player"\n        val extra = currentTrackLabel()\n        titleText.text = base\n        statusText.text = extra\n        updateEpisodeButtonLabel()\n    }\n\n    private fun updateEpisodeButtonLabel() {\n        episodesBtn.text = if (tracks.any { it.episode.isNotBlank() || it.season.isNotBlank() }) "قسمت\u200cها" else "پخش\u200cها"\n    }\n\n    private fun currentTrackLabel(): String {\n        val t = tracks.getOrNull(currentTrackIndex) ?: return ""\n        val parts = mutableListOf<String>()\n        if (t.quality.isNotBlank()) parts.add(t.quality)\n        val typeText = when (t.type.lowercase(Locale.US)) {\n            "dub", "dubbed" -> "دوبله"\n            "soft", "sub", "subtitle" -> "زیرنویس"\n            else -> ""\n        }\n        if (typeText.isNotBlank()) parts.add(typeText)\n        if (t.season.isNotBlank()) parts.add("فصل ${t.season}")\n        if (t.episode.isNotBlank()) parts.add("قسمت ${t.episode}")\n        if (parts.isEmpty() && t.label.isNotBlank()) parts.add(t.label)\n        return parts.joinToString(" • ")\n    }\n\n    private fun setControlsVisible(visible: Boolean) {\n        controlsVisible = visible\n        val visibility = if (visible) View.VISIBLE else View.GONE\n        topBar.visibility = visibility\n        bottomBar.visibility = visibility\n        centerControls.visibility = visibility\n        if (locked) lockBtn.visibility = View.VISIBLE\n    }\n\n    private fun toggleControls() {\n        if (locked) {\n            showHud("برای باز کردن قفل دکمه قفل را بزن")\n            return\n        }\n        setControlsVisible(!controlsVisible)\n        if (controlsVisible) scheduleHideControls()\n    }\n\n    private fun scheduleHideControls() {\n        handler.removeCallbacks(hideControlsRunnable)\n        handler.postDelayed(hideControlsRunnable, 3800)\n    }\n\n    private fun showHud(text: String) {\n        hudText.text = text\n        hudText.visibility = View.VISIBLE\n        handler.removeCallbacks(hideHudRunnable)\n        handler.postDelayed(hideHudRunnable, 1200)\n    }\n\n    private fun setPlayIcon(showPlay: Boolean) {\n        val icon = if (showPlay) R.drawable.ic_bm_play else R.drawable.ic_bm_pause\n        playPauseBtn.setImageResource(icon)\n        bigPlayPauseBtn.setImageResource(icon)\n    }\n\n    private fun formatMs(ms: Long): String {\n        val totalSeconds = max(0L, ms / 1000L)\n        val hours = totalSeconds / 3600\n        val minutes = (totalSeconds % 3600) / 60\n        val seconds = totalSeconds % 60\n        return if (hours > 0) {\n            String.format(Locale.US, "%d:%02d:%02d", hours, minutes, seconds)\n        } else {\n            String.format(Locale.US, "%02d:%02d", minutes, seconds)\n        }\n    }\n\n    private fun isHttpUrl(url: String?): Boolean {\n        if (url.isNullOrBlank()) return false\n        val lower = url.lowercase(Locale.US)\n        return lower.startsWith("http://") || lower.startsWith("https://") || lower.startsWith("content://")\n    }\n\n    private fun isSubtitleUrl(url: String?): Boolean {\n        if (!isHttpUrl(url)) return false\n        val lower = url!!.lowercase(Locale.US)\n        return lower.contains(".srt") ||\n            lower.contains(".ass") ||\n            lower.contains(".ssa") ||\n            lower.contains(".vtt") ||\n            lower.startsWith("content://")\n    }\n\n    private fun dp(value: Int): Int {\n        return (value * resources.displayMetrics.density).toInt()\n    }\n\n    @Deprecated("Deprecated in Java")\n    override fun onBackPressed() {\n        when {\n            locked -> toggleLock()\n            !controlsVisible -> {\n                setControlsVisible(true)\n                scheduleHideControls()\n            }\n            else -> finish()\n        }\n    }\n\n    override fun onPause() {\n        saveCurrentPosition()\n        super.onPause()\n        mediaPlayer?.pause()\n    }\n\n    override fun onResume() {\n        super.onResume()\n        requestedOrientation = ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE\n        setupFullscreenAndCutout()\n    }\n\n    override fun onDestroy() {\n        saveCurrentPosition()\n        handler.removeCallbacksAndMessages(null)\n        releasePlayer()\n        super.onDestroy()\n    }\n}\n', encoding="utf-8")

          layout_dir = project / "app" / "src" / "main" / "res" / "layout"
          layout_dir.mkdir(parents=True, exist_ok=True)
          (layout_dir / "activity_main.xml").write_text('<?xml version="1.0" encoding="utf-8"?>\n<FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"\n    android:id="@+id/mainRoot"\n    android:layout_width="match_parent"\n    android:layout_height="match_parent"\n    android:background="#0B0B0D">\n\n    <WebView\n        android:id="@+id/bankWebView"\n        android:layout_width="match_parent"\n        android:layout_height="match_parent"\n        android:background="#0B0B0D" />\n\n    <ProgressBar\n        android:id="@+id/webProgress"\n        style="?android:attr/progressBarStyleHorizontal"\n        android:layout_width="match_parent"\n        android:layout_height="3dp"\n        android:layout_gravity="top"\n        android:indeterminate="false"\n        android:max="100"\n        android:progress="0"\n        android:progressDrawable="@drawable/bm_web_progress_drawable" />\n\n    <FrameLayout\n        android:id="@+id/fullScreenContainer"\n        android:layout_width="match_parent"\n        android:layout_height="match_parent"\n        android:background="#000000"\n        android:visibility="gone" />\n\n    <LinearLayout\n        android:id="@+id/offlineBox"\n        android:layout_width="match_parent"\n        android:layout_height="match_parent"\n        android:background="#D90B0B0D"\n        android:gravity="center"\n        android:orientation="vertical"\n        android:padding="24dp"\n        android:visibility="gone">\n\n        <ImageView\n            android:layout_width="72dp"\n            android:layout_height="72dp"\n            android:src="@drawable/ic_bm_logo" />\n\n        <TextView\n            android:id="@+id/offlineText"\n            android:layout_width="wrap_content"\n            android:layout_height="wrap_content"\n            android:layout_marginTop="18dp"\n            android:gravity="center"\n            android:text="مشکلی در اتصال رخ داده است"\n            android:textColor="#FFFFFF"\n            android:textSize="15sp"\n            android:textStyle="bold" />\n    </LinearLayout>\n\n    <LinearLayout\n        android:id="@+id/launchLoader"\n        android:layout_width="match_parent"\n        android:layout_height="match_parent"\n        android:background="#F10B0B0D"\n        android:gravity="center"\n        android:orientation="vertical">\n\n        <ImageView\n            android:layout_width="84dp"\n            android:layout_height="84dp"\n            android:src="@drawable/ic_bm_logo" />\n\n        <TextView\n            android:layout_width="wrap_content"\n            android:layout_height="wrap_content"\n            android:layout_marginTop="18dp"\n            android:text="BankMoviee"\n            android:textColor="#FFFFFF"\n            android:textSize="24sp"\n            android:textStyle="bold" />\n\n        <TextView\n            android:id="@+id/launchLoaderText"\n            android:layout_width="wrap_content"\n            android:layout_height="wrap_content"\n            android:layout_marginTop="8dp"\n            android:text="در حال بارگذاری"\n            android:textColor="#C8FFFFFF"\n            android:textSize="13sp" />\n\n        <ProgressBar\n            android:layout_width="40dp"\n            android:layout_height="40dp"\n            android:layout_marginTop="22dp"\n            android:indeterminateTint="#E2C271" />\n    </LinearLayout>\n</FrameLayout>\n', encoding="utf-8")
          (layout_dir / "activity_player.xml").write_text('<?xml version="1.0" encoding="utf-8"?>\n<FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"\n    android:id="@+id/playerRoot"\n    android:layout_width="match_parent"\n    android:layout_height="match_parent"\n    android:background="#000000"\n    android:keepScreenOn="true">\n\n    <org.videolan.libvlc.util.VLCVideoLayout\n        android:id="@+id/vlcVideoLayout"\n        android:layout_width="match_parent"\n        android:layout_height="match_parent"\n        android:background="#000000" />\n\n    <View\n        android:layout_width="match_parent"\n        android:layout_height="150dp"\n        android:layout_gravity="top"\n        android:background="@drawable/bm_player_top_fade" />\n\n    <View\n        android:layout_width="match_parent"\n        android:layout_height="220dp"\n        android:layout_gravity="bottom"\n        android:background="@drawable/bm_player_bottom_fade" />\n\n    <LinearLayout\n        android:id="@+id/playerTopBar"\n        android:layout_width="match_parent"\n        android:layout_height="wrap_content"\n        android:layout_gravity="top"\n        android:gravity="center_vertical"\n        android:orientation="horizontal"\n        android:paddingStart="14dp"\n        android:paddingTop="14dp"\n        android:paddingEnd="14dp"\n        android:paddingBottom="8dp">\n\n        <ImageButton\n            android:id="@+id/closeBtn"\n            android:layout_width="44dp"\n            android:layout_height="44dp"\n            android:background="@drawable/bm_player_button_dark"\n            android:contentDescription="Back"\n            android:padding="10dp"\n            android:src="@drawable/ic_bm_back"\n            android:tint="#FFFFFF" />\n\n        <LinearLayout\n            android:layout_width="0dp"\n            android:layout_height="wrap_content"\n            android:layout_marginStart="12dp"\n            android:layout_weight="1"\n            android:orientation="vertical">\n\n            <TextView\n                android:id="@+id/playerTitle"\n                android:layout_width="match_parent"\n                android:layout_height="wrap_content"\n                android:ellipsize="end"\n                android:maxLines="1"\n                android:text="BankMoviee Player"\n                android:textColor="#FFFFFF"\n                android:textSize="16sp"\n                android:textStyle="bold" />\n\n            <TextView\n                android:id="@+id/playerStatus"\n                android:layout_width="match_parent"\n                android:layout_height="wrap_content"\n                android:ellipsize="end"\n                android:maxLines="1"\n                android:text=""\n                android:textColor="#D4FFFFFF"\n                android:textSize="12sp" />\n        </LinearLayout>\n\n        <ImageButton\n            android:id="@+id/lockBtn"\n            android:layout_width="44dp"\n            android:layout_height="44dp"\n            android:background="@drawable/bm_player_button_dark"\n            android:contentDescription="Lock"\n            android:padding="10dp"\n            android:src="@drawable/ic_bm_unlock"\n            android:tint="#FFFFFF" />\n    </LinearLayout>\n\n    <LinearLayout\n        android:id="@+id/playerCenterControls"\n        android:layout_width="match_parent"\n        android:layout_height="wrap_content"\n        android:layout_gravity="center"\n        android:gravity="center"\n        android:orientation="horizontal">\n\n        <ImageButton\n            android:id="@+id/rewindBtn"\n            android:layout_width="60dp"\n            android:layout_height="60dp"\n            android:layout_marginEnd="28dp"\n            android:background="@drawable/bm_player_button_dark"\n            android:contentDescription="Back 10 seconds"\n            android:padding="15dp"\n            android:src="@drawable/ic_bm_rewind"\n            android:tint="#FFFFFF" />\n\n        <ImageButton\n            android:id="@+id/bigPlayPauseBtn"\n            android:layout_width="88dp"\n            android:layout_height="88dp"\n            android:background="@drawable/bm_player_button_accent"\n            android:contentDescription="Play Pause"\n            android:padding="22dp"\n            android:src="@drawable/ic_bm_pause"\n            android:tint="#121212" />\n\n        <ImageButton\n            android:id="@+id/forwardBtn"\n            android:layout_width="60dp"\n            android:layout_height="60dp"\n            android:layout_marginStart="28dp"\n            android:background="@drawable/bm_player_button_dark"\n            android:contentDescription="Forward 10 seconds"\n            android:padding="15dp"\n            android:src="@drawable/ic_bm_forward"\n            android:tint="#FFFFFF" />\n    </LinearLayout>\n\n    <TextView\n        android:id="@+id/playerHud"\n        android:layout_width="wrap_content"\n        android:layout_height="wrap_content"\n        android:layout_gravity="center"\n        android:background="@drawable/bm_player_hud"\n        android:gravity="center"\n        android:minWidth="120dp"\n        android:paddingStart="18dp"\n        android:paddingTop="10dp"\n        android:paddingEnd="18dp"\n        android:paddingBottom="10dp"\n        android:text="HUD"\n        android:textColor="#FFFFFF"\n        android:textSize="15sp"\n        android:textStyle="bold"\n        android:visibility="gone" />\n\n    <LinearLayout\n        android:id="@+id/playerBottomBar"\n        android:layout_width="match_parent"\n        android:layout_height="wrap_content"\n        android:layout_gravity="bottom"\n        android:orientation="vertical"\n        android:paddingStart="14dp"\n        android:paddingTop="10dp"\n        android:paddingEnd="14dp"\n        android:paddingBottom="14dp">\n\n        <SeekBar\n            android:id="@+id/seekBar"\n            android:layout_width="match_parent"\n            android:layout_height="36dp"\n            android:max="1000"\n            android:progress="0"\n            android:progressTint="#E2C271"\n            android:thumbTint="#E2C271" />\n\n        <LinearLayout\n            android:layout_width="match_parent"\n            android:layout_height="52dp"\n            android:gravity="center_vertical"\n            android:orientation="horizontal">\n\n            <ImageButton\n                android:id="@+id/playPauseBtn"\n                android:layout_width="42dp"\n                android:layout_height="42dp"\n                android:background="@android:color/transparent"\n                android:contentDescription="Play Pause"\n                android:padding="9dp"\n                android:src="@drawable/ic_bm_pause"\n                android:tint="#FFFFFF" />\n\n            <TextView\n                android:id="@+id/currentTime"\n                android:layout_width="54dp"\n                android:layout_height="wrap_content"\n                android:gravity="center"\n                android:text="00:00"\n                android:textColor="#FFFFFF"\n                android:textSize="12sp" />\n\n            <TextView\n                android:id="@+id/durationTime"\n                android:layout_width="64dp"\n                android:layout_height="wrap_content"\n                android:gravity="center"\n                android:text="--:--"\n                android:textColor="#CFFFFFFF"\n                android:textSize="12sp" />\n\n            <View\n                android:layout_width="0dp"\n                android:layout_height="1dp"\n                android:layout_weight="1" />\n\n            <TextView\n                android:id="@+id/episodesBtn"\n                android:layout_width="74dp"\n                android:layout_height="38dp"\n                android:layout_marginStart="5dp"\n                android:background="@drawable/bm_player_chip"\n                android:gravity="center"\n                android:text="قسمت\u200cها"\n                android:textColor="#FFFFFF"\n                android:textSize="12sp"\n                android:textStyle="bold" />\n\n            <TextView\n                android:id="@+id/resizeBtn"\n                android:layout_width="58dp"\n                android:layout_height="38dp"\n                android:layout_marginStart="5dp"\n                android:background="@drawable/bm_player_chip"\n                android:gravity="center"\n                android:text="Fit"\n                android:textColor="#FFFFFF"\n                android:textSize="12sp"\n                android:textStyle="bold" />\n\n            <ImageButton\n                android:id="@+id/subtitleBtn"\n                android:layout_width="42dp"\n                android:layout_height="42dp"\n                android:layout_marginStart="4dp"\n                android:background="@android:color/transparent"\n                android:contentDescription="Subtitles"\n                android:padding="9dp"\n                android:src="@drawable/ic_bm_subtitle"\n                android:tint="#FFFFFF" />\n\n            <ImageButton\n                android:id="@+id/audioBtn"\n                android:layout_width="42dp"\n                android:layout_height="42dp"\n                android:background="@android:color/transparent"\n                android:contentDescription="Audio"\n                android:padding="9dp"\n                android:src="@drawable/ic_bm_audio"\n                android:tint="#FFFFFF" />\n        </LinearLayout>\n    </LinearLayout>\n\n    <LinearLayout\n        android:id="@+id/bufferOverlay"\n        android:layout_width="match_parent"\n        android:layout_height="match_parent"\n        android:background="#99000000"\n        android:gravity="center"\n        android:orientation="vertical"\n        android:visibility="gone">\n\n        <ProgressBar\n            android:id="@+id/bufferSpinner"\n            android:layout_width="46dp"\n            android:lay