name: Build APK From Uploaded ZIP

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Unzip project and build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        shell: bash
        run: |
          rm -rf project
          mkdir project
          unzip -q BankMovieeNativeVLCApp_ROOT_REPO.zip -d project
          echo "Project files:"
          ls -la project
          test -f project/settings.gradle

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          echo "sdk.dir=$ANDROID_HOME" > project/local.properties

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        working-directory: project
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BankMoviee-debug-apk
          path: project/app/build/outputs/apk/debug/*.apk
