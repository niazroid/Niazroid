          main_file.write_text('package ir.bankmoviee.app\n\nimport android.app.Activity\nimport android.app.AlertDialog\nimport android.content.Intent\nimport android.graphics.Bitmap\nimport android.graphics.BitmapFactory\nimport android.graphics.Color\nimport android.graphics.Typeface\nimport android.graphics.drawable.GradientDrawable\nimport android.net.Uri\nimport android.os.Bundle\nimport android.text.Editable\nimport android.text.TextUtils\nimport android.text.TextWatcher\nimport android.view.Gravity\nimport android.view.MotionEvent\nimport android.view.View\nimport android.view.ViewGroup\nimport android.view.Window\nimport android.widget.Button\nimport android.widget.EditText\nimport android.widget.FrameLayout\nimport android.widget.GridLayout\nimport android.widget.HorizontalScrollView\nimport android.widget.ImageView\nimport android.widget.LinearLayout\nimport android.widget.ProgressBar\nimport android.widget.ScrollView\nimport android.widget.TextView\nimport android.widget.Toast\nimport org.json.JSONArray\nimport org.json.JSONObject\nimport java.net.HttpURLConnection\nimport java.net.URL\nimport java.net.URLEncoder\nimport java.util.LinkedHashMap\nimport java.util.Locale\nimport kotlin.math.roundToInt\n\nclass MainActivity : Activity() {\n\n    private val apiBase = "https://bankmoviee.ir/app_api.php"\n    private val defaultArchive = 1\n\n    private val bg = Color.rgb(3, 7, 14)\n    private val bg2 = Color.rgb(7, 13, 24)\n    private val panel = Color.rgb(9, 17, 31)\n    private val panel2 = Color.rgb(13, 24, 42)\n    private val card = Color.rgb(12, 22, 38)\n    private val stroke = Color.rgb(39, 63, 96)\n    private val blue = Color.rgb(0, 108, 255)\n    private val blue2 = Color.rgb(30, 160, 255)\n    private val gold = Color.rgb(226, 194, 113)\n    private val white = Color.WHITE\n    private val muted = Color.rgb(166, 180, 203)\n    private val faint = Color.rgb(105, 123, 150)\n\n    private lateinit var root: LinearLayout\n    private lateinit var content: FrameLayout\n    private lateinit var topBar: LinearLayout\n    private lateinit var bottomNav: LinearLayout\n\n    private var currentScreen = "home"\n    private val imageCache = LinkedHashMap<String, Bitmap>()\n    private val heroItems = mutableListOf<JSONObject>()\n    private var bootJson: JSONObject? = null\n\n    override fun onCreate(savedInstanceState: Bundle?) {\n        super.onCreate(savedInstanceState)\n        requestWindowFeature(Window.FEATURE_NO_TITLE)\n        window.statusBarColor = bg\n        window.navigationBarColor = bg\n        showSplashOnly()\n        boot()\n    }\n\n\n    private fun showSplashOnly() {\n        val splash = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.CENTER\n            setBackgroundColor(Color.BLACK)\n            setPadding(dp(24), dp(24), dp(24), dp(24))\n        }\n        splash.addView(ImageView(this).apply {\n            setImageResource(R.drawable.bankmovie_logo_transparent)\n            scaleType = ImageView.ScaleType.FIT_CENTER\n            adjustViewBounds = true\n        }, LinearLayout.LayoutParams(dp(270), dp(118)).apply { bottomMargin = dp(18) })\n        splash.addView(fancySpinnerText("در حال اتصال به بانک مووی...", "چند لحظه صبر کن"), LinearLayout.LayoutParams(-1, -2))\n        setContentView(splash)\n    }\n\n    private fun showNetworkError(message: String) {\n        val page = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.CENTER\n            setBackgroundColor(Color.BLACK)\n            setPadding(dp(22), dp(22), dp(22), dp(22))\n        }\n        page.addView(ImageView(this).apply {\n            setImageResource(R.drawable.bankmovie_logo_transparent)\n            scaleType = ImageView.ScaleType.FIT_CENTER\n            adjustViewBounds = true\n        }, LinearLayout.LayoutParams(dp(250), dp(105)).apply { bottomMargin = dp(18) })\n        page.addView(TextView(this).apply {\n            text = "اپ بالا نمیاد؟ اینترنتتو عوض کن"\n            setTextColor(white)\n            textSize = 19f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.CENTER\n        })\n        page.addView(TextView(this).apply {\n            text = "اگر با اینترنت دیگر هم درست نشد، داخل کانال تلگرام جوین شو. اطلاعیه\u200cها و نسخه\u200cهای جدید آنجا قرار می\u200cگیرد.\n@BANKMOVIE_ORG"\n            setTextColor(muted)\n            textSize = 13f\n            gravity = Gravity.CENTER\n            setPadding(0, dp(10), 0, dp(18))\n        })\n        page.addView(telegramJoinButton(), LinearLayout.LayoutParams(-1, dp(52)).apply { bottomMargin = dp(12) })\n        page.addView(TextView(this).apply {\n            text = "تلاش دوباره"\n            setTextColor(white)\n            textSize = 14f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = rounded(Color.rgb(24, 37, 57), dp(17), Color.argb(110, 255, 255, 255))\n            setOnClickListener { showSplashOnly(); boot() }\n        }, LinearLayout.LayoutParams(-1, dp(50)))\n        setContentView(page)\n    }\n\n    private fun boot() {\n        fetch("$apiBase?action=boot") { ok, json, err ->\n            runOnUiThread {\n                if (ok && json != null && json.optBoolean("ready", false)) {\n                    bootJson = json\n                    buildShell()\n                    showHome()\n                } else {\n                    showNetworkError(err ?: "خطا در اتصال به بانک مووی")\n                }\n            }\n        }\n    }\n\n    private fun attachSmartHeader(scroll: ScrollView) {\n        topBar.visibility = View.GONE\n    }\n\n    private fun buildShell() {\n        root = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setBackgroundColor(bg)\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n\n        topBar = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            visibility = View.GONE\n        }\n\n        content = FrameLayout(this).apply {\n            layoutParams = LinearLayout.LayoutParams(-1, 0, 1f)\n        }\n\n        bottomNav = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n            setPadding(dp(10), dp(7), dp(10), dp(10))\n            background = GradientDrawable(GradientDrawable.Orientation.TOP_BOTTOM, intArrayOf(Color.rgb(11, 17, 29), Color.rgb(7, 11, 20))).apply {\n                cornerRadius = dp(26).toFloat()\n                setStroke(dp(1), Color.argb(120, 55, 70, 98))\n            }\n            elevation = dp(10).toFloat()\n            layoutParams = LinearLayout.LayoutParams(-1, dp(86)).apply {\n                marginStart = dp(8)\n                marginEnd = dp(8)\n                bottomMargin = dp(8)\n            }\n        }\n\n        root.addView(topBar, LinearLayout.LayoutParams(-1, 0))\n        root.addView(content)\n        root.addView(bottomNav)\n        setContentView(root)\n        buildBottomNav()\n    }\n\n    private fun buildBottomNav() {\n        bottomNav.removeAllViews()\n        navSvg("فیلترها", "filters", R.drawable.ic_nav_filter) { showCategories() }\n        navSvg("پروفایل", "profile", R.drawable.ic_nav_heart) { showProfile() }\n        navSvg("سریال", "series", R.drawable.ic_nav_series) { showList("سریال\u200cهای بروز شده", defaultArchive, "updated_series") }\n        navSvg("فیلم", "movies", R.drawable.ic_nav_movie) { showList("فیلم\u200cهای بروز شده", defaultArchive, "updated_movies") }\n        navSvg("خانه", "home", R.drawable.ic_nav_home) { showHome() }\n    }\n\n    private fun navSvg(label: String, key: String, iconRes: Int, action: () -> Unit) {\n        val active = currentScreen == key\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.CENTER\n            background = if (active) {\n                GradientDrawable(GradientDrawable.Orientation.TOP_BOTTOM, intArrayOf(Color.argb(230, 44, 10, 18), Color.argb(215, 15, 18, 28))).apply {\n                    cornerRadius = dp(22).toFloat()\n                    setStroke(dp(1), Color.argb(190, 235, 35, 45))\n                }\n            } else rounded(Color.TRANSPARENT, dp(22), Color.TRANSPARENT)\n            setPadding(dp(4), dp(5), dp(4), dp(3))\n            setOnClickListener { action() }\n        }\n        box.addView(ImageView(this).apply {\n            setImageResource(iconRes)\n            setColorFilter(if (active) Color.rgb(255, 75, 85) else Color.rgb(188, 198, 214))\n        }, LinearLayout.LayoutParams(if (active) dp(27) else dp(24), if (active) dp(27) else dp(24)).apply { bottomMargin = dp(3) })\n        box.addView(TextView(this).apply {\n            text = label\n            setTextColor(if (active) Color.rgb(255, 75, 85) else muted)\n            textSize = 10.2f\n            gravity = Gravity.CENTER\n            maxLines = 1\n        })\n        bottomNav.addView(box, LinearLayout.LayoutParams(0, dp(62), 1f).apply { marginStart = dp(3); marginEnd = dp(3) })\n    }\n\n    private fun nav(label: String, key: String, icon: String, action: () -> Unit) {\n        val active = currentScreen == key\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.CENTER\n            background = if (active) blueGradient(dp(22)) else rounded(Color.TRANSPARENT, dp(22), Color.TRANSPARENT)\n            setPadding(dp(4), dp(6), dp(4), dp(4))\n            setOnClickListener { action() }\n        }\n        box.addView(TextView(this).apply {\n            text = icon\n            setTextColor(if (active) white else Color.argb(210, 190, 205, 225))\n            textSize = 18f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = if (active) rounded(Color.argb(35, 255, 255, 255), dp(14), Color.TRANSPARENT) else null\n            setPadding(dp(10), dp(4), dp(10), dp(4))\n        })\n        box.addView(TextView(this).apply { text = label; setTextColor(if (active) white else muted); textSize = 10.5f; gravity = Gravity.CENTER; maxLines = 1; setPadding(0, dp(3), 0, 0) })\n        bottomNav.addView(box, LinearLayout.LayoutParams(0, dp(60), 1f).apply { marginStart = dp(3); marginEnd = dp(3) })\n    }\n\n    private fun clear() {\n        content.removeAllViews()\n    }\n\n    private fun movieDetailLoading(seed: JSONObject): View {\n        val title = seed.optString("title_fa").ifBlank { seed.optString("title") }.ifBlank { "بانک مووی" }\n        return fancySpinnerText("در حال آماده\u200cسازی صفحه فیلم", title)\n    }\n\n    private fun skeletonPosterCard(width: Int, height: Int): View {\n        val wrap = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(3), dp(3), dp(3), dp(3))\n            alpha = 0.88f\n            layoutParams = ViewGroup.MarginLayoutParams(width, height).apply {\n                marginStart = dp(5)\n                marginEnd = dp(5)\n                bottomMargin = dp(12)\n            }\n        }\n        wrap.addView(FrameLayout(this).apply {\n            background = rounded(Color.rgb(15, 22, 34), dp(18), Color.rgb(28, 40, 60))\n            addView(View(this@MainActivity).apply {\n                background = GradientDrawable(GradientDrawable.Orientation.LEFT_RIGHT, intArrayOf(Color.rgb(18, 28, 42), Color.rgb(36, 48, 68), Color.rgb(18, 28, 42))).apply {\n                    cornerRadius = dp(18).toFloat()\n                }\n            }, FrameLayout.LayoutParams(-1, -1))\n        }, LinearLayout.LayoutParams(-1, (height * 0.72f).roundToInt()))\n        wrap.addView(View(this).apply { background = rounded(Color.rgb(22, 32, 48), dp(6), Color.TRANSPARENT) }, LinearLayout.LayoutParams(-1, dp(13)).apply { topMargin = dp(8); marginStart = dp(4); marginEnd = dp(4) })\n        wrap.addView(View(this).apply { background = rounded(Color.rgb(16, 24, 38), dp(5), Color.TRANSPARENT) }, LinearLayout.LayoutParams((width * 0.62f).roundToInt(), dp(10)).apply { topMargin = dp(6); marginStart = dp(4); marginEnd = dp(4) })\n        return wrap\n    }\n\n    private fun movieSpecChip(label: String, strong: Boolean = false): TextView {\n        return TextView(this).apply {\n            text = label.ifBlank { "-" }\n            setTextColor(if (strong) Color.rgb(255, 230, 150) else white)\n            textSize = 10.5f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            maxLines = 1\n            ellipsize = TextUtils.TruncateAt.END\n            background = rounded(Color.argb(185, 10, 14, 22), dp(12), Color.argb(100, 255, 255, 255))\n            setPadding(dp(8), dp(5), dp(8), dp(5))\n        }\n    }\n\n    private fun posterSpecsOverlay(item: JSONObject): FrameLayout {\n        val frame = FrameLayout(this)\n        val rating = cleanRating(item.optString("rating"))\n        val topSpecs = listOf("IMDb $rating", item.optString("year")).filter { it.isNotBlank() && it != "IMDb -" }\n        val bottomSpecs = mutableListOf<String>()\n        item.optString("runtime").takeIf { it.isNotBlank() }?.let { bottomSpecs.add(it) }\n        if (item.optBoolean("has_dubbed")) bottomSpecs.add("دوبله")\n        if (item.optBoolean("has_subtitle")) bottomSpecs.add("زیرنویس")\n        item.optString("country").takeIf { it.isNotBlank() }?.let { bottomSpecs.add(it) }\n\n        fun chipRow(specs: List<String>): HorizontalScrollView {\n            val scroll = HorizontalScrollView(this).apply {\n                isHorizontalScrollBarEnabled = false\n                layoutDirection = View.LAYOUT_DIRECTION_RTL\n                clipToPadding = false\n            }\n            val row = LinearLayout(this).apply {\n                orientation = LinearLayout.HORIZONTAL\n                gravity = Gravity.CENTER\n                layoutDirection = View.LAYOUT_DIRECTION_RTL\n                setPadding(dp(6), 0, dp(6), 0)\n            }\n            specs.forEachIndexed { i, s ->\n                row.addView(movieSpecChip(s, i == 0), LinearLayout.LayoutParams(-2, -2).apply {\n                    marginStart = dp(4)\n                    marginEnd = dp(4)\n                })\n            }\n            scroll.addView(row)\n            return scroll\n        }\n\n        if (topSpecs.isNotEmpty()) {\n            frame.addView(chipRow(topSpecs.take(2)), FrameLayout.LayoutParams(-1, dp(34), Gravity.TOP or Gravity.CENTER_HORIZONTAL).apply {\n                topMargin = dp(8)\n            })\n        }\n        if (bottomSpecs.isNotEmpty()) {\n            frame.addView(chipRow(bottomSpecs), FrameLayout.LayoutParams(-1, dp(34), Gravity.BOTTOM or Gravity.CENTER_HORIZONTAL).apply {\n                bottomMargin = dp(8)\n            })\n        }\n        return frame\n    }\n\n    private fun appPrefs() = getSharedPreferences("bm_smart_cinema", MODE_PRIVATE)\n\n    private fun storageKey(item: JSONObject): String {\n        val id = item.optString("id").ifBlank { item.optString("movie_id") }.ifBlank { item.optString("slug") }\n        val type = item.optString("type", "movie")\n        val archive = item.optInt("archive", defaultArchive)\n        return "$archive|$type|${id.ifBlank { item.optString("title_fa") + item.optString("title") + item.optString("poster") }}"\n    }\n\n    private fun compactItem(item: JSONObject): JSONObject {\n        val out = JSONObject()\n        listOf("id", "archive", "type", "title", "title_fa", "poster", "rating", "year", "runtime", "description", "long_description", "has_dubbed", "has_subtitle").forEach { key ->\n            if (item.has(key)) out.put(key, item.opt(key))\n        }\n        out.put("_key", storageKey(item))\n        out.put("_saved_at", System.currentTimeMillis())\n        return out\n    }\n\n    private fun storeItems(key: String): MutableList<JSONObject> {\n        val arr = JSONArray(appPrefs().getString(key, "[]") ?: "[]")\n        val list = mutableListOf<JSONObject>()\n        for (i in 0 until arr.length()) arr.optJSONObject(i)?.let { list.add(it) }\n        return list\n    }\n\n    private fun saveStoreItems(key: String, list: List<JSONObject>) {\n        val arr = JSONArray()\n        list.forEach { arr.put(it) }\n        appPrefs().edit().putString(key, arr.toString()).apply()\n    }\n\n    private fun upsertStoreItem(key: String, item: JSONObject, limit: Int = 30) {\n        val c = compactItem(item)\n        val id = c.optString("_key")\n        val list = storeItems(key).filter { it.optString("_key") != id }.toMutableList()\n        list.add(0, c)\n        saveStoreItems(key, list.take(limit))\n    }\n\n    private fun isFavorite(item: JSONObject): Boolean {\n        val id = storageKey(item)\n        return storeItems("favorites").any { it.optString("_key") == id }\n    }\n\n    private fun toggleFavorite(item: JSONObject) {\n        val id = storageKey(item)\n        val list = storeItems("favorites").toMutableList()\n        val oldSize = list.size\n        val filtered = list.filter { it.optString("_key") != id }.toMutableList()\n        if (filtered.size == oldSize) {\n            filtered.add(0, compactItem(item))\n            Toast.makeText(this, "به علاقه\u200cمندی\u200cها اضافه شد", Toast.LENGTH_SHORT).show()\n        } else {\n            Toast.makeText(this, "از علاقه\u200cمندی\u200cها حذف شد", Toast.LENGTH_SHORT).show()\n        }\n        saveStoreItems("favorites", filtered.take(60))\n    }\n\n    private fun recordHistory(item: JSONObject) {\n        if (item.optString("id").isNotBlank() || item.optString("title_fa").isNotBlank() || item.optString("title").isNotBlank()) {\n            upsertStoreItem("history", item, 40)\n        }\n    }\n\n    private fun recordContinue(item: JSONObject, link: JSONObject) {\n        if (item.length() == 0) return\n        val c = compactItem(item)\n        c.put("quality", link.optString("quality"))\n        c.put("display_label", link.optString("display_label"))\n        c.put("url", link.optString("url"))\n        c.put("type_fa", linkTypeFa(link))\n        c.put("season", link.optInt("season", 0))\n        c.put("episode", link.optInt("episode", 0))\n        val id = c.optString("_key")\n        val list = storeItems("continue").filter { it.optString("_key") != id }.toMutableList()\n        list.add(0, c)\n        saveStoreItems("continue", list.take(20))\n    }\n\n    private fun addLocalRail(page: LinearLayout, title: String, storeKey: String, emptyText: String) {\n        val items = storeItems(storeKey)\n        if (items.isEmpty()) return\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            layoutParams = LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(22) }\n        }\n        box.addView(sectionHeader(title) { showLocalList(title, storeKey, emptyText) })\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        val scroller = HorizontalScrollView(this).apply {\n            isHorizontalScrollBarEnabled = false\n            overScrollMode = View.OVER_SCROLL_NEVER\n            addView(row)\n        }\n        box.addView(scroller)\n        items.take(12).forEach { row.addView(posterCard(it, dp(122), dp(223))) }\n        page.addView(box)\n    }\n\n    private fun profileCountPill(label: String, value: Int): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.CENTER\n            background = rounded(Color.rgb(11, 20, 36), dp(18), Color.argb(110, 235, 35, 45))\n            setPadding(dp(10), dp(10), dp(10), dp(10))\n            addView(TextView(this@MainActivity).apply {\n                text = value.toString()\n                setTextColor(white)\n                textSize = 20f\n                typeface = Typeface.DEFAULT_BOLD\n                gravity = Gravity.CENTER\n            })\n            addView(TextView(this@MainActivity).apply {\n                text = label\n                setTextColor(muted)\n                textSize = 11f\n                gravity = Gravity.CENTER\n                maxLines = 1\n            })\n        }\n    }\n\n    private fun showProfile() {\n        currentScreen = "profile"\n        buildBottomNav()\n        clear()\n\n        val scroll = ScrollView(this).apply {\n            clipToPadding = false\n            setPadding(0, 0, 0, dp(100))\n        }\n        val page = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(12), dp(14), dp(12), dp(28))\n        }\n        scroll.addView(page, FrameLayout.LayoutParams(-1, -2))\n        content.addView(scroll)\n\n        val header = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.RIGHT\n            background = GradientDrawable(GradientDrawable.Orientation.TL_BR, intArrayOf(Color.rgb(35, 12, 22), Color.rgb(9, 16, 29))).apply {\n                cornerRadius = dp(24).toFloat()\n                setStroke(dp(1), Color.argb(140, 235, 35, 45))\n            }\n            setPadding(dp(18), dp(18), dp(18), dp(18))\n        }\n        header.addView(TextView(this).apply {\n            text = "پروفایل"\n            setTextColor(white)\n            textSize = 25f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.RIGHT\n        })\n        header.addView(TextView(this).apply {\n            text = "ادامه تماشا، واچ\u200cلیست و آخرین بازدیدها اینجا ذخیره می\u200cشود"\n            setTextColor(muted)\n            textSize = 12.5f\n            gravity = Gravity.RIGHT\n            setPadding(0, dp(6), 0, 0)\n        })\n        page.addView(header, LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(14) })\n\n        val stats = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        stats.addView(profileCountPill("واچ\u200cلیست", storeItems("favorites").size), LinearLayout.LayoutParams(0, dp(86), 1f).apply { marginStart = dp(7) })\n        stats.addView(profileCountPill("ادامه", storeItems("continue").size), LinearLayout.LayoutParams(0, dp(86), 1f).apply { marginStart = dp(7); marginEnd = dp(7) })\n        stats.addView(profileCountPill("بازدید", storeItems("history").size), LinearLayout.LayoutParams(0, dp(86), 1f).apply { marginEnd = dp(7) })\n        page.addView(stats, LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(16) })\n\n        val before = page.childCount\n        addLocalRail(page, "ادامه تماشا", "continue", "هنوز چیزی برای ادامه تماشا نداری")\n        addLocalRail(page, "واچ\u200cلیست", "favorites", "واچ\u200cلیست خالی است")\n        addLocalRail(page, "آخرین بازدیدها", "history", "هنوز فیلمی باز نکردی")\n        if (page.childCount == before) {\n            page.addView(errorView("هنوز چیزی ذخیره نشده"), LinearLayout.LayoutParams(-1, -2).apply { topMargin = dp(18) })\n        }\n    }\n\n    private fun removeStoreItem(storeKey: String, item: JSONObject) {\n        val id = item.optString("_key").ifBlank { storageKey(item) }\n        val list = storeItems(storeKey).filter { it.optString("_key") != id }\n        saveStoreItems(storeKey, list)\n        Toast.makeText(this, "حذف شد", Toast.LENGTH_SHORT).show()\n    }\n\n    private fun progressTextFor(item: JSONObject): String {\n        val url = item.optString("url")\n        if (url.isBlank()) return ""\n        val ms = appPrefs().getLong("progress_$url", 0L)\n        if (ms <= 0L) return ""\n        val totalSec = ms / 1000L\n        val m = totalSec / 60L\n        val s = totalSec % 60L\n        return String.format(Locale.US, "%02d:%02d", m, s)\n    }\n\n    private fun profileStoredCard(storeKey: String, item: JSONObject): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(3), dp(3), dp(3), dp(3))\n            addView(posterCard(item, dp(116), dp(206)))\n            if (storeKey == "continue") {\n                val p = progressTextFor(item)\n                if (p.isNotBlank()) addView(TextView(this@MainActivity).apply {\n                    text = "ادامه از $p"\n                    setTextColor(Color.rgb(255, 205, 120))\n                    textSize = 10.8f\n                    gravity = Gravity.CENTER\n                    typeface = Typeface.DEFAULT_BOLD\n                    background = rounded(Color.rgb(24, 28, 42), dp(12), Color.argb(80,255,255,255))\n                }, LinearLayout.LayoutParams(-1, dp(28)).apply { topMargin = dp(2) })\n            }\n            if (storeKey == "favorites") {\n                addView(TextView(this@MainActivity).apply {\n                    text = "حذف از واچ\u200cلیست"\n                    setTextColor(white)\n                    textSize = 10.5f\n                    gravity = Gravity.CENTER\n                    typeface = Typeface.DEFAULT_BOLD\n                    background = rounded(Color.rgb(150, 18, 30), dp(12), Color.TRANSPARENT)\n                    setOnClickListener {\n                        removeStoreItem(storeKey, item)\n                        showLocalList("واچ\u200cلیست", "favorites", "واچ\u200cلیست خالی است")\n                    }\n                }, LinearLayout.LayoutParams(-1, dp(30)).apply { topMargin = dp(4) })\n            }\n        }\n    }\n\n    private fun showLocalList(title: String, storeKey: String, emptyText: String) {\n        currentScreen = if (storeKey == "favorites") "profile" else "profile"\n        buildBottomNav()\n        clear()\n        val scroll = ScrollView(this).apply { clipToPadding = false; setPadding(0, 0, 0, dp(100)) }\n        val page = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(12), dp(8), dp(12), dp(28))\n        }\n        scroll.addView(page, FrameLayout.LayoutParams(-1, -2))\n        content.addView(scroll)\n        page.addView(listTop(title))\n        val items = storeItems(storeKey)\n        if (items.isEmpty()) {\n            page.addView(emptyStateBox(emptyText, "برای ذخیره، از صفحه فیلم استفاده کن"), LinearLayout.LayoutParams(-1, -2).apply { topMargin = dp(30) })\n            return\n        }\n        val grid = GridLayout(this).apply { columnCount = 3 }\n        page.addView(grid)\n        items.forEach { grid.addView(profileStoredCard(storeKey, it), ViewGroup.MarginLayoutParams(dp(122), -2).apply { marginStart = dp(4); marginEnd = dp(4); bottomMargin = dp(10) }) }\n    }\n\n    private fun copyLink(url: String) {\n        val cm = getSystemService(CLIPBOARD_SERVICE) as android.content.ClipboardManager\n        cm.setPrimaryClip(android.content.ClipData.newPlainText("download_link", url))\n        Toast.makeText(this, "لینک کپی شد", Toast.LENGTH_SHORT).show()\n    }\n\n    private fun modalButton(label: String, iconRes: Int, red: Boolean, click: () -> Unit): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            background = if (red) GradientDrawable(GradientDrawable.Orientation.LEFT_RIGHT, intArrayOf(Color.rgb(235, 35, 45), Color.rgb(170, 18, 34))).apply { cornerRadius = dp(15).toFloat() }\n            else rounded(Color.rgb(15, 25, 42), dp(15), Color.argb(105, 90, 120, 165))\n            setPadding(dp(10), 0, dp(10), 0)\n            setOnClickListener { click() }\n            addView(ImageView(this@MainActivity).apply {\n                setImageResource(iconRes)\n                if (iconRes != R.drawable.adm_logo_transparent) setColorFilter(white)\n                scaleType = ImageView.ScaleType.FIT_CENTER\n            }, LinearLayout.LayoutParams(dp(22), dp(22)).apply { marginStart = dp(8) })\n            addView(TextView(this@MainActivity).apply {\n                text = label\n                setTextColor(white)\n                textSize = 12.5f\n                typeface = Typeface.DEFAULT_BOLD\n                gravity = Gravity.CENTER\n            })\n        }\n    }\n\n    private fun showDownloadChoiceModal(link: JSONObject) {\n        val url = link.optString("url")\n        if (url.isBlank()) {\n            Toast.makeText(this, "لینک دانلود نامعتبر است", Toast.LENGTH_SHORT).show()\n            return\n        }\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(15), dp(15), dp(15), dp(15))\n            background = rounded(Color.rgb(7, 12, 22), dp(24), Color.argb(150, 235, 35, 45))\n        }\n        val head = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            setPadding(0, 0, 0, dp(12))\n        }\n        head.addView(ImageView(this).apply {\n            setImageResource(R.drawable.adm_logo_transparent)\n            scaleType = ImageView.ScaleType.FIT_CENTER\n            adjustViewBounds = true\n        }, LinearLayout.LayoutParams(dp(58), dp(58)).apply { marginStart = dp(12) })\n        val titles = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL; gravity = Gravity.RIGHT }\n        titles.addView(TextView(this).apply {\n            text = "دانلود فایل"\n            setTextColor(white)\n            textSize = 18f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.RIGHT\n        })\n        titles.addView(TextView(this).apply {\n            text = link.optString("display_label").ifBlank { link.optString("quality").ifBlank { "نسخه انتخاب\u200cشده" } }\n            setTextColor(Color.rgb(188, 198, 214))\n            textSize = 12f\n            maxLines = 1\n            ellipsize = TextUtils.TruncateAt.END\n            gravity = Gravity.RIGHT\n            setPadding(0, dp(4), 0, 0)\n        })\n        head.addView(titles, LinearLayout.LayoutParams(0, -2, 1f))\n        box.addView(head)\n        box.addView(modalButton("ADM", R.drawable.adm_logo_transparent, true) { openExternal(url, "com.dv.adm") }, LinearLayout.LayoutParams(-1, dp(46)).apply { bottomMargin = dp(9) })\n        box.addView(modalButton("Chrome", R.drawable.ic_chrome, false) { openExternal(url, "com.android.chrome") }, LinearLayout.LayoutParams(-1, dp(46)).apply { bottomMargin = dp(9) })\n        box.addView(modalButton("دانلود مستقیم", R.drawable.ic_download, false) { openExternal(url, null) }, LinearLayout.LayoutParams(-1, dp(46)))\n        AlertDialog.Builder(this).setView(box).show()\n    }\n\n    private fun showHome() {\n        currentScreen = "home"\n        buildBottomNav()\n        clear()\n\n        val scroll = ScrollView(this)\n        attachSmartHeader(scroll)\n        val page = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(12), dp(0), dp(12), dp(30))\n        }\n        scroll.addView(page)\n        content.addView(scroll)\n\n        page.addView(homeSearchHeader())\n        page.addView(siteSlider(bootJson?.optJSONArray("sliders") ?: JSONArray()))\n        addQuickTabs(page)\n        addRail(page, "فیلم\u200cهای بروز شده", defaultArchive, "updated_movies", false)\n        addRail(page, "سریال\u200cهای بروز شده", defaultArchive, "updated_series", false)\n        addRail(page, "انیمه", defaultArchive, "anime", false)\n        addRail(page, "ترکی", defaultArchive, "turkish", false)\n        addCollectionsRail(page)\n    }\n\n\n    private fun openTelegramChannel() {\n        openExternal("https://t.me/BANKMOVIE_ORG", "org.telegram.messenger")\n    }\n\n    private fun fancySpinnerText(textValue: String, subValue: String = ""): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.CENTER\n            background = rounded(Color.rgb(8, 14, 26), dp(20), Color.argb(110, 235, 35, 45))\n            setPadding(dp(18), dp(20), dp(18), dp(20))\n            addView(FrameLayout(this@MainActivity).apply {\n                background = GradientDrawable(GradientDrawable.Orientation.TL_BR, intArrayOf(Color.rgb(235, 35, 45), Color.rgb(245, 180, 80))).apply { shape = GradientDrawable.OVAL }\n                addView(ProgressBar(this@MainActivity).apply { isIndeterminate = true }, FrameLayout.LayoutParams(dp(34), dp(34), Gravity.CENTER))\n            }, LinearLayout.LayoutParams(dp(58), dp(58)).apply { bottomMargin = dp(14) })\n            addView(TextView(this@MainActivity).apply {\n                text = textValue\n                setTextColor(white)\n                textSize = 15.5f\n                typeface = Typeface.DEFAULT_BOLD\n                gravity = Gravity.CENTER\n            })\n            if (subValue.isNotBlank()) addView(TextView(this@MainActivity).apply {\n                text = subValue\n                setTextColor(muted)\n                textSize = 12f\n                gravity = Gravity.CENTER\n                maxLines = 2\n                ellipsize = TextUtils.TruncateAt.END\n                setPadding(0, dp(6), 0, 0)\n            })\n        }\n    }\n\n    private fun emptyStateBox(title: String, sub: String): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.CENTER\n            background = rounded(Color.rgb(9, 16, 29), dp(22), Color.argb(90, 95, 120, 160))\n            setPadding(dp(18), dp(30), dp(18), dp(30))\n            addView(ImageView(this@MainActivity).apply {\n                setImageResource(R.drawable.bankmovie_logo_transparent)\n                scaleType = ImageView.ScaleType.FIT_CENTER\n                adjustViewBounds = true\n            }, LinearLayout.LayoutParams(dp(126), dp(54)).apply { bottomMargin = dp(14) })\n            addView(TextView(this@MainActivity).apply {\n                text = title\n                setTextColor(white)\n                textSize = 17f\n                typeface = Typeface.DEFAULT_BOLD\n                gravity = Gravity.CENTER\n            })\n            addView(TextView(this@MainActivity).apply {\n                text = sub\n                setTextColor(muted)\n                textSize = 12.2f\n                gravity = Gravity.CENTER\n                setPadding(0, dp(7), 0, 0)\n            })\n        }\n    }\n\n    private fun telegramJoinButton(): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            background = GradientDrawable(GradientDrawable.Orientation.LEFT_RIGHT, intArrayOf(Color.rgb(42, 171, 238), Color.rgb(28, 105, 190))).apply { cornerRadius = dp(18).toFloat() }\n            setPadding(dp(14), 0, dp(14), 0)\n            setOnClickListener { openTelegramChannel() }\n            addView(ImageView(this@MainActivity).apply {\n                setImageResource(R.drawable.ic_telegram)\n            }, LinearLayout.LayoutParams(dp(22), dp(22)).apply { marginStart = dp(9) })\n            addView(TextView(this@MainActivity).apply {\n                text = "عضویت در کانال تلگرام  @BANKMOVIE_ORG"\n                setTextColor(white)\n                textSize = 12.8f\n                typeface = Typeface.DEFAULT_BOLD\n                gravity = Gravity.CENTER\n                maxLines = 1\n                ellipsize = TextUtils.TruncateAt.END\n            })\n        }\n    }\n\n    private fun homeSearchHeader(): View {\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            setPadding(0, dp(14), 0, dp(12))\n        }\n        row.addView(ImageView(this).apply {\n            setImageResource(R.drawable.bankmovie_logo_transparent)\n            scaleType = ImageView.ScaleType.FIT_CENTER\n            adjustViewBounds = true\n        }, LinearLayout.LayoutParams(dp(104), dp(44)).apply { marginStart = dp(9) })\n\n        val pill = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            background = rounded(Color.rgb(12, 20, 34), dp(23), Color.argb(135, 235, 35, 45))\n            setPadding(dp(13), 0, dp(13), 0)\n            setOnClickListener { showSearch() }\n        }\n        pill.addView(ImageView(this).apply {\n            setImageResource(R.drawable.ic_search_clean)\n            setColorFilter(Color.rgb(160, 170, 188))\n        }, LinearLayout.LayoutParams(dp(23), dp(23)).apply { marginStart = dp(9) })\n        pill.addView(TextView(this).apply {\n            text = "جستجو..."\n            setTextColor(Color.rgb(160, 170, 188))\n            textSize = 14.5f\n            gravity = Gravity.RIGHT or Gravity.CENTER_VERTICAL\n            maxLines = 1\n        }, LinearLayout.LayoutParams(0, -1, 1f))\n        row.addView(pill, LinearLayout.LayoutParams(0, dp(48), 1f))\n        return row\n    }\n\n    private fun searchResultRow(item: JSONObject): View {\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            setPadding(dp(14), dp(11), dp(14), dp(11))\n            background = rounded(Color.TRANSPARENT, dp(0), Color.TRANSPARENT)\n            setOnClickListener { showDetail(item) }\n        }\n        val poster = ImageView(this).apply {\n            scaleType = ImageView.ScaleType.CENTER_CROP\n            background = rounded(Color.rgb(20, 30, 45), dp(8), Color.TRANSPARENT)\n            clipToOutline = true\n        }\n        loadImage(item.optString("poster").ifBlank { item.optString("image") }, poster)\n        row.addView(poster, LinearLayout.LayoutParams(dp(58), dp(82)).apply { marginStart = dp(14) })\n        row.addView(TextView(this).apply {\n            text = item.optString("title_fa").ifBlank { item.optString("title") }\n            setTextColor(white)\n            textSize = 15.5f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.CENTER_VERTICAL or Gravity.RIGHT\n            maxLines = 2\n            ellipsize = TextUtils.TruncateAt.END\n        }, LinearLayout.LayoutParams(0, -1, 1f))\n        return row\n    }\n\n    private fun siteSlider(items: JSONArray): View {\n        val count = items.length().coerceAtMost(8)\n        val frame = FrameLayout(this).apply {\n            background = rounded(panel, dp(0), Color.TRANSPARENT)\n            layoutParams = LinearLayout.LayoutParams(-1, dp(430)).apply {\n                leftMargin = -dp(12)\n                rightMargin = -dp(12)\n                bottomMargin = dp(16)\n            }\n            elevation = dp(12).toFloat()\n        }\n        val image = ImageView(this).apply { scaleType = ImageView.ScaleType.CENTER_CROP }\n        frame.addView(image, FrameLayout.LayoutParams(-1, -1))\n        frame.addView(View(this).apply {\n            background = GradientDrawable(GradientDrawable.Orientation.TOP_BOTTOM, intArrayOf(Color.argb(25,0,0,0), Color.argb(85,0,0,0), Color.argb(250,3,7,14)))\n        }, FrameLayout.LayoutParams(-1,-1))\n\n        val topLine = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            setPadding(dp(16), dp(16), dp(16), 0)\n        }\n        topLine.addView(TextView(this).apply {\n            text = "اسلایدر ویژه"\n            setTextColor(white)\n            textSize = 11.5f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.CENTER\n            background = GradientDrawable(GradientDrawable.Orientation.LEFT_RIGHT, intArrayOf(blue2, blue)).apply { cornerRadius = dp(16).toFloat() }\n            setPadding(dp(12), dp(7), dp(12), dp(7))\n        })\n        frame.addView(topLine, FrameLayout.LayoutParams(-1,-2,Gravity.TOP))\n\n        val contentBox = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.BOTTOM or Gravity.RIGHT\n            setPadding(dp(18), dp(18), dp(18), dp(26))\n        }\n        val titleView = TextView(this).apply {\n            setTextColor(white)\n            textSize = 31f\n            typeface = Typeface.DEFAULT_BOLD\n            maxLines = 2\n            ellipsize = TextUtils.TruncateAt.END\n        }\n        val descView = TextView(this).apply {\n            setTextColor(Color.argb(228, 220, 230, 245))\n            textSize = 13f\n            maxLines = 2\n            ellipsize = TextUtils.TruncateAt.END\n            setPadding(0, dp(8), 0, dp(14))\n        }\n        val state = intArrayOf(0)\n        val actionRow = LinearLayout(this).apply { orientation = LinearLayout.HORIZONTAL; gravity = Gravity.RIGHT or Gravity.CENTER_VERTICAL; layoutDirection = View.LAYOUT_DIRECTION_RTL }\n        val watchButton = iconActionButton("تماشا کنید", R.drawable.ic_play_fill, true) {\n            val item = items.optJSONObject(state[0]) ?: return@iconActionButton\n            val seed = seedFromSlider(item)\n            if (seed != null) showDetail(seed) else Toast.makeText(this@MainActivity, "صفحه این عنوان آماده نیست", Toast.LENGTH_SHORT).show()\n        }\n        actionRow.addView(watchButton, LinearLayout.LayoutParams(dp(158), dp(50)).apply { marginStart = dp(8) })\n        val imdbBadge = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            background = null\n            setPadding(dp(4), dp(4), dp(4), dp(4))\n        }\n        imdbBadge.addView(ImageView(this).apply { setImageResource(R.drawable.ic_imdb); scaleType = ImageView.ScaleType.FIT_CENTER }, LinearLayout.LayoutParams(dp(30), dp(16)).apply { marginStart = dp(6) })\n        val imdbText = TextView(this).apply { setTextColor(white); textSize = 12f; typeface = Typeface.DEFAULT_BOLD }\n        imdbBadge.addView(imdbText)\n        actionRow.addView(imdbBadge)\n        contentBox.addView(titleView)\n        contentBox.addView(descView)\n        contentBox.addView(actionRow)\n        frame.addView(contentBox, FrameLayout.LayoutParams(-1,-1))\n\n        val dots = LinearLayout(this).apply { orientation = LinearLayout.HORIZONTAL; gravity = Gravity.CENTER }\n        frame.addView(dots, FrameLayout.LayoutParams(-2, dp(18), Gravity.BOTTOM or Gravity.CENTER_HORIZONTAL).apply { bottomMargin = dp(8) })\n\n        fun refreshDots(active: Int) {\n            dots.removeAllViews()\n            repeat(count.coerceAtLeast(1)) { i ->\n                dots.addView(View(this).apply { background = rounded(if (i == active) white else Color.argb(95,255,255,255), dp(4), Color.TRANSPARENT) }, LinearLayout.LayoutParams(if (i==active) dp(20) else dp(7), dp(7)).apply { marginStart = dp(4); marginEnd = dp(4) })\n            }\n        }\n        fun bind(index: Int, animate: Boolean) {\n            val item = items.optJSONObject(index) ?: return\n            state[0] = index\n            if (animate) {\n                image.animate().alpha(0f).setDuration(140).withEndAction {\n                    loadImage(item.optString("image"), image)\n                    image.animate().alpha(1f).setDuration(220).start()\n                }.start()\n            } else loadImage(item.optString("image"), image)\n            titleView.text = item.optString("title_fa").ifBlank { item.optString("title") }.ifBlank { "بانک مووی" }\n            descView.text = item.optString("subtitle_fa").ifBlank { item.optString("subtitle") }.ifBlank { "گلچین ویژه متصل به سایت بانک مووی" }\n            val rating = item.optDouble("rating", 0.0)\n            imdbText.text = if (rating > 0) String.format(Locale.US, "%.1f", rating) else "--"\n            refreshDots(index)\n        }\n        bind(0, false)\n        if (count > 1) {\n            frame.postDelayed(object: Runnable {\n                override fun run() {\n                    if (frame.parent != null) {\n                        bind((state[0] + 1) % count, true)\n                        frame.postDelayed(this, 3000)\n                    }\n                }\n            }, 3000)\n            var downX = 0f\n            frame.setOnTouchListener { _, ev ->\n                when (ev.actionMasked) {\n                    MotionEvent.ACTION_DOWN -> { downX = ev.x; true }\n                    MotionEvent.ACTION_UP -> {\n                        val dx = ev.x - downX\n                        if (kotlin.math.abs(dx) > dp(36)) {\n                            if (dx < 0) bind((state[0] + 1) % count, true) else bind((state[0] - 1 + count) % count, true)\n                            true\n                        } else {\n                            val item = items.optJSONObject(state[0])\n                            val seed = if (item != null) seedFromSlider(item) else null\n                            if (seed != null) showDetail(seed)\n                            true\n                        }\n                    }\n                    else -> true\n                }\n            }\n        }\n        return frame\n    }\n\n    private fun addCollectionsRail(page: LinearLayout) {\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            layoutParams = LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(23) }\n        }\n        box.addView(sectionHeader("کالکشن\u200cها") { showCollections() })\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        val scroller = HorizontalScrollView(this).apply {\n            isHorizontalScrollBarEnabled = false\n            overScrollMode = View.OVER_SCROLL_NEVER\n            addView(row)\n        }\n        box.addView(scroller)\n        page.addView(box)\n        fetch("$apiBase?action=collections&page=1&limit=12") { ok, json, err ->\n            runOnUiThread {\n                if (!ok || json == null) {\n                    row.addView(errorView(err ?: "خطا در دریافت کالکشن\u200cها"))\n                    return@runOnUiThread\n                }\n                val items = json.optJSONArray("items") ?: JSONArray()\n                for (i in 0 until minOf(items.length(), 12)) items.optJSONObject(i)?.let { row.addView(collectionCard(it)) }\n            }\n        }\n    }\n\n    private fun collectionCard(item: JSONObject): View {\n        val frame = FrameLayout(this).apply {\n            background = rounded(panel2, dp(18), stroke)\n            layoutParams = ViewGroup.MarginLayoutParams(dp(160), dp(108)).apply {\n                marginStart = dp(6)\n                marginEnd = dp(6)\n            }\n            setOnClickListener { showCollectionItems(item.optString("slug"), item.optString("title_fa").ifBlank { item.optString("title") }) }\n        }\n        val img = ImageView(this).apply {\n            scaleType = ImageView.ScaleType.CENTER_CROP\n            alpha = 0.75f\n        }\n        frame.addView(img, FrameLayout.LayoutParams(-1, -1))\n        loadImage(item.optString("cover_image"), img)\n        frame.addView(View(this).apply {\n            background = GradientDrawable(GradientDrawable.Orientation.TOP_BOTTOM, intArrayOf(Color.TRANSPARENT, Color.argb(230, 0, 0, 0)))\n        }, FrameLayout.LayoutParams(-1, -1))\n        frame.addView(TextView(this).apply {\n            text = item.optString("title_fa").ifBlank { item.optString("title") }\n            setTextColor(white)\n            textSize = 14f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.RIGHT or Gravity.BOTTOM\n            maxLines = 2\n            ellipsize = android.text.TextUtils.TruncateAt.END\n            setPadding(dp(10), dp(10), dp(10), dp(12))\n        }, FrameLayout.LayoutParams(-1, -1))\n        return frame\n    }\n\n    private fun showCollections() {\n        currentScreen = "collections"\n        buildBottomNav()\n        clear()\n\n        val scroll = ScrollView(this)\n        attachSmartHeader(scroll)\n        val page = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(12), dp(8), dp(12), dp(28))\n        }\n        scroll.addView(page)\n        content.addView(scroll)\n\n        page.addView(listTop("کالکشن\u200cها"))\n        val grid = GridLayout(this).apply { columnCount = 2 }\n        page.addView(grid)\n        val more = moreButton("مشاهده بیشتر") { }\n        page.addView(more, LinearLayout.LayoutParams(-1, dp(52)).apply { topMargin = dp(12); bottomMargin = dp(110) })\n\n        fun loadCollections(p: Int) {\n            more.text = "در حال بارگذاری..."\n            more.isEnabled = false\n            fetch("$apiBase?action=collections&page=$p&limit=24") { ok, json, err ->\n                runOnUiThread {\n                    more.isEnabled = true\n                    if (!ok || json == null) {\n                        more.text = "تلاش مجدد"\n                        Toast.makeText(this, err ?: "خطا در دریافت کالکشن\u200cها", Toast.LENGTH_SHORT).show()\n                        return@runOnUiThread\n                    }\n                    val items = json.optJSONArray("items") ?: JSONArray()\n                    for (i in 0 until items.length()) items.optJSONObject(i)?.let {\n                        val card = collectionCard(it)\n                        card.layoutParams = ViewGroup.MarginLayoutParams(dp(166), dp(112)).apply {\n                            marginStart = dp(5)\n                            marginEnd = dp(5)\n                            bottomMargin = dp(12)\n                        }\n                        grid.addView(card)\n                    }\n                    if (json.optBoolean("has_more", false)) {\n                        val next = json.optInt("next_page", p + 1)\n                        more.visibility = View.VISIBLE\n                        more.text = "مشاهده بیشتر"\n                        more.setOnClickListener { loadCollections(next) }\n                    } else {\n                        more.visibility = View.GONE\n                    }\n                }\n            }\n        }\n        loadCollections(1)\n    }\n\n    private fun showCollectionItems(slug: String, title: String) {\n        currentScreen = "collections"\n        buildBottomNav()\n        clear()\n\n        val scroll = ScrollView(this)\n        attachSmartHeader(scroll)\n        val page = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(12), dp(8), dp(12), dp(28))\n        }\n        scroll.addView(page)\n        content.addView(scroll)\n\n        page.addView(listTop(title))\n        val grid = GridLayout(this).apply { columnCount = 3 }\n        page.addView(grid)\n        val more = moreButton("صفحه بعد") { }\n        page.addView(more)\n\n        fun loadItems(p: Int) {\n            more.text = "در حال بارگذاری..."\n            more.isEnabled = false\n            fetch("$apiBase?action=collection&slug=${enc(slug)}&page=$p&limit=24") { ok, json, err ->\n                runOnUiThread {\n                    more.isEnabled = true\n                    if (!ok || json == null) {\n                        more.text = "تلاش مجدد"\n                        Toast.makeText(this, err ?: "خطا در دریافت کالکشن", Toast.LENGTH_SHORT).show()\n                        return@runOnUiThread\n                    }\n                    val items = json.optJSONArray("items") ?: JSONArray()\n                    for (i in 0 until items.length()) items.optJSONObject(i)?.let { grid.addView(posterCard(it, dp(116), dp(222))) }\n                    if (json.optBoolean("has_more", false)) {\n                        val next = json.optInt("next_page", p + 1)\n                        more.visibility = View.VISIBLE\n                        more.text = "صفحه بعد"\n                        more.setOnClickListener { loadItems(next) }\n                    } else {\n                        more.visibility = View.GONE\n                    }\n                }\n            }\n        }\n        loadItems(1)\n    }\n\n    private fun addQuickTabs(page: LinearLayout) {\n        val hsv = HorizontalScrollView(this).apply { isHorizontalScrollBarEnabled = false }\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            gravity = Gravity.CENTER_VERTICAL\n        }\n        hsv.addView(row)\n\n        val tabs = listOf(\n            Triple("همه", defaultArchive, "home"),\n            Triple("فیلم", defaultArchive, "updated_movies"),\n            Triple("سریال", defaultArchive, "updated_series"),\n            Triple("انیمه", defaultArchive, "anime"),\n            Triple("ترکی", defaultArchive, "turkish"),\n            Triple("کالکشن", defaultArchive, "collections")\n        )\n        tabs.forEachIndexed { idx, t ->\n            val v = chip(t.first, idx == 0)\n            v.setOnClickListener {\n                when (t.third) {\n                    "home" -> showHome()\n                    "collections" -> showCollections()\n                    else -> showList(t.first, t.second, t.third)\n                }\n            }\n            row.addView(v, LinearLayout.LayoutParams(-2, dp(44)).apply {\n                marginStart = dp(5)\n                marginEnd = dp(5)\n            })\n        }\n        page.addView(hsv, LinearLayout.LayoutParams(-1, dp(52)).apply { bottomMargin = dp(10) })\n    }\n\n    private fun addRail(page: LinearLayout, title: String, archive: Int, section: String, progressCards: Boolean) {\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            layoutParams = LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(23) }\n        }\n        box.addView(sectionHeader(title) { showList(title, archive, section) })\n\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        val scroller = HorizontalScrollView(this).apply {\n            isHorizontalScrollBarEnabled = false\n            overScrollMode = View.OVER_SCROLL_NEVER\n            addView(row)\n        }\n        box.addView(scroller)\n        page.addView(box)\n        repeat(6) { row.addView(skeletonPosterCard(dp(122), dp(223))) }\n\n        fetch("$apiBase?action=section&archive=$archive&section=$section&page=1&limit=24") { ok, json, err ->\n            runOnUiThread {\n                row.removeAllViews()\n                if (!ok || json == null) {\n                    row.addView(errorView(err ?: "خطا در دریافت اطلاعات"))\n                    return@runOnUiThread\n                }\n                val items = json.optJSONArray("items") ?: JSONArray()\n                if (heroItems.isEmpty() && items.length() > 0) {\n                    heroItems.clear()\n                    for (i in 0 until minOf(items.length(), 5)) items.optJSONObject(i)?.let { heroItems.add(it) }\n                    val holder = page.getChildAt(0) as? FrameLayout\n                    holder?.removeAllViews()\n                    holder?.addView(paperSlider(heroItems))\n                }\n                for (i in 0 until minOf(items.length(), if (progressCards) 8 else 12)) {\n                    val item = items.optJSONObject(i) ?: continue\n                    row.addView(if (progressCards) continueCard(item) else posterCard(item, dp(122), dp(223)))\n                }\n            }\n        }\n    }\n\n    private fun paperSlider(items: List<JSONObject>): View {\n        val frame = FrameLayout(this).apply {\n            background = rounded(Color.rgb(5, 10, 18), dp(28), Color.TRANSPARENT)\n        }\n\n        fun backCard(item: JSONObject?, w: Int, h: Int, gravity: Int, margin: Int, alphaValue: Float) {\n            val card = heroMiniCard(item, false).apply { alpha = alphaValue }\n            val lp = FrameLayout.LayoutParams(dp(w), dp(h), gravity).apply {\n                leftMargin = dp(margin)\n                rightMargin = dp(margin)\n                topMargin = dp(22)\n            }\n            frame.addView(card, lp)\n        }\n\n        backCard(items.getOrNull(2), 120, 162, Gravity.LEFT or Gravity.TOP, 12, 0.36f)\n        backCard(items.getOrNull(1), 138, 176, Gravity.LEFT or Gravity.TOP, 42, 0.55f)\n        backCard(items.getOrNull(4), 120, 162, Gravity.RIGHT or Gravity.TOP, 12, 0.36f)\n        backCard(items.getOrNull(3), 138, 176, Gravity.RIGHT or Gravity.TOP, 42, 0.55f)\n\n        frame.addView(heroMiniCard(items.getOrNull(0), true), FrameLayout.LayoutParams(dp(190), dp(210), Gravity.CENTER))\n\n        val dots = LinearLayout(this).apply { orientation = LinearLayout.HORIZONTAL; gravity = Gravity.CENTER }\n        repeat(6) { i ->\n            dots.addView(View(this).apply {\n                background = rounded(if (i == 0) blue else Color.rgb(80, 92, 112), dp(4), Color.TRANSPARENT)\n            }, LinearLayout.LayoutParams(if (i == 0) dp(18) else dp(7), dp(7)).apply {\n                marginStart = dp(4)\n                marginEnd = dp(4)\n            })\n        }\n        frame.addView(dots, FrameLayout.LayoutParams(-2, dp(18), Gravity.BOTTOM or Gravity.CENTER_HORIZONTAL).apply { bottomMargin = dp(4) })\n        return frame\n    }\n\n    private fun heroMiniCard(item: JSONObject?, main: Boolean): View {\n        val frame = FrameLayout(this).apply {\n            background = rounded(Color.rgb(10, 18, 32), dp(if (main) 18 else 16), Color.rgb(72, 89, 112))\n            setOnClickListener { item?.let { showDetail(it) } }\n        }\n\n        val img = ImageView(this).apply {\n            scaleType = ImageView.ScaleType.CENTER_CROP\n            alpha = if (main) 0.90f else 0.72f\n        }\n        frame.addView(img, FrameLayout.LayoutParams(-1, -1))\n        item?.optString("poster")?.let { loadImage(it, img) }\n\n        frame.addView(View(this).apply {\n            background = GradientDrawable(GradientDrawable.Orientation.TOP_BOTTOM, intArrayOf(Color.TRANSPARENT, Color.argb(230, 0, 0, 0)))\n        }, FrameLayout.LayoutParams(-1, -1))\n\n        if (main) {\n            val info = LinearLayout(this).apply {\n                orientation = LinearLayout.VERTICAL\n                gravity = Gravity.BOTTOM or Gravity.CENTER_HORIZONTAL\n                setPadding(dp(10), dp(8), dp(10), dp(13))\n            }\n            info.addView(TextView(this).apply {\n                text = item?.optString("title_fa")?.ifBlank { item.optString("title") } ?: "BANK MOVIE"\n                setTextColor(white)\n                textSize = 23f\n                typeface = Typeface.DEFAULT_BOLD\n                gravity = Gravity.CENTER\n                maxLines = 1\n                ellipsize = android.text.TextUtils.TruncateAt.END\n                letterSpacing = 0.06f\n            })\n            info.addView(TextView(this).apply {\n                text = if (item != null) "بانک مووی • ${item.optString("year")}" else "آرشیو ۱ به صورت پیش\u200cفرض"\n                setTextColor(muted)\n                textSize = 11f\n                gravity = Gravity.CENTER\n                maxLines = 1\n            })\n            info.addView(TextView(this).apply {\n                text = "مشاهده"\n                setTextColor(white)\n                textSize = 12f\n                gravity = Gravity.CENTER\n                typeface = Typeface.DEFAULT_BOLD\n                background = blueGradient(dp(13))\n                setPadding(dp(18), dp(4), dp(18), dp(4))\n            }, LinearLayout.LayoutParams(dp(104), dp(30)).apply { topMargin = dp(8) })\n            frame.addView(info, FrameLayout.LayoutParams(-1, -1))\n        }\n\n        return frame\n    }\n\n    private fun continueCard(item: JSONObject): View {\n        val frame = FrameLayout(this).apply {\n            background = rounded(card, dp(15), stroke)\n            layoutParams = ViewGroup.MarginLayoutParams(dp(104), dp(148)).apply {\n                marginStart = dp(6)\n                marginEnd = dp(6)\n            }\n            setOnClickListener { showDetail(item) }\n        }\n        val img = ImageView(this).apply { scaleType = ImageView.ScaleType.CENTER_CROP }\n        frame.addView(img, FrameLayout.LayoutParams(-1, -1))\n        loadImage(item.optString("poster"), img)\n\n        frame.addView(View(this).apply {\n            background = GradientDrawable(GradientDrawable.Orientation.TOP_BOTTOM, intArrayOf(Color.TRANSPARENT, Color.argb(230, 0, 0, 0)))\n        }, FrameLayout.LayoutParams(-1, -1))\n\n        frame.addView(TextView(this).apply {\n            text = "▶"\n            setTextColor(white)\n            textSize = 19f\n            gravity = Gravity.CENTER\n            background = rounded(Color.argb(135, 0, 0, 0), dp(20), Color.argb(180, 255, 255, 255))\n        }, FrameLayout.LayoutParams(dp(42), dp(42), Gravity.CENTER))\n\n        val info = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.BOTTOM or Gravity.RIGHT\n            setPadding(dp(7), dp(7), dp(7), dp(8))\n        }\n        info.addView(TextView(this).apply {\n            text = item.optString("title_fa").ifBlank { item.optString("title") }\n            setTextColor(white)\n            textSize = 11f\n            typeface = Typeface.DEFAULT_BOLD\n            maxLines = 1\n            ellipsize = android.text.TextUtils.TruncateAt.END\n        })\n        info.addView(TextView(this).apply {\n            text = item.optString("update_note").ifBlank { item.optString("type") }\n            setTextColor(muted)\n            textSize = 10f\n            maxLines = 1\n        })\n        info.addView(View(this).apply { background = blueGradient(dp(2)) }, LinearLayout.LayoutParams(dp(52), dp(3)).apply { topMargin = dp(5) })\n        frame.addView(info, FrameLayout.LayoutParams(-1, -1))\n        return frame\n    }\n\n    private fun sectionHeader(title: String, more: () -> Unit): View {\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            setPadding(dp(2), dp(8), dp(2), dp(12))\n        }\n        val titleBox = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL; gravity = Gravity.RIGHT }\n        titleBox.addView(TextView(this).apply {\n            text = title\n            setTextColor(white)\n            textSize = 18.5f\n            typeface = Typeface.DEFAULT_BOLD\n        })\n        titleBox.addView(View(this).apply {\n            background = GradientDrawable(GradientDrawable.Orientation.LEFT_RIGHT, intArrayOf(Color.rgb(235,35,45), Color.rgb(245,190,75))).apply { cornerRadius = dp(4).toFloat() }\n        }, LinearLayout.LayoutParams(dp(64), dp(4)).apply { topMargin = dp(6) })\n        row.addView(titleBox, LinearLayout.LayoutParams(0, -2, 1f))\n        row.addView(iconActionButton("بیشتر", R.drawable.ic_more_lines, false) { more() }, LinearLayout.LayoutParams(dp(104), dp(40)))\n        return row\n    }\n\n    private fun showList(title: String, archive: Int, section: String) {\n        currentScreen = if (archive == 1) "archive1" else if (section.contains("series")) "series" else "home"\n        buildBottomNav()\n        clear()\n\n        val scroll = ScrollView(this)\n        attachSmartHeader(scroll)\n        val page = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(12), dp(8), dp(12), dp(28))\n        }\n        scroll.addView(page)\n        content.addView(scroll)\n\n        page.addView(listTop(title))\n        val grid = GridLayout(this).apply { columnCount = 3 }\n        page.addView(grid)\n        val more = moreButton("مشاهده بیشتر") { }\n        page.addView(more)\n        repeat(9) { grid.addView(skeletonPosterCard(dp(116), dp(222))) }\n\n        fun loadPage(p: Int) {\n            more.text = "در حال بارگذاری..."\n            more.isEnabled = false\n            fetch("$apiBase?action=section&archive=$archive&section=$section&page=$p&limit=24") { ok, json, err ->\n                runOnUiThread {\n                    more.isEnabled = true\n                    if (!ok || json == null) {\n                        more.text = "تلاش مجدد"\n                        Toast.makeText(this, err ?: "خطا در دریافت اطلاعات", Toast.LENGTH_SHORT).show()\n                        return@runOnUiThread\n                    }\n                    val arr = json.optJSONArray("items") ?: JSONArray()\n                    if (p == 1) grid.removeAllViews()\n                    for (i in 0 until arr.length()) arr.optJSONObject(i)?.let { grid.addView(posterCard(it, dp(116), dp(222))) }\n                    if (json.optBoolean("has_more", false)) {\n                        val next = json.optInt("next_page", p + 1)\n                        more.visibility = View.VISIBLE\n                        more.text = "مشاهده بیشتر"\n                        more.setOnClickListener { loadPage(next) }\n                    } else {\n                        more.visibility = View.GONE\n                    }\n                }\n            }\n        }\n        loadPage(1)\n    }\n\n    private fun listTop(title: String): View {\n        val box = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL; setPadding(0, 0, 0, dp(14)) }\n        box.addView(TextView(this).apply { text = title; setTextColor(white); textSize = 24f; typeface = Typeface.DEFAULT_BOLD; setPadding(dp(2), dp(4), dp(2), dp(4)) })\n        box.addView(TextView(this).apply { text = "ظاهر سینمایی و مرتب برای مرور سریع"; setTextColor(muted); textSize = 12f; setPadding(dp(2), 0, dp(2), dp(10)) })\n        val row = LinearLayout(this).apply { orientation = LinearLayout.HORIZONTAL; layoutDirection = View.LAYOUT_DIRECTION_RTL }\n        listOf("بروزرسانی", "محبوب", "IMDb").forEachIndexed { i, s ->\n            row.addView(chip(s, i == 0), LinearLayout.LayoutParams(0, dp(42), 1f).apply { marginStart = dp(5); marginEnd = dp(5) })\n        }\n        box.addView(row)\n        return box\n    }\n\n    private fun showCategories() {\n        currentScreen = "categories"\n        buildBottomNav()\n        clear()\n\n        val scroll = ScrollView(this).apply { clipToPadding = false; setPadding(0,0,0,dp(100)) }\n        val page = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(12), dp(10), dp(12), dp(28))\n        }\n        scroll.addView(page)\n        content.addView(scroll)\n        page.addView(TextView(this).apply {\n            text = "فیلترها"\n            setTextColor(white)\n            textSize = 23f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.RIGHT\n            setPadding(0, 0, 0, dp(12))\n        })\n        val groups = linkedMapOf(\n            "نوع محتوا" to listOf("همه", "فیلم", "سریال"),\n            "وضعیت" to listOf("دوبله", "زیرنویس", "IMDb بالا"),\n            "سال" to listOf("2026", "2025", "2024", "2023", "قدیمی\u200cتر"),\n            "کشور" to listOf("آمریکا", "ایران", "کره", "ترکیه", "هند"),\n            "ژانر" to listOf("اکشن", "درام", "ترسناک", "انیمیشن", "جنایی", "کمدی", "رازآلود", "تاریخی", "خانوادگی", "علمی تخیلی")\n        )\n        groups.forEach { group ->\n            page.addView(sectionHeader(group.key) { })\n            val row = LinearLayout(this).apply {\n                orientation = LinearLayout.HORIZONTAL\n                layoutDirection = View.LAYOUT_DIRECTION_RTL\n            }\n            val sc = HorizontalScrollView(this).apply { isHorizontalScrollBarEnabled = false; addView(row) }\n            group.value.forEach { label ->\n                row.addView(TextView(this).apply {\n                    text = label\n                    setTextColor(white)\n                    textSize = 12.3f\n                    gravity = Gravity.CENTER\n                    typeface = Typeface.DEFAULT_BOLD\n                    background = rounded(Color.rgb(13, 23, 40), dp(17), Color.argb(95, 235, 35, 45))\n                    setPadding(dp(14), 0, dp(14), 0)\n                    setOnClickListener {\n                        showSearch()\n                        Toast.makeText(this@MainActivity, "برای فیلتر دقیق، همین عبارت را سرچ کن: $label", Toast.LENGTH_SHORT).show()\n                    }\n                }, LinearLayout.LayoutParams(-2, dp(38)).apply { marginStart = dp(6); marginEnd = dp(6); bottomMargin = dp(10) })\n            }\n            page.addView(sc, LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(10) })\n        }\n        page.addView(telegramJoinButton(), LinearLayout.LayoutParams(-1, dp(52)).apply { topMargin = dp(10) })\n    }\n\n    private fun searchAcceptsType(item: JSONObject, filter: String): Boolean {\n        if (filter == "all") return true\n        val type = item.optString("type").lowercase(Locale.US)\n        val title = (item.optString("title") + " " + item.optString("title_fa")).lowercase(Locale.US)\n        val isSeries = type.contains("series") || type.contains("serial") || title.contains("series") || title.contains("سریال")\n        return if (filter == "series") isSeries else !isSeries\n    }\n\n    private fun showSearch() {\n        currentScreen = "search"\n        buildBottomNav()\n        clear()\n        topBar.visibility = View.GONE\n\n        val rootFrame = FrameLayout(this).apply { setBackgroundColor(bg) }\n        content.addView(rootFrame)\n\n        val scroll = ScrollView(this).apply {\n            isFillViewport = false\n            clipToPadding = false\n            setPadding(0, 0, 0, dp(110))\n        }\n        val page = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(14), dp(18), dp(14), dp(24))\n        }\n        scroll.addView(page, FrameLayout.LayoutParams(-1, -2))\n        rootFrame.addView(scroll, FrameLayout.LayoutParams(-1, -1))\n\n        val header = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        header.addView(ImageView(this).apply {\n            setImageResource(R.drawable.bankmovie_logo_transparent)\n            scaleType = ImageView.ScaleType.FIT_CENTER\n            adjustViewBounds = true\n        }, LinearLayout.LayoutParams(dp(96), dp(42)).apply { marginStart = dp(10) })\n\n        val searchBox = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_LTR\n            background = rounded(Color.rgb(12, 20, 34), dp(23), Color.argb(140, 235, 35, 45))\n            setPadding(dp(10), 0, dp(12), 0)\n        }\n\n        val close = ImageView(this).apply {\n            setImageResource(R.drawable.ic_close_clean)\n            setColorFilter(Color.rgb(145, 154, 172))\n            setOnClickListener { showHome() }\n        }\n        searchBox.addView(close, LinearLayout.LayoutParams(dp(24), dp(24)).apply { marginEnd = dp(7) })\n\n        val input = EditText(this).apply {\n            hint = "اسم فیلم یا سریال..."\n            setHintTextColor(Color.rgb(145, 154, 172))\n            setTextColor(white)\n            textSize = 14.5f\n            gravity = Gravity.CENTER\n            setSingleLine(true)\n            background = null\n        }\n        searchBox.addView(input, LinearLayout.LayoutParams(0, dp(46), 1f))\n\n        val clearBtn = ImageView(this).apply {\n            setImageResource(R.drawable.ic_close_clean)\n            setColorFilter(Color.rgb(145, 154, 172))\n            visibility = View.GONE\n            setOnClickListener { input.setText("") }\n        }\n        searchBox.addView(clearBtn, LinearLayout.LayoutParams(dp(22), dp(22)).apply { marginStart = dp(5) })\n\n        searchBox.addView(ImageView(this).apply {\n            setImageResource(R.drawable.ic_search_clean)\n            setColorFilter(Color.rgb(145, 154, 172))\n        }, LinearLayout.LayoutParams(dp(24), dp(24)).apply { marginStart = dp(7) })\n\n        header.addView(searchBox, LinearLayout.LayoutParams(0, dp(48), 1f))\n        page.addView(header, LinearLayout.LayoutParams(-1, dp(54)).apply { bottomMargin = dp(10) })\n\n        val filterState = arrayOf("all")\n        val tabRow = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        val tabs = mutableMapOf<String, TextView>()\n        fun makeTab(label: String, key: String): TextView {\n            return TextView(this).apply {\n                text = label\n                gravity = Gravity.CENTER\n                typeface = Typeface.DEFAULT_BOLD\n                textSize = 12.2f\n                setOnClickListener {\n                    filterState[0] = key\n                    tabs.forEach { k, v ->\n                        val active = k == filterState[0]\n                        v.setTextColor(if (active) white else muted)\n                        v.background = if (active) blueGradient(dp(15)) else rounded(Color.rgb(13, 23, 40), dp(15), Color.argb(75, 100, 125, 165))\n                    }\n                    val q = input.text?.toString()?.trim() ?: ""\n                    if (q.length >= 2) liveSearch(page, input, filterState[0])\n                }\n            }\n        }\n        tabs["all"] = makeTab("همه", "all")\n        tabs["movie"] = makeTab("فیلم", "movie")\n        tabs["series"] = makeTab("سریال", "series")\n        tabs.forEach { k, v -> tabRow.addView(v, LinearLayout.LayoutParams(0, dp(38), 1f).apply { marginStart = dp(4); marginEnd = dp(4) }) }\n        page.addView(tabRow, LinearLayout.LayoutParams(-1, dp(42)).apply { bottomMargin = dp(10) })\n        tabs["all"]?.performClick()\n\n        val resultsBox = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            background = rounded(Color.rgb(14, 23, 39), dp(16), Color.argb(75, 95, 115, 150))\n            visibility = View.GONE\n        }\n        page.addView(resultsBox, LinearLayout.LayoutParams(-1, -2))\n\n        val progress = LinearLayout(this).apply {\n            visibility = View.GONE\n            addView(fancySpinnerText("در حال جستجو...", "نتایج در حال آماده\u200cسازی است"), LinearLayout.LayoutParams(-1, -2))\n        }\n        page.addView(progress, LinearLayout.LayoutParams(-1, -2).apply { topMargin = dp(12) })\n\n        var lastQuery = ""\n        fun live(q: String) {\n            val query = q.trim()\n            clearBtn.visibility = if (query.isBlank()) View.GONE else View.VISIBLE\n            if (query.length < 2) {\n                resultsBox.removeAllViews()\n                resultsBox.visibility = View.GONE\n                progress.visibility = View.GONE\n                return\n            }\n            if (query == lastQuery && resultsBox.childCount > 0) return\n            lastQuery = query\n            progress.visibility = View.VISIBLE\n            fetch("$apiBase?action=live_search&archive=1&q=${enc(query)}&page=1&limit=18") { ok, json, err ->\n                runOnUiThread {\n                    progress.visibility = View.GONE\n                    resultsBox.removeAllViews()\n                    if (!ok || json == null) {\n                        resultsBox.visibility = View.VISIBLE\n                        resultsBox.addView(emptyStateBox("خطا در جستجو", err ?: "اینترنتتو عوض کن و دوباره تلاش کن"), LinearLayout.LayoutParams(-1, -2))\n                        return@runOnUiThread\n                    }\n                    val arr = json.optJSONArray("items") ?: JSONArray()\n                    val filtered = mutableListOf<JSONObject>()\n                    for (i in 0 until arr.length()) arr.optJSONObject(i)?.let { if (searchAcceptsType(it, filterState[0])) filtered.add(it) }\n                    if (filtered.isEmpty()) {\n                        resultsBox.visibility = View.VISIBLE\n                        resultsBox.addView(emptyStateBox("نتیجه\u200cای پیدا نشد", "با کلمه کوتاه\u200cتر یا تب همه امتحان کن"), LinearLayout.LayoutParams(-1, -2))\n                        return@runOnUiThread\n                    }\n                    resultsBox.visibility = View.VISIBLE\n                    val maxItems = minOf(filtered.size, 8)\n                    for (i in 0 until maxItems) {\n                        val item = filtered[i]\n                        resultsBox.addView(searchResultRow(item), LinearLayout.LayoutParams(-1, dp(100)))\n                        if (i < maxItems - 1) resultsBox.addView(View(this).apply { setBackgroundColor(Color.argb(50, 120, 135, 160)) }, LinearLayout.LayoutParams(-1, 1))\n                    }\n                    resultsBox.addView(TextView(this).apply {\n                        text = "مشاهده همه نتایج"\n                        setTextColor(white)\n                        textSize = 14f\n                        typeface = Typeface.DEFAULT_BOLD\n                        gravity = Gravity.CENTER\n                        background = GradientDrawable(GradientDrawable.Orientation.LEFT_RIGHT, intArrayOf(Color.rgb(235, 35, 45), Color.rgb(170, 18, 34))).apply { cornerRadius = dp(16).toFloat() }\n                        setOnClickListener { doSearch(page, query, filterState[0]) }\n                    }, LinearLayout.LayoutParams(-1, dp(50)).apply { topMargin = dp(10); bottomMargin = dp(8); marginStart = dp(10); marginEnd = dp(10) })\n                }\n            }\n        }\n\n        input.addTextChangedListener(object : TextWatcher {\n            override fun afterTextChanged(s: Editable?) { live(s?.toString() ?: "") }\n            override fun beforeTextChanged(s: CharSequence?, start: Int, count: Int, after: Int) {}\n            override fun onTextChanged(s: CharSequence?, start: Int, before: Int, count: Int) {}\n        })\n        input.requestFocus()\n    }\n\n    private fun liveSearch(page: LinearLayout, input: EditText, filter: String) {\n        val q = input.text?.toString()?.trim() ?: ""\n        if (q.length >= 2) doSearch(page, q, filter)\n    }\n\n    private fun doSearch(page: LinearLayout, q: String, typeFilter: String = "all") {\n        while (page.childCount > 2) page.removeViewAt(2)\n        val grid = GridLayout(this).apply { columnCount = 3 }\n        val more = moreButton("مشاهده بیشتر") { }\n        val loading = fancySpinnerText("در حال آوردن همه نتایج...", q)\n        page.addView(loading, LinearLayout.LayoutParams(-1, -2).apply { topMargin = dp(10); bottomMargin = dp(12) })\n        page.addView(grid)\n        page.addView(more, LinearLayout.LayoutParams(-1, dp(52)).apply { topMargin = dp(12); bottomMargin = dp(110) })\n        val seen = mutableSetOf<String>()\n\n        fun keyOf(item: JSONObject): String {\n            return item.optString("id").ifBlank { item.optString("movie_id") }.ifBlank { item.optString("slug") }.ifBlank { item.optString("title_fa") + item.optString("title") + item.optString("poster") }\n        }\n\n        fun loadPage(p: Int) {\n            val query = URLEncoder.encode(q, "UTF-8")\n            more.text = "در حال بارگذاری..."\n            more.isEnabled = false\n            fetch("$apiBase?action=live_search&archive=$defaultArchive&q=$query&page=$p&limit=48") { ok, json, err ->\n                runOnUiThread {\n                    loading.visibility = View.GONE\n                    more.isEnabled = true\n                    if (!ok || json == null) {\n                        if (grid.childCount == 0) page.addView(emptyStateBox("خطا در جستجو", err ?: "اینترنتتو عوض کن و دوباره تلاش کن"), LinearLayout.LayoutParams(-1, -2).apply { topMargin = dp(12) })\n                        more.text = "تلاش دوباره"\n                        more.setOnClickListener { loadPage(p) }\n                        return@runOnUiThread\n                    }\n                    val arr = json.optJSONArray("items") ?: JSONArray()\n                    var added = 0\n                    for (i in 0 until arr.length()) {\n                        val item = arr.optJSONObject(i) ?: continue\n                        if (!searchAcceptsType(item, typeFilter)) continue\n                        val key = keyOf(item)\n                        if (key.isBlank() || seen.add(key)) {\n                            grid.addView(posterCard(item, dp(116), dp(222)))\n                            added++\n                        }\n                    }\n                    if (arr.length() == 0 && grid.childCount == 0) {\n                        page.addView(emptyStateBox("چیزی پیدا نشد", "تب همه یا کلمه کوتاه\u200cتر را امتحان کن"), LinearLayout.LayoutParams(-1, -2).apply { topMargin = dp(12) })\n                        more.visibility = View.GONE\n                        return@runOnUiThread\n                    }\n                    if (added == 0 && p > 1) {\n                        more.visibility = View.GONE\n                        Toast.makeText(this, "نتیجه جدیدی باقی نمانده", Toast.LENGTH_SHORT).show()\n                        return@runOnUiThread\n                    }\n                    val next = json.optInt("next_page", p + 1)\n                    val hasMore = json.optBoolean("has_more", false) || json.optInt("next_page", 0) > p || arr.length() >= 12\n                    if (hasMore) {\n                        more.visibility = View.VISIBLE\n                        more.text = "مشاهده بیشتر"\n                        more.setOnClickListener { loadPage(if (next > p) next else p + 1) }\n                    } else {\n                        more.visibility = View.GONE\n                    }\n                }\n            }\n        }\n        loadPage(1)\n    }\n\n    private fun posterCard(item: JSONObject, width: Int, height: Int): View {\n        val wrap = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.TOP\n            setPadding(dp(3), dp(3), dp(3), dp(3))\n            setOnClickListener {\n                animate().scaleX(0.97f).scaleY(0.97f).setDuration(70).withEndAction {\n                    animate().scaleX(1f).scaleY(1f).setDuration(90).start()\n                    showDetail(item)\n                }.start()\n            }\n            layoutParams = ViewGroup.MarginLayoutParams(width, height).apply { marginStart = dp(5); marginEnd = dp(5); bottomMargin = dp(12) }\n        }\n        val pf = FrameLayout(this).apply {\n            background = rounded(Color.rgb(10, 16, 28), dp(19), Color.argb(95, 95, 118, 155))\n            elevation = dp(8).toFloat()\n            clipToOutline = true\n        }\n        val img = ImageView(this).apply { scaleType = ImageView.ScaleType.CENTER_CROP }\n        pf.addView(img, FrameLayout.LayoutParams(-1, -1))\n        loadImage(item.optString("poster"), img)\n        pf.addView(View(this).apply {\n            background = GradientDrawable(GradientDrawable.Orientation.TOP_BOTTOM, intArrayOf(Color.argb(5,0,0,0), Color.argb(45,0,0,0), Color.argb(238,0,0,0)))\n        }, FrameLayout.LayoutParams(-1, -1))\n        pf.addView(TextView(this).apply {\n            text = "▶"\n            setTextColor(white)\n            textSize = 13f\n            gravity = Gravity.CENTER\n            background = GradientDrawable().apply { shape = GradientDrawable.OVAL; setColor(Color.argb(135, 0, 0, 0)); setStroke(dp(1), Color.argb(190, 255, 255, 255)) }\n        }, FrameLayout.LayoutParams(dp(34), dp(34), Gravity.CENTER))\n        val badge = when { item.optBoolean("has_dubbed") -> "دوبله"; item.optBoolean("has_subtitle") -> "زیرنویس"; else -> "" }\n        if (badge.isNotBlank()) {\n            pf.addView(TextView(this).apply {\n                text = badge\n                setTextColor(white)\n                textSize = 8.5f\n                gravity = Gravity.CENTER\n                typeface = Typeface.DEFAULT_BOLD\n                background = GradientDrawable(GradientDrawable.Orientation.LEFT_RIGHT, intArrayOf(Color.rgb(235,35,45), Color.rgb(160,20,32))).apply { cornerRadius = dp(10).toFloat() }\n                setPadding(dp(8), dp(4), dp(8), dp(4))\n            }, FrameLayout.LayoutParams(-2, -2, Gravity.TOP or Gravity.LEFT).apply { topMargin = dp(8); leftMargin = dp(8) })\n        }\n        val bottomInfo = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            setPadding(dp(7), 0, dp(7), dp(8))\n        }\n        bottomInfo.addView(movieSpecChip(item.optString("year").ifBlank { "--" }))\n        val rating = item.optDouble("rating", 0.0)\n        if (rating > 0) bottomInfo.addView(movieSpecChip(String.format(Locale.US, "IMDb %.1f", rating), true), LinearLayout.LayoutParams(-2, -2).apply { marginEnd = dp(5) })\n        pf.addView(bottomInfo, FrameLayout.LayoutParams(-2, -2, Gravity.BOTTOM or Gravity.RIGHT))\n        wrap.addView(pf, LinearLayout.LayoutParams(-1, (height * 0.72f).roundToInt()))\n        wrap.addView(TextView(this).apply {\n            text = item.optString("title_fa").ifBlank { item.optString("title") }\n            setTextColor(white)\n            textSize = 12.5f\n            typeface = Typeface.DEFAULT_BOLD\n            maxLines = 2\n            ellipsize = TextUtils.TruncateAt.END\n            gravity = Gravity.RIGHT\n            setPadding(dp(3), dp(8), dp(3), 0)\n        })\n        wrap.addView(TextView(this).apply {\n            text = listOf(item.optString("title").ifBlank { item.optString("type") }, item.optString("runtime")).filter { it.isNotBlank() }.joinToString(" • ")\n            setTextColor(muted)\n            textSize = 10f\n            gravity = Gravity.RIGHT\n            maxLines = 1\n            ellipsize = TextUtils.TruncateAt.END\n            setPadding(dp(3), dp(2), dp(3), 0)\n        })\n        return wrap\n    }\n\n    private fun showDetail(seed: JSONObject) {\n        val archive = seed.optInt("archive", defaultArchive).let { if (it == 3) 3 else 1 }\n        val id = seed.optString("id")\n        val type = seed.optString("type", "movie")\n        if (id.isBlank()) return\n\n        currentScreen = "detail"\n        buildBottomNav()\n        clear()\n        val scroll = ScrollView(this).apply {\n            clipToPadding = false\n            setPadding(0, 0, 0, dp(100))\n        }\n        val page = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(12), dp(8), dp(12), dp(30))\n        }\n        scroll.addView(page, FrameLayout.LayoutParams(-1, -2))\n        content.addView(scroll)\n\n        page.addView(movieDetailLoading(seed), LinearLayout.LayoutParams(-1, dp(360)).apply { topMargin = dp(18); bottomMargin = dp(18) })\n\n        val url = "$apiBase?action=detail&archive=$archive&id=${URLEncoder.encode(id, "UTF-8")}&type=$type"\n        fetch(url) { ok, json, err ->\n            runOnUiThread {\n                page.removeAllViews()\n                if (!ok || json == null) {\n                    page.addView(errorView(err ?: "خطا در دریافت جزئیات"))\n                    renderDetail(page, seed)\n                } else {\n                    renderDetail(page, json.optJSONObject("item") ?: seed)\n                }\n            }\n        }\n    }\n\n    private fun renderDetail(page: LinearLayout, item: JSONObject) {\n        val title = item.optString("title_fa").ifBlank { item.optString("title") }\n        val originalTitle = item.optString("title").ifBlank { item.optString("original_title") }\n        val poster = item.optString("poster")\n        val desc = item.optString("long_description").ifBlank { item.optString("description") }\n        recordHistory(item)\n\n        val hero = FrameLayout(this).apply {\n            background = rounded(Color.rgb(4, 7, 13), dp(0), Color.TRANSPARENT)\n            layoutParams = LinearLayout.LayoutParams(-1, dp(455)).apply {\n                leftMargin = -dp(12)\n                rightMargin = -dp(12)\n                bottomMargin = dp(12)\n            }\n        }\n        val bgImg = ImageView(this).apply { scaleType = ImageView.ScaleType.CENTER_CROP; alpha = 0.54f }\n        hero.addView(bgImg, FrameLayout.LayoutParams(-1, -1))\n        loadImage(poster, bgImg)\n        hero.addView(View(this).apply {\n            background = GradientDrawable(GradientDrawable.Orientation.TOP_BOTTOM, intArrayOf(Color.argb(35,0,0,0), Color.argb(170,0,0,0), Color.rgb(3,7,14)))\n        }, FrameLayout.LayoutParams(-1, -1))\n        hero.addView(View(this).apply {\n            background = GradientDrawable(GradientDrawable.Orientation.RIGHT_LEFT, intArrayOf(Color.argb(240,3,7,14), Color.argb(135,3,7,14), Color.argb(25,3,7,14)))\n        }, FrameLayout.LayoutParams(-1, -1))\n\n        hero.addView(svgIconButton(R.drawable.ic_player_back) { showHome() }, FrameLayout.LayoutParams(dp(46), dp(46), Gravity.TOP or Gravity.LEFT).apply {\n            topMargin = dp(16)\n            leftMargin = dp(14)\n        })\n\n        val posterColumn = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.CENTER\n        }\n        val posterCard = FrameLayout(this).apply {\n            background = rounded(Color.rgb(14, 22, 34), dp(18), Color.argb(175, 235, 35, 45))\n            elevation = dp(12).toFloat()\n            clipToOutline = true\n        }\n        val posterImg = ImageView(this).apply { scaleType = ImageView.ScaleType.CENTER_CROP }\n        loadImage(poster, posterImg)\n        posterCard.addView(posterImg, FrameLayout.LayoutParams(-1, -1))\n        posterCard.addView(View(this).apply {\n            background = GradientDrawable(GradientDrawable.Orientation.TOP_BOTTOM, intArrayOf(Color.TRANSPARENT, Color.argb(225,0,0,0)))\n        }, FrameLayout.LayoutParams(-1, -1))\n        posterColumn.addView(posterCard, LinearLayout.LayoutParams(dp(132), dp(202)))\n        posterColumn.addView(trailerPurpleButton { playTrailer(item) }, LinearLayout.LayoutParams(dp(132), dp(42)).apply { topMargin = dp(8) })\n        hero.addView(posterColumn, FrameLayout.LayoutParams(dp(156), dp(280), Gravity.RIGHT or Gravity.BOTTOM).apply {\n            rightMargin = dp(14)\n            bottomMargin = dp(24)\n        })\n\n        val info = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.BOTTOM or Gravity.RIGHT\n            setPadding(dp(18), dp(18), dp(180), dp(28))\n        }\n        info.addView(TextView(this).apply {\n            text = title\n            setTextColor(white)\n            textSize = 26f\n            typeface = Typeface.DEFAULT_BOLD\n            maxLines = 2\n            ellipsize = TextUtils.TruncateAt.END\n            gravity = Gravity.RIGHT\n        })\n        if (originalTitle.isNotBlank() && originalTitle != title) {\n            info.addView(TextView(this).apply {\n                text = originalTitle\n                setTextColor(Color.rgb(198, 207, 222))\n                textSize = 13f\n                maxLines = 1\n                ellipsize = TextUtils.TruncateAt.END\n                gravity = Gravity.RIGHT\n                setPadding(0, dp(4), 0, dp(8))\n            })\n        }\n\n        val metaScroll = HorizontalScrollView(this).apply { isHorizontalScrollBarEnabled = false; layoutDirection = View.LAYOUT_DIRECTION_RTL }\n        val metaRow = LinearLayout(this).apply { orientation = LinearLayout.HORIZONTAL; layoutDirection = View.LAYOUT_DIRECTION_RTL }\n        metaRow.addView(detailMetaPill(R.drawable.ic_imdb, "", cleanRating(item.optString("rating"))), LinearLayout.LayoutParams(-2, dp(36)).apply { marginStart = dp(8) })\n        metaRow.addView(detailMetaPill(R.drawable.ic_info_calendar, "سال", item.optString("year")), LinearLayout.LayoutParams(-2, dp(36)).apply { marginStart = dp(8) })\n        metaRow.addView(detailMetaPill(R.drawable.ic_info_runtime, "زمان", item.optString("runtime")), LinearLayout.LayoutParams(-2, dp(36)).apply { marginStart = dp(8) })\n        metaRow.addView(detailMetaPill(R.drawable.ic_info_badge, "رده", item.optString("age_rate").ifBlank { "+16" }), LinearLayout.LayoutParams(-2, dp(36)).apply { marginStart = dp(8) })\n        metaScroll.addView(metaRow)\n        info.addView(metaScroll, LinearLayout.LayoutParams(-1, dp(40)).apply { topMargin = dp(10) })\n\n        val genreScroll = HorizontalScrollView(this).apply { isHorizontalScrollBarEnabled = false; layoutDirection = View.LAYOUT_DIRECTION_RTL }\n        val genreRow = LinearLayout(this).apply { orientation = LinearLayout.HORIZONTAL; layoutDirection = View.LAYOUT_DIRECTION_RTL }\n        val genres = genresText(item).split("،", ",", "•").map { it.trim() }.filter { it.isNotBlank() }\n        (if (genres.isEmpty()) listOf("فیلم") else genres).take(8).forEach {\n            genreRow.addView(detailGenreChip(it), LinearLayout.LayoutParams(-2, dp(36)).apply { marginStart = dp(7) })\n        }\n        genreScroll.addView(genreRow)\n        info.addView(genreScroll, LinearLayout.LayoutParams(-1, dp(42)).apply { topMargin = dp(10) })\n\n        val favActive = isFavorite(item)\n        val miniActions = LinearLayout(this).apply { orientation = LinearLayout.HORIZONTAL; layoutDirection = View.LAYOUT_DIRECTION_RTL }\n        miniActions.addView(detailActionButton("پخش آنلاین", R.drawable.ic_play_fill, true) { showPlayableSheet(item) }, LinearLayout.LayoutParams(0, dp(46), 1f).apply { marginStart = dp(10) })\n        miniActions.addView(detailActionButton(if (favActive) "در واچ\u200cلیست" else "واچ\u200cلیست", R.drawable.ic_nav_heart, favActive) {\n            toggleFavorite(item)\n            page.removeAllViews()\n            renderDetail(page, item)\n        }, LinearLayout.LayoutParams(0, dp(46), 1f).apply { marginEnd = dp(10) })\n        info.addView(miniActions, LinearLayout.LayoutParams(-1, dp(52)).apply { topMargin = dp(12) })\n\n        hero.addView(info, FrameLayout.LayoutParams(-1, -1))\n        page.addView(hero)\n\n        page.addView(detailSectionTitle("خلاصه داستان"))\n        page.addView(expandableDescription(desc), LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(12) })\n\n        renderActors(page, item)\n        renderEpisodeBlocks(page, item)\n    }\n\n    private fun playTrailer(item: JSONObject) {\n        val trailer = item.optString("trailer_url").ifBlank { item.optString("trailer") }\n        if (trailer.isBlank()) {\n            Toast.makeText(this, "تریلر برای این عنوان ثبت نشده", Toast.LENGTH_SHORT).show()\n            return\n        }\n        val arr = JSONArray().put(JSONObject().apply {\n            put("url", trailer)\n            put("title", item.optString("title_fa").ifBlank { item.optString("title") })\n            put("quality", "Trailer")\n            put("type", "trailer")\n            put("type_fa", "تریلر")\n            put("display_label", "تریلر")\n        })\n        val payload = JSONObject().apply {\n            put("video", trailer)\n            put("title", item.optString("title_fa").ifBlank { item.optString("title") })\n            put("selectedIndex", 0)\n            put("tracks", arr)\n        }\n        startActivity(Intent(this, PlayerActivity::class.java).apply {\n            putExtra(PlayerActivity.EXTRA_VIDEO_URL, trailer)\n            putExtra(PlayerActivity.EXTRA_TITLE, item.optString("title_fa").ifBlank { item.optString("title") })\n            putExtra(PlayerActivity.EXTRA_PLAYLIST_JSON, payload.toString())\n        })\n    }\n\n    private fun showDownloadOptions(item: JSONObject) {\n        val links = playableLinks(item)\n        if (links.isEmpty()) {\n            Toast.makeText(this, "لینک مستقیم دانلود پیدا نشد", Toast.LENGTH_SHORT).show()\n            return\n        }\n        showDownloadForLinks(item, links)\n    }\n\n    private fun openExternal(url: String, packageName: String?) {\n        val intent = Intent(Intent.ACTION_VIEW, Uri.parse(url))\n        if (packageName != null) intent.setPackage(packageName)\n        try { startActivity(intent) } catch (_: Throwable) { startActivity(Intent(Intent.ACTION_VIEW, Uri.parse(url))) }\n    }\n\n    private fun seedFromSlider(item: JSONObject): JSONObject? {\n        val link = item.optString("link_abs").ifBlank { item.optString("link") }\n        if (link.isBlank()) return null\n        return try {\n            val uri = Uri.parse(link)\n            uri.getQueryParameter("imdb")?.takeIf { it.isNotBlank() }?.let {\n                return JSONObject().put("id", it).put("archive", defaultArchive).put("type", "movie")\n            }\n            val slug = uri.getQueryParameter("slug")\n            val arc = uri.getQueryParameter("arc")?.toIntOrNull() ?: defaultArchive\n            val type = uri.getQueryParameter("type") ?: "movie"\n            if (!slug.isNullOrBlank()) return JSONObject().put("id", slug).put("archive", arc).put("type", type)\n            val path = uri.pathSegments.lastOrNull().orEmpty()\n            if (path.isNotBlank()) JSONObject().put("id", path).put("archive", defaultArchive).put("type", "movie") else null\n        } catch (_: Throwable) { null }\n    }\n\n    private fun detailSectionTitle(title: String): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL or Gravity.RIGHT\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            setPadding(0, dp(16), 0, dp(10))\n            addView(View(this@MainActivity).apply {\n                background = rounded(Color.rgb(235, 35, 45), dp(3), Color.TRANSPARENT)\n            }, LinearLayout.LayoutParams(dp(5), dp(27)).apply { marginStart = dp(10) })\n            addView(TextView(this@MainActivity).apply {\n                text = title\n                setTextColor(white)\n                textSize = 20f\n                typeface = Typeface.DEFAULT_BOLD\n            })\n        }\n    }\n\n    private fun detailMetaPill(iconRes: Int, label: String, value: String): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            background = rounded(Color.rgb(12, 22, 39), dp(17), Color.argb(105, 80, 115, 165))\n            setPadding(dp(10), dp(7), dp(10), dp(7))\n            addView(ImageView(this@MainActivity).apply {\n                setImageResource(iconRes)\n                if (iconRes != R.drawable.ic_imdb) setColorFilter(Color.rgb(235, 35, 45))\n                scaleType = ImageView.ScaleType.FIT_CENTER\n            }, LinearLayout.LayoutParams(if (iconRes == R.drawable.ic_imdb) dp(38) else dp(18), dp(18)).apply { marginStart = dp(8) })\n            addView(TextView(this@MainActivity).apply {\n                text = if (label.isBlank()) value.ifBlank { "-" } else "$label: ${value.ifBlank { "-" }}"\n                setTextColor(white)\n                textSize = 11.5f\n                typeface = Typeface.DEFAULT_BOLD\n                maxLines = 1\n                ellipsize = TextUtils.TruncateAt.END\n            })\n        }\n    }\n\n    private fun detailGenreChip(label: String): TextView {\n        return TextView(this).apply {\n            text = label\n            setTextColor(Color.rgb(225, 232, 244))\n            textSize = 12f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = rounded(Color.rgb(12, 23, 39), dp(19), Color.argb(115, 80, 110, 160))\n            setPadding(dp(16), 0, dp(16), 0)\n        }\n    }\n\n    private fun trailerPurpleButton(click: () -> Unit): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            background = GradientDrawable(GradientDrawable.Orientation.LEFT_RIGHT, intArrayOf(Color.rgb(105, 72, 255), Color.rgb(62, 48, 160))).apply {\n                cornerRadius = dp(18).toFloat()\n                setStroke(dp(1), Color.argb(160, 175, 155, 255))\n            }\n            setPadding(dp(10), 0, dp(10), 0)\n            setOnClickListener { click() }\n            addView(ImageView(this@MainActivity).apply {\n                setImageResource(R.drawable.ic_trailer)\n                setColorFilter(white)\n            }, LinearLayout.LayoutParams(dp(17), dp(17)).apply { marginStart = dp(7) })\n            addView(TextView(this@MainActivity).apply {\n                text = "تماشای تریلر"\n                setTextColor(white)\n                textSize = 12.3f\n                typeface = Typeface.DEFAULT_BOLD\n                gravity = Gravity.CENTER\n            })\n        }\n    }\n\n    private fun detailActionButton(label: String, iconRes: Int, red: Boolean, click: () -> Unit): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            background = if (red) {\n                GradientDrawable(GradientDrawable.Orientation.LEFT_RIGHT, intArrayOf(Color.rgb(235, 35, 45), Color.rgb(165, 18, 32))).apply { cornerRadius = dp(18).toFloat() }\n            } else rounded(Color.rgb(11, 20, 36), dp(18), Color.argb(140, 85, 115, 165))\n            setPadding(dp(12), 0, dp(12), 0)\n            setOnClickListener { click() }\n            addView(ImageView(this@MainActivity).apply {\n                setImageResource(iconRes)\n                setColorFilter(white)\n            }, LinearLayout.LayoutParams(dp(18), dp(18)).apply { marginStart = dp(8) })\n            addView(TextView(this@MainActivity).apply {\n                text = label\n                setTextColor(white)\n                textSize = 12.5f\n                typeface = Typeface.DEFAULT_BOLD\n                gravity = Gravity.CENTER\n            })\n        }\n    }\n\n    private fun expandableDescription(desc: String): LinearLayout {\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            background = rounded(Color.rgb(8, 15, 27), dp(18), Color.rgb(28, 45, 72))\n            setPadding(dp(14), dp(14), dp(14), dp(12))\n        }\n        val body = TextView(this).apply {\n            text = desc.ifBlank { "توضیحاتی برای این عنوان ثبت نشده است." }\n            setTextColor(Color.rgb(218, 226, 240))\n            textSize = 14.2f\n            setLineSpacing(dp(5).toFloat(), 1f)\n            maxLines = 3\n            ellipsize = TextUtils.TruncateAt.END\n            gravity = Gravity.RIGHT\n        }\n        val more = TextView(this).apply {\n            text = "ادامه بیشتر"\n            setTextColor(Color.rgb(235, 35, 45))\n            textSize = 12.5f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.RIGHT\n            setPadding(0, dp(10), 0, 0)\n            setOnClickListener {\n                if (body.maxLines == 3) {\n                    body.maxLines = 100\n                    body.ellipsize = null\n                    text = "بستن توضیحات"\n                } else {\n                    body.maxLines = 3\n                    body.ellipsize = TextUtils.TruncateAt.END\n                    text = "ادامه بیشتر"\n                }\n            }\n        }\n        box.addView(body)\n        if ((desc.length) > 160) box.addView(more)\n        return box\n    }\n\n    private fun renderActors(page: LinearLayout, item: JSONObject) {\n        val actors = item.optJSONArray("actors") ?: return\n        if (actors.length() == 0) return\n        page.addView(sectionHeader("بازیگران") { })\n        val row = LinearLayout(this).apply { orientation = LinearLayout.HORIZONTAL; layoutDirection = View.LAYOUT_DIRECTION_RTL }\n        val scroll = HorizontalScrollView(this).apply { isHorizontalScrollBarEnabled = false; addView(row) }\n        for (i in 0 until minOf(actors.length(), 10)) {\n            val obj = actors.optJSONObject(i)\n            val name = obj?.optString("name")?.takeIf { it.isNotBlank() } ?: actors.optString(i)\n            val role = obj?.optString("role") ?: ""\n            val image = obj?.optString("image") ?: ""\n            if (name.isBlank() || name.startsWith("{")) continue\n            val card = LinearLayout(this).apply {\n                orientation = LinearLayout.VERTICAL\n                gravity = Gravity.CENTER_HORIZONTAL\n                background = rounded(Color.rgb(8, 14, 25), dp(17), Color.rgb(30, 48, 76))\n                setPadding(dp(8), dp(8), dp(8), dp(8))\n                layoutParams = ViewGroup.MarginLayoutParams(dp(90), dp(128)).apply { marginStart = dp(5); marginEnd = dp(5) }\n            }\n            val avatarWrap = FrameLayout(this).apply {\n                background = GradientDrawable().apply { shape = GradientDrawable.OVAL; setColor(Color.rgb(16, 28, 46)); setStroke(dp(1), Color.rgb(44, 70, 106)) }\n                clipToOutline = true\n            }\n            if (image.isNotBlank()) {\n                val img = ImageView(this).apply { scaleType = ImageView.ScaleType.CENTER_CROP; clipToOutline = true }\n                loadImage(image, img)\n                avatarWrap.addView(img, FrameLayout.LayoutParams(-1,-1))\n            } else {\n                avatarWrap.addView(ImageView(this).apply { setImageResource(R.drawable.ic_avatar_circle); setColorFilter(Color.rgb(235,35,45)) }, FrameLayout.LayoutParams(dp(22), dp(22), Gravity.CENTER))\n            }\n            card.addView(avatarWrap, LinearLayout.LayoutParams(dp(52), dp(52)))\n            card.addView(TextView(this).apply { text = name; setTextColor(white); textSize = 10.8f; typeface = Typeface.DEFAULT_BOLD; gravity = Gravity.CENTER; maxLines = 2; ellipsize = TextUtils.TruncateAt.END; setPadding(0, dp(8), 0, 0) }, LinearLayout.LayoutParams(-1,-2))\n            if (role.isNotBlank()) card.addView(TextView(this).apply { text = role; setTextColor(muted); textSize = 9.2f; gravity = Gravity.CENTER; maxLines = 1; ellipsize = TextUtils.TruncateAt.END; setPadding(0, dp(4), 0, 0) }, LinearLayout.LayoutParams(-1,-2))\n            row.addView(card)\n        }\n        page.addView(scroll, LinearLayout.LayoutParams(-1, dp(140)).apply { bottomMargin = dp(14) })\n    }\n\n    private fun infoGrid(item: JSONObject): View {\n        val grid = GridLayout(this).apply {\n            columnCount = 2\n            background = rounded(Color.rgb(8, 15, 27), dp(18), Color.rgb(28, 45, 72))\n            setPadding(dp(8), dp(8), dp(8), dp(8))\n        }\n        val country = item.optJSONArray("country")?.optString(0) ?: item.optString("country")\n        val cells: List<Triple<Int, String, String>> = listOf(\n            Triple(R.drawable.ic_imdb, "امتیاز", cleanRating(item.optString("rating"))),\n            Triple(R.drawable.ic_info_globe, "کشور", country.ifBlank { "نامشخص" }),\n            Triple(R.drawable.ic_info_calendar, "سال", item.optString("year")),\n            Triple(R.drawable.ic_info_runtime, "زمان", item.optString("runtime")),\n            Triple(R.drawable.ic_info_badge, "رده سنی", item.optString("age_rate").ifBlank { "+16" }),\n            Triple(R.drawable.ic_info_archive, "آرشیو", "۱")\n        )\n        cells.forEach { cell: Triple<Int, String, String> ->\n            grid.addView(infoCell(cell.first, cell.second, cell.third), ViewGroup.MarginLayoutParams(0, -2).apply {\n                width = dp(160)\n                marginStart = dp(4)\n                marginEnd = dp(4)\n                bottomMargin = dp(8)\n            })\n        }\n        return grid\n    }\n\n    private fun renderEpisodeBlocks(page: LinearLayout, item: JSONObject) {\n        val links = playableLinks(item)\n        if (links.isEmpty()) return\n\n        page.addView(sectionHeader(if (isSeriesLinks(links)) "فصل\u200cها و قسمت\u200cها / دانلود" else "باکس دانلود") { showPlayableSheet(item) })\n        page.addView(downloadNotice())\n\n        groupedDownloadBlocks(item, links).forEach { block ->\n            page.addView(block, LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(12) })\n        }\n    }\n\n    private fun downloadNotice(): TextView {\n        return TextView(this).apply {\n            text = "⚠️ برای دانلود VPN را خاموش کنید و از IP ایران استفاده نمایید."\n            setTextColor(Color.rgb(214, 227, 246))\n            textSize = 12.3f\n            gravity = Gravity.CENTER\n            background = rounded(Color.rgb(31, 70, 116), dp(10), Color.argb(90, 120, 160, 220))\n            setPadding(dp(12), dp(11), dp(12), dp(11))\n            layoutParams = LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(12) }\n        }\n    }\n\n    private fun downloadGroupCard(item: JSONObject, allLinks: List<JSONObject>, title: String, links: List<JSONObject>, openDefault: Boolean): LinearLayout {\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            background = rounded(Color.rgb(12, 20, 35), dp(17), Color.argb(110, 115, 75, 95))\n        }\n        val header = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            background = GradientDrawable(GradientDrawable.Orientation.LEFT_RIGHT, intArrayOf(Color.rgb(48, 18, 28), Color.rgb(20, 24, 40))).apply {\n                cornerRadius = dp(17).toFloat()\n                setStroke(dp(1), Color.argb(130, 235, 35, 45))\n            }\n            setPadding(dp(14), 0, dp(14), 0)\n        }\n        val arrow = TextView(this).apply {\n            text = if (openDefault) "⌃" else "⌄"\n            setTextColor(Color.rgb(255, 82, 92))\n            textSize = 23f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n        }\n        header.addView(ImageView(this).apply {\n            setImageResource(R.drawable.ic_download)\n            setColorFilter(Color.rgb(255, 200, 110))\n        }, LinearLayout.LayoutParams(dp(24), dp(24)).apply { marginStart = dp(9) })\n        header.addView(TextView(this).apply {\n            text = title\n            setTextColor(white)\n            textSize = 14.5f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.RIGHT or Gravity.CENTER_VERTICAL\n            maxLines = 2\n            ellipsize = TextUtils.TruncateAt.END\n        }, LinearLayout.LayoutParams(0, dp(58), 1f))\n        header.addView(TextView(this).apply {\n            text = "${links.size} نسخه"\n            setTextColor(Color.rgb(218, 226, 240))\n            textSize = 11f\n            gravity = Gravity.CENTER\n            background = rounded(Color.argb(120, 255, 255, 255), dp(11), Color.TRANSPARENT)\n            setPadding(dp(8), dp(3), dp(8), dp(3))\n        }, LinearLayout.LayoutParams(-2, -2).apply { marginStart = dp(8) })\n        header.addView(arrow, LinearLayout.LayoutParams(dp(32), dp(58)))\n\n        val content = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            visibility = if (openDefault) View.VISIBLE else View.GONE\n            setPadding(dp(9), dp(12), dp(9), dp(9))\n        }\n        links.sortedWith(compareByDescending<JSONObject> { qualityScore(it.optString("quality")) }.thenBy { it.optString("display_label") }).forEach { link ->\n            val idx = allLinks.indexOf(link).coerceAtLeast(0)\n            content.addView(downloadQualityRow(item, allLinks, idx, link), LinearLayout.LayoutParams(-1, dp(68)).apply { bottomMargin = dp(8) })\n        }\n\n        header.setOnClickListener {\n            val open = content.visibility != View.VISIBLE\n            content.visibility = if (open) View.VISIBLE else View.GONE\n            arrow.text = if (open) "⌃" else "⌄"\n        }\n        box.addView(header)\n        box.addView(content)\n        return box\n    }\n\n    private fun downloadQualityRow(item: JSONObject, allLinks: List<JSONObject>, index: Int, link: JSONObject): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            background = rounded(Color.rgb(9, 16, 29), dp(15), Color.argb(65, 255, 255, 255))\n            setPadding(dp(7), dp(6), dp(7), dp(6))\n\n            addView(FrameLayout(this@MainActivity).apply {\n                background = rounded(Color.rgb(18, 72, 48), dp(13), Color.argb(70, 85, 235, 135))\n                addView(ImageView(this@MainActivity).apply {\n                    setImageResource(R.drawable.ic_play_fill)\n                    setColorFilter(Color.rgb(80, 235, 135))\n                }, FrameLayout.LayoutParams(dp(20), dp(20), Gravity.CENTER))\n                setOnClickListener {\n                    if (item.length() > 0) recordContinue(item, link)\n                    openPlayer(item, allLinks, index)\n                }\n            }, LinearLayout.LayoutParams(dp(43), dp(48)).apply { marginStart = dp(6) })\n\n            val info = LinearLayout(this@MainActivity).apply {\n                orientation = LinearLayout.VERTICAL\n                gravity = Gravity.CENTER_VERTICAL or Gravity.RIGHT\n                setPadding(dp(8), 0, dp(8), 0)\n            }\n            info.addView(TextView(this@MainActivity).apply {\n                text = link.optString("display_label").ifBlank { link.optString("quality").ifBlank { "نامشخص" } }\n                setTextColor(white)\n                textSize = 12.4f\n                typeface = Typeface.DEFAULT_BOLD\n                maxLines = 1\n                ellipsize = TextUtils.TruncateAt.END\n                gravity = Gravity.RIGHT\n            })\n            info.addView(TextView(this@MainActivity).apply {\n                text = listOf(linkTypeFa(link), if (link.optInt("season",0)>0) "فصل ${link.optInt("season",0)}" else "", if (link.optInt("episode",0)>0) "قسمت ${link.optInt("episode",0)}" else "", link.optString("quality")).filter { it.isNotBlank() }.distinct().joinToString(" • ")\n                setTextColor(Color.rgb(188, 198, 214))\n                textSize = 10.1f\n                maxLines = 1\n                ellipsize = TextUtils.TruncateAt.END\n                gravity = Gravity.RIGHT\n            })\n            addView(info, LinearLayout.LayoutParams(0, -1, 1f).apply { marginStart = dp(6) })\n\n            addView(FrameLayout(this@MainActivity).apply {\n                background = rounded(Color.rgb(30, 38, 58), dp(13), Color.argb(115, 235, 35, 45))\n                addView(ImageView(this@MainActivity).apply {\n                    setImageResource(R.drawable.ic_download)\n                    setColorFilter(Color.rgb(255, 215, 145))\n                }, FrameLayout.LayoutParams(dp(22), dp(22), Gravity.CENTER))\n                setOnClickListener { showDownloadChoiceModal(link) }\n            }, LinearLayout.LayoutParams(dp(42), dp(48)))\n        }\n    }\n\n    private fun downloadSeasonCard(item: JSONObject, allLinks: List<JSONObject>, seasonNumber: Int, seasonLinks: List<JSONObject>): LinearLayout {\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            background = rounded(Color.rgb(11, 20, 36), dp(16), Color.argb(120, 68, 95, 150))\n        }\n        val header = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            background = GradientDrawable(GradientDrawable.Orientation.LEFT_RIGHT, intArrayOf(Color.rgb(72, 23, 42), Color.rgb(33, 22, 38))).apply {\n                cornerRadius = dp(16).toFloat()\n            }\n            setPadding(dp(14), 0, dp(14), 0)\n        }\n        val arrow = TextView(this).apply {\n            text = "⌄"\n            setTextColor(Color.rgb(255, 82, 92))\n            textSize = 23f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.CENTER\n        }\n        header.addView(TextView(this).apply {\n            text = if (seasonNumber > 0) "فصل ${seasonNumber}" else "قسمت\u200cها"\n            setTextColor(white)\n            textSize = 15.5f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.RIGHT or Gravity.CENTER_VERTICAL\n        }, LinearLayout.LayoutParams(0, dp(58), 1f))\n        header.addView(TextView(this).apply {\n            text = "${seasonLinks.groupBy { it.optInt("episode", 0) }.size} قسمت"\n            setTextColor(Color.rgb(210, 220, 238))\n            textSize = 11.5f\n            gravity = Gravity.CENTER\n        }, LinearLayout.LayoutParams(-2, dp(58)).apply { marginStart = dp(10) })\n        header.addView(arrow, LinearLayout.LayoutParams(dp(36), dp(58)))\n\n        val content = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            visibility = View.GONE\n            setPadding(dp(10), dp(12), dp(10), dp(10))\n        }\n        seasonLinks.groupBy { it.optInt("episode", 0) }.toSortedMap().forEach { ep ->\n            val epTitle = if (ep.key > 0) "قسمت ${ep.key}" else "لینک\u200cها"\n            content.addView(downloadGroupCard(item, allLinks, epTitle, ep.value, false), LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(10) })\n        }\n        header.setOnClickListener {\n            val open = content.visibility != View.VISIBLE\n            content.visibility = if (open) View.VISIBLE else View.GONE\n            arrow.text = if (open) "⌃" else "⌄"\n        }\n        box.addView(header)\n        box.addView(content)\n        return box\n    }\n\n    private fun groupedDownloadBlocks(item: JSONObject, links: List<JSONObject>): List<View> {\n        val blocks = mutableListOf<View>()\n        if (isSeriesLinks(links)) {\n            links.groupBy { it.optInt("season", 0) }.toSortedMap().forEach { season ->\n                blocks.add(downloadSeasonCard(item, links, season.key, season.value))\n            }\n        } else {\n            links.groupBy { linkTypeFa(it) }.toSortedMap().forEach { group ->\n                val title = when (group.key) {\n                    "دوبله" -> "دوبله فارسی"\n                    "زیرنویس" -> "نسخه زیرنویس فارسی"\n                    else -> group.key\n                }\n                blocks.add(downloadGroupCard(item, links, title, group.value, false))\n            }\n        }\n        return blocks\n    }\n\n    private fun movieVersionPanel(item: JSONObject, links: List<JSONObject>): View {\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            background = rounded(Color.rgb(7, 13, 25), dp(24), Color.argb(135, 65, 105, 170))\n            setPadding(dp(14), dp(14), dp(14), dp(14))\n            layoutParams = LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(14) }\n        }\n        box.addView(TextView(this).apply {\n            text = "انتخاب نسخه پخش"\n            setTextColor(white)\n            textSize = 18f\n            typeface = Typeface.DEFAULT_BOLD\n            setPadding(0, 0, 0, dp(10))\n        })\n        links.forEachIndexed { idx, link ->\n            box.addView(movieVersionCard(item, links, idx, link), LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(10) })\n        }\n        return box\n    }\n\n    private fun movieVersionCard(item: JSONObject, links: List<JSONObject>, idx: Int, link: JSONObject): View {\n        val card = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            background = rounded(Color.rgb(10, 19, 35), dp(20), Color.argb(115, 58, 96, 155))\n            setPadding(dp(12), dp(12), dp(12), dp(12))\n        }\n        val top = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        top.addView(TextView(this).apply {\n            text = link.optString("display_label").ifBlank { linkLabel(link) }\n            setTextColor(white)\n            textSize = 14.5f\n            typeface = Typeface.DEFAULT_BOLD\n            maxLines = 1\n            ellipsize = android.text.TextUtils.TruncateAt.END\n        }, LinearLayout.LayoutParams(0, -2, 1f))\n        top.addView(premiumQualityChip(link, true) { openPlayer(item, links, idx) }, LinearLayout.LayoutParams(-2, dp(34)))\n        card.addView(top)\n        val buttons = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            setPadding(0, dp(10), 0, 0)\n        }\n        buttons.addView(premiumMiniButton("▶ پخش") { openPlayer(item, links, idx) }, LinearLayout.LayoutParams(0, dp(44), 1f).apply { marginStart = dp(6) })\n        buttons.addView(premiumMiniButton("⇩ دانلود") { showDownloadForLinks(item, listOf(link)) }, LinearLayout.LayoutParams(0, dp(44), 1f).apply { marginEnd = dp(6) })\n        card.addView(buttons)\n        return card\n    }\n\n    private fun seasonPremiumCard(item: JSONObject, allLinks: List<JSONObject>, seasonNumber: Int, seasonLinks: List<JSONObject>, initiallyOpen: Boolean): View {\n        val outer = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            background = rounded(Color.rgb(7, 13, 25), dp(24), Color.argb(145, 65, 105, 170))\n            setPadding(dp(12), dp(12), dp(12), dp(12))\n            layoutParams = LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(14) }\n        }\n\n        val episodes = seasonLinks.groupBy { it.optInt("episode", 0) }.toSortedMap()\n        val header = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            background = rounded(Color.rgb(11, 21, 39), dp(18), Color.argb(110, 60, 103, 178))\n            setPadding(dp(12), dp(10), dp(12), dp(10))\n        }\n        val arrow = TextView(this).apply {\n            text = if (initiallyOpen) "⌃" else "⌄"\n            setTextColor(blue2)\n            textSize = 22f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n        }\n        val titleBox = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.RIGHT\n        }\n        titleBox.addView(TextView(this).apply {\n            text = if (seasonNumber > 0) "فصل ${seasonNumber}" else "قسمت\u200cها"\n            setTextColor(white)\n            textSize = 18f\n            typeface = Typeface.DEFAULT_BOLD\n        })\n        titleBox.addView(TextView(this).apply {\n            text = "${episodes.size} قسمت • ${seasonLinks.size} نسخه قابل پخش"\n            setTextColor(muted)\n            textSize = 11.5f\n            setPadding(0, dp(3), 0, 0)\n        })\n        header.addView(titleBox, LinearLayout.LayoutParams(0, -2, 1f))\n        header.addView(arrow, LinearLayout.LayoutParams(dp(38), dp(38)))\n\n        val episodeContainer = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            visibility = if (initiallyOpen) View.VISIBLE else View.GONE\n            setPadding(0, dp(12), 0, 0)\n        }\n        episodes.forEach { ep ->\n            episodeContainer.addView(episodePremiumCard(item, allLinks, ep.key, ep.value), LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(10) })\n        }\n\n        header.setOnClickListener {\n            val open = episodeContainer.visibility != View.VISIBLE\n            episodeContainer.visibility = if (open) View.VISIBLE else View.GONE\n            arrow.text = if (open) "⌃" else "⌄"\n        }\n\n        outer.addView(header)\n        outer.addView(episodeContainer)\n        return outer\n    }\n\n    private fun episodePremiumCard(item: JSONObject, allLinks: List<JSONObject>, episodeNumber: Int, epLinks: List<JSONObject>): View {\n        val best = bestEpisodeLink(epLinks)\n        val bestIndex = allLinks.indexOf(best).coerceAtLeast(0)\n        val card = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            background = rounded(Color.rgb(10, 19, 35), dp(20), Color.argb(105, 45, 80, 135))\n            setPadding(dp(12), dp(12), dp(12), dp(12))\n        }\n\n        val top = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        val info = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL; gravity = Gravity.RIGHT }\n        info.addView(TextView(this).apply {\n            text = if (episodeNumber > 0) "قسمت ${episodeNumber}" else "لینک\u200cها"\n            setTextColor(white)\n            textSize = 16f\n            typeface = Typeface.DEFAULT_BOLD\n        })\n        info.addView(TextView(this).apply {\n            text = episodeSubtitle(best, epLinks)\n            setTextColor(muted)\n            textSize = 11.5f\n            maxLines = 1\n            ellipsize = android.text.TextUtils.TruncateAt.END\n            setPadding(0, dp(4), 0, 0)\n        })\n        top.addView(info, LinearLayout.LayoutParams(0, -2, 1f))\n        top.addView(TextView(this).apply {\n            text = runtimeText(best)\n            setTextColor(blue2)\n            textSize = 11f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = rounded(Color.argb(80, 0, 108, 255), dp(13), Color.argb(95, 70, 120, 200))\n            setPadding(dp(9), dp(5), dp(9), dp(5))\n        })\n        card.addView(top)\n\n        val chipScroll = HorizontalScrollView(this).apply {\n            isHorizontalScrollBarEnabled = false\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        val chips = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            setPadding(0, dp(10), 0, dp(8))\n        }\n        epLinks.sortedByDescending { qualityScore(it.optString("quality")) }.forEach { link ->\n            val idx = allLinks.indexOf(link)\n            chips.addView(premiumQualityChip(link, idx == bestIndex) { openPlayer(item, allLinks, idx) }, LinearLayout.LayoutParams(-2, dp(34)).apply {\n                marginStart = dp(5)\n                marginEnd = dp(5)\n            })\n        }\n        chipScroll.addView(chips)\n        card.addView(chipScroll, LinearLayout.LayoutParams(-1, -2))\n\n        val actions = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        actions.addView(premiumMiniButton("▶ پخش") { openPlayer(item, allLinks, bestIndex) }, LinearLayout.LayoutParams(0, dp(44), 1f).apply { marginStart = dp(6) })\n        actions.addView(premiumMiniButton("⇩ دانلود") { showDownloadForLinks(item, epLinks) }, LinearLayout.LayoutParams(0, dp(44), 1f).apply { marginEnd = dp(6) })\n        card.addView(actions)\n        return card\n    }\n\n    private fun bestEpisodeLink(epLinks: List<JSONObject>): JSONObject {\n        return epLinks.sortedWith(\n            compareByDescending<JSONObject> { qualityScore(it.optString("quality")) }\n                .thenBy { if (it.optString("type") == "dub") 0 else 1 }\n        ).firstOrNull() ?: JSONObject()\n    }\n\n    private fun episodeSubtitle(first: JSONObject, epLinks: List<JSONObject>): String {\n        val name = first.optString("episode_name").ifBlank { first.optString("name") }\n        val versions = epLinks.map { linkTypeFa(it) }.distinct().joinToString(" / ")\n        val quality = epLinks.map { it.optString("quality") }.filter { it.isNotBlank() }.distinct().joinToString("، ")\n        return listOf(name, versions, quality).filter { it.isNotBlank() }.joinToString(" • ").ifBlank { "نسخه\u200cهای قابل پخش" }\n    }\n\n    private fun runtimeText(link: JSONObject): String {\n        return link.optString("runtime").ifBlank { link.optString("duration").ifBlank { "--" } }\n    }\n\n    private fun linkTypeFa(link: JSONObject): String {\n        val tf = link.optString("type_fa").trim()\n        if (tf.isNotBlank() && !tf.equals("unknown", true) && tf != "نامشخص") return tf\n        val s = (link.optString("type") + " " + link.optString("display_label") + " " + link.optString("label")).lowercase(Locale.US)\n        return when {\n            s.contains("subtitle") || s.contains("sub") || s.contains("زیر") -> "زیرنویس"\n            s.contains("dub") || s.contains("دوبله") -> "دوبله"\n            else -> "نسخه"\n        }\n    }\n\n    private fun premiumQualityChip(link: JSONObject, active: Boolean, click: () -> Unit): TextView {\n        return TextView(this).apply {\n            text = qualityChipText(link)\n            setTextColor(white)\n            textSize = 10.5f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = qualityGradient(link, active)\n            setPadding(dp(10), 0, dp(10), 0)\n            setOnClickListener { click() }\n            minWidth = dp(70)\n        }\n    }\n\n    private fun qualityChipText(link: JSONObject): String {\n        val q = link.optString("quality").ifBlank { "نامشخص" }.uppercase(Locale.US)\n        val kind = linkTypeFa(link)\n        val label = (link.optString("display_label") + " " + link.optString("label")).uppercase(Locale.US)\n        val tags = mutableListOf<String>()\n        if (label.contains("4K") || q.contains("2160")) tags.add("4K")\n        if (label.contains("HDR")) tags.add("HDR")\n        if (label.contains("DOLBY")) tags.add("DV")\n        if (label.contains("HEVC") || label.contains("H265")) tags.add("HEVC")\n        return (listOf(q, kind) + tags).joinToString(" • ")\n    }\n\n    private fun qualityGradient(link: JSONObject, active: Boolean): GradientDrawable {\n        val label = qualityChipText(link).uppercase(Locale.US)\n        val colors = when {\n            label.contains("4K") -> intArrayOf(Color.rgb(120, 70, 255), Color.rgb(30, 170, 255))\n            label.contains("1080") -> intArrayOf(Color.rgb(0, 105, 255), Color.rgb(30, 175, 255))\n            label.contains("720") -> intArrayOf(Color.rgb(0, 145, 130), Color.rgb(0, 205, 175))\n            label.contains("480") -> intArrayOf(Color.rgb(85, 95, 125), Color.rgb(125, 140, 175))\n            label.contains("دوبله") -> intArrayOf(Color.rgb(30, 90, 215), Color.rgb(90, 70, 245))\n            label.contains("زیرنویس") -> intArrayOf(Color.rgb(180, 115, 20), Color.rgb(225, 170, 45))\n            else -> intArrayOf(Color.rgb(42, 55, 82), Color.rgb(70, 88, 125))\n        }\n        return GradientDrawable(GradientDrawable.Orientation.LEFT_RIGHT, colors).apply {\n            cornerRadius = dp(16).toFloat()\n            setStroke(dp(if (active) 2 else 1), if (active) Color.argb(230, 230, 245, 255) else Color.argb(105, 150, 180, 230))\n        }\n    }\n\n    private fun premiumMiniButton(label: String, click: () -> Unit): TextView {\n        return TextView(this).apply {\n            text = label\n            setTextColor(white)\n            textSize = 12.5f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = rounded(Color.rgb(14, 27, 50), dp(16), Color.argb(125, 65, 105, 170))\n            setOnClickListener { click() }\n        }\n    }\n\n    private fun showDownloadForLinks(item: JSONObject, links: List<JSONObject>) {\n        if (links.isEmpty()) return\n        val scroll = ScrollView(this)\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(14), dp(14), dp(14), dp(14))\n            background = rounded(Color.rgb(8, 14, 26), dp(22), Color.argb(155, 235, 35, 45))\n        }\n        scroll.addView(box)\n        val head = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            setPadding(0, 0, 0, dp(12))\n        }\n        head.addView(FrameLayout(this).apply {\n            background = GradientDrawable(GradientDrawable.Orientation.TL_BR, intArrayOf(Color.rgb(235, 35, 45), Color.rgb(245, 184, 75))).apply { cornerRadius = dp(18).toFloat() }\n            addView(ImageView(this@MainActivity).apply {\n                setImageResource(R.drawable.ic_download)\n                setColorFilter(white)\n            }, FrameLayout.LayoutParams(dp(30), dp(30), Gravity.CENTER))\n        }, LinearLayout.LayoutParams(dp(58), dp(58)).apply { marginStart = dp(12) })\n        val titleBox = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL; gravity = Gravity.RIGHT }\n        titleBox.addView(TextView(this).apply {\n            text = "باکس دانلود"\n            setTextColor(white)\n            textSize = 19f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.RIGHT\n        })\n        titleBox.addView(TextView(this).apply {\n            text = "روی آیکن دانلود بزن و روش دانلود را انتخاب کن"\n            setTextColor(muted)\n            textSize = 11.8f\n            gravity = Gravity.RIGHT\n            setPadding(0, dp(4), 0, 0)\n        })\n        head.addView(titleBox, LinearLayout.LayoutParams(0, -2, 1f))\n        box.addView(head)\n        box.addView(downloadNotice())\n        groupedDownloadBlocks(item, links).forEach { block ->\n            box.addView(block, LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(12) })\n        }\n        AlertDialog.Builder(this)\n            .setView(scroll)\n            .show()\n    }\n\n    private fun showPlayableSheet(item: JSONObject) {\n        val links = playableLinks(item)\n        if (links.isEmpty()) {\n            Toast.makeText(this, "لینک پخش مستقیم پیدا نشد", Toast.LENGTH_SHORT).show()\n            return\n        }\n\n        val scroll = ScrollView(this)\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(12), dp(12), dp(12), dp(12))\n        }\n        scroll.addView(box)\n        box.addView(downloadNotice())\n        groupedDownloadBlocks(item, links).forEach { block ->\n            box.addView(block, LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(12) })\n        }\n\n        AlertDialog.Builder(this)\n            .setTitle(if (isSeriesLinks(links)) "انتخاب فصل و قسمت" else "انتخاب نسخه")\n            .setView(scroll)\n            .show()\n    }\n\n    private fun svgIconButton(iconRes: Int, click: () -> Unit): FrameLayout {\n        return FrameLayout(this).apply {\n            background = rounded(Color.argb(140, 8, 18, 34), dp(18), Color.argb(140, 90, 130, 200))\n            setOnClickListener { click() }\n            addView(ImageView(this@MainActivity).apply {\n                setImageResource(iconRes)\n                setColorFilter(white)\n                scaleType = ImageView.ScaleType.FIT_CENTER\n            }, FrameLayout.LayoutParams(dp(20), dp(20), Gravity.CENTER))\n        }\n    }\n\n    private fun iconActionButton(label: String, iconRes: Int, primary: Boolean, click: () -> Unit): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            background = if (primary) blueGradient(dp(19)) else rounded(Color.rgb(10, 18, 32), dp(19), Color.argb(160, 66, 102, 158))\n            setPadding(dp(12), 0, dp(12), 0)\n            setOnClickListener { click() }\n            addView(ImageView(this@MainActivity).apply {\n                setImageResource(iconRes)\n                setColorFilter(white)\n            }, LinearLayout.LayoutParams(dp(18), dp(18)).apply { marginStart = dp(6) })\n            addView(TextView(this@MainActivity).apply {\n                text = label\n                setTextColor(white)\n                textSize = 12.5f\n                typeface = Typeface.DEFAULT_BOLD\n                gravity = Gravity.CENTER\n            })\n        }\n    }\n\n    private fun downloadBrandButton(label: String, iconRes: Int, click: () -> Unit): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            background = rounded(Color.rgb(12, 24, 42), dp(16), Color.argb(160, 74, 115, 180))\n            setPadding(dp(12), 0, dp(12), 0)\n            setOnClickListener { click() }\n            addView(ImageView(this@MainActivity).apply {\n                setImageResource(iconRes)\n                scaleType = ImageView.ScaleType.FIT_CENTER\n            }, LinearLayout.LayoutParams(dp(22), dp(22)).apply { marginStart = dp(8) })\n            addView(TextView(this@MainActivity).apply {\n                text = label\n                setTextColor(white)\n                textSize = 12f\n                typeface = Typeface.DEFAULT_BOLD\n                gravity = Gravity.CENTER\n            })\n        }\n    }\n\n    private fun infoCell(iconRes: Int, label: String, value: String): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            background = rounded(Color.rgb(11, 19, 34), dp(14), Color.rgb(23, 39, 64))\n            setPadding(dp(10), dp(8), dp(10), dp(8))\n            addView(ImageView(this@MainActivity).apply {\n                setImageResource(iconRes)\n                setColorFilter(blue2)\n            }, LinearLayout.LayoutParams(dp(18), dp(18)).apply { marginStart = dp(8) })\n            val texts = LinearLayout(this@MainActivity).apply { orientation = LinearLayout.VERTICAL; gravity = Gravity.RIGHT }\n            texts.addView(TextView(this@MainActivity).apply { text = label; setTextColor(faint); textSize = 10.5f })\n            texts.addView(TextView(this@MainActivity).apply { text = value.ifBlank { "-" }; setTextColor(white); textSize = 12f; typeface = Typeface.DEFAULT_BOLD; maxLines = 1 })\n            addView(texts, LinearLayout.LayoutParams(0, -2, 1f))\n        }\n    }\n\n    private fun linkButton(label: String, primary: Boolean, click: () -> Unit): TextView {\n        return TextView(this).apply {\n            text = label\n            setTextColor(white)\n            textSize = if (primary) 14f else 11.5f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = if (primary) blueGradient(dp(16)) else rounded(Color.rgb(6, 11, 20), dp(14), Color.rgb(39, 62, 96))\n            setOnClickListener { click() }\n        }\n    }\n\n    private fun sheetButton(label: String, click: () -> Unit): TextView {\n        return TextView(this).apply {\n            text = label\n            setTextColor(white)\n            textSize = 14f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = blueGradient(dp(18))\n            setOnClickListener { click() }\n        }\n    }\n\n    private fun openPlayer(item: JSONObject, links: List<JSONObject>, selected: Int) {\n        val safeIndex = selected.coerceIn(0, links.size - 1)\n        val selectedLink = links[safeIndex]\n        if (item.length() > 0) recordContinue(item, selectedLink)\n        val title = item.optString("title_fa").ifBlank { item.optString("title") }\n        val arr = JSONArray()\n        links.forEach { l ->\n            arr.put(JSONObject().apply {\n                put("url", l.optString("url"))\n                put("title", title)\n                put("quality", l.optString("quality"))\n                put("type", l.optString("type"))\n                put("label", l.optString("label"))\n                put("display_label", l.optString("display_label"))\n                put("type_fa", l.optString("type_fa"))\n                put("is_audio", l.optBoolean("is_audio", false))\n                put("season", l.optString("season"))\n                put("episode", l.optString("episode"))\n            })\n        }\n        val payload = JSONObject().apply {\n            put("video", selectedLink.optString("url"))\n            put("title", title)\n            put("selectedIndex", safeIndex)\n            put("tracks", arr)\n        }\n        startActivity(Intent(this, PlayerActivity::class.java).apply {\n            putExtra(PlayerActivity.EXTRA_VIDEO_URL, selectedLink.optString("url"))\n            putExtra(PlayerActivity.EXTRA_TITLE, title)\n            putExtra(PlayerActivity.EXTRA_PLAYLIST_JSON, payload.toString())\n        })\n    }\n\n    private fun playableLinks(item: JSONObject): List<JSONObject> {\n        val play = item.optJSONObject("play")\n        val arr = play?.optJSONArray("links") ?: item.optJSONArray("links") ?: JSONArray()\n        val out = mutableListOf<JSONObject>()\n        for (i in 0 until arr.length()) {\n            val l = arr.optJSONObject(i) ?: continue\n            val url = l.optString("url")\n            val direct = l.optBoolean("is_direct", true)\n            val audioOnly = l.optBoolean("is_audio", false)\n            if (direct && url.isNotBlank() && !audioOnly && isVideo(url)) out.add(l)\n        }\n        return out.sortedWith(\n            compareBy<JSONObject> { it.optInt("season", 0) }\n                .thenBy { it.optInt("episode", 0) }\n                .thenBy { if (linkTypeFa(it) == "دوبله") 0 else 1 }\n                .thenByDescending { qualityScore(it.optString("quality")) }\n                .thenBy { it.optString("display_label") }\n        )\n    }\n\n    private fun isSeriesLinks(links: List<JSONObject>) = links.any { it.optInt("season", 0) > 0 || it.optInt("episode", 0) > 0 }\n\n    private fun isVideo(url: String): Boolean {\n        val u = url.lowercase(Locale.US)\n        return u.startsWith("http") && (u.contains(".mkv") || u.contains(".mp4") || u.contains(".m3u8") || u.contains(".avi") || u.contains(".webm") || u.contains(".mov"))\n    }\n\n    private fun qualityScore(q: String) = Regex("(\\\\d+)").find(q)?.value?.toIntOrNull() ?: 0\n\n    private fun linkLabel(link: JSONObject): String {\n        val ep = if (link.optInt("season", 0) > 0 || link.optInt("episode", 0) > 0) "فصل ${link.optInt("season", 0)} قسمت ${link.optInt("episode", 0)} • " else ""\n        return ep + link.optString("display_label").ifBlank { shortLinkLabel(link) }\n    }\n\n    private fun shortLinkLabel(link: JSONObject): String {\n        val display = link.optString("display_label").trim()\n        if (display.isNotBlank() && !display.equals("unknown", true) && display != "نامشخص") return display\n        val kind = linkTypeFa(link)\n        val q = link.optString("quality").ifBlank { "کیفیت نامشخص" }\n        return "$q • $kind"\n    }\n\n    private fun genresText(item: JSONObject): String {\n        val arr = item.optJSONArray("genres") ?: return ""\n        val out = mutableListOf<String>()\n        for (i in 0 until arr.length()) out.add(arr.optString(i))\n        return out.joinToString("   ")\n    }\n\n    private fun cleanRating(v: String): String {\n        if (v.isBlank() || v == "null") return "N/A"\n        return try { String.format(Locale.US, "%.1f", v.toDouble()) } catch (_: Throwable) { v.take(3) }\n    }\n\n    private fun iconText(label: String): TextView {\n        return TextView(this).apply {\n            text = label\n            setTextColor(white)\n            textSize = 25f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = rounded(Color.argb(60, 15, 25, 42), dp(17), Color.TRANSPARENT)\n        }\n    }\n\n    private fun chip(label: String, active: Boolean): TextView {\n        return TextView(this).apply {\n            text = label\n            setTextColor(white)\n            textSize = 12.5f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = if (active) blueGradient(dp(20)) else rounded(Color.rgb(12, 20, 34), dp(20), Color.rgb(36, 58, 88))\n            setPadding(dp(17), 0, dp(17), 0)\n        }\n    }\n\n    private fun moreButton(label: String, click: () -> Unit): TextView {\n        return TextView(this).apply {\n            text = label\n            setTextColor(white)\n            textSize = 14f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = blueGradient(dp(22))\n            setOnClickListener { click() }\n            layoutParams = LinearLayout.LayoutParams(-1, dp(50)).apply { topMargin = dp(10) }\n        }\n    }\n\n    private fun enc(s: String): String = URLEncoder.encode(s, "UTF-8")\n\n\n    private fun showMenuDialog() {\n        val items = arrayOf("خانه", "فیلم\u200cهای بروز شده", "سریال\u200cهای بروز شده", "انیمه", "ترکی", "کالکشن\u200cها", "جستجو")\n        AlertDialog.Builder(this)\n            .setTitle("بانک مووی")\n            .setItems(items) { _, which ->\n                when (which) {\n                    0 -> showHome()\n                    1 -> showList("فیلم\u200cهای بروز شده", 1, "updated_movies")\n                    2 -> showList("سریال\u200cهای بروز شده", 1, "updated_series")\n                    3 -> showList("انیمه", 1, "anime")\n                    4 -> showList("ترکی", 1, "turkish")\n                    5 -> showCollections()\n                    6 -> showSearch()\n                }\n            }.show()\n    }\n\n    private fun fetch(url: String, cb: (Boolean, JSONObject?, String?) -> Unit) {\n        Thread {\n            try {\n                val c = URL(url).openConnection() as HttpURLConnection\n                c.connectTimeout = 12000\n                c.readTimeout = 18000\n                c.setRequestProperty("Accept", "application/json")\n                c.setRequestProperty("User-Agent", "BankMovieeAndroidNative/6.0")\n                val code = c.responseCode\n                val stream = if (code in 200..299) c.inputStream else c.errorStream\n                val body = stream.bufferedReader(Charsets.UTF_8).use { it.readText() }\n                if (code in 200..299) cb(true, JSONObject(body), null) else cb(false, null, "HTTP $code")\n            } catch (e: Throwable) {\n                cb(false, null, e.message ?: "خطای اتصال")\n            }\n        }.start()\n    }\n\n    private fun loadImage(url: String, target: ImageView) {\n        if (url.isBlank() || url == "null") return\n        val cached = imageCache[url]\n        if (cached != null) {\n            target.setImageBitmap(cached)\n            return\n        }\n        Thread {\n            try {\n                val c = URL(url).openConnection() as HttpURLConnection\n                c.connectTimeout = 7000\n                c.readTimeout = 9000\n                c.instanceFollowRedirects = true\n                val bmp = BitmapFactory.decodeStream(c.inputStream)\n                if (bmp != null) {\n                    if (imageCache.size > 150) imageCache.clear()\n                    imageCache[url] = bmp\n                    runOnUiThread { target.setImageBitmap(bmp) }\n                }\n            } catch (_: Throwable) {}\n        }.start()\n    }\n\n    private fun errorView(msg: String): TextView {\n        return TextView(this).apply {\n            text = "⚠️  $msg\\\\nتلاش مجدد کنید"\n            setTextColor(Color.rgb(255, 178, 178))\n            textSize = 13.5f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = rounded(Color.rgb(27, 14, 18), dp(18), Color.argb(150, 235, 35, 45))\n            setPadding(dp(14), dp(24), dp(14), dp(24))\n        }\n    }\n\n    private fun rounded(color: Int, radius: Int, strokeColor: Int): GradientDrawable {\n        return GradientDrawable().apply {\n            setColor(color)\n            cornerRadius = radius.toFloat()\n            if (strokeColor != Color.TRANSPARENT) setStroke(dp(1), strokeColor)\n        }\n    }\n\n    private fun blueGradient(radius: Int): GradientDrawable {\n        return GradientDrawable(GradientDrawable.Orientation.TL_BR, intArrayOf(Color.rgb(235, 35, 45), Color.rgb(168, 18, 31))).apply {\n            cornerRadius = radius.toFloat()\n            setStroke(dp(1), Color.argb(145, 255, 200, 120))\n        }\n    }\n\n    private fun dp(v: Int): Int = (v * resources.displayMetrics.density).roundToInt()\n}\n', encoding="utf-8")
          player_file.write_text('package ir.bankmoviee.app\n\nimport android.app.Activity\nimport android.app.AlertDialog\nimport android.app.PictureInPictureParams\nimport android.content.Context\nimport android.content.pm.ActivityInfo\nimport android.graphics.Color\nimport android.graphics.Typeface\nimport android.graphics.drawable.ColorDrawable\nimport android.net.Uri\nimport android.os.Build\nimport android.os.Bundle\nimport android.os.Handler\nimport android.os.Looper\nimport android.view.Gravity\nimport android.view.MotionEvent\nimport android.view.View\nimport android.view.Window\nimport android.view.WindowManager\nimport android.widget.FrameLayout\nimport android.widget.ImageView\nimport android.widget.LinearLayout\nimport android.widget.ScrollView\nimport android.widget.SeekBar\nimport android.widget.TextView\nimport android.widget.Toast\nimport org.json.JSONArray\nimport org.json.JSONObject\nimport org.videolan.libvlc.LibVLC\nimport org.videolan.libvlc.Media\nimport org.videolan.libvlc.MediaPlayer\nimport org.videolan.libvlc.util.VLCVideoLayout\nimport java.util.Locale\nimport kotlin.math.abs\nimport kotlin.math.max\nimport kotlin.math.min\nimport kotlin.math.roundToInt\n\nclass PlayerActivity : Activity() {\n\n    companion object {\n        const val EXTRA_VIDEO_URL = "video_url"\n        const val EXTRA_TITLE = "title"\n        const val EXTRA_PLAYLIST_JSON = "playlist_json"\n    }\n\n    data class Track(\n        val url: String,\n        val title: String,\n        val quality: String,\n        val type: String,\n        val label: String,\n        val typeFa: String,\n        val displayLabel: String,\n        val isAudio: Boolean,\n        val season: Int,\n        val episode: Int\n    )\n\n    private val blue = Color.rgb(0, 108, 255)\n    private val blue2 = Color.rgb(30, 160, 255)\n    private val blue3 = Color.argb(160, 35, 95, 255)\n    private val panel = Color.argb(168, 5, 12, 24)\n    private val stroke = Color.argb(185, 48, 86, 138)\n    private val white = Color.WHITE\n    private val muted = Color.rgb(178, 189, 208)\n\n    private lateinit var root: FrameLayout\n    private lateinit var videoLayout: VLCVideoLayout\n    private lateinit var topBar: LinearLayout\n    private lateinit var bottomBar: LinearLayout\n    private lateinit var centerControls: LinearLayout\n    private lateinit var titleText: TextView\n    private lateinit var subText: TextView\n    private lateinit var seek: SeekBar\n    private lateinit var currentTimeText: TextView\n    private lateinit var totalTimeText: TextView\n    private lateinit var hudBox: TextView\n    private lateinit var playIcon: ImageView\n    private lateinit var fitIcon: ImageView\n    private lateinit var lockIcon: ImageView\n    private lateinit var unlockOverlay: FrameLayout\n\n    private var vlc: LibVLC? = null\n    private var player: MediaPlayer? = null\n    private val handler = Handler(Looper.getMainLooper())\n    private val tracks = mutableListOf<Track>()\n    private var currentIndex = 0\n    private var title = "BankMoviee"\n    private var videoUrl = ""\n    private val modes = arrayOf("FIT", "CROP", "STRETCH")\n    private val modeTitles = arrayOf("متناسب", "برش سینمایی", "کشیده")\n    private var modeIndex = 0\n    private var controlsLocked = false\n    private var lastTap = 0L\n    private var touchStartX = 0f\n    private var touchStartY = 0f\n    private var touchStartBrightness = 0.5f\n    private var touchStartVolume = 0\n    private var gestureMode = 0 // 0 none, 1 brightness, 2 volume\n    private var controlsVisible = true\n    private var sleepMinutes = 0\n    private var currentSpeed = 1.0f\n    private var hardwareDecoder = true\n    private var autoPlayNext = true\n    private var lastProgressSaveAt = 0L\n    private var subtitleDelayMs = 0\n    private var subtitleScale = 100\n    private var subtitlePositionIndex = 0\n    private val subtitlePositions = arrayOf("پایین", "وسط", "بالا")\n    private val subtitleMargins = arrayOf("40", "190", "340")\n    private var subtitleColorIndex = 0\n    private val subtitleColorLabels = arrayOf("سفید", "زرد", "آبی", "سبز", "قرمز", "بنفش", "مشکی")\n    private val subtitleColorValues = arrayOf("16777215", "16776960", "3394815", "65280", "16733525", "11141290", "0")\n    private var longPress2x = false\n    private val longPressRunnable = Runnable {\n        longPress2x = true\n        setTemporarySpeed(true)\n    }\n    private val audioManager by lazy { getSystemService(Context.AUDIO_SERVICE) as android.media.AudioManager }\n\n    private val hideRunnable = Runnable { if (!controlsLocked) hideControls() }\n    private val hudHideRunnable = Runnable { hudBox.visibility = View.GONE }\n    private val sleepRunnable = Runnable {\n        Toast.makeText(this, "زمان خواب رسید", Toast.LENGTH_SHORT).show()\n        finish()\n    }\n    private val progressRunnable = object : Runnable {\n        override fun run() {\n            updateProgress()\n            handler.postDelayed(this, 500)\n        }\n    }\n\n    override fun onCreate(savedInstanceState: Bundle?) {\n        super.onCreate(savedInstanceState)\n        requestWindowFeature(Window.FEATURE_NO_TITLE)\n        requestedOrientation = ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE\n        window.addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON)\n        enterImmersive()\n        parseIncoming()\n        if (tracks.isEmpty() && videoUrl.isNotBlank()) tracks.add(Track(videoUrl, title, "", "", "", "", "", false, 0, 0))\n        if (currentIndex !in tracks.indices) currentIndex = 0\n        videoUrl = tracks.getOrNull(currentIndex)?.url ?: videoUrl\n        title = tracks.getOrNull(currentIndex)?.title ?: title\n        currentBrightness = if (window.attributes.screenBrightness > 0f) window.attributes.screenBrightness else 0.55f\n        buildUi()\n        switchTo(currentIndex)\n    }\n\n    private var currentBrightness = 0.55f\n\n    private fun parseIncoming() {\n        videoUrl = intent.getStringExtra(EXTRA_VIDEO_URL) ?: ""\n        title = intent.getStringExtra(EXTRA_TITLE) ?: "BankMoviee"\n        val json = intent.getStringExtra(EXTRA_PLAYLIST_JSON) ?: ""\n        if (json.isNotBlank()) {\n            try {\n                val obj = JSONObject(json)\n                currentIndex = obj.optInt("selectedIndex", 0)\n                val arr = obj.optJSONArray("tracks") ?: JSONArray()\n                for (i in 0 until arr.length()) {\n                    val it = arr.optJSONObject(i) ?: continue\n                    tracks.add(\n                        Track(\n                            it.optString("url"),\n                            it.optString("title", title),\n                            it.optString("quality"),\n                            it.optString("type"),\n                            it.optString("label"),\n                            it.optString("type_fa"),\n                            it.optString("display_label"),\n                            it.optBoolean("is_audio", false),\n                            it.optInt("season", 0),\n                            it.optInt("episode", 0)\n                        )\n                    )\n                }\n            } catch (_: Throwable) {}\n        }\n    }\n\n    private fun buildUi() {\n        root = FrameLayout(this).apply { setBackgroundColor(Color.BLACK) }\n        videoLayout = VLCVideoLayout(this)\n        root.addView(videoLayout, FrameLayout.LayoutParams(-1, -1))\n\n        hudBox = TextView(this).apply {\n            setTextColor(Color.WHITE)\n            textSize = 14f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.CENTER\n            setPadding(dp(16), dp(12), dp(16), dp(12))\n            background = rounded(Color.argb(210, 0, 0, 0), dp(20), Color.argb(120, 255, 255, 255))\n            visibility = View.GONE\n        }\n        root.addView(hudBox, FrameLayout.LayoutParams(-2, -2, Gravity.CENTER).apply { bottomMargin = dp(28) })\n\n        topBar = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            setPadding(dp(12), dp(10), dp(12), dp(8))\n            background = android.graphics.drawable.GradientDrawable(\n                android.graphics.drawable.GradientDrawable.Orientation.TOP_BOTTOM,\n                intArrayOf(Color.argb(145, 0, 0, 0), Color.argb(0, 0, 0, 0))\n            )\n        }\n\n        val back = glassIconButton(R.drawable.ic_player_back) { finish() }\n        topBar.addView(back, LinearLayout.LayoutParams(dp(44), dp(44)))\n\n        val info = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL; gravity = Gravity.CENTER }\n        titleText = TextView(this).apply {\n            text = title\n            setTextColor(white)\n            textSize = 14.5f\n            typeface = Typeface.DEFAULT_BOLD\n            maxLines = 1\n            gravity = Gravity.CENTER\n        }\n        subText = TextView(this).apply {\n            text = currentLabel()\n            setTextColor(muted)\n            textSize = 11f\n            maxLines = 1\n            gravity = Gravity.CENTER\n        }\n        info.addView(titleText)\n        info.addView(subText)\n        topBar.addView(info, LinearLayout.LayoutParams(0, -2, 1f).apply { marginStart = dp(10); marginEnd = dp(10) })\n\n        val actions = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        actions.addView(simplePlayerIcon(R.drawable.ic_player_lock) { toggleLock() }, LinearLayout.LayoutParams(dp(36), dp(36)).apply { marginStart = dp(10) })\n        actions.addView(simplePlayerIcon(R.drawable.ic_player_fit) { nextMode() }, LinearLayout.LayoutParams(dp(36), dp(36)).apply { marginStart = dp(10) })\n        actions.addView(simplePlayerIconWithText(R.drawable.ic_speedometer, speedLabel()) { showSpeedSheet() }, LinearLayout.LayoutParams(dp(48), dp(36)).apply { marginStart = dp(10) })\n        actions.addView(simplePlayerIcon(R.drawable.ic_player_audio) { quickTypeSwitch(false) }, LinearLayout.LayoutParams(dp(36), dp(36)).apply { marginStart = dp(10) })\n        actions.addView(simplePlayerIcon(R.drawable.ic_player_cc) { quickTypeSwitch(true) }, LinearLayout.LayoutParams(dp(36), dp(36)).apply { marginStart = dp(10) })\n        actions.addView(simplePlayerIcon(R.drawable.ic_player_settings) { showSettingsSheet() }, LinearLayout.LayoutParams(dp(36), dp(36)))\n        topBar.addView(actions)\n        root.addView(topBar, FrameLayout.LayoutParams(-1, dp(72), Gravity.TOP))\n\n        centerControls = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n        }\n        val rewind = circleAction(R.drawable.ic_player_replay, "10") { seekBy(-10000) }\n        val play = FrameLayout(this).apply {\n            background = android.graphics.drawable.GradientDrawable().apply {\n                shape = android.graphics.drawable.GradientDrawable.OVAL\n                setColor(Color.argb(35, 0, 0, 0))\n                setStroke(dp(2), Color.argb(220, 255, 255, 255))\n            }\n            elevation = dp(8).toFloat()\n            setOnClickListener { toggle() }\n        }\n        playIcon = ImageView(this).apply {\n            setImageResource(R.drawable.ic_player_pause)\n            setColorFilter(Color.WHITE)\n        }\n        play.addView(playIcon, FrameLayout.LayoutParams(dp(34), dp(34), Gravity.CENTER))\n        val forward = circleAction(R.drawable.ic_player_forward, "10") { seekBy(10000) }\n        centerControls.addView(rewind, LinearLayout.LayoutParams(dp(56), dp(56)).apply { marginEnd = dp(18) })\n        centerControls.addView(play, LinearLayout.LayoutParams(dp(70), dp(70)))\n        centerControls.addView(forward, LinearLayout.LayoutParams(dp(56), dp(56)).apply { marginStart = dp(18) })\n        root.addView(centerControls, FrameLayout.LayoutParams(-1, dp(96), Gravity.CENTER))\n\n        bottomBar = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(16), dp(6), dp(16), dp(12))\n            background = android.graphics.drawable.GradientDrawable(\n                android.graphics.drawable.GradientDrawable.Orientation.TOP_BOTTOM,\n                intArrayOf(Color.argb(0, 2, 8, 18), Color.argb(220, 2, 8, 18), Color.argb(246, 2, 8, 18))\n            )\n        }\n\n        val timeRow = LinearLayout(this).apply { orientation = LinearLayout.HORIZONTAL; gravity = Gravity.CENTER_VERTICAL }\n        currentTimeText = TextView(this).apply { text = "00:00"; setTextColor(white); textSize = 10.5f }\n        totalTimeText = TextView(this).apply { text = "--:--"; setTextColor(muted); textSize = 10.5f; gravity = Gravity.END }\n        timeRow.addView(currentTimeText, LinearLayout.LayoutParams(0, -2, 1f))\n        timeRow.addView(totalTimeText, LinearLayout.LayoutParams(0, -2, 1f))\n        bottomBar.addView(timeRow)\n\n        seek = SeekBar(this).apply {\n            max = 1000\n            progressTintList = android.content.res.ColorStateList.valueOf(blue)\n            thumbTintList = android.content.res.ColorStateList.valueOf(blue2)\n        }\n        bottomBar.addView(seek, LinearLayout.LayoutParams(-1, dp(34)).apply { topMargin = dp(2) })\n\n        val bottomActions = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.END or Gravity.CENTER_VERTICAL\n        }\n        val fitButton = glassIconButton(R.drawable.ic_player_fit) { nextMode() }\n        fitIcon = fitButton.getChildAt(0) as ImageView\n        val lockButton = glassIconButton(R.drawable.ic_player_lock) { toggleLock() }\n        lockIcon = lockButton.getChildAt(0) as ImageView\n        bottomActions.addView(fitButton, LinearLayout.LayoutParams(dp(38), dp(38)))\n        bottomActions.addView(lockButton, LinearLayout.LayoutParams(dp(38), dp(38)).apply { marginStart = dp(8) })\n        bottomBar.addView(bottomActions, LinearLayout.LayoutParams(-1, -2).apply { topMargin = dp(8) })\n        root.addView(bottomBar, FrameLayout.LayoutParams(-1, dp(104), Gravity.BOTTOM))\n\n        unlockOverlay = glassIconButton(R.drawable.ic_player_unlock) { controlsLocked = false; showControls(); updateLockUi() }.apply { visibility = View.GONE }\n        root.addView(unlockOverlay, FrameLayout.LayoutParams(dp(46), dp(46), Gravity.END or Gravity.CENTER_VERTICAL).apply { rightMargin = dp(16) })\n\n        setContentView(root)\n\n        seek.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {\n            override fun onStartTrackingTouch(s: SeekBar?) { handler.removeCallbacks(hideRunnable) }\n            override fun onStopTrackingTouch(s: SeekBar?) {\n                val p = player ?: return\n                if (p.length > 0) p.time = ((s?.progress ?: 0).toLong() * p.length) / 1000L\n                hideBarsLater()\n            }\n            override fun onProgressChanged(s: SeekBar?, progress: Int, fromUser: Boolean) {}\n        })\n\n        videoLayout.setOnTouchListener { _, e -> handleVideoTouch(e) }\n        hideBarsLater()\n    }\n\n    private fun simplePlayerIcon(iconRes: Int, click: () -> Unit): FrameLayout {\n        return FrameLayout(this).apply {\n            background = rounded(Color.argb(118, 0, 0, 0), dp(18), Color.argb(105, 255, 255, 255))\n            setOnClickListener {\n                if (!controlsLocked || iconRes == R.drawable.ic_player_lock) {\n                    click()\n                    hideBarsLater()\n                }\n            }\n            addView(ImageView(this@PlayerActivity).apply {\n                setImageResource(iconRes)\n                setColorFilter(Color.WHITE)\n                scaleType = ImageView.ScaleType.FIT_CENTER\n            }, FrameLayout.LayoutParams(dp(20), dp(20), Gravity.CENTER))\n        }\n    }\n\n    private fun simplePlayerIconWithText(iconRes: Int, label: String, click: () -> Unit): FrameLayout {\n        return FrameLayout(this).apply {\n            background = rounded(Color.TRANSPARENT, dp(21), Color.TRANSPARENT)\n            setOnClickListener {\n                if (!controlsLocked) {\n                    click()\n                    hideBarsLater()\n                }\n            }\n            addView(ImageView(this@PlayerActivity).apply {\n                setImageResource(iconRes)\n                setColorFilter(Color.WHITE)\n            }, FrameLayout.LayoutParams(dp(19), dp(19), Gravity.CENTER).apply { rightMargin = dp(7) })\n            addView(TextView(this@PlayerActivity).apply {\n                text = label.replace("نرمال", "1x").replace(".0x", "x")\n                setTextColor(Color.WHITE)\n                textSize = 10.5f\n                typeface = Typeface.DEFAULT_BOLD\n            }, FrameLayout.LayoutParams(-2, -2, Gravity.RIGHT or Gravity.TOP).apply { rightMargin = dp(2); topMargin = dp(0) })\n        }\n    }\n\n    private fun topActionButton(iconRes: Int, label: String, click: () -> Unit): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n            setPadding(dp(7), 0, dp(7), 0)\n            background = rounded(Color.argb(150, 6, 14, 28), dp(18), Color.argb(155, 55, 99, 170))\n            setOnClickListener {\n                if (!controlsLocked) {\n                    click()\n                    hideBarsLater()\n                }\n            }\n            addView(ImageView(this@PlayerActivity).apply {\n                setImageResource(iconRes)\n                setColorFilter(Color.WHITE)\n            }, LinearLayout.LayoutParams(dp(17), dp(17)).apply { marginEnd = dp(4) })\n            addView(TextView(this@PlayerActivity).apply {\n                text = label\n                setTextColor(Color.WHITE)\n                textSize = 10.2f\n                gravity = Gravity.CENTER\n                typeface = Typeface.DEFAULT_BOLD\n                maxLines = 1\n            })\n        }\n    }\n\n    private fun typeSwitchButton(iconRes: Int, label: String, subtitle: Boolean): LinearLayout {\n        val active = tracks.getOrNull(currentIndex)?.let { isSubtitle(it) == subtitle } ?: false\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n            setPadding(dp(8), 0, dp(8), 0)\n            background = if (active) {\n                android.graphics.drawable.GradientDrawable(android.graphics.drawable.GradientDrawable.Orientation.LEFT_RIGHT, intArrayOf(Color.argb(230, 25, 115, 255), Color.argb(210, 92, 60, 255))).apply {\n                    cornerRadius = dp(20).toFloat()\n                    setStroke(dp(1), Color.argb(210, 190, 225, 255))\n                }\n            } else rounded(Color.argb(150, 6, 14, 28), dp(20), Color.argb(155, 55, 99, 170))\n            setOnClickListener {\n                if (!controlsLocked) {\n                    quickTypeSwitch(subtitle)\n                    hideBarsLater()\n                }\n            }\n            addView(ImageView(this@PlayerActivity).apply {\n                setImageResource(iconRes)\n                setColorFilter(Color.WHITE)\n            }, LinearLayout.LayoutParams(dp(18), dp(18)).apply { marginEnd = dp(5) })\n            addView(TextView(this@PlayerActivity).apply {\n                text = label\n                setTextColor(Color.WHITE)\n                textSize = 11f\n                gravity = Gravity.CENTER\n                typeface = Typeface.DEFAULT_BOLD\n                maxLines = 1\n            })\n        }\n    }\n\n    private fun glassIconButton(iconRes: Int, click: () -> Unit): FrameLayout {\n        val box = FrameLayout(this).apply {\n            background = rounded(Color.TRANSPARENT, dp(18), Color.TRANSPARENT)\n            setOnClickListener {\n                if (!controlsLocked || iconRes == R.drawable.ic_player_unlock) {\n                    click()\n                    hideBarsLater()\n                }\n            }\n        }\n        box.addView(ImageView(this).apply {\n            setImageResource(iconRes)\n            setColorFilter(Color.WHITE)\n        }, FrameLayout.LayoutParams(dp(24), dp(24), Gravity.CENTER))\n        return box\n    }\n\n    private fun circleAction(iconRes: Int, smallLabel: String, click: () -> Unit): FrameLayout {\n        val box = FrameLayout(this).apply {\n            background = rounded(Color.argb(92, 0, 0, 0), dp(999), Color.argb(185, 255, 255, 255))\n            setOnClickListener { click(); hideBarsLater() }\n        }\n        val stack = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL; gravity = Gravity.CENTER }\n        stack.addView(ImageView(this).apply {\n            setImageResource(iconRes)\n            setColorFilter(Color.WHITE)\n        }, LinearLayout.LayoutParams(dp(22), dp(22)))\n        stack.addView(TextView(this).apply {\n            text = smallLabel\n            setTextColor(Color.WHITE)\n            textSize = 10f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n        })\n        box.addView(stack, FrameLayout.LayoutParams(-2, -2, Gravity.CENTER))\n        return box\n    }\n\n    private fun startPlayer(url: String) {\n        releasePlayer()\n        val libOptions = arrayListOf(\n            "--network-caching=1500",\n            "--http-reconnect",\n            "--audio-time-stretch",\n            "--sub-text-scale=$subtitleScale",\n            "--sub-margin=${subtitleMargins[subtitlePositionIndex]}",\n            "--freetype-color=${subtitleColorValues[subtitleColorIndex]}"\n        )\n        val lib = LibVLC(this, libOptions)\n        vlc = lib\n        val mp = MediaPlayer(lib)\n        player = mp\n        mp.attachViews(videoLayout, null, false, false)\n        mp.setEventListener { event ->\n            runOnUiThread {\n                when (event.type) {\n                    MediaPlayer.Event.Playing -> {\n                        playIcon.setImageResource(R.drawable.ic_player_pause)\n                        applyMode()\n                        applySubtitleDelay()\n                        updateLabels()\n                    }\n                    MediaPlayer.Event.Paused -> playIcon.setImageResource(R.drawable.ic_player_play)\n                    MediaPlayer.Event.Stopped -> playIcon.setImageResource(R.drawable.ic_player_play)\n                    MediaPlayer.Event.EndReached -> playNext()\n                    MediaPlayer.Event.EncounteredError -> Toast.makeText(this, "خطا در پخش", Toast.LENGTH_LONG).show()\n                }\n            }\n        }\n        val media = Media(lib, Uri.parse(url))\n        media.setHWDecoderEnabled(hardwareDecoder, false)\n        media.addOption(":input-repeat=0")\n        media.addOption(":http-reconnect=true")\n        mp.media = media\n        media.release()\n        mp.play()\n        if (currentSpeed != 1.0f) {\n            try { mp.setRate(currentSpeed) } catch (_: Throwable) {}\n        }\n        applySubtitleDelay()\n        handler.removeCallbacks(progressRunnable)\n        handler.post(progressRunnable)\n    }\n\n\n    private fun switchTo(index: Int) {\n        if (index !in tracks.indices) return\n        currentIndex = index\n        title = tracks[index].title\n        videoUrl = tracks[index].url\n        updateLabels()\n        refreshTopActions()\n        startPlayer(videoUrl)\n        showHud(currentLabel().ifBlank { "در حال پخش" })\n    }\n\n    private fun refreshTopActions() {\n        // Simple VLC/MX-style top controls stay fixed.\n    }\n\n\n    private fun updateLabels() {\n        titleText.text = title\n        subText.text = currentLabel()\n    }\n\n    private fun currentLabel(): String = tracks.getOrNull(currentIndex)?.let { trackLabel(it) } ?: ""\n\n    private fun trackLabel(t: Track): String {\n        val head = if (t.season > 0 || t.episode > 0) "فصل ${t.season} قسمت ${t.episode} • " else ""\n        val typeFa = when {\n            t.typeFa.isNotBlank() -> t.typeFa\n            isSubtitle(t) -> "زیرنویس"\n            isAudioOnly(t) -> "صوت دوبله"\n            else -> "دوبله"\n        }\n        val base = t.displayLabel.ifBlank { (t.quality.ifBlank { "کیفیت نامشخص" }) + " • " + typeFa }\n        return head + base\n    }\n\n    private fun isSubtitle(t: Track): Boolean {\n        val s = (t.type + " " + t.typeFa + " " + t.displayLabel + " " + t.label + " " + t.url).lowercase(Locale.US)\n        return s.contains("sub") || s.contains("subtitle") || s.contains("زیر")\n    }\n\n    private fun isAudioOnly(t: Track): Boolean = t.isAudio || t.url.lowercase(Locale.US).endsWith(".mka") || t.url.lowercase(Locale.US).endsWith(".mp3")\n\n    private fun showSourceSheet() {\n        if (tracks.isEmpty()) return\n        val scroll = ScrollView(this)\n        val box = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL; setPadding(dp(14), dp(14), dp(14), dp(14)) }\n        scroll.addView(box)\n        var dialog: AlertDialog? = null\n        val isSeries = tracks.any { it.season > 0 || it.episode > 0 }\n        if (isSeries) {\n            tracks.groupBy { it.season }.toSortedMap().forEach { entry ->\n                box.addView(sectionTitle(if (entry.key > 0) "فصل ${entry.key}" else "قسمت\u200cها"))\n                entry.value.groupBy { it.episode }.toSortedMap().forEach { ep ->\n                    box.addView(TextView(this).apply {\n                        text = if (ep.key > 0) "قسمت ${ep.key}" else "لینک\u200cها"\n                        setTextColor(muted)\n                        textSize = 13f\n                        setPadding(0, dp(8), 0, dp(4))\n                    })\n                    val first = ep.value.firstOrNull() ?: return@forEach\n                    val idx = tracks.indexOf(first)\n                    box.addView(sheetButton("${trackLabel(first)}${if (idx == currentIndex) "  ●" else ""}") {\n                        dialog?.dismiss(); switchTo(idx)\n                    }, LinearLayout.LayoutParams(-1, dp(48)).apply { topMargin = dp(4); bottomMargin = dp(4) })\n                }\n            }\n        } else {\n            tracks.forEachIndexed { idx, t ->\n                box.addView(sheetButton("${trackLabel(t)}${if (idx == currentIndex) "  ●" else ""}") {\n                    dialog?.dismiss(); switchTo(idx)\n                }, LinearLayout.LayoutParams(-1, dp(48)).apply { topMargin = dp(4); bottomMargin = dp(4) })\n            }\n        }\n        dialog = dialogOf(scroll)\n        dialog.show()\n    }\n\n    private fun scopedTracks(): List<Track> {\n        val current = tracks.getOrNull(currentIndex)\n        return if (current != null && (current.season > 0 || current.episode > 0)) {\n            tracks.filter { it.season == current.season && it.episode == current.episode }\n        } else tracks.toList()\n    }\n\n    private fun showQualitySheet() {\n        val scoped = scopedTracks().filter { !isAudioOnly(it) }\n        if (scoped.isEmpty()) return\n        val unique = linkedMapOf<String, Track>()\n        scoped.forEach { if (it.quality.isNotBlank() && !unique.containsKey(it.quality)) unique[it.quality] = it }\n        if (unique.isEmpty()) return Toast.makeText(this, "کیفیتی پیدا نشد", Toast.LENGTH_SHORT).show()\n        val box = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL; setPadding(dp(14), dp(14), dp(14), dp(14)) }\n        box.addView(sectionTitle("انتخاب کیفیت"))\n        var dialog: AlertDialog? = null\n        unique.forEach { q, sample ->\n            box.addView(sheetButton(q + if (sample.quality == tracks.getOrNull(currentIndex)?.quality) "  ●" else "") {\n                dialog?.dismiss()\n                val current = tracks.getOrNull(currentIndex)\n                val target = scoped.firstOrNull { it.quality == q && it.type == current?.type } ?: scoped.firstOrNull { it.quality == q }\n                val idx = tracks.indexOf(target)\n                if (idx >= 0) switchTo(idx)\n            }, LinearLayout.LayoutParams(-1, dp(48)).apply { topMargin = dp(5); bottomMargin = dp(5) })\n        }\n        dialog = dialogOf(ScrollView(this).apply { addView(box) })\n        dialog.show()\n    }\n\n    private fun quickTypeSwitch(subtitleOnly: Boolean) {\n        val current = tracks.getOrNull(currentIndex)\n        val scoped = scopedTracks().filter { if (subtitleOnly) isSubtitle(it) else (!isSubtitle(it) && !isAudioOnly(it)) }\n        if (scoped.isEmpty()) {\n            Toast.makeText(this, if (subtitleOnly) "نسخه زیرنویس پیدا نشد" else "نسخه دوبله پیدا نشد", Toast.LENGTH_SHORT).show()\n            return\n        }\n        val preferred = scoped.firstOrNull { it.quality == current?.quality } ?: scoped.firstOrNull()\n        val idx = tracks.indexOf(preferred)\n        if (idx >= 0 && idx != currentIndex) {\n            switchTo(idx)\n        } else {\n            showTypeSheet(subtitleOnly)\n        }\n    }\n\n    private fun showTypeSheet(subtitleOnly: Boolean) {\n        val scoped = scopedTracks().filter { if (subtitleOnly) isSubtitle(it) else (!isSubtitle(it) && !isAudioOnly(it)) }\n        if (scoped.isEmpty()) return Toast.makeText(this, if (subtitleOnly) "نسخه زیرنویس پیدا نشد" else "نسخه دوبله پیدا نشد", Toast.LENGTH_SHORT).show()\n        val box = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL; setPadding(dp(14), dp(14), dp(14), dp(14)) }\n        box.addView(sectionTitle(if (subtitleOnly) "زیرنویس" else "صدا / دوبله"))\n        var dialog: AlertDialog? = null\n        scoped.forEach { t ->\n            val idx = tracks.indexOf(t)\n            box.addView(sheetButton("${t.quality.ifBlank { "نامشخص" }}${if (idx == currentIndex) "  ●" else ""}") {\n                dialog?.dismiss(); if (idx >= 0) switchTo(idx)\n            }, LinearLayout.LayoutParams(-1, dp(48)).apply { topMargin = dp(5); bottomMargin = dp(5) })\n        }\n        dialog = dialogOf(ScrollView(this).apply { addView(box) })\n        dialog.show()\n    }\n\n    private fun showSettingsSheet() {\n        val scroll = ScrollView(this)\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(14), dp(14), dp(14), dp(14))\n            background = rounded(Color.argb(245, 4, 4, 4), dp(22), Color.argb(130, 130, 130, 130))\n        }\n        scroll.addView(box)\n\n        box.addView(sectionTitle("تنظیمات پلیر"))\n        box.addView(settingsMiniLabel("پخش"))\n        box.addView(settingButton("سرعت پخش", speedLabel(), "Long press روی تصویر هم 2X موقت می\u200cکند") { showSpeedSheet() })\n        box.addView(settingButton("ترک صدا", "دوبله / نسخه صوتی", "انتخاب نسخه دوبله یا صدای موجود") { quickTypeSwitch(false) })\n        box.addView(settingButton("Auto Play Next", if (autoPlayNext) "روشن" else "خاموش", "بعد از پایان قسمت، قسمت بعدی پخش شود") {\n            autoPlayNext = !autoPlayNext\n            showHud("Auto Play Next: ${if (autoPlayNext) "روشن" else "خاموش"}")\n        })\n\n        box.addView(settingsMiniLabel("زیرنویس"))\n        box.addView(settingButton("استایل زیرنویس", subtitleStyleLabel(), "تاخیر، اندازه، جایگاه و رنگ برای SoftSub") { showSubtitleStyleSheet() })\n        box.addView(settingButton("نسخه زیرنویس", "انتخاب نسخه", "فقط نسخه\u200cهای زیرنویس از API") { quickTypeSwitch(true) })\n\n        box.addView(settingsMiniLabel("سیستم"))\n        box.addView(settingButton("دیکودر", if (hardwareDecoder) "Hardware" else "Software", "تعویض بین Hardware و Software") {\n            hardwareDecoder = !hardwareDecoder\n            restartKeepingTime("Decoder: ${if (hardwareDecoder) "Hardware" else "Software"}")\n        })\n        box.addView(settingButton("Picture in Picture", "فعال\u200cسازی", "برای اندروید 8 به بالا") { enterPipMode() })\n        box.addView(settingButton("Sleep Timer", if (sleepMinutes > 0) "${sleepMinutes} دقیقه" else "خاموش", "خاموشی خودکار پلیر") { showSleepSheet() })\n        box.addView(settingButton("Lock Controls", if (controlsLocked) "قفل" else "باز", "قفل کردن کنترل\u200cها") { toggleLock() })\n\n        dialogOf(scroll).show()\n    }\n\n    private fun settingsMiniLabel(label: String): TextView {\n        return TextView(this).apply {\n            text = label\n            setTextColor(Color.rgb(220, 220, 220))\n            textSize = 11.5f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.RIGHT\n            setPadding(0, dp(12), 0, dp(6))\n        }\n    }\n\n    private fun settingButton(title: String, value: String, sub: String, click: () -> Unit): LinearLayout {\n        return LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            background = rounded(Color.argb(230, 12, 12, 12), dp(14), Color.argb(120, 95, 95, 95))\n            setPadding(dp(12), dp(10), dp(12), dp(10))\n            setOnClickListener { click() }\n            layoutParams = LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(8) }\n\n            val row = LinearLayout(this@PlayerActivity).apply {\n                orientation = LinearLayout.HORIZONTAL\n                gravity = Gravity.CENTER_VERTICAL\n                layoutDirection = View.LAYOUT_DIRECTION_RTL\n            }\n            row.addView(TextView(this@PlayerActivity).apply {\n                text = title\n                setTextColor(Color.WHITE)\n                textSize = 14f\n                typeface = Typeface.DEFAULT_BOLD\n                gravity = Gravity.RIGHT\n            }, LinearLayout.LayoutParams(0, -2, 1f))\n            row.addView(TextView(this@PlayerActivity).apply {\n                text = value\n                setTextColor(Color.rgb(220, 220, 220))\n                textSize = 12f\n                typeface = Typeface.DEFAULT_BOLD\n                gravity = Gravity.CENTER\n            })\n            addView(row)\n            addView(TextView(this@PlayerActivity).apply {\n                text = sub\n                setTextColor(Color.rgb(160, 160, 160))\n                textSize = 10.5f\n                gravity = Gravity.RIGHT\n                setPadding(0, dp(5), 0, 0)\n            })\n        }\n    }\n\n    private fun showSpeedSheet() {\n        val box = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL; setPadding(dp(14), dp(14), dp(14), dp(14)) }\n        box.addView(sectionTitle("سرعت پخش"))\n        var dialog: AlertDialog? = null\n        listOf(0.5f, 0.75f, 1.0f, 1.25f, 1.5f, 1.75f, 2.0f).forEach { sp ->\n            box.addView(sheetButton((if (sp == 1.0f) "نرمال" else "${sp}x") + if (currentSpeed == sp) "  ●" else "") {\n                currentSpeed = sp\n                try { player?.setRate(sp) } catch (_: Throwable) {}\n                showHud("سرعت پخش: ${speedLabel()}")\n                dialog?.dismiss()\n            }, LinearLayout.LayoutParams(-1, dp(46)).apply { topMargin = dp(4); bottomMargin = dp(4) })\n        }\n        dialog = dialogOf(ScrollView(this).apply { addView(box) })\n        dialog.show()\n    }\n\n    private fun showSubtitleStyleSheet() {\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(14), dp(14), dp(14), dp(14))\n            background = rounded(Color.argb(245, 4, 4, 4), dp(22), Color.argb(130, 130, 130, 130))\n        }\n        box.addView(sectionTitle("تنظیمات حرفه\u200cای زیرنویس SoftSub"))\n\n        box.addView(settingsMiniLabel("تاخیر"))\n        val delayRow = LinearLayout(this).apply { orientation = LinearLayout.HORIZONTAL; layoutDirection = View.LAYOUT_DIRECTION_RTL }\n        delayRow.addView(sheetButton("-0.5s") { subtitleDelayMs -= 500; applySubtitleDelay(); showHud("Subtitle Delay: ${subtitleDelayMs}ms") }, LinearLayout.LayoutParams(0, dp(44), 1f).apply { marginStart = dp(5) })\n        delayRow.addView(sheetButton("+0.5s") { subtitleDelayMs += 500; applySubtitleDelay(); showHud("Subtitle Delay: ${subtitleDelayMs}ms") }, LinearLayout.LayoutParams(0, dp(44), 1f).apply { marginEnd = dp(5) })\n        box.addView(delayRow)\n\n        box.addView(settingsMiniLabel("اندازه و جایگاه"))\n        val sizeRow = LinearLayout(this).apply { orientation = LinearLayout.HORIZONTAL; layoutDirection = View.LAYOUT_DIRECTION_RTL }\n        sizeRow.addView(sheetButton("اندازه +") { subtitleScale = min(170, subtitleScale + 10); restartKeepingTime("اندازه زیرنویس: ${subtitleScale}%") }, LinearLayout.LayoutParams(0, dp(44), 1f).apply { marginStart = dp(5) })\n        sizeRow.addView(sheetButton("اندازه -") { subtitleScale = max(70, subtitleScale - 10); restartKeepingTime("اندازه زیرنویس: ${subtitleScale}%") }, LinearLayout.LayoutParams(0, dp(44), 1f).apply { marginEnd = dp(5) })\n        box.addView(sizeRow, LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(6) })\n        box.addView(sheetButton("جایگاه: ${subtitlePositions[subtitlePositionIndex]}") {\n            subtitlePositionIndex = (subtitlePositionIndex + 1) % subtitlePositions.size\n            restartKeepingTime("جایگاه زیرنویس: ${subtitlePositions[subtitlePositionIndex]}")\n        }, LinearLayout.LayoutParams(-1, dp(44)).apply { bottomMargin = dp(8) })\n\n        box.addView(settingsMiniLabel("رنگ زیرنویس"))\n        val colorGrid = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL }\n        for (i in subtitleColorLabels.indices step 2) {\n            val row = LinearLayout(this).apply { orientation = LinearLayout.HORIZONTAL; layoutDirection = View.LAYOUT_DIRECTION_RTL }\n            row.addView(sheetButton(subtitleColorLabels[i] + if (i == subtitleColorIndex) " ●" else "") {\n                subtitleColorIndex = i\n                restartKeepingTime("رنگ زیرنویس: ${subtitleColorLabels[subtitleColorIndex]}")\n            }, LinearLayout.LayoutParams(0, dp(42), 1f).apply { marginStart = dp(5); bottomMargin = dp(5) })\n            if (i + 1 < subtitleColorLabels.size) {\n                val j = i + 1\n                row.addView(sheetButton(subtitleColorLabels[j] + if (j == subtitleColorIndex) " ●" else "") {\n                    subtitleColorIndex = j\n                    restartKeepingTime("رنگ زیرنویس: ${subtitleColorLabels[subtitleColorIndex]}")\n                }, LinearLayout.LayoutParams(0, dp(42), 1f).apply { marginEnd = dp(5); bottomMargin = dp(5) })\n            }\n            colorGrid.addView(row)\n        }\n        box.addView(colorGrid)\n        dialogOf(ScrollView(this).apply { addView(box) }).show()\n    }\n\n    private fun showSleepSheet() {\n        val box = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL; setPadding(dp(14), dp(14), dp(14), dp(14)) }\n        box.addView(sectionTitle("Sleep Timer"))\n        var dialog: AlertDialog? = null\n        listOf(0 to "خاموش", 15 to "15 دقیقه", 30 to "30 دقیقه", 45 to "45 دقیقه", 60 to "60 دقیقه").forEach { item ->\n            box.addView(sheetButton(item.second + if (sleepMinutes == item.first) "  ●" else "") {\n                setSleepTimer(item.first)\n                dialog?.dismiss()\n            }, LinearLayout.LayoutParams(-1, dp(46)).apply { topMargin = dp(4); bottomMargin = dp(4) })\n        }\n        dialog = dialogOf(ScrollView(this).apply { addView(box) })\n        dialog.show()\n    }\n\n    private fun speedLabel(): String = if (currentSpeed == 1.0f) "نرمال" else "${currentSpeed}x"\n\n    private fun subtitleStyleLabel(): String = "${subtitleColorLabels[subtitleColorIndex]} • ${subtitleScale}% • ${subtitlePositions[subtitlePositionIndex]}"\n\n    private fun applySubtitleDelay() {\n        try { player?.javaClass?.getMethod("setSpuDelay", java.lang.Long.TYPE)?.invoke(player, subtitleDelayMs * 1000L) } catch (_: Throwable) {}\n    }\n\n    private fun restartKeepingTime(message: String) {\n        val pos = player?.time ?: 0L\n        startPlayer(videoUrl)\n        handler.postDelayed({\n            try { player?.time = pos } catch (_: Throwable) {}\n            showHud(message)\n        }, 650)\n    }\n\n    private fun setTemporarySpeed(active: Boolean) {\n        try { player?.setRate(if (active) 2.0f else currentSpeed) } catch (_: Throwable) {}\n        showHud(if (active) "2X" else "سرعت پخش: ${speedLabel()}")\n    }\n\n    private fun enterPipMode() {\n        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {\n            try {\n                enterPictureInPictureMode(PictureInPictureParams.Builder().build())\n            } catch (_: Throwable) {\n                Toast.makeText(this, "Picture in Picture روی این دستگاه فعال نشد", Toast.LENGTH_SHORT).show()\n            }\n        } else {\n            Toast.makeText(this, "Picture in Picture برای اندروید 8 به بالا است", Toast.LENGTH_SHORT).show()\n        }\n    }\n\n    private fun setSleepTimer(minutes: Int) {\n        sleepMinutes = minutes\n        handler.removeCallbacks(sleepRunnable)\n        if (minutes > 0) handler.postDelayed(sleepRunnable, minutes * 60_000L)\n        showHud(if (minutes > 0) "خواب: ${minutes} دقیقه" else "حالت خواب خاموش شد")\n    }\n\n    private fun sectionTitle(label: String): TextView = TextView(this).apply {\n        text = label\n        setTextColor(white)\n        textSize = 17f\n        typeface = Typeface.DEFAULT_BOLD\n        setPadding(0, 0, 0, dp(6))\n    }\n\n    private fun dialogOf(view: View): AlertDialog {\n        return AlertDialog.Builder(this).setView(view).create().also {\n            it.window?.setBackgroundDrawable(ColorDrawable(Color.TRANSPARENT))\n        }\n    }\n\n    private fun sheetButton(label: String, click: () -> Unit): TextView {\n        return TextView(this).apply {\n            text = label\n            setTextColor(white)\n            textSize = 14f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            background = rounded(Color.argb(210, 8, 18, 36), dp(16), Color.argb(180, 55, 104, 188))\n            setOnClickListener { click() }\n        }\n    }\n\n    private fun toggle() {\n        val p = player ?: return\n        if (p.isPlaying) p.pause() else p.play()\n        playIcon.setImageResource(if (p.isPlaying) R.drawable.ic_player_pause else R.drawable.ic_player_play)\n        hideBarsLater()\n    }\n\n    private fun seekBy(delta: Long) {\n        val p = player ?: return\n        val len = p.length\n        p.time = if (len > 0) min(max(p.time + delta, 0L), len) else max(p.time + delta, 0L)\n        updateProgress()\n        hideBarsLater()\n    }\n\n    private fun playNext() {\n        if (!autoPlayNext) {\n            showHud("پخش خودکار قسمت بعد خاموش است")\n            playIcon.setImageResource(R.drawable.ic_player_play)\n            return\n        }\n        if (currentIndex + 1 < tracks.size) switchTo(currentIndex + 1)\n    }\n\n    private fun nextMode() {\n        modeIndex = (modeIndex + 1) % modes.size\n        applyMode()\n        showHud("حالت تصویر: ${modeTitles[modeIndex]}")\n        hideBarsLater()\n    }\n\n    private fun applyMode() {\n        val mp = player ?: return\n        when (modes[modeIndex]) {\n            "FIT" -> { setAspect(mp, null); setScale(mp, 0f) }\n            "CROP" -> { setAspect(mp, null); setScale(mp, 1.2f) }\n            "STRETCH" -> {\n                videoLayout.post {\n                    val w = max(root.width, resources.displayMetrics.widthPixels)\n                    val h = max(root.height, resources.displayMetrics.heightPixels)\n                    setAspect(mp, "$w:$h")\n                    setScale(mp, 0f)\n                }\n            }\n        }\n    }\n\n    private fun toggleLock() {\n        controlsLocked = !controlsLocked\n        updateLockUi()\n        if (controlsLocked) {\n            topBar.visibility = View.GONE\n            bottomBar.visibility = View.GONE\n            centerControls.visibility = View.GONE\n            unlockOverlay.visibility = View.VISIBLE\n            controlsVisible = false\n            showHud("قفل شد")\n        } else {\n            unlockOverlay.visibility = View.GONE\n            showControls()\n            showHud("قفل باز شد")\n        }\n    }\n\n    private fun updateLockUi() {\n        lockIcon.setImageResource(if (controlsLocked) R.drawable.ic_player_unlock else R.drawable.ic_player_lock)\n    }\n\n    private fun showControls() {\n        if (controlsLocked) return\n        controlsVisible = true\n        topBar.visibility = View.VISIBLE\n        bottomBar.visibility = View.VISIBLE\n        centerControls.visibility = View.VISIBLE\n        hideBarsLater()\n    }\n\n    private fun hideControls() {\n        if (controlsLocked) return\n        controlsVisible = false\n        topBar.visibility = View.GONE\n        bottomBar.visibility = View.GONE\n        centerControls.visibility = View.GONE\n    }\n\n    private fun hideBarsLater() {\n        handler.removeCallbacks(hideRunnable)\n        if (!controlsLocked) handler.postDelayed(hideRunnable, 3500)\n    }\n\n    private fun showHud(msg: String) {\n        hudBox.text = msg\n        hudBox.visibility = View.VISIBLE\n        handler.removeCallbacks(hudHideRunnable)\n        handler.postDelayed(hudHideRunnable, 1100)\n    }\n\n    private fun handleVideoTouch(e: MotionEvent): Boolean {\n        if (controlsLocked && e.action != MotionEvent.ACTION_UP) return true\n        when (e.actionMasked) {\n            MotionEvent.ACTION_DOWN -> {\n                touchStartX = e.x\n                touchStartY = e.y\n                touchStartBrightness = currentBrightness\n                touchStartVolume = audioManager.getStreamVolume(android.media.AudioManager.STREAM_MUSIC)\n                gestureMode = 0\n                longPress2x = false\n                handler.removeCallbacks(longPressRunnable)\n                handler.postDelayed(longPressRunnable, 480)\n                return true\n            }\n            MotionEvent.ACTION_MOVE -> {\n                val dx = e.x - touchStartX\n                val dy = e.y - touchStartY\n                if (gestureMode == 0 && abs(dy) > abs(dx) && abs(dy) > dp(18)) {\n                    handler.removeCallbacks(longPressRunnable)\n                    gestureMode = if (touchStartX < root.width / 2f) 1 else 2\n                }\n                if (gestureMode == 1) {\n                    val delta = (touchStartY - e.y) / root.height\n                    currentBrightness = (touchStartBrightness + delta * 1.6f).coerceIn(0.05f, 1f)\n                    val lp = window.attributes\n                    lp.screenBrightness = currentBrightness\n                    window.attributes = lp\n                    showHud("روشنایی ${ (currentBrightness * 100).roundToInt() }٪")\n                    return true\n                } else if (gestureMode == 2) {\n                    val maxVol = audioManager.getStreamMaxVolume(android.media.AudioManager.STREAM_MUSIC)\n                    val delta = ((touchStartY - e.y) / root.height * maxVol).roundToInt()\n                    val vol = (touchStartVolume + delta).coerceIn(0, maxVol)\n                    audioManager.setStreamVolume(android.media.AudioManager.STREAM_MUSIC, vol, 0)\n                    val percent = (vol * 100f / maxVol).roundToInt()\n                    showHud("صدا ${percent}٪")\n                    return true\n                }\n            }\n            MotionEvent.ACTION_UP -> {\n                handler.removeCallbacks(longPressRunnable)\n                if (longPress2x) {\n                    longPress2x = false\n                    setTemporarySpeed(false)\n                    hideBarsLater()\n                    return true\n                }\n                if (controlsLocked) {\n                    unlockOverlay.visibility = View.VISIBLE\n                    return true\n                }\n                if (gestureMode != 0) {\n                    hideBarsLater()\n                    return true\n                }\n                val now = System.currentTimeMillis()\n                if (now - lastTap < 280) {\n                    if (e.x < root.width / 2f) seekBy(-10000) else seekBy(10000)\n                    lastTap = 0L\n                } else {\n                    lastTap = now\n                    handler.postDelayed({\n                        if (System.currentTimeMillis() - lastTap >= 260) {\n                            if (controlsVisible) hideControls() else showControls()\n                        }\n                    }, 270)\n                }\n                return true\n            }\n            MotionEvent.ACTION_CANCEL -> {\n                handler.removeCallbacks(longPressRunnable)\n                if (longPress2x) {\n                    longPress2x = false\n                    setTemporarySpeed(false)\n                }\n            }\n        }\n        return true\n    }\n\n    private fun savePlaybackProgress(force: Boolean = false) {\n        val p = player ?: return\n        if (videoUrl.isBlank()) return\n        val now = System.currentTimeMillis()\n        if (!force && now - lastProgressSaveAt < 8000L) return\n        lastProgressSaveAt = now\n        try {\n            getSharedPreferences("bm_smart_cinema", MODE_PRIVATE).edit()\n                .putLong("progress_$videoUrl", p.time.coerceAtLeast(0L))\n                .apply()\n        } catch (_: Throwable) {}\n    }\n\n    private fun updateProgress() {\n        val p = player ?: return\n        val len = p.length\n        val time = p.time\n        if (len > 0) seek.progress = ((time * 1000L) / len).toInt().coerceIn(0, 1000)\n        currentTimeText.text = fmt(time)\n        totalTimeText.text = if (len > 0) fmt(len) else "--:--"\n        savePlaybackProgress(false)\n    }\n\n    private fun fmt(ms: Long): String {\n        if (ms <= 0) return "00:00"\n        val total = ms / 1000L\n        val h = total / 3600\n        val m = (total % 3600) / 60\n        val s = total % 60\n        return if (h > 0) String.format(Locale.US, "%d:%02d:%02d", h, m, s) else String.format(Locale.US, "%02d:%02d", m, s)\n    }\n\n    private fun setAspect(mp: MediaPlayer, ratio: String?) {\n        try { mp.javaClass.getMethod("setAspectRatio", String::class.java).invoke(mp, ratio) } catch (_: Throwable) {}\n    }\n\n    private fun setScale(mp: MediaPlayer, scale: Float) {\n        try { mp.javaClass.getMethod("setScale", java.lang.Float.TYPE).invoke(mp, scale) } catch (_: Throwable) {}\n    }\n\n    private fun rounded(color: Int, radius: Int, strokeColor: Int): android.graphics.drawable.GradientDrawable {\n        return android.graphics.drawable.GradientDrawable().apply {\n            setColor(color)\n            cornerRadius = radius.toFloat()\n            if (strokeColor != Color.TRANSPARENT) setStroke(dp(1), strokeColor)\n        }\n    }\n\n    private fun enterImmersive() {\n        window.decorView.systemUiVisibility = (\n            View.SYSTEM_UI_FLAG_FULLSCREEN or\n                View.SYSTEM_UI_FLAG_HIDE_NAVIGATION or\n                View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY or\n                View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN or\n                View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION or\n                View.SYSTEM_UI_FLAG_LAYOUT_STABLE\n            )\n        window.statusBarColor = Color.BLACK\n        window.navigationBarColor = Color.BLACK\n    }\n\n    override fun onResume() {\n        super.onResume()\n        enterImmersive()\n    }\n\n    private fun releasePlayer() {\n        try {\n            player?.stop()\n            player?.detachViews()\n            player?.release()\n            vlc?.release()\n        } catch (_: Throwable) {}\n        player = null\n        vlc = null\n    }\n\n    override fun onPause() {\n        savePlaybackProgress(true)\n        super.onPause()\n    }\n\n    override fun onDestroy() {\n        savePlaybackProgress(true)\n        handler.removeCallbacksAndMessages(null)\n        releasePlayer()\n        super.onDestroy()\n    }\n\n    private fun dp(v: Int): Int = (v * resources.displayMetrics.density).roundToInt()\n}\n', encoding="utf-8")


