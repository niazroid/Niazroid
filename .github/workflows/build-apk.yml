      - name: Restore slider and add remote UI controls
        shell: bash
        run: |
          set -euo pipefail

          cat > /tmp/patch_slider_controls.py <<'PY'
          from pathlib import Path
          
          path = Path('project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt')
          source = path.read_text(encoding='utf-8')
          
          # 1) Remote control state model before API fields.
          anchor = '    private var apiBase = "https://bankmoviee.ir/app_api.php"\n'
          insert = '''    private data class RemoteUiState(
                  val visible: Boolean = true,
                  val enabled: Boolean = true,
                  val message: String = ""
              )
          
              private val remoteUiStates = mutableMapOf<String, RemoteUiState>()
              private val remoteHiddenLabels = linkedSetOf<String>()
              private val remoteDisabledLabels = linkedSetOf<String>()
          
          '''
          if anchor not in source:
              raise SystemExit('api field anchor not found')
          source = source.replace(anchor, insert + anchor, 1)
          
          # 2) Helpers before applyAppConfig.
          anchor = '    private fun applyAppConfig(json: JSONObject) {\n'
          helpers = r'''    private fun remoteControlKey(value: String): String {
                  return value.trim().lowercase(Locale.ROOT)
                      .replace('-', '_')
                      .replace(' ', '_')
              }
          
              private fun registerRemoteUiState(id: String, value: Any?) {
                  val key = remoteControlKey(id)
                  if (key.isBlank()) return
          
                  val state = when (value) {
                      is Boolean -> RemoteUiState(visible = value, enabled = value)
                      is String -> {
                          when (value.trim().lowercase(Locale.ROOT)) {
                              "hidden", "hide", "gone", "off" -> RemoteUiState(visible = false, enabled = false)
                              "disabled", "disable", "muted", "locked" -> RemoteUiState(visible = true, enabled = false)
                              else -> RemoteUiState()
                          }
                      }
                      is JSONObject -> {
                          val mode = value.optString("state")
                              .ifBlank { value.optString("mode") }
                              .trim()
                              .lowercase(Locale.ROOT)
                          val defaultVisible = mode !in setOf("hidden", "hide", "gone", "off")
                          val defaultEnabled = mode !in setOf("hidden", "hide", "gone", "off", "disabled", "disable", "muted", "locked")
                          RemoteUiState(
                              visible = value.optBoolean("visible", defaultVisible),
                              enabled = value.optBoolean("enabled", defaultEnabled),
                              message = value.optString("message")
                                  .ifBlank { value.optString("disabled_message") }
                                  .trim()
                          )
                      }
                      else -> RemoteUiState()
                  }
                  remoteUiStates[key] = state
              }
          
              private fun readRemoteStringSet(array: JSONArray?, output: MutableSet<String>) {
                  if (array == null) return
                  for (i in 0 until array.length()) {
                      val value = array.optString(i).trim()
                      if (value.isNotBlank()) output.add(value)
                  }
              }
          
              private fun parseRemoteUiControls(
                  json: JSONObject,
                  archive1Config: JSONObject?,
                  archive2Config: JSONObject?
              ) {
                  remoteUiStates.clear()
                  remoteHiddenLabels.clear()
                  remoteDisabledLabels.clear()
          
                  val controls = json.optJSONObject("ui_controls")
                      ?: json.optJSONObject("button_controls")
                      ?: json.optJSONObject("buttons")
          
                  controls?.keys()?.let { keys ->
                      while (keys.hasNext()) {
                          val key = keys.next()
                          if (key in setOf("hidden", "disabled", "hidden_labels", "disabled_labels")) continue
                          registerRemoteUiState(key, controls.opt(key))
                      }
                  }
          
                  fun registerIds(array: JSONArray?, visible: Boolean, enabled: Boolean) {
                      if (array == null) return
                      for (i in 0 until array.length()) {
                          val id = array.optString(i).trim()
                          if (id.isNotBlank()) remoteUiStates[remoteControlKey(id)] = RemoteUiState(visible, enabled)
                      }
                  }
          
                  registerIds(controls?.optJSONArray("hidden"), visible = false, enabled = false)
                  registerIds(controls?.optJSONArray("disabled"), visible = true, enabled = false)
                  readRemoteStringSet(controls?.optJSONArray("hidden_labels"), remoteHiddenLabels)
                  readRemoteStringSet(controls?.optJSONArray("disabled_labels"), remoteDisabledLabels)
                  readRemoteStringSet(json.optJSONArray("hidden_button_labels"), remoteHiddenLabels)
                  readRemoteStringSet(json.optJSONArray("disabled_button_labels"), remoteDisabledLabels)
          
                  archive1Config?.let { registerRemoteUiState("archive_1", it) }
                  archive2Config?.let { registerRemoteUiState("archive_2", it) }
          
                  json.optJSONObject("slider")?.let { registerRemoteUiState("slider", it) }
                  if (json.has("slider_enabled")) {
                      val enabled = json.optBoolean("slider_enabled", true)
                      registerRemoteUiState("slider", JSONObject().put("visible", enabled).put("enabled", enabled))
                  }
          
                  val selectedId = "archive_${if (selectedArchive == 2) 2 else 1}"
                  val otherArchive = if (selectedArchive == 2) 1 else 2
                  if ((!remoteUiVisible(selectedId) || !remoteUiEnabled(selectedId)) && remoteArchiveUsable(otherArchive)) {
                      selectedArchive = otherArchive
                      appPrefs().edit().putInt("selected_archive", selectedArchive).apply()
                  }
              }
          
              private fun remoteUiState(id: String): RemoteUiState {
                  return remoteUiStates[remoteControlKey(id)] ?: RemoteUiState()
              }
          
              private fun remoteUiVisible(id: String): Boolean = remoteUiState(id).visible
              private fun remoteUiEnabled(id: String): Boolean = remoteUiState(id).enabled
              private fun remoteUiMessage(id: String): String = remoteUiState(id).message
              private fun remoteArchiveUsable(archive: Int): Boolean {
                  val id = "archive_${if (archive == 2) 2 else 1}"
                  return remoteUiVisible(id) && remoteUiEnabled(id)
              }
          
              private fun remoteDisabledMessage(id: String, fallback: String): String {
                  return remoteUiMessage(id).ifBlank { fallback }
              }
          
              private fun applyRemoteControl(view: View, id: String, label: String = "") {
                  val state = remoteUiState(id)
                  view.tag = "remote:${remoteControlKey(id)}"
                  if (!state.visible) {
                      view.visibility = View.GONE
                      return
                  }
                  view.visibility = View.VISIBLE
                  if (!state.enabled) {
                      view.alpha = 0.30f
                      view.isFocusable = false
                      view.isEnabled = true
                      view.isClickable = true
                      view.setOnClickListener {
                          Toast.makeText(
                              this,
                              state.message.ifBlank {
                                  t(
                                      if (label.isBlank()) "این بخش موقتاً غیرفعال است" else "$label موقتاً غیرفعال است",
                                      if (label.isBlank()) "This section is temporarily disabled" else "$label is temporarily disabled"
                                  )
                              },
                              Toast.LENGTH_LONG
                          ).show()
                      }
                  }
              }
          
              private fun normalizedRemoteLabel(value: String): String {
                  return value.trim().replace("✓", "").replace(Regex("\\s+"), " ").lowercase(Locale.ROOT)
              }
          
              private fun labelMatchesRemoteSet(label: String, values: Set<String>): Boolean {
                  val normalized = normalizedRemoteLabel(label)
                  return values.any { configured ->
                      val candidate = normalizedRemoteLabel(configured)
                      candidate.isNotBlank() && (normalized == candidate || normalized.contains(candidate))
                  }
              }
          
              private fun clickableRemoteTarget(start: View): View {
                  var current: View = start
                  var parent = current.parent
                  repeat(5) {
                      if (current.hasOnClickListeners()) return current
                      if (parent !is View) return current
                      current = parent as View
                      parent = current.parent
                  }
                  return current
              }
          
              private fun applyRemoteUiControls(view: View) {
                  val tagValue = view.tag as? String
                  if (tagValue != null && tagValue.startsWith("remote:")) {
                      applyRemoteControl(view, tagValue.removePrefix("remote:"))
                  }
          
                  if (view is TextView) {
                      val label = view.text?.toString().orEmpty()
                      if (labelMatchesRemoteSet(label, remoteHiddenLabels)) {
                          clickableRemoteTarget(view).visibility = View.GONE
                      } else if (labelMatchesRemoteSet(label, remoteDisabledLabels)) {
                          val target = clickableRemoteTarget(view)
                          target.alpha = 0.30f
                          target.isFocusable = false
                          target.isEnabled = false
                          target.isClickable = false
                      }
                  }
          
                  if (view is ViewGroup) {
                      for (i in 0 until view.childCount) applyRemoteUiControls(view.getChildAt(i))
                  }
              }
          
              private fun scheduleRemoteUiControls() {
                  if (!::content.isInitialized) return
                  listOf(0L, 180L, 750L, 1600L).forEach { delay ->
                      uiHandler.postDelayed({
                          if (::content.isInitialized) applyRemoteUiControls(content)
                          if (::bottomNav.isInitialized) applyRemoteUiControls(bottomNav)
                      }, delay)
                  }
              }
          
          '''
