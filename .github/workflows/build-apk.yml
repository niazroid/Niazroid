      - name: Force first build to ARM64 and V7A only
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("project/app/build.gradle")
          source = path.read_text(encoding="utf-8")

          source = re.sub(
              r'\n\s*ndk\s*\{\s*abiFilters[^\n]*\n\s*\}',
              '',
              source,
              count=1,
              flags=re.MULTILINE,
          )

          marker = '        versionName "1.9"\n'
          replacement = (
              '        versionName "1.9"\n'
              '        ndk {\n'
              '            abiFilters "armeabi-v7a", "arm64-v8a"\n'
              '        }\n'
          )
          if marker not in source:
              raise SystemExit("Could not find versionName insertion point")
          source = source.replace(marker, replacement, 1)

          source, changed = re.subn(
              r'include\s+[^\n]+',
              'include "armeabi-v7a", "arm64-v8a"',
              source,
              count=1,
          )
          if changed != 1:
              raise SystemExit("Could not set two-ABI split list")

          source, changed = re.subn(
              r'universalApk\s+(?:false|true)',
              'universalApk true',
              source,
              count=1,
          )
          if changed != 1:
              raise SystemExit("Could not enable universal APK")

          path.write_text(source, encoding="utf-8")
          PY
          grep -Fq 'abiFilters "armeabi-v7a", "arm64-v8a"' project/app/build.gradle
          grep -Fq 'include "armeabi-v7a", "arm64-v8a"' project/app/build.gradle

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          echo "sdk.dir=$ANDROID_HOME" > project/local.properties

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build and verify four APKs
        working-directory: project
        shell: bash
        run: |
          set -uo pipefail
          rm -rf app/build publish
          mkdir -p publish/arm64 publish/v7a publish/universal-lite publish/universal-full

          print_real_error() {
            local log_file="$1"
            local exit_code="$2"
            echo ""
            echo "================ KOTLIN COMPILER ERRORS ================"
            grep -E '(^e: |^w: |\.kt:[0-9]+:[0-9]+|\.kt \([0-9]+,[0-9]+\)|Unresolved reference|Type mismatch|Overload resolution ambiguity|Cannot infer|No value passed|Too many arguments|Unsupported escape|Expecting)' "$log_file" | tail -n 260 || true
            echo "==================== REAL ERROR ========================="
            grep -Ei 'FAILURE:|What went wrong:|Execution failed|error:|Exception|Caused by:' "$log_file" | tail -n 200 || true
            echo "-------------------- LAST LOG LINES ---------------------"
            tail -n 140 "$log_file" || true
            echo "========================================================="
            exit "$exit_code"
          }

          build_release() {
            local log_file="$1"
            local mode="$2"
            rm -rf app/build
            set +e
            if [ "$mode" = "append" ]; then
              gradle :app:assembleRelease --no-daemon --max-workers=1 --stacktrace --console=plain 2>&1 | tee -a "$log_file"
            else
              gradle :app:assembleRelease --no-daemon --max-workers=1 --stacktrace --console=plain 2>&1 | tee "$log_file"
            fi
            local status=${PIPESTATUS[0]}
            set -e
            if [ "$status" -ne 0 ]; then
              print_real_error "$log_file" "$status"
            fi
          }

          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          EXPECTED_SHA256="862bc358d8d239a2134a63fab979ff6019862372e7950ea49bac74780936205d"

          verify_apk() {
            local apk="$1"
            local label="$2"
            local expected_mode="$3"
            local badging="apk-badging-${label}.txt"
            local signing="apk-signature-${label}.txt"

            "$AAPT" dump badging "$apk" > "$badging"
            grep -Fq "versionName='1.9'" "$badging" || { echo "$label versionName is not 1.9"; grep -m1 '^package:' "$badging" || true; exit 1; }
            grep -Fq "package: name='ir.bankmoviee.app'" "$badging" || { echo "$label package is wrong"; exit 1; }
            VERSION_CODE="$(sed -n "s/.*versionCode='\([0-9][0-9]*\)'.*/\1/p" "$badging" | head -n1)"
            if [ -z "$VERSION_CODE" ] || [ "$VERSION_CODE" -lt 3400001 ]; then
              echo "$label versionCode is not high enough for V19 in-place update: ${VERSION_CODE:-missing}"
              exit 1
            fi

            local native_line
            native_line="$(grep -m1 '^native-code:' "$badging" || true)"
            case "$expected_mode" in
              arm64)
                printf '%s' "$native_line" | grep -Fq "'arm64-v8a'" || { echo "ARM64 ABI missing"; exit 1; }
                printf '%s' "$native_line" | grep -Eq "armeabi-v7a|x86" && { echo "ARM64 APK contains unwanted ABI: $native_line"; exit 1; } || true
                ;;
              v7a)
                printf '%s' "$native_line" | grep -Fq "'armeabi-v7a'" || { echo "V7A ABI missing"; exit 1; }
                printf '%s' "$native_line" | grep -Eq "arm64-v8a|x86" && { echo "V7A APK contains unwanted ABI: $native_line"; exit 1; } || true
                ;;
              lite-universal)
                printf '%s' "$native_line" | grep -Fq "'arm64-v8a'" || { echo "Lite Universal arm64 missing"; exit 1; }
                printf '%s' "$native_line" | grep -Fq "'armeabi-v7a'" || { echo "Lite Universal v7a missing"; exit 1; }
                printf '%s' "$native_line" | grep -Eq "'x86'|'x86_64'" && { echo "Lite Universal contains x86: $native_line"; exit 1; } || true
                ;;
              full-universal)
                for abi in arm64-v8a armeabi-v7a x86 x86_64; do
                  printf '%s' "$native_line" | grep -Fq "'$abi'" || { echo "Full Universal missing $abi: $native_line"; exit 1; }
                done
                ;;
            esac

            set +e
            "$APKSIGNER" verify --verbose --print-certs "$apk" > "$signing" 2>&1
            local sign_status=$?
            set -e
            [ "$sign_status" -eq 0 ] || { cat "$signing"; exit "$sign_status"; }

            local actual_sha256
            actual_sha256="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' "$signing" | head -n1 | tr '[:upper:]' '[:lower:]' | tr -d ':[:space:]')"
            [ "$actual_sha256" = "$EXPECTED_SHA256" ] || { echo "$label signer mismatch: $actual_sha256"; exit 1; }

            echo "$label verified:"
            grep -m1 '^package:' "$badging"
            grep -m1 '^native-code:' "$badging" || true
            grep -E '^Signer #1 certificate (DN|SHA-256 digest):' "$signing" || true
          }

          echo "========== BUILD 1: ARM64 + V7A + LITE UNIVERSAL =========="
          build_release "build.log" "new"

          OUT="app/build/outputs/apk/release"
          ARM64="$(find "$OUT" -maxdepth 1 -type f -name '*arm64-v8a*release*.apk' | head -n1)"
          V7A="$(find "$OUT" -maxdepth 1 -type f -name '*armeabi-v7a*release*.apk' | head -n1)"
          LITE_UNIVERSAL="$(find "$OUT" -maxdepth 1 -type f -name '*universal*release*.apk' | head -n1)"
          [ -n "$ARM64" ] && [ -n "$V7A" ] && [ -n "$LITE_UNIVERSAL" ] || { find "$OUT" -maxdepth 1 -type f -name '*.apk' -print || true; exit 1; }

          verify_apk "$ARM64" "arm64" "arm64"
          verify_apk "$V7A" "v7a" "v7a"
          verify_apk "$LITE_UNIVERSAL" "universal-lite" "lite-universal"

          cp "$ARM64" "publish/arm64/Bankmovie-v1.9-v19-hotfix-arm64-v8a-build-${GITHUB_RUN_NUMBER}.apk"
          cp "$V7A" "publish/v7a/Bankmovie-v1.9-v19-hotfix-armeabi-v7a-build-${GITHUB_RUN_NUMBER}.apk"
          cp "$LITE_UNIVERSAL" "publish/universal-lite/Bankmovie-v1.9-v19-hotfix-universal-lite-2abi-build-${GITHUB_RUN_NUMBER}.apk"

          echo "========== BUILD 2: FULL UNIVERSAL 4 ABI =========="
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("app/build.gradle")
          source = path.read_text(encoding="utf-8")
          source, split_changed = re.subn(
              r'include\s+"armeabi-v7a",\s*"arm64-v8a"',
              'include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"',
              source,
              count=1,
          )
          source, filter_changed = re.subn(
              r'abiFilters\s+"armeabi-v7a",\s*"arm64-v8a"',
              'abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"',
              source,
              count=1,
          )
          if split_changed != 1 or filter_changed != 1:
              raise SystemExit(f"Could not enable four ABIs: split={split_changed}, filter={filter_changed}")
          path.write_text(source, encoding="utf-8")
          PY

          grep -Fq 'include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"' app/build.gradle
          grep -Fq 'abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"' app/build.gradle
          build_release "build.log" "append"

          OUT="app/build/outputs/apk/release"
          FULL_UNIVERSAL="$(find "$OUT" -maxdepth 1 -type f -name '*universal*release*.apk' | head -n1)"
          [ -n "$FULL_UNIVERSAL" ] || { find "$OUT" -maxdepth 1 -type f -name '*.apk' -print || true; exit 1; }
          verify_apk "$FULL_UNIVERSAL" "universal-full" "full-universal"
          cp "$FULL_UNIVERSAL" "publish/universal-full/Bankmovie-v1.9-v19-hotfix-universal-full-4abi-build-${GITHUB_RUN_NUMBER}.apk"

          for dir in arm64 v7a universal-lite universal-full; do
            sha256sum "publish/$dir"/*.apk > "publish/$dir/SHA256.txt"
          done

          echo "================ APK SIZES ================"
          for apk in publish/*/*.apk; do
            bytes=$(stat -c%s "$apk")
            mib=$(awk -v b="$bytes" 'BEGIN { printf "%.1f", b/1048576 }')
            echo "$(basename "$apk"): ${mib} MiB"
          done
          echo "==========================================="

      - name: Upload diagnostic build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.9-V19-Hotfix-Build-Log-${{ github.run_number }}
          path: project/build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.9-V19-Hotfix-ARM64-${{ github.run_number }}
          path: project/publish/arm64/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload V7A APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.9-V19-Hotfix-V7A-${{ github.run_number }}
          path: project/publish/v7a/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload Lite Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.9-V19-Hotfix-Universal-Lite-2ABI-${{ github.run_number }}
          path: project/publish/universal-lite/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload Full Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.9-V19-Hotfix-Universal-Full-4ABI-${{ github.run_number }}
          path: project/publish/universal-full/*
          if-no-files-found: error
          retention-days: 14
