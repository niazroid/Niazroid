          downloads = downloads.replace(
          '''            if (item.optString("storage_mode") == InternalDownloadStore.STORAGE_TREE && documentRaw.isNotBlank()) {''',
          '''            if (item.optString("storage_mode") in listOf(InternalDownloadStore.STORAGE_TREE, InternalDownloadStore.STORAGE_MEDIA) && documentRaw.isNotBlank()) {''',1)
          # Add translation helpers before dp().
          insert_anchor = '    private fun dp(value: Int): Int = (value * resources.displayMetrics.density).toInt()\n'
          helper = r'''    private fun isFa(): Boolean = (getSharedPreferences("bm_smart_cinema", MODE_PRIVATE).getString("lang_code", "fa") ?: "fa") != "en"
          
              private fun ui(raw: String): String {
                  if (isFa()) return raw
                  val exact = mapOf(
                      "دانلودهای من" to "My Downloads",
                      "دانلودر اختصاصی بانک مووی • توقف و ادامه واقعی" to "Bankmovie downloader • real pause and resume",
