              }
          '''
          assert old in service, 'service openTarget block not found'
          service = service.replace(old,new,1)
          needle = '''            target.sync()
                      updateItem(id, InternalDownloadStore.STATUS_COMPLETED, downloaded, if (total > 0L) total else downloaded, 0L, "")
          '''
