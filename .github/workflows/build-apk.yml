name: Build BankMoviee Home Step 1 Blue Fix

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    name: Build API First Blue Native APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find and unzip project ZIP
        id: unzip
        shell: bash
        run: |
          echo "Files in repository root:"
          ls -la

          ZIP_FILE="$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)"

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            echo "Upload the project ZIP in the main Code page."
            exit 1
          fi

          echo "Using ZIP file: $ZIP_FILE"

          rm -rf project
          mkdir project
          unzip -q "$ZIP_FILE" -d project

          SETTINGS_FILE="$(find project -maxdepth 5 -type f -name "settings.gradle" | head -n 1)"

          if [ -z "$SETTINGS_FILE" ]; then
            echo "Could not find settings.gradle after unzip."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          echo "Android project directory: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Patch BankMoviee Home Step 1 Blue Fix
        shell: bash
        env:
          PROJECT_DIR: ${{ steps.unzip.outputs.project_dir }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os, re
          project = Path(os.environ["PROJECT_DIR"])

          gradle_props = project / "gradle.properties"
          existing = gradle_props.read_text(encoding="utf-8") if gradle_props.exists() else ""
          props = {}
          for line in existing.splitlines():
              if "=" in line and not line.strip().startswith("#"):
                  k, v = line.split("=", 1)
                  props[k.strip()] = v.strip()
          props["android.useAndroidX"] = "true"
          props["android.enableJetifier"] = "true"
          merged, seen = [], set()
          for line in existing.splitlines():
              if "=" in line and not line.strip().startswith("#"):
                  k = line.split("=", 1)[0].strip()
                  if k in props:
                      merged.append(f"{k}={props[k]}")
                      seen.add(k)
                  else:
                      merged.append(line)
              else:
                  merged.append(line)
          for k, v in props.items():
              if k not in seen:
                  merged.append(f"{k}={v}")
          gradle_props.write_text("\n".join(merged).strip() + "\n", encoding="utf-8")

          app_gradle = project / "app" / "build.gradle"
          if app_gradle.exists():
              text = app_gradle.read_text(encoding="utf-8")
              text = re.sub(r"\n\s*splits\s*\{\s*abi\s*\{.*?\n\s*\}\s*\}\s*", "\n", text, flags=re.S)
              text = re.sub(r"\n\s*ndk\s*\{\s*abiFilters[^\n]*\n\s*\}\s*", "\n", text, flags=re.S)
              text = re.sub(r"\n\s*abiFilters[^\n]*", "\n", text, flags=re.S)
              if "BANKMOVIE_API_FIRST_BLUE_NATIVE" not in text:
                  text += """
          android {
              // BANKMOVIE_API_FIRST_BLUE_NATIVE
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          """
              app_gradle.write_text(text, encoding="utf-8")

          manifest = project / "app" / "src" / "main" / "AndroidManifest.xml"
          if manifest.exists():
              text = manifest.read_text(encoding="utf-8")
              if "android.permission.INTERNET" not in text:
                  text = text.replace("<application", '<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <application', 1)
              if ".PlayerActivity" not in text:
                  text = text.replace("</application>", '        <activity android:name=".PlayerActivity" android:screenOrientation="fullSensor" android:configChanges="orientation|screenSize|keyboardHidden" />\n    </application>', 1)
              text = text.replace('android:screenOrientation="sensorLandscape"', 'android:screenOrientation="fullSensor"')
              text = text.replace('android:screenOrientation="landscape"', 'android:screenOrientation="fullSensor"')
              manifest.write_text(text, encoding="utf-8")

          java_dir = project / "app" / "src" / "main" / "java"
          main_files = list(java_dir.rglob("MainActivity.kt"))
          if not main_files:
              main_files = [java_dir / "ir" / "bankmoviee" / "app" / "MainActivity.kt"]
          main_file = main_files[0]
          main_file.parent.mkdir(parents=True, exist_ok=True)
          player_file = main_file.parent / "PlayerActivity.kt"
          main_file.write_text('package ir.bankmoviee.app\n\nimport android.app.Activity\nimport android.app.AlertDialog\nimport android.content.Intent\nimport android.graphics.Bitmap\nimport android.graphics.BitmapFactory\nimport android.graphics.Color\nimport android.graphics.Typeface\nimport android.graphics.drawable.GradientDrawable\nimport android.os.Bundle\nimport android.text.TextUtils\nimport android.view.Gravity\nimport android.view.View\nimport android.view.ViewGroup\nimport android.view.Window\nimport android.widget.Button\nimport android.widget.EditText\nimport android.widget.FrameLayout\nimport android.widget.GridLayout\nimport android.widget.HorizontalScrollView\nimport android.widget.ImageView\nimport android.widget.LinearLayout\nimport android.widget.ScrollView\nimport android.widget.TextView\nimport android.widget.Toast\nimport org.json.JSONArray\nimport org.json.JSONObject\nimport java.net.HttpURLConnection\nimport java.net.URL\nimport java.net.URLEncoder\nimport java.util.LinkedHashMap\nimport java.util.Locale\nimport kotlin.math.roundToInt\n\nclass MainActivity : Activity() {\n\n    private val apiBase = "https://bankmoviee.ir/app_api.php"\n\n    private val bg = Color.rgb(9, 13, 23)\n    private val bg2 = Color.rgb(13, 18, 32)\n    private val card = Color.rgb(22, 28, 43)\n    private val card2 = Color.rgb(30, 39, 58)\n    private val blue = Color.rgb(0, 122, 255)\n    private val blueSoft = Color.rgb(35, 160, 255)\n    private val cyan = Color.rgb(0, 210, 255)\n    private val text = Color.WHITE\n    private val muted = Color.rgb(167, 178, 198)\n    private val faint = Color.rgb(91, 106, 132)\n\n    private lateinit var root: LinearLayout\n    private lateinit var topBar: LinearLayout\n    private lateinit var titleBar: TextView\n    private lateinit var content: FrameLayout\n    private lateinit var bottomNav: LinearLayout\n    private var currentScreen = "home"\n    private var heroItem: JSONObject? = null\n    private val imageCache = LinkedHashMap<String, Bitmap>()\n\n    override fun onCreate(savedInstanceState: Bundle?) {\n        super.onCreate(savedInstanceState)\n        requestWindowFeature(Window.FEATURE_NO_TITLE)\n        window.statusBarColor = bg\n        window.navigationBarColor = bg\n        buildShell()\n        showHome()\n    }\n\n    private fun buildShell() {\n        root = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setBackgroundColor(bg)\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n\n        topBar = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            setPadding(dp(14), dp(10), dp(14), dp(6))\n            background = gradient(intArrayOf(bg, Color.rgb(13, 18, 31)), dp(0), 0)\n        }\n\n        val menu = capsuleText("منو", false)\n        menu.setOnClickListener { showMenuDialog() }\n\n        titleBar = TextView(this).apply {\n            text = "بانک مووی"\n            setTextColor(Color.WHITE)\n            textSize = 21f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            layoutParams = LinearLayout.LayoutParams(0, dp(54), 1f)\n        }\n\n        val search = capsuleText("جستجو", false)\n        search.setOnClickListener { showSearch() }\n\n        topBar.addView(menu, LinearLayout.LayoutParams(dp(76), dp(44)))\n        topBar.addView(titleBar)\n        topBar.addView(search, LinearLayout.LayoutParams(dp(82), dp(44)))\n\n        content = FrameLayout(this).apply {\n            layoutParams = LinearLayout.LayoutParams(-1, 0, 1f)\n        }\n\n        bottomNav = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n            setPadding(dp(12), dp(8), dp(12), dp(12))\n            background = glassNavBg()\n            layoutParams = LinearLayout.LayoutParams(-1, dp(82))\n        }\n\n        root.addView(topBar, LinearLayout.LayoutParams(-1, dp(70)))\n        root.addView(content)\n        root.addView(bottomNav)\n        setContentView(root)\n        buildBottomNav()\n    }\n\n    private fun buildBottomNav() {\n        bottomNav.removeAllViews()\n        navItem("خانه", "home") { showHome() }\n        navItem("فیلم", "movies") { showList("فیلم\u200cهای جدید", 3, "new_movies", "movie") }\n        navItem("سریال", "series") { showList("سریال\u200cهای جدید", 3, "new_series", "series") }\n        navItem("جستجو", "search") { showSearch() }\n    }\n\n    private fun navItem(label: String, key: String, click: () -> Unit) {\n        val selected = currentScreen == key\n        val item = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.CENTER\n            background = if (selected) gradient(intArrayOf(blue, Color.rgb(0, 70, 180)), dp(26), dp(1), Color.argb(120, 140, 210, 255)) else null\n            setOnClickListener { click() }\n        }\n        item.addView(TextView(this).apply {\n            text = label\n            textSize = 13f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            setTextColor(if (selected) Color.WHITE else muted)\n        }, LinearLayout.LayoutParams(-1, -2))\n        bottomNav.addView(item, LinearLayout.LayoutParams(0, dp(54), 1f).apply {\n            marginStart = dp(4)\n            marginEnd = dp(4)\n        })\n    }\n\n    private fun clear(title: String) {\n        titleBar.text = title\n        content.removeAllViews()\n    }\n\n    private fun showHome() {\n        currentScreen = "home"\n        buildBottomNav()\n        clear("بانک مووی")\n\n        val scroll = ScrollView(this)\n        val page = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(14), dp(6), dp(14), dp(28))\n        }\n        scroll.addView(page)\n        content.addView(scroll)\n\n        val hero = heroShell(null)\n        page.addView(hero)\n\n        addChips(page)\n        addSection(page, "سریال\u200cهای بروز شده", 3, "updated_series")\n        addSection(page, "فیلم\u200cهای جدید", 3, "new_movies")\n        addSection(page, "آرشیو ۱", 1, "new_movies")\n        addSection(page, "انیمه", 3, "new_anime")\n    }\n\n    private fun addChips(parent: LinearLayout) {\n        val hsv = HorizontalScrollView(this).apply { isHorizontalScrollBarEnabled = false }\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            gravity = Gravity.CENTER_VERTICAL\n        }\n        hsv.addView(row)\n        listOf(\n            Triple("همه", 0, ""),\n            Triple("فیلم", 3, "new_movies"),\n            Triple("سریال", 3, "new_series"),\n            Triple("آرشیو ۱", 1, "new_movies"),\n            Triple("آرشیو ۳", 3, "new_movies")\n        ).forEachIndexed { index, t ->\n            val chip = capsuleText(t.first, index == 0)\n            chip.setOnClickListener {\n                if (t.second == 0) showHome() else showList(t.first, t.second, t.third, "")\n            }\n            row.addView(chip, LinearLayout.LayoutParams(-2, dp(44)).apply {\n                marginStart = dp(6)\n                marginEnd = dp(6)\n            })\n        }\n        parent.addView(hsv, LinearLayout.LayoutParams(-1, dp(54)).apply { bottomMargin = dp(10) })\n    }\n\n    private fun addSection(parent: LinearLayout, title: String, archive: Int, section: String) {\n        val box = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            layoutParams = LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(24) }\n        }\n        box.addView(sectionHeader(title) { showList(title, archive, section, "") })\n\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        val scroller = HorizontalScrollView(this).apply {\n            isHorizontalScrollBarEnabled = false\n            addView(row)\n        }\n        box.addView(scroller)\n        parent.addView(box)\n\n        fetch("$apiBase?action=section&archive=$archive&section=$section&page=1") { ok, json, err ->\n            runOnUiThread {\n                if (!ok || json == null) {\n                    row.addView(errorView(err ?: "خطا در دریافت اطلاعات"))\n                    return@runOnUiThread\n                }\n                val items = json.optJSONArray("items") ?: JSONArray()\n                if (heroItem == null && items.length() > 0) {\n                    heroItem = items.optJSONObject(0)\n                    val idx = parent.indexOfChild(parent.getChildAt(0))\n                    if (idx >= 0) {\n                        parent.removeViewAt(0)\n                        parent.addView(heroShell(heroItem), 0)\n                    }\n                }\n                for (i in 0 until minOf(items.length(), 12)) {\n                    items.optJSONObject(i)?.let { row.addView(mediaCard(it, dp(140), dp(266))) }\n                }\n            }\n        }\n    }\n\n    private fun heroShell(item: JSONObject?): View {\n        val h = FrameLayout(this).apply {\n            background = gradient(intArrayOf(Color.rgb(23, 36, 58), Color.rgb(8, 12, 22)), dp(30), dp(1), Color.rgb(36, 60, 92))\n            layoutParams = LinearLayout.LayoutParams(-1, dp(230)).apply { bottomMargin = dp(18) }\n        }\n\n        val bgImage = ImageView(this).apply {\n            scaleType = ImageView.ScaleType.CENTER_CROP\n            alpha = 0.35f\n        }\n        h.addView(bgImage, FrameLayout.LayoutParams(-1, -1))\n        item?.optString("poster")?.let { loadImage(it, bgImage) }\n\n        val shade = View(this).apply {\n            background = gradient(intArrayOf(Color.argb(20, 0, 0, 0), Color.argb(230, 9, 13, 23)), dp(30), 0)\n        }\n        h.addView(shade, FrameLayout.LayoutParams(-1, -1))\n\n        val inner = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.BOTTOM or Gravity.RIGHT\n            setPadding(dp(18), dp(18), dp(18), dp(20))\n        }\n        val title = item?.optString("title_fa")?.ifBlank { item.optString("title") } ?: "BankMoviee Native"\n        inner.addView(TextView(this).apply {\n            text = title\n            setTextColor(Color.WHITE)\n            textSize = 25f\n            typeface = Typeface.DEFAULT_BOLD\n            maxLines = 1\n            ellipsize = TextUtils.TruncateAt.END\n        })\n        inner.addView(TextView(this).apply {\n            text = item?.optString("update_note")?.ifBlank { "اپ اختصاصی بانک مووی با API و پلیر Native" } ?: "اپ اختصاصی بانک مووی با API و پلیر Native"\n            setTextColor(Color.rgb(215, 228, 245))\n            textSize = 13f\n            maxLines = 2\n            ellipsize = TextUtils.TruncateAt.END\n            setPadding(0, dp(8), 0, dp(14))\n        })\n\n        val btn = Button(this).apply {\n            text = "تماشا کنید"\n            setTextColor(Color.WHITE)\n            textSize = 15f\n            typeface = Typeface.DEFAULT_BOLD\n            background = gradient(intArrayOf(blueSoft, blue), dp(24), 0)\n            setOnClickListener { item?.let { showDetail(it) } ?: showList("فیلم\u200cهای جدید", 3, "new_movies", "movie") }\n        }\n        inner.addView(btn, LinearLayout.LayoutParams(dp(156), dp(50)))\n        h.addView(inner, FrameLayout.LayoutParams(-1, -1))\n        return h\n    }\n\n    private fun sectionHeader(label: String, more: (() -> Unit)?): LinearLayout {\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            setPadding(0, dp(3), 0, dp(12))\n        }\n        row.addView(TextView(this).apply {\n            text = label\n            setTextColor(Color.WHITE)\n            textSize = 19f\n            typeface = Typeface.DEFAULT_BOLD\n        }, LinearLayout.LayoutParams(0, -2, 1f))\n        if (more != null) {\n            row.addView(TextView(this).apply {\n                text = "مشاهده همه"\n                setTextColor(muted)\n                textSize = 12f\n                gravity = Gravity.CENTER\n                background = rounded(Color.rgb(19, 25, 38), dp(16), Color.rgb(38, 49, 70))\n                setPadding(dp(12), dp(6), dp(12), dp(6))\n                setOnClickListener { more() }\n            })\n        }\n        return row\n    }\n\n    private fun showList(title: String, archive: Int, section: String, type: String) {\n        currentScreen = if (section.contains("series")) "series" else "movies"\n        buildBottomNav()\n        clear(title)\n\n        val scroll = ScrollView(this)\n        val page = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(14), dp(8), dp(14), dp(28))\n        }\n        scroll.addView(page)\n        content.addView(scroll)\n\n        page.addView(filtersBar())\n        val grid = GridLayout(this).apply { columnCount = 3 }\n        page.addView(grid)\n\n        fetch("$apiBase?action=section&archive=$archive&section=$section&page=1") { ok, json, err ->\n            runOnUiThread {\n                if (!ok || json == null) {\n                    page.addView(errorView(err ?: "خطا در دریافت اطلاعات"))\n                    return@runOnUiThread\n                }\n                val items = json.optJSONArray("items") ?: JSONArray()\n                for (i in 0 until items.length()) {\n                    items.optJSONObject(i)?.let { grid.addView(mediaCard(it, dp(114), dp(238))) }\n                }\n            }\n        }\n    }\n\n    private fun filtersBar(): View {\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n            gravity = Gravity.CENTER_VERTICAL\n            setPadding(0, 0, 0, dp(16))\n        }\n        listOf("بروزرسانی", "IMDb", "پاک کردن").forEachIndexed { i, s ->\n            val v = capsuleText(s, i == 0)\n            row.addView(v, LinearLayout.LayoutParams(0, dp(44), 1f).apply {\n                marginStart = dp(5)\n                marginEnd = dp(5)\n            })\n        }\n        return row\n    }\n\n    private fun showSearch() {\n        currentScreen = "search"\n        buildBottomNav()\n        clear("جستجو")\n\n        val scroll = ScrollView(this)\n        val page = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(14), dp(10), dp(14), dp(28))\n        }\n        scroll.addView(page)\n        content.addView(scroll)\n\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            background = rounded(card, dp(28), Color.rgb(40, 52, 75))\n            setPadding(dp(10), 0, dp(10), 0)\n        }\n\n        val input = EditText(this).apply {\n            hint = "دنبال عنوان خاصی می\u200cگردی؟"\n            setHintTextColor(muted)\n            setTextColor(Color.WHITE)\n            textSize = 15f\n            background = null\n            setSingleLine(true)\n        }\n        val btn = Button(this).apply {\n            text = "جستجو"\n            setTextColor(Color.WHITE)\n            background = gradient(intArrayOf(blueSoft, blue), dp(22), 0)\n            setOnClickListener {\n                val q = input.text.toString().trim()\n                if (q.isNotBlank()) doSearch(page, q)\n            }\n        }\n        row.addView(input, LinearLayout.LayoutParams(0, dp(58), 1f))\n        row.addView(btn, LinearLayout.LayoutParams(dp(94), dp(46)))\n        page.addView(row, LinearLayout.LayoutParams(-1, dp(66)).apply { bottomMargin = dp(20) })\n\n        page.addView(TextView(this).apply {\n            text = "جستجوی پیشرفته در آرشیو ۱ و ۳"\n            setTextColor(muted)\n            textSize = 13f\n            setPadding(0, 0, 0, dp(12))\n        })\n    }\n\n    private fun doSearch(page: LinearLayout, q: String) {\n        while (page.childCount > 2) page.removeViewAt(2)\n        val grid = GridLayout(this).apply { columnCount = 3 }\n        page.addView(grid)\n        val results = mutableListOf<JSONObject>()\n        var pending = 2\n        val query = URLEncoder.encode(q, "UTF-8")\n        listOf(1, 3).forEach { archive ->\n            fetch("$apiBase?action=search&archive=$archive&q=$query&page=1") { ok, json, _ ->\n                if (ok && json != null) {\n                    val arr = json.optJSONArray("items") ?: JSONArray()\n                    for (i in 0 until arr.length()) arr.optJSONObject(i)?.let { results.add(it) }\n                }\n                pending -= 1\n                if (pending == 0) {\n                    runOnUiThread {\n                        if (results.isEmpty()) page.addView(errorView("نتیجه\u200cای پیدا نشد"))\n                        else results.forEach { grid.addView(mediaCard(it, dp(114), dp(238))) }\n                    }\n                }\n            }\n        }\n    }\n\n    private fun mediaCard(item: JSONObject, w: Int, h: Int): LinearLayout {\n        val wrap = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.TOP\n            setPadding(dp(4), dp(4), dp(4), dp(4))\n            setOnClickListener { showDetail(item) }\n            layoutParams = ViewGroup.MarginLayoutParams(w, h).apply {\n                marginStart = dp(5)\n                marginEnd = dp(5)\n                bottomMargin = dp(12)\n            }\n        }\n\n        val posterShell = FrameLayout(this).apply {\n            background = rounded(card2, dp(18), Color.rgb(37, 49, 72))\n        }\n        val img = ImageView(this).apply {\n            scaleType = ImageView.ScaleType.CENTER_CROP\n        }\n        posterShell.addView(img, FrameLayout.LayoutParams(-1, -1))\n        loadImage(item.optString("poster"), img)\n\n        val badgeText = when {\n            item.optBoolean("has_dubbed") -> "DUB"\n            item.optBoolean("has_subtitle") -> "CC"\n            else -> ""\n        }\n        if (badgeText.isNotBlank()) {\n            posterShell.addView(TextView(this).apply {\n                text = badgeText\n                setTextColor(Color.WHITE)\n                textSize = 10f\n                gravity = Gravity.CENTER\n                typeface = Typeface.DEFAULT_BOLD\n                background = rounded(Color.argb(175, 0, 122, 255), dp(9), Color.TRANSPARENT)\n            }, FrameLayout.LayoutParams(dp(38), dp(26), Gravity.TOP or Gravity.LEFT).apply {\n                topMargin = dp(8)\n                leftMargin = dp(8)\n            })\n        }\n\n        wrap.addView(posterShell, LinearLayout.LayoutParams(-1, (h * 0.66f).roundToInt()))\n\n        wrap.addView(TextView(this).apply {\n            text = item.optString("title_fa").ifBlank { item.optString("title") }\n            setTextColor(Color.WHITE)\n            textSize = 13f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.CENTER\n            maxLines = 1\n            ellipsize = TextUtils.TruncateAt.END\n            setPadding(0, dp(8), 0, dp(5))\n        })\n\n        val meta = "${item.optString("year")}   ${cleanRating(item.optString("rating"))}"\n        wrap.addView(TextView(this).apply {\n            text = meta\n            setTextColor(blueSoft)\n            textSize = 11f\n            gravity = Gravity.CENTER\n            background = rounded(Color.rgb(7, 10, 18), dp(10), Color.rgb(35, 45, 65))\n            setPadding(0, dp(4), 0, dp(4))\n        }, LinearLayout.LayoutParams(-1, dp(28)))\n\n        return wrap\n    }\n\n    private fun showDetail(seed: JSONObject) {\n        val archive = seed.optInt("archive", 3)\n        val id = seed.optString("id")\n        val type = seed.optString("type", "movie")\n        if (id.isBlank()) return\n\n        clear(seed.optString("title_fa").ifBlank { seed.optString("title") })\n        val scroll = ScrollView(this)\n        val page = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            setPadding(dp(14), dp(8), dp(14), dp(30))\n        }\n        scroll.addView(page)\n        content.addView(scroll)\n        renderDetail(page, seed)\n\n        val url = "$apiBase?action=detail&archive=$archive&id=${URLEncoder.encode(id, "UTF-8")}&type=$type"\n        fetch(url) { ok, json, err ->\n            runOnUiThread {\n                page.removeAllViews()\n                if (!ok || json == null) {\n                    page.addView(errorView(err ?: "خطا در دریافت جزئیات"))\n                    renderDetail(page, seed)\n                } else {\n                    renderDetail(page, json.optJSONObject("item") ?: seed)\n                }\n            }\n        }\n    }\n\n    private fun renderDetail(page: LinearLayout, item: JSONObject) {\n        val poster = item.optString("poster")\n        val title = item.optString("title_fa").ifBlank { item.optString("title") }\n        val desc = item.optString("long_description").ifBlank { item.optString("description") }\n\n        val hero = FrameLayout(this).apply {\n            background = rounded(card, dp(30), Color.rgb(36, 48, 72))\n            layoutParams = LinearLayout.LayoutParams(-1, dp(255)).apply { bottomMargin = dp(16) }\n        }\n        val bgImg = ImageView(this).apply {\n            scaleType = ImageView.ScaleType.CENTER_CROP\n            alpha = 0.28f\n        }\n        hero.addView(bgImg, FrameLayout.LayoutParams(-1, -1))\n        loadImage(poster, bgImg)\n        val shade = View(this).apply { background = gradient(intArrayOf(Color.argb(10,0,0,0), Color.argb(240,9,13,23)), dp(30), 0) }\n        hero.addView(shade, FrameLayout.LayoutParams(-1, -1))\n\n        val info = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.BOTTOM or Gravity.CENTER_HORIZONTAL\n            setPadding(dp(18), dp(18), dp(18), dp(18))\n        }\n        info.addView(TextView(this).apply {\n            text = title\n            setTextColor(Color.WHITE)\n            textSize = 25f\n            typeface = Typeface.DEFAULT_BOLD\n            gravity = Gravity.CENTER\n            maxLines = 1\n            ellipsize = TextUtils.TruncateAt.END\n        })\n        info.addView(TextView(this).apply {\n            text = listOf(item.optString("year"), "IMDb ${cleanRating(item.optString("rating"))}", item.optString("type")).filter { it.isNotBlank() }.joinToString("  •  ")\n            setTextColor(blueSoft)\n            textSize = 13f\n            gravity = Gravity.CENTER\n            setPadding(0, dp(8), 0, dp(10))\n        })\n        hero.addView(info, FrameLayout.LayoutParams(-1, -1))\n        page.addView(hero)\n\n        val actions = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER\n            layoutDirection = View.LAYOUT_DIRECTION_RTL\n        }\n        val play = Button(this).apply {\n            text = "پخش آنلاین"\n            setTextColor(Color.WHITE)\n            typeface = Typeface.DEFAULT_BOLD\n            background = gradient(intArrayOf(blueSoft, blue), dp(24), 0)\n            setOnClickListener { playItem(item) }\n        }\n        val links = Button(this).apply {\n            text = "لینک\u200cها"\n            setTextColor(Color.WHITE)\n            background = rounded(card2, dp(24), Color.rgb(48, 62, 90))\n            setOnClickListener { showLinks(item) }\n        }\n        actions.addView(play, LinearLayout.LayoutParams(0, dp(54), 1f).apply { marginStart = dp(6) })\n        actions.addView(links, LinearLayout.LayoutParams(0, dp(54), 1f).apply { marginEnd = dp(6) })\n        page.addView(actions, LinearLayout.LayoutParams(-1, dp(66)).apply { bottomMargin = dp(12) })\n\n        val genreText = item.optJSONArray("genres")?.let { arr ->\n            val out = mutableListOf<String>()\n            for (i in 0 until arr.length()) out.add(arr.optString(i))\n            out.joinToString("   ")\n        } ?: ""\n        if (genreText.isNotBlank()) {\n            page.addView(TextView(this).apply {\n                text = genreText\n                setTextColor(muted)\n                textSize = 13f\n                gravity = Gravity.CENTER\n                background = rounded(card, dp(18), Color.rgb(40, 52, 75))\n                setPadding(dp(12), dp(10), dp(12), dp(10))\n            }, LinearLayout.LayoutParams(-1, -2).apply { bottomMargin = dp(14) })\n        }\n\n        page.addView(TextView(this).apply {\n            text = desc.ifBlank { "توضیحاتی برای این عنوان ثبت نشده است." }\n            setTextColor(Color.rgb(221, 228, 238))\n            textSize = 15f\n            setLineSpacing(dp(5).toFloat(), 1f)\n        })\n    }\n\n    private fun playItem(item: JSONObject) {\n        val links = playableLinks(item)\n        if (links.isEmpty()) {\n            Toast.makeText(this, "لینک پخش مستقیم پیدا نشد", Toast.LENGTH_SHORT).show()\n            return\n        }\n        if (links.size == 1) openPlayer(item, links, 0) else showLinks(item)\n    }\n\n    private fun showLinks(item: JSONObject) {\n        val links = playableLinks(item)\n        if (links.isEmpty()) {\n            Toast.makeText(this, "لینکی پیدا نشد", Toast.LENGTH_SHORT).show()\n            return\n        }\n        val labels = links.mapIndexed { index, l ->\n            val ep = if (l.optString("season").isNotBlank() && l.optString("season") != "0") "فصل ${l.optString("season")} قسمت ${l.optString("episode")} • " else ""\n            val kind = if (l.optString("type").lowercase(Locale.US).contains("dub")) "دوبله" else "زیرنویس"\n            "${index + 1}. $ep${l.optString("quality")} • $kind"\n        }.toTypedArray()\n        AlertDialog.Builder(this)\n            .setTitle("انتخاب پخش")\n            .setItems(labels) { _, which -> openPlayer(item, links, which) }\n            .show()\n    }\n\n    private fun openPlayer(item: JSONObject, links: List<JSONObject>, selected: Int) {\n        val title = item.optString("title_fa").ifBlank { item.optString("title") }\n        val arr = JSONArray()\n        links.forEach { l ->\n            arr.put(JSONObject().apply {\n                put("url", l.optString("url"))\n                put("title", title)\n                put("quality", l.optString("quality"))\n                put("type", l.optString("type"))\n                put("label", l.optString("label"))\n                put("season", l.optString("season"))\n                put("episode", l.optString("episode"))\n            })\n        }\n        val payload = JSONObject().apply {\n            put("video", links[selected].optString("url"))\n            put("title", title)\n            put("selectedIndex", selected)\n            put("tracks", arr)\n        }\n        startActivity(Intent(this, PlayerActivity::class.java).apply {\n            putExtra(PlayerActivity.EXTRA_VIDEO_URL, links[selected].optString("url"))\n            putExtra(PlayerActivity.EXTRA_TITLE, title)\n            putExtra(PlayerActivity.EXTRA_PLAYLIST_JSON, payload.toString())\n        })\n    }\n\n    private fun playableLinks(item: JSONObject): List<JSONObject> {\n        val arr = item.optJSONObject("play")?.optJSONArray("links") ?: item.optJSONArray("links") ?: JSONArray()\n        val out = mutableListOf<JSONObject>()\n        for (i in 0 until arr.length()) {\n            val l = arr.optJSONObject(i) ?: continue\n            if (isVideo(l.optString("url"))) out.add(l)\n        }\n        return out\n    }\n\n    private fun isVideo(url: String): Boolean {\n        val u = url.lowercase(Locale.US)\n        return u.startsWith("http") && (u.contains(".mkv") || u.contains(".mp4") || u.contains(".m3u8") || u.contains(".avi") || u.contains(".webm") || u.contains(".mov"))\n    }\n\n    private fun cleanRating(v: String): String {\n        if (v.isBlank() || v == "null") return "N/A"\n        return try { String.format(Locale.US, "%.1f", v.toDouble()) } catch (_: Throwable) { v.take(3) }\n    }\n\n    private fun capsuleText(label: String, active: Boolean): TextView {\n        return TextView(this).apply {\n            text = label\n            textSize = 13f\n            gravity = Gravity.CENTER\n            typeface = Typeface.DEFAULT_BOLD\n            setTextColor(Color.WHITE)\n            background = if (active) gradient(intArrayOf(blueSoft, blue), dp(22), 0) else rounded(card, dp(22), Color.rgb(42, 54, 78))\n            setPadding(dp(14), 0, dp(14), 0)\n        }\n    }\n\n    private fun showMenuDialog() {\n        val items = arrayOf("خانه", "آرشیو ۱", "آرشیو ۳ فیلم\u200cها", "آرشیو ۳ سریال\u200cها", "جستجو")\n        AlertDialog.Builder(this)\n            .setTitle("بانک مووی")\n            .setItems(items) { _, which ->\n                when (which) {\n                    0 -> showHome()\n                    1 -> showList("آرشیو ۱", 1, "new_movies", "movie")\n                    2 -> showList("آرشیو ۳ فیلم\u200cها", 3, "new_movies", "movie")\n                    3 -> showList("آرشیو ۳ سریال\u200cها", 3, "new_series", "series")\n                    4 -> showSearch()\n                }\n            }\n            .show()\n    }\n\n    private fun fetch(url: String, cb: (Boolean, JSONObject?, String?) -> Unit) {\n        Thread {\n            try {\n                val c = URL(url).openConnection() as HttpURLConnection\n                c.connectTimeout = 12000\n                c.readTimeout = 18000\n                c.setRequestProperty("Accept", "application/json")\n                c.setRequestProperty("User-Agent", "BankMovieeAndroidApi/2.0")\n                val code = c.responseCode\n                val stream = if (code in 200..299) c.inputStream else c.errorStream\n                val body = stream.bufferedReader(Charsets.UTF_8).use { it.readText() }\n                if (code in 200..299) cb(true, JSONObject(body), null) else cb(false, null, "HTTP $code")\n            } catch (e: Throwable) {\n                cb(false, null, e.message ?: "خطای اتصال")\n            }\n        }.start()\n    }\n\n    private fun loadImage(url: String, view: ImageView) {\n        if (url.isBlank() || url == "null") return\n        val cached = imageCache[url]\n        if (cached != null) {\n            view.setImageBitmap(cached)\n            return\n        }\n        Thread {\n            try {\n                val c = URL(url).openConnection() as HttpURLConnection\n                c.connectTimeout = 7000\n                c.readTimeout = 9000\n                c.instanceFollowRedirects = true\n                val bmp = BitmapFactory.decodeStream(c.inputStream)\n                if (bmp != null) {\n                    if (imageCache.size > 120) imageCache.clear()\n                    imageCache[url] = bmp\n                    runOnUiThread { view.setImageBitmap(bmp) }\n                }\n            } catch (_: Throwable) {}\n        }.start()\n    }\n\n    private fun errorView(msg: String): TextView {\n        return TextView(this).apply {\n            text = msg\n            setTextColor(Color.rgb(255, 125, 125))\n            textSize = 14f\n            gravity = Gravity.CENTER\n            setPadding(dp(12), dp(24), dp(12), dp(24))\n        }\n    }\n\n    private fun rounded(color: Int, radius: Int, stroke: Int): GradientDrawable {\n        return GradientDrawable().apply {\n            setColor(color)\n            cornerRadius = radius.toFloat()\n            if (stroke != Color.TRANSPARENT) setStroke(dp(1), stroke)\n        }\n    }\n\n    private fun gradient(colors: IntArray, radius: Int, strokeWidth: Int = 0, strokeColor: Int = Color.TRANSPARENT): GradientDrawable {\n        return GradientDrawable(GradientDrawable.Orientation.TL_BR, colors).apply {\n            cornerRadius = radius.toFloat()\n            if (strokeWidth > 0) setStroke(strokeWidth, strokeColor)\n        }\n    }\n\n    private fun glassNavBg(): GradientDrawable {\n        return GradientDrawable(GradientDrawable.Orientation.TOP_BOTTOM, intArrayOf(Color.rgb(20, 27, 41), Color.rgb(14, 18, 30))).apply {\n            cornerRadius = dp(28).toFloat()\n            setStroke(dp(1), Color.rgb(33, 43, 62))\n        }\n    }\n\n    private fun dp(v: Int): Int = (v * resources.displayMetrics.density).roundToInt()\n}\n', encoding="utf-8")
          player_file.write_text('package ir.bankmoviee.app\n\nimport android.app.Activity\nimport android.app.AlertDialog\nimport android.content.Intent\nimport android.content.pm.ActivityInfo\nimport android.graphics.Color\nimport android.graphics.Typeface\nimport android.net.Uri\nimport android.os.Bundle\nimport android.os.Handler\nimport android.os.Looper\nimport android.view.Gravity\nimport android.view.MotionEvent\nimport android.view.View\nimport android.view.Window\nimport android.view.WindowManager\nimport android.widget.FrameLayout\nimport android.widget.ImageButton\nimport android.widget.LinearLayout\nimport android.widget.SeekBar\nimport android.widget.TextView\nimport android.widget.Toast\nimport org.json.JSONArray\nimport org.json.JSONObject\nimport org.videolan.libvlc.LibVLC\nimport org.videolan.libvlc.Media\nimport org.videolan.libvlc.MediaPlayer\nimport org.videolan.libvlc.util.VLCVideoLayout\nimport java.util.Locale\nimport kotlin.math.abs\nimport kotlin.math.max\nimport kotlin.math.min\nimport kotlin.math.roundToInt\n\nclass PlayerActivity : Activity() {\n\n    companion object {\n        const val EXTRA_VIDEO_URL = "video_url"\n        const val EXTRA_TITLE = "title"\n        const val EXTRA_PLAYLIST_JSON = "playlist_json"\n    }\n\n    data class Track(\n        val url: String,\n        val title: String,\n        val quality: String,\n        val type: String,\n        val label: String,\n        val season: String,\n        val episode: String\n    )\n\n    private val blue = Color.rgb(0, 122, 255)\n    private val bgPanel = Color.argb(145, 0, 0, 0)\n    private lateinit var root: FrameLayout\n    private lateinit var videoLayout: VLCVideoLayout\n    private lateinit var controls: LinearLayout\n    private lateinit var titleText: TextView\n    private lateinit var statusText: TextView\n    private lateinit var seek: SeekBar\n    private lateinit var timeText: TextView\n    private lateinit var playBtn: TextView\n    private lateinit var modeBtn: TextView\n    private lateinit var episodeBtn: TextView\n\n    private var vlc: LibVLC? = null\n    private var player: MediaPlayer? = null\n    private val handler = Handler(Looper.getMainLooper())\n    private var tracks = mutableListOf<Track>()\n    private var currentIndex = 0\n    private var videoUrl = ""\n    private var title = "BankMoviee"\n    private var modeIndex = 0\n    private val modes = arrayOf("Fit", "Crop", "Full")\n    private var downX = 0f\n    private var lastTap = 0L\n\n    private val progressRunnable = object : Runnable {\n        override fun run() {\n            updateProgress()\n            handler.postDelayed(this, 500)\n        }\n    }\n\n    override fun onCreate(savedInstanceState: Bundle?) {\n        super.onCreate(savedInstanceState)\n        requestWindowFeature(Window.FEATURE_NO_TITLE)\n        requestedOrientation = ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE\n        window.addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON)\n        window.decorView.systemUiVisibility = (\n            View.SYSTEM_UI_FLAG_FULLSCREEN or\n                View.SYSTEM_UI_FLAG_HIDE_NAVIGATION or\n                View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY or\n                View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN or\n                View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION\n        )\n        parseIntent()\n        buildUi()\n        startPlayer(videoUrl)\n    }\n\n    private fun parseIntent() {\n        videoUrl = intent.getStringExtra(EXTRA_VIDEO_URL) ?: ""\n        title = intent.getStringExtra(EXTRA_TITLE) ?: "BankMoviee"\n        val json = intent.getStringExtra(EXTRA_PLAYLIST_JSON) ?: ""\n        if (json.isNotBlank()) {\n            try {\n                val obj = JSONObject(json)\n                currentIndex = obj.optInt("selectedIndex", 0)\n                val arr = obj.optJSONArray("tracks") ?: JSONArray()\n                for (i in 0 until arr.length()) {\n                    val it = arr.optJSONObject(i) ?: continue\n                    tracks.add(\n                        Track(\n                            it.optString("url"),\n                            it.optString("title", title),\n                            it.optString("quality"),\n                            it.optString("type"),\n                            it.optString("label"),\n                            it.optString("season"),\n                            it.optString("episode")\n                        )\n                    )\n                }\n            } catch (_: Throwable) {}\n        }\n        if (tracks.isEmpty() && videoUrl.isNotBlank()) {\n            tracks.add(Track(videoUrl, title, "", "", "", "", ""))\n            currentIndex = 0\n        }\n        if (currentIndex !in tracks.indices) currentIndex = 0\n        videoUrl = tracks.getOrNull(currentIndex)?.url ?: videoUrl\n        title = tracks.getOrNull(currentIndex)?.title ?: title\n    }\n\n    private fun buildUi() {\n        root = FrameLayout(this).apply { setBackgroundColor(Color.BLACK) }\n        videoLayout = VLCVideoLayout(this)\n        root.addView(videoLayout, FrameLayout.LayoutParams(-1, -1))\n\n        val top = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n            setPadding(dp(14), dp(12), dp(14), dp(8))\n            backgroundColorCompat(bgPanel)\n        }\n        val back = pill("بازگشت")\n        back.setOnClickListener { finish() }\n        val info = LinearLayout(this).apply { orientation = LinearLayout.VERTICAL }\n        titleText = TextView(this).apply {\n            text = title\n            setTextColor(Color.WHITE)\n            textSize = 15f\n            typeface = Typeface.DEFAULT_BOLD\n            maxLines = 1\n        }\n        statusText = TextView(this).apply {\n            text = currentLabel()\n            setTextColor(Color.LTGRAY)\n            textSize = 12f\n            maxLines = 1\n        }\n        info.addView(titleText)\n        info.addView(statusText)\n        top.addView(back, LinearLayout.LayoutParams(dp(86), dp(44)))\n        top.addView(info, LinearLayout.LayoutParams(0, -2, 1f))\n        root.addView(top, FrameLayout.LayoutParams(-1, dp(74), Gravity.TOP))\n\n        controls = LinearLayout(this).apply {\n            orientation = LinearLayout.VERTICAL\n            gravity = Gravity.CENTER\n            setPadding(dp(18), dp(10), dp(18), dp(14))\n            backgroundColorCompat(bgPanel)\n        }\n\n        seek = SeekBar(this).apply {\n            max = 1000\n            progressTintList = android.content.res.ColorStateList.valueOf(blue)\n            thumbTintList = android.content.res.ColorStateList.valueOf(blue)\n        }\n        controls.addView(seek, LinearLayout.LayoutParams(-1, dp(34)))\n\n        val row = LinearLayout(this).apply {\n            orientation = LinearLayout.HORIZONTAL\n            gravity = Gravity.CENTER_VERTICAL\n        }\n        timeText = TextView(this).apply {\n            text = "00:00 / --:--"\n            setTextColor(Color.WHITE)\n            textSize = 12f\n        }\n        playBtn = pill("توقف")\n        playBtn.setOnClickListener { toggle() }\n        episodeBtn = pill("قسمت\u200cها")\n        episodeBtn.setOnClickListener { showEpisodes() }\n        modeBtn = pill("Fit")\n        modeBtn.setOnClickListener { nextMode() }\n\n        row.addView(timeText, LinearLayout.LayoutParams(0, dp(48), 1f))\n        row.addView(modeBtn, LinearLayout.LayoutParams(dp(82), dp(42)))\n        row.addView(episodeBtn, LinearLayout.LayoutParams(dp(100), dp(42)))\n        row.addView(playBtn, LinearLayout.LayoutParams(dp(82), dp(42)))\n        controls.addView(row)\n\n        root.addView(controls, FrameLayout.LayoutParams(-1, dp(98), Gravity.BOTTOM))\n        root.setOnClickListener { toggleControls() }\n        root.setOnTouchListener { _, event -> handleTap(event) }\n        setContentView(root)\n\n        seek.setOnSeekBarChangeListener(object : SeekBar.OnSeekBarChangeListener {\n            override fun onStartTrackingTouch(s: SeekBar?) {}\n            override fun onStopTrackingTouch(s: SeekBar?) {\n                val p = player ?: return\n                if (p.length > 0) p.time = ((s?.progress ?: 0).toLong() * p.length) / 1000L\n            }\n            override fun onProgressChanged(s: SeekBar?, progress: Int, fromUser: Boolean) {}\n        })\n    }\n\n    private fun startPlayer(url: String) {\n        release()\n        val lib = LibVLC(this, arrayListOf("--network-caching=1800", "--http-reconnect", "--audio-time-stretch"))\n        vlc = lib\n        val mp = MediaPlayer(lib)\n        player = mp\n        mp.attachViews(videoLayout, null, false, false)\n        mp.setEventListener { e ->\n            runOnUiThread {\n                when (e.type) {\n                    MediaPlayer.Event.Playing -> {\n                        playBtn.text = "توقف"\n                        applyMode()\n                    }\n                    MediaPlayer.Event.Paused -> playBtn.text = "پخش"\n                    MediaPlayer.Event.EndReached -> playNext()\n                    MediaPlayer.Event.EncounteredError -> Toast.makeText(this, "خطا در پخش", Toast.LENGTH_LONG).show()\n                }\n            }\n        }\n        val media = Media(lib, Uri.parse(url))\n        media.setHWDecoderEnabled(true, false)\n        media.addOption(":network-caching=1800")\n        media.addOption(":http-reconnect")\n        media.addOption(":http-user-agent=Mozilla/5.0 BankMovieeAndroidApi/1.0")\n        mp.media = media\n        media.release()\n        mp.play()\n        handler.removeCallbacks(progressRunnable)\n        handler.post(progressRunnable)\n        updateTitle()\n    }\n\n    private fun showEpisodes() {\n        if (tracks.isEmpty()) return\n        val labels = tracks.mapIndexed { idx, t ->\n            val type = if (t.type.lowercase(Locale.US).contains("dub")) "دوبله" else "زیرنویس"\n            val ep = if (t.season