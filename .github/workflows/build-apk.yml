      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          echo "sdk.dir=$ANDROID_HOME" > "${{ steps.unzip.outputs.project_dir }}/local.properties"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK and print real errors if needed
        working-directory: ${{ steps.unzip.outputs.project_dir }}
        shell: bash
        run: |
          set +e
          gradle assembleDebug --no-daemon --stacktrace --info --console=plain 2>&1 | tee build.log
          STATUS=${PIPESTATUS[0]}

          if [ "$STATUS" -ne 0 ]; then
            echo ""
            echo "================ REAL ERROR LINES ================"
            grep -n -E "e: |error:|ERROR:|Unresolved reference|Expecting|Overload resolution|None of the following|Cannot access|Type mismatch|Too many arguments|No value passed|Only safe|Smart cast|Redeclaration|Conflicting|Cannot infer" build.log | tail -n 120 || true
            echo "================ END REAL ERROR LINES ================"
            echo ""
          fi

          exit "$STATUS"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BankMoviee-Player-Episode-Update-apk
          path: ${{ steps.unzip.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
