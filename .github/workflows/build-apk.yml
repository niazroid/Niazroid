          new = '''    private fun openTarget(item: JSONObject): DownloadTarget {
                  val mode = item.optString("storage_mode")
                  return if (mode == InternalDownloadStore.STORAGE_TREE || mode == InternalDownloadStore.STORAGE_MEDIA) {
                      val uri = Uri.parse(item.optString("document_uri"))
                      val descriptor = contentResolver.openFileDescriptor(uri, "rw")
