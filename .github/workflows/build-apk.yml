name: BM Action Smoke Test

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Quick runner test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Start test
        run: |
          echo "GitHub Actions runner started successfully"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Branch: $GITHUB_REF_NAME"
          echo "Commit: $GITHUB_SHA"
          date -u

      - name: Checkout
        uses: actions/checkout@v4

      - name: List files
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sed -n '1,80p'

      - name: Create test artifact
        run: |
          mkdir -p smoke-output
          {
            echo "BM Action Smoke Test OK"
            echo "repo=$GITHUB_REPOSITORY"
            echo "branch=$GITHUB_REF_NAME"
            echo "sha=$GITHUB_SHA"
            date -u
          } > smoke-output/result.txt

      - name: Upload test artifact
        uses: actions/upload-artifact@v4
        with:
          name: BM-Smoke-Test-Result
          path: smoke-output/result.txt
