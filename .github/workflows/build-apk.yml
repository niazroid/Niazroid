                                  gravity = Gravity.LEFT
                              }
                          )

                          details.addView(
                              progressTrack,
                              LinearLayout.LayoutParams(
                                  -1,
                                  dp(6)
                              ).apply {
                                  topMargin = dp(10)
                              }
                          )

                          details.addView(
                              TextView(
                                  this@MainActivity
                              ).apply {
                                  text = when {
                                      remaining > 0L ->
                                          "${
                                              formatResumeTime(
                                                  remaining
                                              )
                                          } باقی‌مانده"

                                      position > 0L ->
                                          "ادامه از ${
                                              formatResumeTime(
                                                  position
                                              )
                                          }"

                                      else ->
                                          "ادامه تماشا"
                                  }

                                  setTextColor(
                                      Color.rgb(
                                          164,
                                          169,
                                          180
                                      )
                                  )

                                  textSize = 11.5f
                                  gravity = Gravity.LEFT
                              },
                              LinearLayout.LayoutParams(
                                  -1,
                                  -2
                              ).apply {
                                  topMargin = dp(7)
                              }
                          )

                          cardBox.addView(
                              details,
                              LinearLayout.LayoutParams(
                                  dp(196),
                                  -1
                              )
                          )

                          addView(
                              cardBox,
                              LinearLayout.LayoutParams(
                                  dp(308),
                                  dp(132)
                              )
                          )

                          return@apply
                      }

                      addView(
                          posterCard(
                              item,
                              dp(116),
                              dp(206)
                          )
                      )

                      if (storeKey == "favorites") {
                          addView(
                              TextView(
                                  this@MainActivity
                              ).apply {
                                  text = "حذف از واچ‌لیست"
                                  setTextColor(white)
                                  textSize = 10.5f
                                  gravity = Gravity.CENTER

                                  background = rounded(
                                      Color.rgb(
                                          120,
                                          24,
                                          35
                                      ),
                                      dp(10),
                                      Color.TRANSPARENT
                                  )

                                  setOnClickListener {
                                      removeStoreItem(
                                          storeKey,
                                          item
                                      )

                                      showProfile()
                                  }
                              },
                              LinearLayout.LayoutParams(
                                  -1,
                                  dp(28)
                              ).apply {
                                  topMargin = dp(3)
                              }
                          )
                      }
                  }
              }

          '''

          main = main[:start] + replacement + main[end:]

          # 5) ذخیره مدت زمان کامل در کنار زمان پخش
          old = '''            getSharedPreferences("bm_smart_cinema", MODE_PRIVATE).edit()
                          .putLong(stableKey, savedTime)
                          .putLong("progress_$videoUrl", savedTime)
                          .apply()
          '''

          new = '''            val duration = p.length.coerceAtLeast(0L)
                      getSharedPreferences("bm_smart_cinema", MODE_PRIVATE).edit()
                          .putLong(stableKey, savedTime)
                          .putLong("progress_$videoUrl", savedTime)
                          .putLong("${stableKey}_duration", duration)
                          .putLong("progress_${videoUrl}_duration", duration)
                          .apply()
          '''

          if old not in player:
              raise SystemExit("Progress save block not found")

          player = player.replace(old, new, 1)

          # 6) اجرای چندمرحله‌ای Seek برای Resume مطمئن
          old = '''                        if (!resumeApplied) {
                                      resumeApplied = true
                                      val prefs = getSharedPreferences("bm_smart_cinema", MODE_PRIVATE)
                                      val stableKey = progressKey.ifBlank { "progress_$videoUrl" }
                                      val saved = prefs.getLong(stableKey, prefs.getLong("progress_$videoUrl", 0L))
                                      if (saved > 15000L) {
                                          try { player?.time = saved } catch (_: Throwable) {}
                                          showHud("ادامه از ${fmt(saved)}")
                                      }
                                  }
          '''

          new = '''                        if (!resumeApplied) {
                                      resumeApplied = true
                                      val prefs = getSharedPreferences("bm_smart_cinema", MODE_PRIVATE)
                                      val stableKey = progressKey.ifBlank { "progress_$videoUrl" }
                                      val saved = prefs.getLong(stableKey, prefs.getLong("progress_$videoUrl", 0L))

                                      if (saved > 15000L) {
                                          fun applyResumeSeek() {
                                              try {
                                                  val current =
                                                      player?.time
                                                          ?: 0L

                                                  if (
                                                      current <
                                                      saved - 5000L
                                                  ) {
                                                      player?.time =
                                                          saved
                                                  }
                                              } catch (
                                                  _: Throwable
                                              ) {
                                              }
                                          }

                                          applyResumeSeek()

                                          handler.postDelayed(
                                              {
                                                  applyResumeSeek()
                                              },
                                              350L
                                          )

                                          handler.postDelayed(
                                              {
                                                  applyResumeSeek()
                                              },
                                              1100L
                                          )

                                          showHud(
                                              "ادامه از ${fmt(saved)}"
                                          )
                                      }
                                  }
          '''

          if old not in player:
              raise SystemExit("Resume block not found")

          player = player.replace(old, new, 1)

          main_path.write_text(
              main,
              encoding="utf-8"
          )

          player_path.write_text(
              player,
              encoding="utf-8"
          )

          print("V12 YAML-only patch applied.")
          PY

          python3 /tmp/patch_v12.py

          MAIN="project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt"
          PLAYER="project/app/src/main/java/ir/bankmoviee/app/PlayerActivity.kt"

          grep -Fq 'if (item.optInt("archive", selectedArchive) != 2)' "$MAIN"
          grep -Fq 'else if (detailArchive != 2)' "$MAIN"
          grep -Fq 'private fun continueProgressValues(item: JSONObject)' "$MAIN"
          grep -Fq 'resources.displayMetrics.widthPixels - dp(72)' "$MAIN"
          grep -Fq 'putLong("${stableKey}_duration", duration)' "$PLAYER"
          grep -Fq 'handler.postDelayed({ applyResumeSeek() }, 350L)' "$PLAYER"
          grep -Fq 'handler.postDelayed({ applyResumeSeek() }, 1100L)' "$PLAYER"

          echo "V12 YAML-only fixes verified."

      - name: Force first build to ARM64 and V7A only
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("project/app/build.gradle")
          source = path.read_text(encoding="utf-8")

          source = re.sub(
              r'\n\s*ndk\s*\{\s*abiFilters[^\n]*\n\s*\}',
              "",
              source,
              count=1,
              flags=re.MULTILINE,
          )

          marker = '        versionName "1.5"\n'

          replacement = (
              '        versionName "1.5"\n'
              '        ndk {\n'
              '            abiFilters '
              '"armeabi-v7a", "arm64-v8a"\n'
              '        }\n'
          )

          if marker not in source:
              raise SystemExit(
                  "Could not find versionName insertion point"
              )

          source = source.replace(
              marker,
              replacement,
              1
          )

          source, changed = re.subn(
              r'include\s+[^\n]+',
              'include "armeabi-v7a", "arm64-v8a"',
              source,
              count=1,
          )

          if changed != 1:
              raise SystemExit(
                  "Could not set two-ABI split list"
              )

          source, changed = re.subn(
              r'universalApk\s+(?:false|true)',
              'universalApk true',
              source,
              count=1,
          )

          if changed != 1:
              raise SystemExit(
                  "Could not enable universal APK"
              )

          path.write_text(
              source,
              encoding="utf-8"
          )
          PY

          grep -Fq 'abiFilters "armeabi-v7a", "arm64-v8a"' project/app/build.gradle
          grep -Fq 'include "armeabi-v7a", "arm64-v8a"' project/app/build.gradle

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0"

          echo "sdk.dir=$ANDROID_HOME" \
            > project/local.properties

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build and verify four APKs
        working-directory: project
        shell: bash
        run: |
          set -uo pipefail

          rm -rf app/build publish

          mkdir -p \
            publish/arm64 \
            publish/v7a \
            publish/universal-lite \
            publish/universal-full

          print_real_error() {
            local log_file="$1"
            local exit_code="$2"

            echo ""
            echo "================ KOTLIN COMPILER ERRORS ================"

            grep -E \
              '(^e: |^w: |\.kt:[0-9]+:[0-9]+|\.kt \([0-9]+,[0-9]+\)|Unresolved reference|Type mismatch|Overload resolution ambiguity|Cannot infer|No value passed|Too many arguments|Unsupported escape|Expecting)' \
              "$log_file" \
              | tail -n 260 \
              || true

            echo "==================== REAL ERROR ========================="

            grep -Ei \
              'FAILURE:|What went wrong:|Execution failed|error:|Exception|Caused by:' \
              "$log_file" \
              | tail -n 200 \
              || true

            echo "-------------------- LAST LOG LINES ---------------------"

            tail -n 140 "$log_file" || true

            echo "========================================================="

            exit "$exit_code"
          }

          build_release() {
            local log_file="$1"
            local mode="$2"

            rm -rf app/build
            set +e

            if [ "$mode" = "append" ]; then
              gradle \
                :app:assembleRelease \
                --no-daemon \
                --max-workers=1 \
                --stacktrace \
                --console=plain \
                2>&1 \
                | tee -a "$log_file"
            else
              gradle \
                :app:assembleRelease \
                --no-daemon \
                --max-workers=1 \
                --stacktrace \
                --console=plain \
                2>&1 \
                | tee "$log_file"
            fi

            local status=${PIPESTATUS[0]}

            set -e

            if [ "$status" -ne 0 ]; then
              print_real_error \
                "$log_file" \
                "$status"
            fi
          }

          AAPT="$ANDROID_HOME/build-tools/35.0.0/aapt"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"

          EXPECTED_SHA256="862bc358d8d239a2134a63fab979ff6019862372e7950ea49bac74780936205d"

          verify_apk() {
            local apk="$1"
            local label="$2"
            local expected_mode="$3"

            local badging="apk-badging-${label}.txt"
            local signing="apk-signature-${label}.txt"

            "$AAPT" dump badging \
              "$apk" \
              > "$badging"

            grep -Fq "versionName='1.5'" "$badging" || {
              echo "$label versionName is not 1.5"
              grep -m1 '^package:' "$badging" || true
              exit 1
            }

            grep -Fq \
              "package: name='ir.bankmoviee.app'" \
              "$badging" || {
                echo "$label package is wrong"
                exit 1
              }

            local native_line

            native_line="$(
              grep -m1 '^native-code:' "$badging" || true
            )"

            case "$expected_mode" in
              arm64)
                printf '%s' "$native_line" \
                  | grep -Fq "'arm64-v8a'" || {
                    echo "ARM64 ABI missing"
                    exit 1
                  }

                printf '%s' "$native_line" \
                  | grep -Eq "armeabi-v7a|x86" && {
                    echo "ARM64 APK contains unwanted ABI: $native_line"
                    exit 1
                  } || true
                ;;

              v7a)
                printf '%s' "$native_line" \
                  | grep -Fq "'armeabi-v7a'" || {
                    echo "V7A ABI missing"
                    exit 1
                  }

                printf '%s' "$native_line" \
                  | grep -Eq "arm64-v8a|x86" && {
                    echo "V7A APK contains unwanted ABI: $native_line"
                    exit 1
                  } || true
                ;;

              lite-universal)
                printf '%s' "$native_line" \
                  | grep -Fq "'arm64-v8a'" || {
                    echo "Lite Universal arm64 missing"
                    exit 1
                  }

                printf '%s' "$native_line" \
                  | grep -Fq "'armeabi-v7a'" || {
                    echo "Lite Universal v7a missing"
                    exit 1
                  }

                printf '%s' "$native_line" \
                  | grep -Eq "'x86'|'x86_64'" && {
                    echo "Lite Universal contains x86: $native_line"
                    exit 1
                  } || true
                ;;

              full-universal)
                for abi in \
                  arm64-v8a \
                  armeabi-v7a \
                  x86 \
                  x86_64
                do
                  printf '%s' "$native_line" \
                    | grep -Fq "'$abi'" || {
                      echo "Full Universal missing $abi: $native_line"
                      exit 1
                    }
                done
                ;;
            esac

            set +e

            "$APKSIGNER" verify \
              --verbose \
              --print-certs \
              "$apk" \
              > "$signing" \
              2>&1

            local sign_status=$?

            set -e

            [ "$sign_status" -eq 0 ] || {
              cat "$signing"
              exit "$sign_status"
            }

            local actual_sha256

            actual_sha256="$(
              sed -n \
                's/^Signer #1 certificate SHA-256 digest: //p' \
                "$signing" \
                | head -n1 \
                | tr '[:upper:]' '[:lower:]' \
                | tr -d ':[:space:]'
            )"

            [ "$actual_sha256" = "$EXPECTED_SHA256" ] || {
              echo "$label signer mismatch: $actual_sha256"
              exit 1
            }

            echo "$label verified:"

            grep -m1 '^package:' "$badging"

            grep -m1 '^native-code:' "$badging" || true

            grep -E \
              '^Signer #1 certificate (DN|SHA-256 digest):' \
              "$signing" \
              || true
          }

          echo "========== BUILD 1: ARM64 + V7A + LITE UNIVERSAL =========="

          build_release \
            "build.log" \
            "new"

          OUT="app/build/outputs/apk/release"

          ARM64="$(
            find "$OUT" \
              -maxdepth 1 \
              -type f \
              -name '*arm64-v8a*release*.apk' \
              | head -n1
          )"

          V7A="$(
            find "$OUT" \
              -maxdepth 1 \
              -type f \
              -name '*armeabi-v7a*release*.apk' \
              | head -n1
          )"

          LITE_UNIVERSAL="$(
            find "$OUT" \
              -maxdepth 1 \
              -type f \
              -name '*universal*release*.apk' \
              | head -n1
          )"

          [ -n "$ARM64" ] \
            && [ -n "$V7A" ] \
            && [ -n "$LITE_UNIVERSAL" ] || {
              find "$OUT" \
                -maxdepth 1 \
                -type f \
                -name '*.apk' \
                -print || true

              exit 1
            }

          verify_apk \
            "$ARM64" \
            "arm64" \
            "arm64"

          verify_apk \
            "$V7A" \
            "v7a" \
            "v7a"

          verify_apk \
            "$LITE_UNIVERSAL" \
            "universal-lite" \
            "lite-universal"

          cp \
            "$ARM64" \
            "publish/arm64/Bankmovie-v1.5-v12-arm64-v8a-build-${GITHUB_RUN_NUMBER}.apk"

          cp \
            "$V7A" \
            "publish/v7a/Bankmovie-v1.5-v12-armeabi-v7a-build-${GITHUB_RUN_NUMBER}.apk"

          cp \
            "$LITE_UNIVERSAL" \
            "publish/universal-lite/Bankmovie-v1.5-v12-universal-lite-2abi-build-${GITHUB_RUN_NUMBER}.apk"

          echo "========== BUILD 2: FULL UNIVERSAL 4 ABI =========="

          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("app/build.gradle")
          source = path.read_text(encoding="utf-8")

          source, split_changed = re.subn(
              r'include\s+"armeabi-v7a",\s*"arm64-v8a"',
              'include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"',
              source,
              count=1,
          )

          source, filter_changed = re.subn(
              r'abiFilters\s+"armeabi-v7a",\s*"arm64-v8a"',
              'abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"',
              source,
              count=1,
          )

          if split_changed != 1 or filter_changed != 1:
              raise SystemExit(
                  "Could not enable four ABIs: "
                  f"split={split_changed}, "
                  f"filter={filter_changed}"
              )

          path.write_text(
              source,
              encoding="utf-8"
          )
          PY

          grep -Fq \
            'include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"' \
            app/build.gradle

          grep -Fq \
            'abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"' \
            app/build.gradle

          build_release \
            "build.log" \
            "append"

          OUT="app/build/outputs/apk/release"

          FULL_UNIVERSAL="$(
            find "$OUT" \
              -maxdepth 1 \
              -type f \
              -name '*universal*release*.apk' \
              | head -n1
          )"

          [ -n "$FULL_UNIVERSAL" ] || {
            find "$OUT" \
              -maxdepth 1 \
              -type f \
              -name '*.apk' \
              -print || true

            exit 1
          }

          verify_apk \
            "$FULL_UNIVERSAL" \
            "universal-full" \
            "full-universal"

          cp \
            "$FULL_UNIVERSAL" \
            "publish/universal-full/Bankmovie-v1.5-v12-universal-full-4abi-build-${GITHUB_RUN_NUMBER}.apk"

          for dir in \
            arm64 \
            v7a \
            universal-lite \
            universal-full
          do
            sha256sum \
              "publish/$dir"/*.apk \
              > "publish/$dir/SHA256.txt"
          done

          echo "================ APK SIZES ================"

          for apk in publish/*/*.apk
          do
            bytes=$(stat -c%s "$apk")

            mib=$(
              awk \
                -v b="$bytes" \
                'BEGIN { printf "%.1f", b/1048576 }'
            )

            echo "$(basename "$apk"): ${mib} MiB"
          done

          echo "==========================================="

      - name: Upload diagnostic build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.5-V12-Build-Log-${{ github.run_number }}
          path: project/build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.5-V12-ARM64-${{ github.run_number }}
          path: project/publish/arm64/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload V7A APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.5-V12-V7A-${{ github.run_number }}
          path: project/publish/v7a/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload Lite Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.5-V12-Universal-Lite-2ABI-${{ github.run_number }}
          path: project/publish/universal-lite/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload Full Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Bankmovie-V1.5-V12-Universal-Full-4ABI-${{ github.run_number }}
          path: project/publish/universal-full/*
          if-no-files-found: error
          retention-days: 14
