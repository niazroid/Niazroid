name: Build Bankmovie V1.9 V22 Slider Remote Controls Hotfix

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build V1.9 V22 Slider Remote Controls Hotfix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip exact V1.9 source
        shell: bash
        run: |
          set -euo pipefail
          ZIP="Bankmovie-v1.9-source-v22-professional-search-ui.zip"
          if [ ! -f "$ZIP" ]; then
            echo "==================== REAL ERROR ===================="
            echo "Missing $ZIP in repository root."
            echo "===================================================="
            exit 1
          fi
          rm -rf project
          mkdir project
          unzip -q "$ZIP" -d project
          test -f project/settings.gradle
          test -f project/app/build.gradle
          test -f project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt

      - name: Verify legacy update signing key
        shell: bash
        run: |
          set -euo pipefail
          test -f project/bankmovie_update.jks
          KEY_INFO="$(keytool -list -v -keystore project/bankmovie_update.jks -storepass bankmovie123 -alias bankmovie)"
          printf '%s\n' "$KEY_INFO"
          NORMALIZED="$(printf '%s\n' "$KEY_INFO" | sed -n 's/.*SHA256: //p' | head -n1 | tr '[:upper:]' '[:lower:]' | tr -d ':[:space:]')"
          EXPECTED="862bc358d8d239a2134a63fab979ff6019862372e7950ea49bac74780936205d"
          if [ "$NORMALIZED" != "$EXPECTED" ]; then
            echo "Legacy Bankmovie signing key mismatch: $NORMALIZED"
            exit 1
          fi
          echo "Legacy signing key verified: $NORMALIZED"

      - name: Verify V1.9 V22 source
        shell: bash
        run: |
          set -euo pipefail
          MAIN="project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt"
          PLAYER="project/app/src/main/java/ir/bankmoviee/app/PlayerActivity.kt"
          PREFS="project/app/src/main/java/ir/bankmoviee/app/UiPreferences.kt"
          STORE="project/app/src/main/java/ir/bankmoviee/app/InternalDownloadStore.kt"
          SERVICE="project/app/src/main/java/ir/bankmoviee/app/InternalDownloadService.kt"
          DOWNLOADS="project/app/src/main/java/ir/bankmoviee/app/DownloadsActivity.kt"
          LOCATION="project/app/src/main/java/ir/bankmoviee/app/DownloadLocationPrefs.kt"
          MANIFEST="project/app/src/main/AndroidManifest.xml"
          GRADLE="project/app/build.gradle"

          grep -Fq 'versionName "1.9"' "$GRADLE"
          grep -Fq 'versionCode 3700000 + runNumber' "$GRADLE"
          grep -Fq "androidx.documentfile:documentfile" "$GRADLE"
          grep -Fq 'minifyEnabled true' "$GRADLE"
          grep -Fq 'shrinkResources true' "$GRADLE"

          test -f "$PREFS"
          test -f "$STORE"
          test -f "$SERVICE"
          test -f "$DOWNLOADS"
          test -f "$LOCATION"
          test -f project/app/src/main/res/xml/file_paths.xml
          test -f project/app/src/main/res/drawable/ic_telegram.xml
          test -f project/app/src/main/res/drawable/ic_dubbed_mic_green.xml

          grep -Fq 'InternalDownloadService' "$MANIFEST"
          grep -Fq 'DownloadsActivity' "$MANIFEST"
          grep -Fq 'android.permission.FOREGROUND_SERVICE_DATA_SYNC' "$MANIFEST"
          grep -Fq 'androidx.core.content.FileProvider' "$MANIFEST"

          grep -Fq 'private val bmAppKey = "bm_android_v1_7c2f40"' "$MAIN"
          grep -Fq 'DownloadLocationPrefs.hasChoice' "$MAIN"
          grep -Fq 'Intent.ACTION_OPEN_DOCUMENT_TREE' "$MAIN"
          grep -Fq 'itemHasDubbedBadge' "$MAIN"
          grep -Fq 'ic_dubbed_mic_green' "$MAIN"
          grep -Fq 'normalizeArchiveItem(it, archive)' "$MAIN"
          grep -Fq 'text = "نسخه ${appVersionName()}"' "$MAIN"
          grep -Fq 'سافت‌ساب فارسی' "$MAIN"
          grep -Fq 'هاردساب فارسی' "$MAIN"
          grep -Fq 'دوبله فارسی' "$MAIN"
          grep -Fq 'صوت دوبله' "$MAIN"

          grep -Fq 'private fun showAdvancedSearchResults(state: AdvancedSearchState)' "$MAIN"
          grep -Fq 'private fun advancedSearchAccordion(' "$MAIN"
          grep -Fq 'private fun showAdvancedFiltersDialog(' "$MAIN"
          grep -Fq 'private fun advancedFilterCount(' "$MAIN"
          grep -Fq 'جستجوی پیشرفته' "$MAIN"
          grep -Fq 'اعمال فیلتر' "$MAIN"
          grep -Fq 'هر آرشیو دیتابیس جدا دارد' "$MAIN"
          grep -Fq 'private fun advancedSearchUrl(state: AdvancedSearchState' "$MAIN"
          grep -Fq 'جستجوی پیشرفته' "$MAIN"
          grep -Fq 'آرشیو ۱' "$MAIN"
          grep -Fq 'آرشیو ۲' "$MAIN"
          if grep -Fq 'پلی‌لیست' "$MAIN"; then
            echo "Old Playlist label still exists."
            exit 1
          fi

          php -l project/server-required/api5.php
          php -l project/server-required/api5_lib.php
          php -l project/server-required/archive1_live.php
          php -l project/server-required/archive1_live_lib.php
          grep -Fq 'serialblog_advanced_search' project/server-required/api5_lib.php
          grep -Fq 'bma1_advanced_url' project/server-required/archive1_live_lib.php
          grep -Fq "isset(\$_GET['advanced'])" project/server-required/api5.php
          grep -Fq "isset(\$_GET['advanced'])" project/server-required/archive1_live.php

          grep -Fq 'private fun showAudioSubtitleSettingsSheet()' "$PLAYER"
          grep -Fq 'time.toDouble() / length.toDouble() < 0.95' "$PLAYER"
          grep -Fq '"pink" to "صورتی"' "$PLAYER"
          if grep -Eq 'CastContext|MediaRouteButton|CastButtonFactory|castCurrentMedia' "$PLAYER"; then
            echo "Cast code still exists in PlayerActivity."
            exit 1
          fi
          if grep -Eq 'play-services-cast-framework|androidx.mediarouter' "$GRADLE"; then
            echo "Cast dependencies still exist."
            exit 1
          fi
          if grep -Fq 'CastOptionsProvider' "$MANIFEST"; then
            echo "Cast manifest metadata still exists."
            exit 1
          fi

          grep -Fq 'getInt(KEY_SUB_TEXT_COLOR, Color.YELLOW)' "$PREFS"
          grep -Fq 'getString(KEY_SUB_BG_MODE, "black")' "$PREFS"
          grep -Fq '"pink" -> Color.rgb(236, 64, 122)' "$PREFS"
          if grep -Fq '"glass"' "$PREFS"; then
            echo "Broken glass subtitle mode still exists."
            exit 1
          fi

          grep -Fq 'DocumentFile.fromTreeUri' "$SERVICE"
          grep -Fq 'ParcelFileDescriptor' "$SERVICE"
          grep -Fq 'setRequestProperty("Range", "bytes=$start-")' "$SERVICE"
          grep -Fq 'Executors.newFixedThreadPool(2)' "$SERVICE"
          grep -Fq 'مسیر ذخیره‌سازی' "$DOWNLOADS"
          grep -Fq 'ذخیره در:' "$DOWNLOADS"
          grep -Fq 'DownloadLocationPrefs.setTree' "$DOWNLOADS"

          if grep -R -E 'bonVF|vazir\.ttf|KEY_FONT|KEY_SUB_FONT|customFontFile' project/app/src/main project/app/build.gradle; then
            echo "Custom font code or asset still exists."
            exit 1
          fi
          if grep -Fq 'دانلود با Chrome' "$MAIN"; then
            echo "Chrome downloader must stay removed."
            exit 1
          fi
          if find project/app/src/main -type f \( -iname '*.ttf' -o -iname '*.otf' -o -iname '*.woff' -o -iname '*.woff2' \) | grep -q .; then
            echo "A font file is still packaged."
            exit 1
          fi

          grep -Fq 'const val EXTRA_PLAYLIST_FILE = "playlist_file"' "$PLAYER"
          grep -Fq 'private fun launchPlayerSafely(url: String)' "$PLAYER"
          grep -Fq 'playbackRetryCount < 2' "$PLAYER"
          grep -Fq 'private fun cachePlayerPayload(payload: JSONObject)' "$MAIN"
          grep -Fq 'putExtra(PlayerActivity.EXTRA_PLAYLIST_FILE, payloadPath)' "$MAIN"
          grep -Fq 'private fun showPlaylistGuide()' "$MAIN"
          grep -Fq 'آرشیو ۱ — همیشه به‌روز' "$MAIN"
          grep -Fq 'آرشیو ۲ — به‌روزرسانی دیرتر' "$MAIN"
          grep -Fq 'private fun showFavorites()' "$MAIN"
          grep -Fq '"favorites", R.drawable.ic_nav_heart' "$MAIN"
          grep -Fq 'currentScreen != "search"' "$MAIN"
          grep -Fq 'archiveSwitchBar { archive ->' "$MAIN"
          grep -Fq 'Executors.newFixedThreadPool(4)' "$MAIN"
          test -f project/V20_PLAYER_CRASH_PLAYLIST_GUIDE_README_FA.txt
          test -f project/V22_SEARCH_FILTER_UI_README_FA.txt

          echo "V1.9 V22 professional search filters, Archive 1/2 guide and prior fixes verified."

      - name: Fix V22 transparent background compile error
        shell: bash
        run: |
          set -euo pipefail

          MAIN="project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt"

          python3 <<'PY'
          from pathlib import Path

          path = Path("project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt")
          source = path.read_text(encoding="utf-8")

          old = (
              "        val wrapper = LinearLayout(this).apply {\n"
              "            orientation = LinearLayout.VERTICAL\n"
              "            background = Color.TRANSPARENT\n"
              "        }"
          )

          new = (
              "        val wrapper = LinearLayout(this).apply {\n"
              "            orientation = LinearLayout.VERTICAL\n"
              "            setBackgroundColor(Color.TRANSPARENT)\n"
              "        }"
          )

          count = source.count(old)
          if count != 1:
              print("==================== REAL ERROR ====================")
              print(f"Expected one broken transparent background block, found: {count}")
              print("====================================================")
              raise SystemExit(1)

          path.write_text(source.replace(old, new, 1), encoding="utf-8")
          print("V22 compile error fixed.")
          PY

          grep -Fq 'setBackgroundColor(Color.TRANSPARENT)' "$MAIN"

          if grep -Fq 'background = Color.TRANSPARENT' "$MAIN"; then
            echo "Broken Drawable assignment still exists."
            exit 1
          fi

          echo "V22 compile hotfix verified."

      - name: Make startup independent from archive availability
        shell: bash
        run: |
          set -euo pipefail

          cat > /tmp/patch_archive_fallback.py <<'PY'
          from pathlib import Path
          
          path = Path('project/app/src/main/java/ir/bankmoviee/app/MainActivity.kt')
          source = path.read_text(encoding='utf-8')
          
          # Keep remote-config failure from delaying app entry for too long.
          source = source.replace('connectTimeout = 6500', 'connectTimeout = 3500', 1)
          source = source.replace('readTimeout = 9000', 'readTimeout = 5000', 1)
          
          # 1) Runtime archive state fields.
          old = '''    private var pendingDownloadItemJson = ""
              private var pendingDownloadLinkJson = ""
          '''
          new = '''    private var pendingDownloadItemJson = ""
              private var pendingDownloadLinkJson = ""
              private var archive1Available: Boolean? = null
              private var archive2Available: Boolean? = null
              private var archiveProbeRemaining = 0
              private var archiveStatusNoticeShown = false
          '''
          if old not in source:
              raise SystemExit('fields anchor not found')
          source = source.replace(old, new, 1)
          
          # 2) Replace direct archive selection with availability-aware selection.
          start = source.index('    private fun setSelectedArchive(archive: Int) {')
          end = source.index('\n    private fun archiveSectionUrl(', start)
          selection_code = r'''    private fun archiveKnownAvailable(archive: Int): Boolean? {
                  return if (archive == 2) archive2Available else archive1Available
              }
          
              private fun archiveOther(archive: Int): Int = if (archive == 2) 1 else 2
          
              private fun archiveDownMessage(archive: Int): String {
                  val other = archiveOther(archive)
                  return t(
                      "${archiveLabel(archive)} موقتاً در دسترس نیست. تا زمان رفع مشکل از ${archiveLabel(other)} استفاده کنید.",
                      "${archiveLabel(archive)} is temporarily unavailable. Please use ${archiveLabel(other)} until it is restored."
                  )
              }
          
              private fun chooseArchive(archive: Int, onSelected: ((Int) -> Unit)? = null) {
                  val safe = if (archive == 2) 2 else 1
                  val other = archiveOther(safe)
                  if (archiveKnownAvailable(safe) == false && archiveKnownAvailable(other) == true) {
                      showArchiveUnavailableDialog(safe, other)
                      return
                  }
                  val changed = selectedArchive != safe
                  selectedArchive = safe
                  appPrefs().edit().putInt("selected_archive", safe).apply()
                  if (onSelected != null) {
                      onSelected(safe)
                  } else if (changed) {
                      navigationHistory.clear()
                      showHome()
                  }
              }
          
              private fun setSelectedArchive(archive: Int) {
                  chooseArchive(archive, null)
              }
          '''
          source = source[:start] + selection_code + source[end:]
          
          # 3) Make archive switch use chooseArchive().
          old = '''            setOnClickListener {
                          val safe = if (archive == 2) 2 else 1
                          val changed = selectedArchive != safe
                          selectedArchive = safe
                          appPrefs().edit().putInt("selected_archive", safe).apply()
                          if (onSelected != null) {
                              onSelected(safe)
                          } else if (changed) {
                              navigationHistory.clear()
                              showHome()
                          }
                      }
          '''
          new = '''            setOnClickListener {
                          chooseArchive(archive, onSelected)
                      }
          '''
          if old not in source:
              raise SystemExit('archive segment click block not found')
          source = source.replace(old, new, 1)
          
          # 4) Add resilient archive probes, banners and fallback boot.
          boot_start = source.index('    private fun boot() {')
          boot_end = source.index('\n        private fun attachSmartHeader(', boot_start)
          boot_code = r'''    private fun cachedArchiveAvailability(archive: Int): Boolean? {
                  val prefs = appPrefs()
                  val checkedAt = prefs.getLong("archive_${archive}_checked_at", 0L)
                  if (checkedAt <= 0L || System.currentTimeMillis() - checkedAt > 30L * 60L * 1000L) return null
                  return when (prefs.getInt("archive_${archive}_available", -1)) {
                      1 -> true
                      0 -> false
                      else -> null
                  }
              }
          
              private fun saveArchiveAvailability(archive: Int, available: Boolean) {
                  if (archive == 2) archive2Available = available else archive1Available = available
                  appPrefs().edit()
                      .putInt("archive_${archive}_available", if (available) 1 else 0)
                      .putLong("archive_${archive}_checked_at", System.currentTimeMillis())
                      .apply()
              }
          
              private fun archiveProbeUrl(archive: Int): String {
                  return if (archive == 2) {
                      "$archive2ApiBase?section=movies_2025_2026&page=1&limit=1"
                  } else {
                      "$apiBase?action=section&archive=1&section=updated_movies&page=1&limit=1"
                  }
              }
          
              private fun probeJsonFast(rawUrl: String): Boolean {
                  ensureDefaultServerPool()
                  val rewritten = rewriteConfiguredUrl(rawUrl)
                  val original = try { URL(rewritten) } catch (_: Throwable) { return false }
                  val query = original.query?.let { "?$it" }.orEmpty()
                  val candidates = mutableListOf<String>()
                  if (original.path.endsWith("app_api.php", true)) {
                      apiServers.forEach { endpoint -> candidates.add(endpoint.apiUrl.substringBefore('?') + query) }
                  } else {
                      candidates.add(rewritten)
                  }
                  if (candidates.none { it.equals(rewritten, true) }) candidates.add(0, rewritten)
          
                  for (candidate in candidates.distinctBy { it.lowercase(Locale.US) }) {
                      var connection: HttpURLConnection? = null
                      try {
                          val url = URL(candidate)
                          connection = (url.openConnection() as HttpURLConnection).apply {
                              connectTimeout = 3500
                              readTimeout = 5000
                              instanceFollowRedirects = true
                              setRequestProperty("Accept", "application/json")
                              setRequestProperty("User-Agent", "BankmovieAndroidNative/1.9-ArchiveFallback")
                              setRequestProperty("Cache-Control", "no-cache")
                          }
                          if (url.path.endsWith("app_api.php", true)) {
                              val ts = (System.currentTimeMillis() / 1000L + serverClockOffsetSec).toString()
                              val pathQuery = url.path + if (url.query.isNullOrBlank()) "" else "?${url.query}"
                              connection.setRequestProperty("X-BM-App-Key", bmAppKey)
                              connection.setRequestProperty("X-BM-Ts", ts)
                              connection.setRequestProperty("X-BM-Sign", hmacSha256Hex("$ts|$pathQuery", bmAppSecret))
                          }
                          val code = connection.responseCode
                          val body = (if (code in 200..299) connection.inputStream else connection.errorStream)
                              ?.bufferedReader(Charsets.UTF_8)?.use { it.readText() }.orEmpty()
                          if (code !in 200..299 || body.isBlank()) continue
                          val json = JSONObject(body)
                          val explicitFailure =
                              (json.has("ok") && !json.optBoolean("ok", false)) ||
                              (json.has("success") && !json.optBoolean("success", false)) ||
                              json.optString("error").isNotBlank()
                          val hasPayload = json.has("items") || json.has("movies") || json.has("data") ||
                              json.optBoolean("ready", false) || json.optBoolean("ok", false) || json.optBoolean("success", false)
                          if (!explicitFailure && hasPayload) return true
                      } catch (_: Throwable) {
                      } finally {
                          try { connection?.disconnect() } catch (_: Throwable) {}
                      }
                  }
                  return false
              }
          
              private fun showArchiveUnavailableDialog(unavailable: Int, available: Int) {
                  if (isFinishing) return
                  AlertDialog.Builder(this)
                      .setTitle(t("${archiveLabel(unavailable)} موقتاً قطع است", "${archiveLabel(unavailable)} is temporarily offline"))
                      .setMessage(archiveDownMessage(unavailable))
                      .setPositiveButton(t("استفاده از ${archiveLabel(available)}", "Use ${archiveLabel(available)}")) { dialog, _ ->
                          dialog.dismiss()
                          val changed = selectedArchive != available
                          selectedArchive = available
                          appPrefs().edit().putInt("selected_archive", available).apply()
                          if (changed && ::root.isInitialized && currentScreen == "home") showHome()
                      }
                      .setNegativeButton(t("بعداً", "Later"), null)
                      .show()
              }
          
              private fun activateArchiveFallback(unavailable: Int, available: Int) {
                  if (selectedArchive != unavailable || archiveKnownAvailable(available) != true) return
                  selectedArchive = available
                  appPrefs().edit().putInt("selected_archive", available).apply()
                  if (::root.isInitialized && currentScreen == "home") showHome()
                  if (!archiveStatusNoticeShown) {
                      archiveStatusNoticeShown = true
                      showArchiveUnavailableDialog(unavailable, available)
                  } else {
                      Toast.makeText(this, archiveDownMessage(unavailable), Toast.LENGTH_LONG).show()
                  }
              }
          
              private fun handleArchiveProbeResult(archive: Int, available: Boolean) {
                  saveArchiveAvailability(archive, available)
                  archiveProbeRemaining = (archiveProbeRemaining - 1).coerceAtLeast(0)
                  val other = archiveOther(archive)
          
                  if (!available && archiveKnownAvailable(other) == true) {
                      activateArchiveFallback(archive, other)
                  } else if (available && selectedArchive == other && archiveKnownAvailable(other) != true) {
                      uiHandler.postDelayed({
                          if (selectedArchive == other && archiveKnownAvailable(other) != true && archiveKnownAvailable(archive) == true) {
                              activateArchiveFallback(other, archive)
                          }
                      }, 4000L)
                  }
          
                  if (archiveProbeRemaining == 0 && ::root.isInitialized && currentScreen == "home") {
                      showHome()
                  }
              }
          
              private fun refreshArchiveAvailability() {
                  archiveProbeRemaining = 2
                  for (archive in 1..2) {
                      Thread {
                          val available = probeJsonFast(archiveProbeUrl(archive))
                          runOnUiThread { handleArchiveProbeResult(archive, available) }
                      }.start()
                  }
              }
          
              private fun archiveStatusBanner(): View? {
                  val a1 = archive1Available
                  val a2 = archive2Available
                  val message = when {
                      a1 == false && a2 == true -> t(
                          "آرشیو ۱ موقتاً در دسترس نیست؛ فعلاً از آرشیو ۲ استفاده کنید.",
                          "Archive 1 is temporarily unavailable; please use Archive 2."
                      )
                      a2 == false && a1 == true -> t(
                          "آرشیو ۲ موقتاً در دسترس نیست؛ فعلاً از آرشیو ۱ استفاده کنید.",
                          "Archive 2 is temporarily unavailable; please use Archive 1."
                      )
                      a1 == false && a2 == false -> t(
                          "هر دو آرشیو موقتاً در دسترس نیستند. برنامه باز می‌ماند؛ کمی بعد دوباره تلاش کنید.",
                          "Both archives are temporarily unavailable. The app will stay open; try again shortly."
                      )
                      else -> return null
                  }
                  val target = when {
                      a1 == false && a2 == true -> 2
                      a2 == false && a1 == true -> 1
                      else -> 0
                  }
                  return TextView(this).apply {
                      text = message
                      setTextColor(if (UiPreferences.themeMode(this@MainActivity) == "light") Color.rgb(92, 45, 0) else Color.rgb(255, 219, 153))
                      textSize = 12.3f
                      gravity = Gravity.CENTER
                      typeface = Typeface.DEFAULT_BOLD
                      setPadding(dp(14), dp(11), dp(14), dp(11))
                      background = rounded(
                          if (UiPreferences.themeMode(this@MainActivity) == "light") Color.rgb(255, 243, 214) else Color.rgb(56, 35, 12),
                          dp(16),
                          Color.rgb(226, 162, 48)
                      )
                      if (target != 0) setOnClickListener { chooseArchive(target, null) }
                  }
              }
          
              private fun archiveUnavailableView(archive: Int, rawError: String?): View {
                  val other = archiveOther(archive)
                  return LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      gravity = Gravity.CENTER
                      setPadding(dp(16), dp(14), dp(16), dp(14))
                      background = rounded(card, dp(16), Color.argb(100, 235, 168, 53))
                      addView(TextView(this@MainActivity).apply {
                          text = t("${archiveLabel(archive)} لود نشد", "${archiveLabel(archive)} could not be loaded")
                          setTextColor(white)
                          textSize = 13.5f
                          typeface = Typeface.DEFAULT_BOLD
                          gravity = Gravity.CENTER
                      })
                      addView(TextView(this@MainActivity).apply {
                          text = if (archiveKnownAvailable(other) != false) archiveDownMessage(archive) else friendlyError(rawError)
                          setTextColor(muted)
                          textSize = 11.5f
                          gravity = Gravity.CENTER
                          setPadding(0, dp(6), 0, 0)
                      })
                      if (archiveKnownAvailable(other) != false) {
                          addView(TextView(this@MainActivity).apply {
                              text = t("رفتن به ${archiveLabel(other)}", "Open ${archiveLabel(other)}")
                              setTextColor(Color.WHITE)
                              textSize = 12f
                              typeface = Typeface.DEFAULT_BOLD
                              gravity = Gravity.CENTER
                              background = blueGradient(dp(14))
                              setPadding(dp(16), dp(8), dp(16), dp(8))
                              setOnClickListener { chooseArchive(other, null) }
                          }, LinearLayout.LayoutParams(-2, -2).apply { topMargin = dp(10) })
                      }
                  }
              }
          
              private fun boot() {
                  loadAppConfig {
                      if (maintenanceMode) {
                          runOnUiThread { showNetworkError(maintenanceMessage) }
                          return@loadAppConfig
                      }
                      val versionBlockReason = currentVersionBlockReason()
                      if (versionBlockReason != null) {
                          runOnUiThread {
                              val apkUrl = selectedRemoteApkUrl()
                              if (apkUrl.isNotBlank() && forceUpdateBlockedVersions) {
                                  showUpdateDialog(
                                      remoteUpdateTitle.ifBlank { t("این نسخه غیرفعال شده است", "This version is disabled") },
                                      versionBlockReason,
                                      apkUrl,
                                      true,
                                      remoteVersionName.ifBlank { t("نسخه جدید", "Latest version") },
                                      appVersionName(),
                                      remoteUpdateChanges
                                  )
                              } else {
                                  showBlockedVersionScreen(versionBlockReason)
                              }
                          }
                          return@loadAppConfig
                      }
          
                      archive1Available = cachedArchiveAvailability(1)
                      archive2Available = cachedArchiveAvailability(2)
                      if (selectedArchive == 1 && archive1Available == false && archive2Available != false) selectedArchive = 2
                      if (selectedArchive == 2 && archive2Available == false && archive1Available != false) selectedArchive = 1
                      appPrefs().edit().putInt("selected_archive", selectedArchive).apply()
          
                      val cachedBoot = appPrefs().getString("cached_boot_json_v1", "").orEmpty()
                      bootJson = try {
                          if (cachedBoot.isNotBlank()) JSONObject(cachedBoot) else JSONObject().put("ready", true).put("sliders", JSONArray())
                      } catch (_: Throwable) {
                          JSONObject().put("ready", true).put("sliders", JSONArray())
                      }
          
                      runOnUiThread {
                          buildShell()
                          showHome()
                          showRemoteNoticeIfNeeded()
                          showConfigUpdateIfNeeded(false)
                          refreshArchiveAvailability()
                      }
          
                      // Boot metadata is optional. Its failure must never block entering the app.
                      fetch("$apiBase?action=boot") { ok, json, _ ->
